<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ny Aina Med's Emergency & Intensive Care</title>
<style>
:root{
  --bg:#0b0f14; --bg2:#121821; --panel:#161d27; --panel2:#1c2531;
  --border:#26323f; --text:#e8edf2; --muted:#8a99a8; --accent:#2dd4bf;
  --accent2:#38bdf8; --danger:#f87171; --warn:#fbbf24; --ok:#4ade80;
  --grave:#dc2626; --modere:#f59e0b; --leger:#22c55e;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.5; min-height:100vh;
}
#app{display:flex; min-height:100vh;}

/* Sidebar */
#sidebar{
  width:260px; background:var(--bg2); border-right:1px solid var(--border);
  flex-shrink:0; display:flex; flex-direction:column; height:100vh;
  position:sticky; top:0; overflow-y:auto; transition:transform .25s ease;
  z-index:50;
}
#sidebar .brand{
  padding:18px 16px; border-bottom:1px solid var(--border);
}
#sidebar .brand h1{font-size:16px; color:var(--accent); font-weight:700;}
#sidebar .brand p{font-size:11px; color:var(--muted); margin-top:2px;}
#nav-list{list-style:none; padding:8px;}
#nav-list li{margin-bottom:2px;}
#nav-list button{
  width:100%; text-align:left; background:none; border:none; color:var(--text);
  padding:10px 12px; border-radius:8px; font-size:13.5px; cursor:pointer;
  display:flex; align-items:center; gap:10px; transition:background .15s;
}
#nav-list button:hover{background:var(--panel2);}
#nav-list button.active{background:var(--panel2); color:var(--accent); font-weight:600;}
#nav-list .icon{font-size:16px; width:20px; text-align:center;}

/* Main */
#main{flex:1; min-width:0; display:flex; flex-direction:column;}
#topbar{
  display:none; align-items:center; gap:12px; padding:12px 16px;
  background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:40;
}
#topbar button{background:none; border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 10px; font-size:18px;}
#content{padding:20px 24px 60px; max-width:980px; margin:0 auto; width:100%;}

h2.module-title{font-size:20px; color:var(--accent); margin-bottom:4px;}
p.module-sub{color:var(--muted); font-size:13px; margin-bottom:18px;}

.card{
  background:var(--panel); border:1px solid var(--border); border-radius:12px;
  padding:16px; margin-bottom:14px; scroll-margin-top:70px;
}
.card h3{color:var(--accent2); font-size:15px; margin-bottom:10px;}
.placeholder{
  border:1px dashed var(--border); border-radius:12px; padding:30px;
  text-align:center; color:var(--muted); font-size:13.5px;
}
.badge{display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; margin-left:6px;}
.badge.todo{background:#3a2e1a; color:var(--warn);}
.badge.done{background:#163325; color:var(--ok);}

.toc{
  background:var(--panel); border:1px solid var(--border); border-radius:12px;
  padding:14px 16px; margin-bottom:14px; scroll-margin-top:70px;
}
.toc-head{display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer; user-select:none;}
.toc-head h3{color:var(--accent); font-size:14px; display:flex; align-items:center; gap:6px; margin-bottom:0;}
.toc-toggle{
  background:none; border:1px solid var(--border); color:var(--muted); border-radius:8px;
  width:28px; height:28px; font-size:13px; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:transform .2s ease;
}
.toc.collapsed .toc-toggle{transform:rotate(-90deg);}
.toc-list{list-style:none; display:flex; flex-direction:column; margin-top:10px; overflow:hidden; border-top:1px solid var(--border);}
.toc.collapsed .toc-list{display:none;}
.toc-list li{margin:0; border-bottom:1px solid var(--border);}
.toc-list a{
  display:flex; align-items:center; gap:8px; color:var(--text);
  padding:10px 4px; font-size:13px; text-decoration:none; cursor:pointer;
  transition:color .15s, padding-left .15s;
}
.toc-list a::after{content:"›"; margin-left:auto; color:var(--muted); font-size:16px;}
.toc-list a:hover, .toc-list a:active{color:var(--accent); padding-left:8px;}
.toc-list li.toc-cat{
  border-bottom:1px solid var(--border); padding:14px 4px 6px 4px; font-size:11px;
  text-transform:uppercase; letter-spacing:.05em; color:var(--accent); font-weight:700;
  cursor:pointer; user-select:none; display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.toc-list li.toc-cat:first-child{padding-top:2px;}
.toc-list a .grave-dot{color:var(--danger);}
.toc-cat-arrow{
  font-size:12px; color:var(--muted); font-weight:400; text-transform:none; letter-spacing:0;
  transition:transform .2s ease; flex-shrink:0;
}
.toc-list li.toc-cat.collapsed .toc-cat-arrow{transform:rotate(-90deg);}
.toc-list li.toc-group{padding:0; border-bottom:none; overflow:hidden;}
.toc-list li.toc-group.collapsed{display:none;}
.toc-sub{list-style:none; margin:0; padding:0;}
.toc-sub li{margin:0; border-bottom:1px solid var(--border);}
.back-to-toc{
  display:inline-flex; align-items:center; gap:5px; margin-top:14px;
  background:none; border:1px solid var(--border); color:var(--muted);
  border-radius:20px; padding:6px 12px; font-size:12px; cursor:pointer;
  transition:color .15s, border-color .15s;
}
.back-to-toc:hover, .back-to-toc:active{color:var(--accent); border-color:var(--accent);}

table{width:100%; border-collapse:collapse; font-size:13px;}
th,td{padding:8px 10px; border-bottom:1px solid var(--border); text-align:left;}
th{color:var(--muted); font-weight:600; font-size:12px;}

.grave{color:var(--grave); font-weight:700;}
.modere{color:var(--modere); font-weight:700;}
.leger{color:var(--leger); font-weight:700;}

input[type=number], select{
  background:var(--panel2); border:1px solid var(--border); color:var(--text);
  padding:8px 10px; border-radius:8px; font-size:14px; width:100%;
}
label{font-size:12.5px; color:var(--muted); display:block; margin-bottom:4px;}
.field{margin-bottom:10px;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.btn{
  background:var(--accent); color:#06201c; border:none; padding:10px 16px;
  border-radius:8px; font-weight:700; font-size:14px; cursor:pointer; margin-top:6px;
}
.result-box{
  margin-top:12px; padding:12px 14px; border-radius:10px; background:var(--panel2);
  border-left:4px solid var(--accent); font-size:14px;
}
.warn-box{
  margin-bottom:10px; padding:9px 12px; border-radius:8px; background:rgba(251,191,36,.1);
  border:1px solid var(--warn); color:var(--warn); font-size:12.5px; line-height:1.6;
}
#search-results{list-style:none; padding:0 8px; margin:0; max-height:60vh; overflow-y:auto; display:none;}
#search-results.show{display:block;}
#search-results li{margin-bottom:2px;}
#search-results a{
  display:block; padding:8px 10px; border-radius:8px; color:var(--text); text-decoration:none;
  cursor:pointer; font-size:12.5px; border:1px solid transparent;
}
#search-results a:hover, #search-results a:active{background:var(--panel2); border-color:var(--accent);}
#search-results .sr-mod{color:var(--accent); font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; display:block; margin-bottom:2px;}
#search-results .sr-empty{color:var(--muted); font-size:12.5px; padding:10px;}
.search-highlight{outline:2px solid var(--accent); outline-offset:3px; transition:outline-color 2s ease;}

#search-box{
  padding:12px; border-bottom:1px solid var(--border);
}
#search-box input{
  width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
  padding:9px 10px; border-radius:8px; font-size:13px;
}
.local-search-input{
  background:var(--panel2); border:1px solid var(--border); color:var(--text);
  padding:10px 12px; border-radius:8px; font-size:14px; width:100%; margin-bottom:10px;
}
.local-search-input:focus{outline:none; border-color:var(--accent);}
#abbr-count{font-size:12px; color:var(--muted); margin-bottom:8px;}
.abbr-list{list-style:none; padding:0; margin:0;}
.abbr-item{
  padding:9px 6px; border-bottom:1px solid var(--border); font-size:13.5px; line-height:1.5;
}
.abbr-item:last-child{border-bottom:none;}
.abbr-item strong{color:var(--accent); margin-right:6px;}
.abbr-empty{color:var(--muted); font-size:13px; padding:14px 6px; display:none;}
.hidden{display:none !important;}
#overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:45;}

@media (max-width:860px){
  #sidebar{position:fixed; left:0; top:0; height:100%; transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #topbar{display:flex;}
  #overlay.show{display:block;}
}
</style>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Urgence & Réanimation"></head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <h1>🫀 Ny Aina Med's</h1>
      <p>Emergency & Intensive Care</p>
    </div>
    <div id="search-box">
      <input type="text" id="nav-search" placeholder="Rechercher (ex. atropine, hyperkaliémie...)">
    </div>
    <ul id="search-results"></ul>
    <ul id="nav-list">
      <li><button data-mod="accueil" class="active"><span class="icon">🏠</span> Accueil</button></li>

      <li><button data-mod="protocoles"><span class="icon">🚨</span> Protocoles d'urgence</button></li>
      <li><button data-mod="drogues"><span class="icon">💉</span> Drogues de réanimation</button></li>
      <li><button data-mod="ventilation"><span class="icon">🫁</span> Ventilation & O2</button></li>
      <li><button data-mod="abords"><span class="icon">🩸</span> Voies veineuses / Abords</button></li>
      <li><button data-mod="surveillance"><span class="icon">📈</span> Bilan & Surveillance</button></li>
      <li><button data-mod="fiches"><span class="icon">✅</span> Fiches pratiques</button></li>
      <li><button data-mod="calculateurs"><span class="icon">🧮</span> Calculateurs</button></li>
      <li><button data-mod="ionique"><span class="icon">⚗️</span> Troubles ioniques</button></li>
      <li><button data-mod="abreviations"><span class="icon">🔤</span> Abréviations</button></li>
    </ul>
  </aside>
  <div id="overlay"></div>
  <main id="main">
    <div id="topbar">
      <button id="menu-toggle">☰</button>
      <strong id="topbar-title">Accueil</strong>
    </div>
    <div id="content"></div>
  </main>
</div>

<script>
const MODULES = {
  accueil: { title:"Accueil", icon:"🏠" },
  scores: { title:"Scores cliniques", icon:"📊" },
  protocoles: { title:"Protocoles d'urgence", icon:"🚨" },
  drogues: { title:"Drogues de réanimation", icon:"💉" },
  ventilation: { title:"Ventilation & O2", icon:"🫁" },
  abords: { title:"Voies veineuses / Abords", icon:"🩸" },
  surveillance: { title:"Bilan & Surveillance", icon:"📈" },
  fiches: { title:"Fiches pratiques", icon:"✅" },
  calculateurs: { title:"Calculateurs", icon:"🧮" },
  ionique: { title:"Troubles ioniques", icon:"⚗️" },
  abreviations: { title:"Abréviations", icon:"🔤" },
};

const renderers = {}; // mod -> function() -> html string

/* ancienne renderAccueil remplacée plus bas */

/* ===================== MODULE SCORES CLINIQUES ===================== */
function renderScores(){
  return `
  <h2 class="module-title">📊 Scores cliniques</h2>
  <p class="module-sub">Calculateurs interactifs avec interprétation automatique.</p>

  <div class="card">
    <h3>NEWS2 — National Early Warning Score 2</h3>
    <div class="row2">
      <div class="field"><label>Fréquence respiratoire (/min)</label><input type="number" id="news_fr"></div>
      <div class="field"><label>SpO2 (%)</label><input type="number" id="news_spo2"></div>
      <div class="field"><label>Sous oxygène ?</label>
        <select id="news_o2"><option value="0">Air ambiant</option><option value="2">Oxygénothérapie</option></select>
      </div>
      <div class="field"><label>Température (°C)</label><input type="number" step="0.1" id="news_temp"></div>
      <div class="field"><label>PA systolique (mmHg)</label><input type="number" id="news_pas"></div>
      <div class="field"><label>Fréquence cardiaque (/min)</label><input type="number" id="news_fc"></div>
      <div class="field"><label>Conscience</label>
        <select id="news_consc"><option value="0">Alerte</option><option value="3">Confusion/Voix/Douleur/Aréactif (CVPU)</option></select>
      </div>
    </div>
    <button class="btn" onclick="calcNEWS2()">Calculer</button>
    <div class="result-box hidden" id="news_result"></div>
  </div>

  <div class="card">
    <h3>Score de Glasgow (GCS) — Adulte</h3>
    <div class="row2">
      <div class="field"><label>Ouverture des yeux (Y)</label>
        <select id="gcs_y">
          <option value="4">4 — Spontanée</option>
          <option value="3">3 — À la demande</option>
          <option value="2">2 — À la douleur</option>
          <option value="1">1 — Nulle</option>
        </select>
      </div>
      <div class="field"><label>Réponse verbale (V)</label>
        <select id="gcs_v">
          <option value="5">5 — Orientée</option>
          <option value="4">4 — Confuse</option>
          <option value="3">3 — Mots inappropriés</option>
          <option value="2">2 — Sons incompréhensibles</option>
          <option value="1">1 — Nulle</option>
        </select>
      </div>
      <div class="field"><label>Réponse motrice (M)</label>
        <select id="gcs_m">
          <option value="6">6 — Obéit aux ordres</option>
          <option value="5">5 — Orientée à la douleur</option>
          <option value="4">4 — Évitement/Retrait</option>
          <option value="3">3 — Flexion (décortication)</option>
          <option value="2">2 — Extension (décérébration)</option>
          <option value="1">1 — Nulle</option>
        </select>
      </div>
    </div>
    <button class="btn" onclick="calcGCS()">Calculer</button>
    <div class="result-box hidden" id="gcs_result"></div>
  </div>

  <div class="card">
    <h3>qSOFA — Quick SOFA (suspicion sepsis)</h3>
    <div class="row2">
      <div class="field"><label>Fréquence respiratoire ≥ 22/min ?</label>
        <select id="qsofa_fr"><option value="0">Non</option><option value="1">Oui</option></select></div>
      <div class="field"><label>PA systolique ≤ 100 mmHg ?</label>
        <select id="qsofa_pas"><option value="0">Non</option><option value="1">Oui</option></select></div>
      <div class="field"><label>Altération de la conscience (GCS&lt;15) ?</label>
        <select id="qsofa_consc"><option value="0">Non</option><option value="1">Oui</option></select></div>
    </div>
    <button class="btn" onclick="calcQSOFA()">Calculer</button>
    <div class="result-box hidden" id="qsofa_result"></div>
  </div>

  <div class="card">
    <h3>Référence rapide — interprétation</h3>
    <table>
      <tr><th>Score</th><th>Seuils</th></tr>
      <tr><td>NEWS2</td><td>0-4 <span class="leger">faible</span> · 5-6 <span class="modere">moyen</span> · ≥7 <span class="grave">élevé (urgence)</span></td></tr>
      <tr><td>GCS</td><td>13-15 léger · 9-12 modéré · ≤8 <span class="grave">grave (intubation à discuter)</span></td></tr>
      <tr><td>qSOFA</td><td>≥2 critères → risque de mortalité accru, évoquer sepsis grave</td></tr>
    </table>
  </div>`;
}
renderers.scores = renderScores;

function calcNEWS2(){
  const fr = parseFloat(document.getElementById('news_fr').value);
  const spo2 = parseFloat(document.getElementById('news_spo2').value);
  const o2 = parseInt(document.getElementById('news_o2').value);
  const temp = parseFloat(document.getElementById('news_temp').value);
  const pas = parseFloat(document.getElementById('news_pas').value);
  const fc = parseFloat(document.getElementById('news_fc').value);
  const consc = parseInt(document.getElementById('news_consc').value);

  if([fr,spo2,temp,pas,fc].some(v=>isNaN(v))){
    alert("Veuillez remplir tous les champs numériques.");
    return;
  }
  let score = 0;
  let sFr, sSpo2, sTemp, sPas, sFc;
  sFr = fr<=8?3: fr<=11?1: fr<=20?0: fr<=24?2:3; score+=sFr;
  sSpo2 = spo2<=91?3: spo2<=93?2: spo2<=95?1:0; score+=sSpo2;
  score += o2;
  sTemp = temp<=35?3: temp<=36?1: temp<=38?0: temp<=39?1:2; score+=sTemp;
  sPas = pas<=90?3: pas<=100?2: pas<=110?1: pas<=219?0:3; score+=sPas;
  sFc = fc<=40?3: fc<=50?1: fc<=90?0: fc<=110?1: fc<=130?2:3; score+=sFc;
  score += consc;

  // Règle NEWS2 officielle : un score isolé à 3 sur un seul paramètre ("score rouge")
  // impose une réponse urgente même si le score agrégé est faible — ne jamais l'ignorer.
  const scoreRougeIsole = [sFr,sSpo2,sTemp,sPas,sFc].some(s=>s===3);

  let niveau, classe, conduite;
  if(score>=7){niveau="ÉLEVÉ"; classe="grave"; conduite="Évaluation médicale urgente continue / discuter réanimation.";}
  else if(score>=5){niveau="MOYEN"; classe="modere"; conduite="Évaluation médicale urgente, surveillance rapprochée.";}
  else if(scoreRougeIsole){niveau="MOYEN (score rouge isolé)"; classe="modere"; conduite="Un paramètre est côté à 3 malgré un score total bas : réponse urgente requise (avis médical sans délai), quel que soit le score agrégé.";}
  else if(score===0){niveau="FAIBLE"; classe="leger"; conduite="Surveillance de routine (min. 12h).";}
  else {niveau="FAIBLE"; classe="leger"; conduite="Surveillance renforcée (min. 4-6h).";}

  document.getElementById('news_result').classList.remove('hidden');
  document.getElementById('news_result').innerHTML =
    `<strong>Score NEWS2 = ${score}</strong> — Risque <span class="${classe}">${niveau}</span><br>${conduite}`;
}

function calcGCS(){
  const y = parseInt(document.getElementById('gcs_y').value);
  const v = parseInt(document.getElementById('gcs_v').value);
  const m = parseInt(document.getElementById('gcs_m').value);
  const total = y+v+m;
  let niveau, classe;
  if(total<=8){niveau="GRAVE — discuter intubation (protection des voies aériennes)"; classe="grave";}
  else if(total<=12){niveau="MODÉRÉ"; classe="modere";}
  else {niveau="LÉGER"; classe="leger";}
  document.getElementById('gcs_result').classList.remove('hidden');
  document.getElementById('gcs_result').innerHTML =
    `<strong>GCS = ${total}/15</strong> (Y${y}V${v}M${m}) — <span class="${classe}">${niveau}</span>`;
}

function calcQSOFA(){
  const fr = parseInt(document.getElementById('qsofa_fr').value);
  const pas = parseInt(document.getElementById('qsofa_pas').value);
  const consc = parseInt(document.getElementById('qsofa_consc').value);
  const total = fr+pas+consc;
  let msg, classe;
  if(total>=2){msg="qSOFA positif — risque accru de mortalité, suspicion de sepsis grave. Doser lactates, hémocultures, débuter prise en charge sepsis."; classe="grave";}
  else {msg="qSOFA négatif — ne permet pas d'écarter un sepsis, rester vigilant si suspicion clinique."; classe="leger";}
  document.getElementById('qsofa_result').classList.remove('hidden');
  document.getElementById('qsofa_result').innerHTML = `<strong>qSOFA = ${total}/3</strong> — <span class="${classe}">${msg}</span>`;
}

/* ===================== MODULE TROUBLES IONIQUES ===================== */
function renderIonique(){
  return `
  <h2 class="module-title">⚗️ Correction des troubles ioniques</h2>
  <p class="module-sub">Reconnaissance et conduite à tenir en urgence. Vérifier la fonction rénale avant toute correction.</p>

  <nav class="toc" id="ionique-toc" aria-label="Sommaire des troubles ioniques">
    <div class="toc-head" onclick="toggleIoniqueToc()">
      <h3>📑 Sommaire — accès rapide</h3>
      <button type="button" class="toc-toggle" aria-label="Afficher/masquer le sommaire" onclick="event.stopPropagation(); toggleIoniqueToc();">▾</button>
    </div>
    <ul class="toc-list">
      <li><a onclick="document.getElementById('ion-hyperkaliemie').scrollIntoView({behavior:'smooth',block:'start'})">🔴 Hyperkaliémie</a></li>
      <li><a onclick="document.getElementById('ion-hypokaliemie').scrollIntoView({behavior:'smooth',block:'start'})">🟡 Hypokaliémie</a></li>
      <li><a onclick="document.getElementById('ion-hyponatremie').scrollIntoView({behavior:'smooth',block:'start'})">🔴 Hyponatrémie</a></li>
      <li><a onclick="document.getElementById('ion-hypernatremie').scrollIntoView({behavior:'smooth',block:'start'})">🟡 Hypernatrémie</a></li>
      <li><a onclick="document.getElementById('ion-hypocalcemie').scrollIntoView({behavior:'smooth',block:'start'})">🟡 Hypocalcémie</a></li>
      <li><a onclick="document.getElementById('ion-hypercalcemie').scrollIntoView({behavior:'smooth',block:'start'})">🟡 Hypercalcémie</a></li>
      <li><a onclick="document.getElementById('ion-hypomagnesemie').scrollIntoView({behavior:'smooth',block:'start'})">🟡 Hypomagnésémie</a></li>
      <li><a onclick="document.getElementById('ion-principes').scrollIntoView({behavior:'smooth',block:'start'})">⚠️ Principes généraux</a></li>
    </ul>
  </nav>

  <div class="card" id="ion-hyperkaliemie">
    <h3>🔴 Hyperkaliémie (K+ &gt; 5,0 mmol/L)</h3>
    <table>
      <tr><th>Gravité</th><th>Seuils / signes</th></tr>
      <tr><td class="modere">Modérée</td><td>K+ 5,5–6,5 mmol/L, ECG normal</td></tr>
      <tr><td class="grave">Sévère</td><td>K+ &gt; 6,5 mmol/L et/ou signes ECG (ondes T amples pointues, QRS élargi, disparition onde P, BAV, troubles du rythme ventriculaire)</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Conduite à tenir (si signes ECG ou K+ > 6,5) :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Stabilisation membranaire :</strong> Gluconate de calcium 10% — 10 mL IVL en 2-3 min (à répéter si ECG inchangé après 5 min). Ne corrige pas la kaliémie.</li>
      <li><strong>Transfert intracellulaire :</strong> Insuline rapide 10 UI + Glucosé 30% 250-500 mL (ou G10% 500mL) en 15-30 min (surveiller glycémie). Salbutamol nébulisé 10-20 mg (effet additif).</li>
      <li><strong>Bicarbonate de sodium</strong> 8,4% 50-100 mL IVL si acidose métabolique associée.</li>
      <li><strong>Élimination du potassium :</strong> Furosémide IV si diurèse conservée. Résines échangeuses d'ions (Kayexalate) par voie orale/rectale (action lente, non urgente). Épuration extra-rénale si insuffisance rénale sévère ou échec du traitement médical.</li>
      <li>Arrêt de tout apport de K+ et des médicaments hyperkaliémiants (IEC, ARA2, épargneurs de K+, AINS).</li>
    </ol>
  </div>

  <div class="card" id="ion-hypokaliemie">
    <h3>🟡 Hypokaliémie (K+ &lt; 3,5 mmol/L)</h3>
    <table>
      <tr><th>Gravité</th><th>Seuils / signes</th></tr>
      <tr><td class="modere">Modérée</td><td>K+ 3,0–3,5 mmol/L, peu/pas de symptômes</td></tr>
      <tr><td class="grave">Sévère</td><td>K+ &lt; 2,5 mmol/L et/ou signes ECG (sous-décalage ST, onde U, aplatissement onde T, troubles du rythme), faiblesse musculaire marquée</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Conduite à tenir :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Voie orale si possible et trouble modéré : sels de potassium per os.</li>
      <li>Voie IV si sévère/signes ECG : KCl dilué, débit max <strong>≤ 15 mmol/h</strong> sur voie périphérique (≤ 20 mmol/h sur VVC avec scope), jamais en bolus direct (risque d'arrêt cardiaque).</li>
      <li>Rechercher et corriger une hypomagnésémie associée (résistance au traitement si Mg non corrigé).</li>
      <li>Surveillance ECG continue si correction IV rapide ou trouble sévère.</li>
    </ul>
  </div>

  <div class="card" id="ion-hyponatremie">
    <h3>🔴 Hyponatrémie (Na+ &lt; 135 mmol/L)</h3>
    <table>
      <tr><th>Gravité</th><th>Seuils / signes</th></tr>
      <tr><td class="modere">Modérée</td><td>Na+ 125–134 mmol/L, asymptomatique ou symptômes légers (nausées, céphalées)</td></tr>
      <tr><td class="grave">Sévère / symptomatique</td><td>Na+ &lt; 125 mmol/L et/ou troubles neurologiques (confusion, convulsions, coma) — urgence vitale</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Conduite à tenir :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Règle d'or : ne jamais corriger trop vite</strong> — risque de myélinolyse centropontine. Maximum <strong>8-10 mmol/L par 24h</strong> (idéalement ≤ 8).</li>
      <li>Si symptomatique sévère (convulsions, coma) : NaCl hypertonique 3% — bolus 100-150 mL IVL en 10-20 min, répétable 1-2 fois selon évolution clinique, objectif d'élévation rapide initiale de 4-6 mmol/L puis ralentir.</li>
      <li>Si chronique et peu symptomatique : restriction hydrique ± correction très progressive selon étiologie (SIADH, hypovolémie, insuffisance surrénalienne...).</li>
      <li>Identifier la cause : évaluer le statut volémique (hypovolémique / euvolémique / hypervolémique) avant de choisir le traitement.</li>
      <li>Surveillance ionogramme rapprochée (toutes les 2-4h en phase aiguë).</li>
    </ul>
  </div>

  <div class="card" id="ion-hypernatremie">
    <h3>🟡 Hypernatrémie (Na+ &gt; 145 mmol/L)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Traduit le plus souvent un déficit en eau libre (déshydratation, diabète insipide, apports insuffisants).</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Correction <strong>progressive</strong> : baisse maximale de <strong>10-12 mmol/L par 24h</strong> (risque d'œdème cérébral si correction trop rapide).</li>
      <li>Réhydratation par eau libre (per os/SNG si possible) ou Glucosé 5% IV si voie orale impossible.</li>
      <li>Calculer le déficit en eau libre : Déficit (L) ≈ 0,6 × Poids(kg) × [(Na actuel / 140) − 1] (0,5 chez la femme/personne âgée).</li>
      <li>Si hypovolémie associée : corriger d'abord la volémie avec NaCl 0,9%, puis eau libre.</li>
      <li>Surveillance ionogramme toutes les 4-6h.</li>
    </ul>
  </div>

  <div class="card" id="ion-hypocalcemie">
    <h3>🟡 Hypocalcémie (Ca2+ corrigé &lt; 2,20 mmol/L)</h3>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Signes de gravité : tétanie, laryngospasme, convulsions, allongement QT, troubles du rythme.</li>
      <li>Forme symptomatique/sévère : Gluconate de calcium 10% 10-20 mL dans 100 mL G5%, IVL en 10-20 min, sous scope (risque de troubles du rythme si injection rapide), à répéter/relayer en perfusion continue si besoin.</li>
      <li>Corriger une hypomagnésémie associée (fréquente, entretient l'hypocalcémie).</li>
      <li>Forme chronique peu symptomatique : calcium et vitamine D par voie orale.</li>
    </ul>
  </div>

  <div class="card" id="ion-hypercalcemie">
    <h3>🟡 Hypercalcémie (Ca2+ corrigé &gt; 2,60 mmol/L)</h3>
    <table>
      <tr><th>Gravité</th><th>Seuils</th></tr>
      <tr><td class="modere">Modérée</td><td>2,6–3,0 mmol/L</td></tr>
      <tr><td class="grave">Sévère (urgence)</td><td>&gt; 3,5 mmol/L et/ou troubles de conscience, signes ECG (QT court)</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Conduite à tenir si sévère :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Réhydratation</strong> NaCl 0,9% — pierre angulaire du traitement, 2-4 L/24h selon tolérance cardiaque, à adapter chez le sujet âgé/insuffisant cardiaque.</li>
      <li>Furosémide uniquement après correction volémique, si besoin de favoriser la diurèse (jamais en première intention).</li>
      <li>Bisphosphonates IV (selon disponibilité) pour les hypercalcémies malignes ou sévères persistantes.</li>
      <li>Arrêt des apports calciques, vitamine D, diurétiques thiazidiques.</li>
      <li>Épuration extra-rénale si forme menaçante avec insuffisance rénale ou cardiaque empêchant la réhydratation.</li>
    </ul>
  </div>

  <div class="card" id="ion-hypomagnesemie">
    <h3>🟡 Hypomagnésémie (Mg2+ &lt; 0,65 mmol/L)</h3>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Souvent associée à hypokaliémie/hypocalcémie réfractaires — toujours doser et corriger en premier.</li>
      <li>Forme sévère/symptomatique (convulsions, torsade de pointes) : Sulfate de magnésium 1-2 g IVL en 10-15 min, puis relais en perfusion continue (ex. 4-6 g/24h) selon contexte.</li>
      <li>Surveillance : réflexes ostéotendineux, fréquence respiratoire (risque de dépression respiratoire si surdosage), fonction rénale.</li>
      <li>Forme légère : supplémentation orale.</li>
    </ul>
  </div>

  <div class="card" id="ion-principes">
    <h3>⚠️ Principes généraux</h3>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Toujours confirmer un trouble ionique sévère par un second dosage avant correction agressive (sauf urgence vitale avec signes ECG/cliniques).</li>
      <li>Corriger un trouble ionique sévère = scope ECG continu.</li>
      <li>Rechercher systématiquement la cause sous-jacente en parallèle de la correction symptomatique.</li>
      <li>Adapter les volumes de perfusion à la fonction cardiaque et rénale du patient.</li>
      <li>Les corrections trop rapides de Na+ sont aussi dangereuses que l'absence de correction — la prudence prime sur la vitesse.</li>
    </ul>
  </div>`;
}

  <div class="card" id="proto-acr-adulte">
    <h3>💔 Arrêt cardio-respiratoire — Adulte (ERC 2021)</h3>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Sécurité</strong> → vérifier conscience → appeler à l'aide → libérer voies aériennes → évaluer respiration/pouls (≤10 sec)</li>
      <li><strong>Débuter RCP</strong> immédiatement : 30 compressions / 2 insufflations, 100-120/min, dépression 5-6 cm, relâchement complet</li>
      <li><strong>Brancher scope/DAE dès que possible</strong> — analyser le rythme</li>
    </ol>
    <table style="margin-top:10px;">
      <tr><th>Rythme</th><th>Conduite</th></tr>
      <tr><td class="grave">FV / TV sans pouls</td><td>Choc immédiat (150-200J biphasique) → reprendre RCP 2 min → <strong>Adrénaline (Adrénaline Aguettant®)</strong> 1mg IV après le 2e choc puis toutes les 3-5 min → <strong>Amiodarone (Cordarone®)</strong> 300mg IV après le 3e choc (puis 150mg si persistance)</td></tr>
      <tr><td class="modere">Asystolie / AESP</td><td>Pas de choc → RCP continue → <strong>Adrénaline (Adrénaline Aguettant®)</strong> 1mg IV dès que possible puis toutes les 3-5 min → rechercher causes réversibles</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">4H / 4T — causes réversibles à rechercher systématiquement :</p>
    <div class="row2" style="font-size:13px;">
      <div>🔹 <strong>Hypoxie</strong><br>🔹 <strong>Hypovolémie</strong><br>🔹 <strong>Hypo/Hyperkaliémie</strong> (+ métabolique)<br>🔹 <strong>Hypothermie</strong></div>
      <div>🔹 <strong>Thrombose</strong> (coronaire/pulmonaire)<br>🔹 <strong>Tamponnade</strong><br>🔹 <strong>Toxiques</strong><br>🔹 <strong>Pneumothorax</strong> compressif</div>
    </div>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">Voie d'abord : IV ou intra-osseuse si échec. Capnographie si disponible pour confirmer position de sonde et qualité du MCE. Ne pas interrompre les compressions >10 sec.</p>
  </div>

  <div class="card" id="proto-acr-pediatrique">
    <h3>💔 Arrêt cardio-respiratoire — Pédiatrique (ERC 2021)</h3>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>5 insufflations initiales avant de débuter les compressions (si arrêt respiratoire probable)</li>
      <li>Ratio <strong>15 compressions / 2 insufflations</strong> (2 sauveteurs qualifiés) — dépression 1/3 du diamètre thoracique</li>
      <li>RCP 1 min avant d'alerter si seul, puis appeler à l'aide</li>
      <li>Adrénaline (<strong>Adrénaline Aguettant®</strong>) IV/IO : <strong>10 microgrammes/kg</strong> (0,01 mg/kg), max 1mg, toutes les 3-5 min</li>
      <li>Énergie de choc (FV/TV) : <strong>4 J/kg</strong></li>
      <li>Rechercher les mêmes causes réversibles (4H/4T) — chez l'enfant, penser surtout hypoxie et hypovolémie</li>
    </ol>
  </div>

  <div class="card" id="proto-etats-choc">
    <h3>🩸 États de choc</h3>
    <table>
      <tr><th>Type</th><th>Signes clés</th><th>Conduite immédiate</th></tr>
      <tr>
        <td class="grave">Hypovolémique</td>
        <td>Tachycardie, hypoTA, marbrures, TRC&gt;3s, pli cutané</td>
        <td>2 VVP de gros calibre, remplissage cristalloïdes 500mL en bolus (réévaluer), contrôle de l'hémorragie si applicable, transfusion précoce si choc hémorragique</td>
      </tr>
      <tr>
        <td class="grave">Septique</td>
        <td>Fièvre/hypothermie, hypoTA, confusion, lactates élevés (Sepsis-3 / Surviving Sepsis Campaign)</td>
        <td><strong>Bundle 1h :</strong> hémocultures avant ATB, lactates, ATB probabiliste large spectre dans l'heure, remplissage 30mL/kg cristalloïdes en 3h si hypoTA/lactates&gt;4, vasopresseur (<strong>Noradrénaline — Noradrénaline Aguettant®</strong>) si hypoTA persistante après remplissage — <em>protocole détaillé (posologies, choc réfractaire) : voir <a onclick="document.getElementById('proto-sepsis').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">Sepsis / Choc septique</a></em></td>
      </tr>
      <tr>
        <td class="grave">Cardiogénique</td>
        <td>hypoTA + signes de congestion (crépitants, turgescence jugulaire), froideur des extrémités</td>
        <td><strong>Prudence sur le remplissage</strong> (risque OAP) — petits bolus 100-250mL si suspicion hypovolémie associée. Inotrope (<strong>Dobutamine — Dobutrex®</strong>) ± vasopresseur si hypoTA sévère. Traiter la cause (SCA, trouble du rythme, EP)</td>
      </tr>
      <tr>
        <td class="grave">Anaphylactique</td>
        <td>Urticaire/angio-œdème + bronchospasme et/ou hypoTA après exposition à un allergène</td>
        <td><strong>Adrénaline IM (Adrénaline Aguettant®)</strong> 0,5 mg (0,01 mg/kg enfant) face antéro-latérale de la cuisse, à répéter toutes les 5-15 min si besoin. Position déclive/Trendelenburg. Remplissage cristalloïdes rapide. O2 haut débit. Si réfractaire : Adrénaline IV titrée en milieu surveillé — <em>protocole détaillé (positionnement, réaction biphasique, anaphylaxie réfractaire) : voir <a onclick="document.getElementById('proto-anaphylaxie').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">Choc anaphylactique / Anaphylaxie</a></em></td>
      </tr>
      <tr>
        <td class="grave">Obstructif</td>
        <td>Turgescence jugulaire + hypoTA + polypnée, sans râles. 3 causes principales : tamponnade (bruits du cœur assourdis, pouls paradoxal), pneumothorax compressif (abolition unilatérale MV, déviation trachéale), embolie pulmonaire massive (contexte thrombo-embolique, choc brutal)</td>
        <td><strong>Tamponnade :</strong> remplissage prudent + péricardiocentèse en urgence — <em>voir <a onclick="document.getElementById('proto-tamponnade').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">Tamponnade cardiaque</a></em>. <strong>PNO compressif :</strong> exsufflation à l'aiguille puis drainage thoracique, sans attendre l'imagerie — <em>voir <a onclick="document.getElementById('proto-pneumothorax').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">Pneumothorax</a></em>. <strong>EP massive avec choc :</strong> thrombolyse IV (<strong>Altéplase — Actilyse®</strong>) si pas de contre-indication majeure, sinon embolectomie si disponible ; anticoagulation efficace dans tous les cas</td>
      </tr>
    </table>
  </div>

  <div class="card" id="proto-troubles-rythme">
    <h3>⚡ Tachycardie et Bradycardie instables (ERC 2021)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Algorithmes ERC/ILCOR pour les troubles du rythme aigus, en dehors de l'arrêt cardiaque. La conduite dépend avant tout de la présence de <strong>signes d'instabilité</strong>, pas uniquement de la fréquence cardiaque.</p>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">A. Tachycardie</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Rechercher les signes d'instabilité</strong> (« signes défavorables ») : <strong>choc</strong> (marbrures, hypoTA, TRC allongé, confusion), <strong>syncope</strong>, <strong>ischémie myocardique</strong> (douleur thoracique, sus/sous-décalage ST), <strong>insuffisance cardiaque aiguë</strong> (OAP)</li>
      <li><strong>Si instable</strong> : <strong>cardioversion électrique synchronisée</strong> sans délai — jusqu'à 3 tentatives ; sédation/analgésie brève si le patient est conscient et le temps le permet ; si échec après 3 chocs : <strong>Amiodarone (Cordarone®) 300 mg IV en 10-20 min</strong>, puis nouvelle tentative de cardioversion, suivie d'une perfusion d'entretien de 900 mg sur 24h</li>
      <li><strong>Si stable</strong> : analyser le <strong>QRS</strong> (large ≥0,12s ou fin) et la <strong>régularité</strong> du rythme :
        <ul style="margin-left:18px;">
          <li><em>QRS fin régulier</em> (TSV probable) : manœuvres vagales (Valsalva, massage carotidien après élimination d'un souffle) puis <strong>Adénosine</strong> 6 mg IV bolus rapide (rinçage immédiat), puis 12 mg, puis 12 mg si échec (sous scope, prévenir le patient d'une sensation transitoire désagréable)</li>
          <li><em>QRS fin irrégulier</em> (FA probable) : contrôle de fréquence — <strong>Bêtabloquant</strong> ou <strong>Diltiazem</strong> IV (éviter si insuffisance cardiaque sévère) ; anticoagulation à discuter selon le score CHA2DS2-VASc et la durée d'évolution (cardioversion à risque embolique si FA &gt;48h sans anticoagulation efficace ni exclusion d'un thrombus par échographie transœsophagienne)</li>
          <li><em>QRS large régulier</em> (TV probable jusqu'à preuve du contraire) : <strong>Amiodarone 300 mg IV en 20-60 min</strong>, avis cardiologique, ne jamais traiter par vérapamil (risque de collapsus si TV méconnue)</li>
          <li><em>QRS large irrégulier</em> : évoquer une FA sur voie accessoire (WPW — éviter adénosine/bêtabloquant/digoxine/vérapamil qui peuvent accélérer la conduction sur la voie accessoire) ou une TV polymorphe (torsade de pointes — <strong>Sulfate de magnésium 2g IV</strong> en 10 min, corriger une hypokaliémie associée)</li>
        </ul>
      </li>
    </ol>
    <p style="margin-top:14px; font-weight:600; color:var(--accent2);">B. Bradycardie</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Rechercher les mêmes signes d'instabilité</strong> que pour la tachycardie (choc, syncope, ischémie, insuffisance cardiaque), et évaluer le <strong>risque d'asystolie</strong> (BAV de haut degré type Mobitz II ou BAV III, pause sinusale &gt;3s, asystolie récente)</li>
      <li><strong>Si instable ou risque d'asystolie</strong> : <strong>Atropine 500 µg IV</strong>, à répéter toutes les 3-5 min jusqu'à un maximum de <strong>3 mg</strong></li>
      <li><strong>Si réponse insuffisante à l'atropine</strong> : mesures de 2e ligne en attendant l'entraînement électrosystolique — <strong>Isoprénaline</strong> 5 µg/min IVSE, ou <strong>Adrénaline</strong> 2-10 µg/min IVSE, ou <strong>entraînement électrosystolique transcutané</strong> immédiat (sédation/analgésie recommandée, procédure douloureuse)</li>
      <li>Alternatives si disponibles : <strong>Aminophylline</strong> si bradycardie sur infarctus inférieur ou lésion médullaire, <strong>Glucagon</strong> si bêtabloquant/inhibiteur calcique en cause, <strong>entraînement électrosystolique transveineux</strong> en relais dès que possible si la cause n'est pas réversible</li>
      <li><strong>Si stable sans risque d'asystolie</strong> : surveillance scopée continue, rechercher et traiter la cause (iatrogène, ischémique, métabolique — hyperkaliémie, hypothyroïdie, hypothermie)</li>
    </ol>
  </div>

  <div class="card" id="proto-anaphylaxie">
    <h3>🐝 Choc anaphylactique / Anaphylaxie</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les recommandations WAO (World Allergy Organization) 2020 et EAACI. <strong>Diagnostic</strong> : début brutal (minutes à quelques heures) après exposition à un allergène probable, associant atteinte cutanéo-muqueuse (urticaire, angio-œdème, prurit) ET au moins un signe respiratoire (bronchospasme, stridor, dyspnée), cardiovasculaire (hypoTA, collapsus, syncope) ou digestif (vomissements, douleurs abdominales) — <strong>l'atteinte cutanée peut être absente dans 10-20% des cas</strong>, ne pas exclure le diagnostic sur ce seul critère. Causes fréquentes : piqûres d'hyménoptères, aliments (arachide, fruits de mer), médicaments (bêta-lactamines, AINS, curares), latex.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Retrait immédiat de l'allergène</strong> si identifiable (arrêt de la perfusion en cours, retrait du dard) — ne pas retarder l'adrénaline pour autant</li>
      <li><strong>Adrénaline IM (Adrénaline Aguettant®)</strong> — traitement de 1ère ligne, à administrer sans délai dès suspicion : <strong>0,5 mg</strong> chez l'adulte (0,01 mg/kg chez l'enfant, max 0,3 mg), face antéro-latérale de la <strong>cuisse</strong> (jamais la fesse — résorption trop lente), à répéter toutes les <strong>5-15 min</strong> si absence d'amélioration. Ne jamais substituer par la voie orale/inhalée ni par les antihistaminiques/corticoïdes seuls</li>
      <li><strong>Positionnement</strong> : décubitus dorsal jambes surélevées (Trendelenburg) si hypotension/collapsus — <strong>ne jamais laisser le patient debout ou asseoir brutalement</strong> (risque de syndrome de vidange ventriculaire vide et de mort subite par vasoplégie) ; position semi-assise uniquement si détresse respiratoire prédominante sans hypoTA ; décubitus latéral gauche si vomissements ; femme enceinte en décubitus latéral gauche</li>
      <li><strong>Oxygène</strong> haut débit au masque à haute concentration, monitorage continu (scope, SpO2, PA répétée)</li>
      <li><strong>Remplissage vasculaire</strong> rapide si hypoTA/collapsus : cristalloïdes (NaCl 0,9%, Ringer Lactate) — bolus 500-1000 mL chez l'adulte (20 mL/kg chez l'enfant), à répéter selon réponse hémodynamique</li>
      <li>Si bronchospasme persistant malgré l'adrénaline : <strong>Salbutamol (Ventoline®)</strong> nébulisé en complément (n'agit pas sur la composante vasculaire, ne remplace jamais l'adrénaline)</li>
      <li><strong>Anaphylaxie réfractaire</strong> (persistance des signes malgré ≥2-3 injections IM d'adrénaline et remplissage) : <strong>Adrénaline IV titrée</strong> en milieu surveillé (scope continu, voie veineuse fiable) — dilution 1 mg dans 100 mL SSI (10 µg/mL), débit initial 30-100 mL/h (5-15 µg/min) à titrer selon la réponse tensionnelle ; si le patient est sous <strong>bêtabloquant</strong> et résiste à l'adrénaline : <strong>Glucagon (GlucaGen®)</strong> 1-2 mg IV bolus lent, répétable, puis relais en perfusion continue si besoin</li>
      <li><strong>Traitements adjuvants</strong> (n'agissent pas sur l'urgence vitale, jamais en substitut de l'adrénaline) : antihistaminique H1 — <strong>Déxchlorphéniramine (Polaramine®)</strong> 5 mg IV/IM chez l'adulte (0,15-0,25 mg/kg chez l'enfant), et corticoïdes — <strong>Méthylprednisolone (Solu-Médrol®)</strong> 1-2 mg/kg IV (soit environ 40-80 mg chez l'adulte), utiles surtout pour les symptômes cutanés et la prévention théorique d'une réaction biphasique (bénéfice non formellement démontré)</li>
      <li><strong>Surveillance de la réaction biphasique</strong> : récidive des symptômes sans nouvelle exposition, généralement dans les <strong>4-12h</strong> (jusqu'à 24-72h décrit) — observation minimale de <strong>4-6h</strong> après résolution complète pour une réaction non sévère, à prolonger à <strong>8-24h</strong> si : réaction sévère/hypoTA initiale, bronchospasme sévère ou asthme sous-jacent, nécessité de plusieurs doses d'adrénaline, antécédent de réaction biphasique, ou accès aux soins d'urgence limité en cas de récidive</li>
      <li><strong>À la sortie</strong> : prescription d'un stylo auto-injecteur d'adrénaline si disponible avec éducation à son utilisation, plan d'action écrit, éviction de l'allergène identifié, orientation vers une consultation d'allergologie</li>
    </ol>
  </div>

  <div class="card" id="proto-angioedeme-bradykinique">
    <h3>😷 Angio-œdème bradykinique (non allergique)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">À distinguer impérativement de l'angio-œdème allergique (histaminique) : mécanisme non IgE-médié, <strong>résistant à l'adrénaline, aux antihistaminiques et aux corticoïdes</strong>. Deux causes principales : <strong>iatrogène aux IEC</strong> (peut survenir à tout moment du traitement, même après des années) et <strong>angio-œdème héréditaire</strong> (déficit ou dysfonction en C1-inhibiteur, antécédents familiaux, épisodes récidivants depuis l'enfance).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes d'orientation</strong> : œdème localisé à la face, aux lèvres, à la langue, au larynx ou à la paroi intestinale (douleurs abdominales pseudo-chirurgicales) — <strong>absence d'urticaire et de prurit</strong>, absence de bronchospasme ou de collapsus associés, installation progressive sur plusieurs heures (contrairement à l'anaphylaxie)</li>
      <li><strong>Sécuriser les voies aériennes précocement</strong> — l'œdème peut progresser sur plusieurs heures jusqu'à l'obstruction complète ; anticiper une intubation difficile (fibroscopie, matériel de cricothyroïdotomie à proximité) en cas d'atteinte laryngée/linguale évolutive ; ne pas attendre la détresse respiratoire franche pour appeler l'anesthésiste-réanimateur</li>
      <li>En cas de doute diagnostique avec une anaphylaxie : <strong>administrer l'adrénaline IM</strong> sans délai (le bénéfice potentiel dépasse le risque si le diagnostic est incertain) — mais ne pas s'attendre à une réponse si le mécanisme est réellement bradykinique</li>
      <li><strong>Arrêt immédiat et définitif de l'IEC</strong> (et éviter les ARA2, qui peuvent occasionnellement être en cause également) — mentionner clairement la contre-indication définitive dans le dossier</li>
      <li><strong>Traitements spécifiques si disponibles</strong> : <strong>Icatibant (Firazyr®)</strong> — antagoniste du récepteur B2 de la bradykinine, 30 mg SC (efficace sur l'angio-œdème héréditaire et probablement sur l'angio-œdème aux IEC), ou <strong>concentré de C1-inhibiteur</strong> (Berinert®) 20 UI/kg IV si angio-œdème héréditaire connu</li>
      <li>À défaut de traitement spécifique (contexte à ressources limitées) : <strong>acide tranexamique</strong> 1g IV (effet antifibrinolytique avec un bénéfice modeste rapporté sur certains angio-œdèmes bradykiniques), <strong>plasma frais congelé</strong> discuté en dernier recours (apporte du C1-inhibiteur mais aussi du kininogène, risque théorique d'aggravation transitoire)</li>
      <li><strong>Surveillance prolongée</strong> en unité de soins continus tant que l'œdème facial/lingual/laryngé n'est pas en régression franche, du fait de l'évolution imprévisible et parfois prolongée (12-72h)</li>
    </ol>
  </div>

  <div class="card" id="proto-tamponnade">
    <h3>🫀 Tamponnade cardiaque</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les ESC Guidelines 2015 (maladies du péricarde). Accumulation de liquide péricardique (ou sang, pus, air) sous tension, comprimant les cavités cardiaques et limitant le remplissage diastolique — une des 3 causes de choc obstructif.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes évocateurs</strong> : triade de Beck (hypotension, turgescence jugulaire, assourdissement des bruits du cœur — inconstante), tachycardie, <strong>pouls paradoxal</strong> (chute de la PAS &gt;10 mmHg à l'inspiration), polypnée, signes de choc obstructif sans râles pulmonaires</li>
      <li><strong>Échographie cardiaque au lit (POCUS)</strong> dès que possible pour confirmer le diagnostic : épanchement péricardique, collapsus diastolique du ventricule/oreillette droite, variation respiratoire des flux mitral/tricuspide, veine cave inférieure dilatée sans variation respiratoire — ne doit pas retarder le geste si instabilité extrême avec forte suspicion clinique</li>
      <li><strong>Remplissage vasculaire prudent</strong> (cristalloïdes, 250-500 mL) en attendant le geste — maintient la précharge et peut transitoirement améliorer l'hémodynamique, sans traiter la cause</li>
      <li><strong>Péricardiocentèse en urgence</strong> (geste salvateur) : voie sous-xiphoïdienne, aiguille dirigée à 45° vers l'épaule gauche, sous guidage échographique si disponible (réduit le risque de ponction myocardique/coronaire) — l'évacuation même de petits volumes (50-100 mL) peut restaurer significativement l'hémodynamique en cas de tamponnade aiguë</li>
      <li>Si péricardiocentèse impossible/inefficace et arrêt cardiaque imminent : <strong>péricardiotomie chirurgicale (fenêtre péricardique)</strong> ou thoracotomie de sauvetage selon le contexte (notamment tamponnade traumatique) et le plateau technique disponible</li>
      <li><strong>Éviter la ventilation mécanique en pression positive avant le drainage</strong> si possible — l'augmentation de la pression intrathoracique aggrave la compression des cavités droites et peut précipiter le collapsus ; si l'intubation est indispensable, réaliser le drainage péricardique en priorité si réalisable rapidement</li>
      <li>Laisser un drain péricardique en place après évacuation initiale (prévention de la récidive), surveillance échographique répétée</li>
      <li>Rechercher la cause sous-jacente : traumatique (hémopéricarde), néoplasique, urémique, infectieuse (tuberculose, purulente), post-péricardiotomie/post-IDM (syndrome de Dressler), dissection aortique (tamponnade par rupture dans le péricarde — <em>voir protocole dédié</em>), iatrogène (post-geste invasif)</li>
    </ol>
  </div>

  <div class="card" id="proto-sca">
    <h3>🫀 Syndrome coronarien aigu (SCA / IDM)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Douleur thoracique constrictive &gt;20 min, irradiation typique, souvent associée à dyspnée/sueurs/nausées. ECG 18 dérivations dans les 10 min suivant le premier contact médical.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>MONA-BASH</strong> à l'admission : <strong>Aspirine (Aspégic®, Kardégic®)</strong> 300 mg PO/IV à croquer (dose de charge) + 2ème antiagrégant (<strong>Clopidogrel — Plavix®</strong> 300-600 mg ou <strong>Ticagrélor — Brilique®</strong> 180 mg selon protocole local) ; Oxygène uniquement si SpO2&lt;90% (pas d'O2 systématique) ; <strong>Nitrés (Risordan® IV, Natispray® sublingual)</strong> si douleur persistante et TA systolique &gt;90 mmHg (contre-indiqués si suspicion d'IDM du VD) ; <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min si douleur réfractaire ; Bêtabloquant précoce (<strong>Bisoprolol — Cardensiel®</strong>) si pas de contre-indication (insuffisance cardiaque aiguë, choc, bloc AV)</li>
      <li><strong>STEMI</strong> (sus-décalage ST ≥1mm en 2 dérivations contiguës ou BBG nouveau) : reperfusion en urgence — <strong>angioplastie primaire</strong> si réalisable &lt;120 min depuis le premier contact médical (idéal &lt;90 min), sinon <strong>thrombolyse IV (Altéplase — Actilyse®)</strong> schéma accéléré : 15 mg IV bolus, puis 0,75 mg/kg (max 50 mg) sur 30 min, puis 0,5 mg/kg (max 35 mg) sur 60 min — dose totale max 100 mg — (si &lt;12h depuis le début des symptômes et pas de contre-indication) suivie de transfert vers un centre avec plateau technique</li>
      <li><strong>NSTEMI/angor instable</strong> (sous-décalage ST, inversion T, troponine élevée) : anticoagulation (héparine), double antiagrégation, stratification du risque (score GRACE), coronarographie précoce (&lt;24-72h) selon le niveau de risque, sans thrombolyse</li>
      <li>Anticoagulation : Héparine non fractionnée ou HBPM selon stratégie de reperfusion choisie et disponibilité</li>
      <li>Surveillance scope continue — risque de trouble du rythme ventriculaire dans les premières heures ; DAE/défibrillateur à proximité immédiate</li>
      <li>Statine à forte dose dès l'admission ; IEC si dysfonction VG ; traiter les complications précoces (choc cardiogénique, trouble du rythme, rupture septale/pariétale)</li>
    </ol>
  </div>

  <div class="card" id="proto-oap">
    <h3>💧 Œdème aigu du poumon (OAP) cardiogénique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Dyspnée aiguë avec orthopnée, crépitants bilatéraux, souvent contexte de cardiopathie connue ou poussée hypertensive/SCA sous-jacent.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Position demi-assise/assise, jambes pendantes si possible (diminue le retour veineux)</li>
      <li>Oxygène pour SpO2 cible ≥94% ; ventilation non invasive (CPAP/VNI) précoce si détresse respiratoire — réduit le recours à l'intubation</li>
      <li><strong>Diurétique de l'anse :</strong> Furosémide IV 40-80 mg (dose plus élevée si insuffisance rénale ou déjà sous furosémide au long cours), répétable selon réponse diurétique</li>
      <li><strong>Dérivés nitrés</strong> IV/sublingual si TA systolique &gt;110 mmHg (vasodilatation, réduction de la précharge) — à éviter si hypoTA ou suspicion de rétrécissement aortique serré</li>
      <li>Rechercher et traiter le facteur déclenchant : SCA (ECG systématique), poussée hypertensive, trouble du rythme, écart thérapeutique/régime</li>
      <li>Si choc cardiogénique associé (hypoTA, hypoperfusion) : éviter les diurétiques/vasodilatateurs en 1ère intention, privilégier inotrope (Dobutamine) et discuter assistance circulatoire si disponible</li>
      <li>Intubation/ventilation mécanique si épuisement respiratoire ou échec de la VNI</li>
    </ol>
  </div>

  <div class="card" id="proto-hta-urgence">
    <h3>📈 Urgence et crise hypertensive</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Poussée hypertensive simple</strong> (TA élevée sans souffrance d'organe) ≠ <strong>urgence hypertensive</strong> (TA élevée, souvent &gt;180/120 mmHg, AVEC souffrance d'organe : encéphalopathie, OAP, dissection aortique, SCA, éclampsie, insuffisance rénale aiguë).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Poussée hypertensive sans souffrance d'organe :</strong> pas de baisse tensionnelle brutale — repos, traitement PO habituel repris/optimisé, réévaluation ambulatoire. Éviter la Nifédipine sublinguale (risque de chute tensionnelle brutale et d'ischémie)</li>
      <li><strong>Urgence hypertensive avec souffrance d'organe :</strong> baisse progressive et contrôlée par voie IV, sous surveillance continue (scope, TA toutes les 5-15 min pendant la titration) — objectif de baisse de la TAM d'environ 20-25% dans la 1ère heure (sauf AVC, cf. protocole dédié, et dissection aortique où la baisse doit être plus rapide)</li>
      <li><strong>Nicardipine (Loxen®)</strong> — inhibiteur calcique, molécule de référence, large spectre d'indications : dilution 1 ampoule 10mg/10mL, à la seringue électrique (jamais en IV directe). <strong>Débit initial 5 mg/h</strong> (ou 3-5 mg/h pendant les 15 premières minutes selon RCP français), puis <strong>titration par paliers de 2,5 mg/h toutes les 5-15 min</strong> (paliers de 0,5-1 mg/h selon RCP français, plus prudent) jusqu'à l'objectif tensionnel — <strong>débit maximal 15 mg/h</strong>. Une fois la cible atteinte, réduire progressivement au débit minimal efficace (souvent 3 mg/h en entretien).
        <br><span style="font-size:12.5px; color:var(--warn)">⚠️ Sans pousse-seringue : possible en gravité (burette microgouttes 60 gtt/mL indispensable) mais la titration fine nécessaire à la Nicardipine la rend plus délicate à gérer manuellement que l'Urapidil ou le Labétalol (schémas en bolus, plus adaptés en l'absence de PSE) — dilution 10 mg dans 40 mL SSI (50 mL au total, 200 µg/mL) : à 5 mg/h ≈ 25 gtt/min, à 15 mg/h ≈ 75 gtt/min. Un <a onclick="document.querySelector('[data-mod=calculateurs]').click(); setTimeout(()=&gt;document.getElementById('gtt-card')?.scrollIntoView({behavior:'smooth'}),100)" style="color:var(--accent); cursor:pointer; text-decoration:underline;">calculateur dédié</a> est disponible dans le module Calculateurs.</span></li>
      <li><strong>Labétalol (Trandate®)</strong> — alpha/bêta-bloquant, à privilégier si contexte cardiaque associé sans contre-indication (asthme, BAV, insuffisance cardiaque décompensée) : <strong>bolus IV de 20 mg sur 2 min</strong>, répétable par paliers de 20-40 mg IV toutes les 10 min jusqu'à effet souhaité (<strong>dose cumulée maximale 300 mg</strong>) ; en alternative, <strong>perfusion continue à 1-2 mg/min</strong> (dilution 200 mg dans 200 mL SSI 0,9% = 1 mg/mL, débit initial 60-120 mL/h) jusqu'à obtention de la cible tensionnelle, puis titration selon la réponse</li>
      <li><strong>Urapidil (Eupressyl®, Médiatensyl®)</strong> — bon profil chez le sujet âgé/insuffisant rénal, alternative de choix si contre-indication aux bêta-bloquants : <strong>bolus IV de 25 mg sur 20 secondes</strong> ; si TA insuffisamment contrôlée à 5 min, répéter un bolus de <strong>25 mg</strong> ; si toujours insuffisant à 5 min, bolus de <strong>50 mg</strong> — puis relais en <strong>seringue électrique à débit initial de 120 mg/h (24 mL/h)</strong> jusqu'à obtention de la cible, puis <strong>dose d'entretien de 9 à 30 mg/h (moyenne 9-15 mg/h)</strong> à ajuster selon la réponse tensionnelle</li>
      <li><strong>Dissection aortique suspectée :</strong> cible TA systolique &lt;120 mmHg et FC &lt;60/min rapidement (idéalement en &lt;20 min) — Bêtabloquant IV en 1ère intention : <strong>Esmolol (Brevibloc®)</strong> — bolus de charge <strong>0,5 mg/kg IV sur 1 min</strong> (soit 35 mg pour 70 kg), puis <strong>perfusion continue 50 à 300 µg/kg/min</strong> (titration par paliers de 50 µg/kg/min toutes les 4 min selon réponse — demi-vie ultra-courte ~9 min, idéal pour titration fine et réversibilité rapide), ou <strong>Labétalol (Trandate®)</strong> selon schéma ci-dessus — puis associer <strong>Nicardipine (Loxen®)</strong> en vasodilatateur complémentaire si la cible n'est pas atteinte par le bêtabloquant seul, jamais l'inverse (un vasodilatateur seul provoque une tachycardie réflexe qui aggrave le cisaillement aortique). Imagerie en urgence (angioscanner), avis chirurgical — <em>protocole détaillé (classification de Stanford, prise en charge chirurgicale/TEVAR) : voir <a onclick="document.getElementById('proto-dissection-aortique').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">Dissection aortique</a></em></li>
      <li><strong>Éclampsie/prééclampsie sévère :</strong> voir protocole dédié — Sulfate de magnésium + antihypertenseurs spécifiques à la grossesse</li>
      <li>Rechercher systématiquement une cause et des signes de gravité : fond d'œil (si disponible), ECG, fonction rénale, protéinurie si grossesse</li>
      <li><strong>Surveillance pendant la titration :</strong> TA (idéalement invasive/scope continu, sinon toutes les 5 min pendant la phase de titration active puis toutes les 15-30 min), FC, diurèse horaire, état neurologique — arrêter/ralentir la baisse tensionnelle en cas de signe d'hypoperfusion (confusion, oligurie, angor)</li>
      <li><strong>Cibles tensionnelles à retenir :</strong> encéphalopathie hypertensive/HTA maligne — baisse de 20-25% de la TAM en 1h ; dissection aortique/prééclampsie sévère — TA systolique &lt;140 mmHg (voire &lt;120 pour la dissection) dès la 1ère heure ; AVC — ne pas baisser sauf &gt;220/120 mmHg hors thrombolyse (cf. protocole AVC dédié)</li>
    </ol>
  </div>

  <div class="card" id="proto-dissection-aortique">
    <h3>💔 Dissection aortique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les ESC Guidelines 2014 (maladies de l'aorte). Douleur thoracique brutale, maximale d'emblée, à type de déchirure, irradiant dans le dos/interscapulaire, migratrice. <strong>Classification de Stanford :</strong> type A (aorte ascendante impliquée — chirurgie cardiaque urgente) vs type B (aorte descendante uniquement, en aval de la sous-clavière gauche — traitement médical sauf complication).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes évocateurs</strong> : asymétrie tensionnelle/des pouls entre les 2 bras (&gt;20 mmHg), souffle diastolique d'insuffisance aortique nouveau, déficit neurologique focal (dissection carotidienne), douleur abdominale/ischémie de membre (extension), signes de tamponnade (rupture dans le péricarde — <em>voir protocole dédié</em>), IDM inférieur (dissection coronaire droite)</li>
      <li><strong>Imagerie en urgence</strong> : angioscanner thoraco-abdomino-pelvien injecté (examen de référence, disponibilité large) ; échocardiographie transœsophagienne (ETO) si patient trop instable pour être transporté</li>
      <li><strong>Contrôle tensionnel et de la fréquence cardiaque — objectif rapide (idéalement &lt;20 min)</strong> : <strong>FC &lt;60/min</strong> et <strong>PA systolique &lt;120 mmHg</strong> (voir protocole Urgence hypertensive pour le détail des posologies)</li>
      <li><strong>Bêtabloquant IV en 1ère intention</strong> (réduit la fréquence cardiaque ET la force d'éjection systolique, donc le cisaillement pariétal aortique — dP/dt) : <strong>Esmolol (Brevibloc®)</strong> — bolus de charge 0,5 mg/kg IV sur 1 min, puis perfusion continue 50-300 µg/kg/min (titration rapide, demi-vie ultra-courte ~9 min) — ou <strong>Labétalol (Trandate®)</strong> en alternative (bolus 20 mg IV sur 2 min, répétable, dose cumulée max 300 mg)</li>
      <li>Si la cible tensionnelle n'est pas atteinte par le bêtabloquant seul : associer un vasodilatateur — <strong>Nicardipine (Loxen®)</strong> IVSE (cf. protocole HTA pour la dilution/titration) — <strong>toujours après</strong> le bêtabloquant, jamais en monothérapie initiale (un vasodilatateur seul entraîne une tachycardie réflexe qui augmente le cisaillement aortique et peut aggraver la dissection)</li>
      <li><strong>Antalgie</strong> : <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min — la douleur intense entretient la décharge sympathique et la poussée tensionnelle</li>
      <li><strong>Type A (aorte ascendante) :</strong> avis chirurgical cardiaque en extrême urgence — chirurgie de remplacement aortique dans les meilleurs délais (mortalité augmentant d'environ 1-2%/heure sans traitement)</li>
      <li><strong>Type B (aorte descendante) non compliquée :</strong> traitement médical seul (bêtabloquant + contrôle tensionnel strict), surveillance en unité de soins intensifs, imagerie de contrôle. <strong>Type B compliquée</strong> (malperfusion d'organe, rupture, extension, douleur réfractaire, HTA réfractaire) : <strong>TEVAR</strong> (endoprothèse aortique par voie endovasculaire) en 1ère intention si disponible, sinon chirurgie ouverte</li>
      <li>Ne pas administrer d'antiagrégant plaquettaire ni d'anticoagulant tant que la dissection n'est pas formellement exclue ou prise en charge chirurgicalement (aggravation du risque hémorragique/de rupture)</li>
      <li>Rechercher un contexte favorisant : HTA mal contrôlée (cause la plus fréquente), maladie du tissu conjonctif (Marfan, Ehlers-Danlos), bicuspidie aortique, grossesse, traumatisme thoracique, cocaïne</li>
    </ol>
  </div>

  <div class="card" id="proto-avc">
    <h3>🧠 AVC — Accident vasculaire cérébral (ischémique / hémorragique)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Déficit neurologique focal brutal (FAST : Face/Arm/Speech/Time). Chaque minute compte — "Time is brain". TDM cérébrale en urgence pour différencier ischémique/hémorragique avant tout traitement spécifique.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>ABCDE, glycémie capillaire systématique (une hypo/hyperglycémie peut mimer un AVC), O2 si SpO2&lt;94%, ECG (rechercher une fibrillation atriale)</li>
      <li>Heure exacte de début des symptômes (ou dernière heure vue asymptomatique) — détermine l'éligibilité à la thrombolyse/thrombectomie</li>
      <li>TDM cérébrale sans injection en urgence pour éliminer une hémorragie avant tout traitement</li>
      <li><strong>AVC ischémique :</strong> thrombolyse IV (<strong>Altéplase — Actilyse®</strong>, 0,9 mg/kg, max 90 mg, 10% en bolus puis le reste sur 1h) possible si &lt;4h30 depuis le début des symptômes et absence de contre-indication (pas d'hémorragie, TA contrôlée, pas de chirurgie/traumatisme récent, pas de trouble de la coagulation) ; thrombectomie mécanique à discuter si occlusion de gros vaisseau prouvée, fenêtre élargie selon l'imagerie de perfusion (jusqu'à 24h dans des centres spécialisés)</li>
      <li><strong>Gestion tensionnelle AVC ischémique :</strong> ne pas baisser la TA sauf si &gt;220/120 mmHg (hors thrombolyse) — l'hypertension permissive préserve la perfusion cérébrale. Si thrombolyse envisagée : TA doit être &lt;185/110 mmHg avant, puis maintenue &lt;180/105 mmHg pendant 24h après</li>
      <li><strong>AVC hémorragique :</strong> contrôle tensionnel plus strict (cible TA systolique ≈140 mmHg si toléré), correction urgente de toute anticoagulation en cours, avis neurochirurgical (évacuation si hématome volumineux/engagement), surveillance neurologique rapprochée (aggravation = TDM de contrôle)</li>
      <li>Ne pas donner d'antiagrégant/anticoagulant avant d'avoir éliminé une hémorragie à l'imagerie</li>
      <li>Position tête à 30°, contrôle glycémique strict, prévention des complications (fausses routes — évaluation de la déglutition avant toute alimentation, thromboprophylaxie)</li>
    </ol>
  </div>

  <div class="card" id="proto-detresse-respiratoire">
    <h3>🫁 Détresse respiratoire aiguë / SDRA</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Critères de Berlin du SDRA :</strong> début aigu &lt;7j, opacités bilatérales à l'imagerie, non expliquées par insuffisance cardiaque/surcharge, PaO2/FiO2 ≤300 sous PEP≥5 (léger 200-300, modéré 100-200, sévère &lt;100).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Position demi-assise, O2 pour SpO2 cible 92-96% (88-92% si BPCO connue)</li>
      <li>Évaluer signes de gravité : FR&gt;30, tirage, sueurs, cyanose, troubles de conscience, épuisement respiratoire → discuter ventilation non invasive ou intubation sans délai</li>
      <li>Identifier la cause : OAP (<strong>Furosémide — Lasilix®</strong>, dérivés nitrés — <strong>Risordan®</strong>), pneumopathie (ATB), asthme/BPCO décompensée (<strong>Salbutamol — Ventoline®</strong>, corticoïdes — <strong>Solu-Médrol®</strong>), EP (anticoagulation), pneumothorax (drainage)</li>
      <li>Si SDRA confirmé : ventilation protectrice (Vt 6mL/kg de poids idéal théorique, Pplateau &lt;30 cmH2O), PEP adaptée, décubitus ventral précoce si SDRA modéré-sévère (&gt;12h/jour si possible)</li>
    </ol>
  </div>

  <div class="card" id="proto-asthme">
    <h3>🌬️ Crise d'asthme aiguë (exacerbation)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après le GINA (Global Initiative for Asthma) 2025. Éliminer d'abord un diagnostic différentiel : <a onclick="document.getElementById('proto-anaphylaxie').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">anaphylaxie</a>, OAP, corps étranger inhalé, embolie pulmonaire, dysfonction des cordes vocales.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Sévérité</th><th>Signes</th></tr>
      <tr><td class="modere">Légère à modérée</td><td>Parle par phrases, préfère s'asseoir, non agité · FR augmentée, pas de mise en jeu des muscles accessoires · Pouls 100-120/min · SpO2 (air ambiant) 90-95% · DEP &gt;50% de la meilleure valeur/théorique</td></tr>
      <tr><td class="grave">Sévère</td><td>Parle par mots, penché en avant, agité · FR &gt;30/min · Mise en jeu des muscles accessoires · Pouls &gt;120/min · SpO2 (air ambiant) &lt;90% · DEP ≤50%</td></tr>
      <tr><td class="grave">Engageant le pronostic vital</td><td>Somnolence, confusion, ou thorax silencieux à l'auscultation → <strong>transfert en soins intensifs</strong></td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Traitement initial (formes légères à modérées) :</strong> <strong>Salbutamol (Ventoline®)</strong> (SABA) 4-10 bouffées au pMDI + chambre d'inhalation, toutes les 20 min pendant la 1ère heure (3 doses) si besoin ; oxygène contrôlé si disponible, cible SpO2 93-95% chez l'adulte/adolescent (≥94% chez l'enfant)</li>
      <li><strong>Corticoïdes systémiques</strong> (sauf forme légère isolée) : <strong>Prednisolone (Solupred®)</strong> PO 40-50 mg/j chez l'adulte, 1-2 mg/kg/j (max 40 mg) chez l'enfant, pendant 5-7 jours (3-5 jours chez l'enfant). Voie IV (<strong>Méthylprednisolone — Solu-Médrol®</strong>) si vomissements/impossibilité de prise orale, sans supériorité démontrée sur la voie orale</li>
      <li><strong>Formes sévères/pronostic vital engagé — transfert en structure de soins aigus :</strong> associer d'emblée <strong>Salbutamol (Ventoline®)</strong> nébulisé + <strong>Ipratropium bromide (Atrovent®)</strong> nébulisé + oxygène + corticoïdes systémiques, dans l'attente du transfert</li>
      <li><strong>Sulfate de magnésium (Magnésium Sulfate Lavoisier®)</strong> IV (2g en 20 min chez l'adulte) à envisager en soins aigus si réponse insuffisante au traitement initial intensif (FEV1/DEP restant bas après bronchodilatateurs répétés)</li>
      <li><strong>Ne pas faire</strong> en routine : radiographie thoracique, gaz du sang, antibiotiques (sauf infection bactérienne documentée), sédatifs (contre-indiqués — risque de dépression respiratoire)</li>
      <li><strong>Réévaluation à 1h</strong> (ou avant) : symptômes, SpO2, DEP. Si aggravation → transfert/soins intensifs. Si amélioration → poursuivre SABA à la demande</li>
      <li><strong>Critères de sortie :</strong> symptômes améliorés sans besoin de SABA rapproché, DEP &gt;60-80% de la meilleure valeur personnelle, SpO2 &gt;94% en air ambiant, ressources à domicile adéquates</li>
      <li><strong>À la sortie :</strong> reliever à la demande (non systématique) ; initier ou intensifier le traitement de fond contenant un corticoïde inhalé (CSI) ; poursuivre la corticothérapie orale jusqu'à 5-7 jours (3-5 j enfant) ; vérifier la technique d'inhalation et l'observance ; remettre un plan d'action écrit ; consultation de suivi à 2-7 jours (1-3 jours chez l'enfant)</li>
    </ol>
  </div>

  <div class="card" id="proto-bpco">
    <h3>🫁 Exacerbation aiguë de BPCO</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Décompensation aiguë chez un patient bronchopneumopathe chronique connu (ou fortement suspecté) — majoration de la dyspnée, de la toux et/ou du volume/purulence des expectorations. Piège principal : une oxygénothérapie excessive peut aggraver l'hypercapnie et précipiter un coma hypercapnique (perte du stimulus hypoxique chez le patient rétenteur chronique de CO2).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Oxygénothérapie titrée avec prudence</strong> — cible <strong>SpO2 88-92%</strong> (et non &gt;94% comme en population générale), débuter à faible débit (1-2 L/min lunettes) et titrer selon SpO2 et gazométrie ; surveiller l'apparition de signes d'hypercapnie (somnolence, astérixis, céphalées) après toute majoration de l'O2</li>
      <li><strong>Bronchodilatateurs nébulisés</strong> : <strong>Salbutamol (Ventoline®)</strong> 5 mg + <strong>Ipratropium (Atrovent®)</strong> 0,5 mg, nébulisation à l'air comprimé (pas à l'oxygène pur si risque de rétention de CO2), à répéter toutes les 20-30 min les 3 premières nébulisations puis espacer</li>
      <li><strong>Corticothérapie systémique</strong> : <strong>Prednisolone</strong> 40 mg/j PO (ou équivalent IV si voie orale impossible) pendant 5 jours — réduit la durée d'hospitalisation et le risque de rechute précoce</li>
      <li><strong>Antibiothérapie</strong> si <strong>critères d'Anthonisen</strong> présents (au moins 2 des 3 : majoration dyspnée, majoration volume expectoration, purulence des expectorations) ou si ventilation mécanique nécessaire — amoxicilline-acide clavulanique ou macrolide en 1ère intention selon les résistances locales, à adapter à la sévérité et aux antécédents de colonisation à Pseudomonas</li>
      <li><strong>Ventilation Non Invasive (VNI)</strong> en 1ère intention si <strong>acidose respiratoire</strong> persistante malgré le traitement médical optimal (pH &lt;7,35 avec PaCO2 &gt;45 mmHg) — réduit significativement la mortalité et le recours à l'intubation ; contre-indications : trouble de conscience sévère, vomissements incoercibles, instabilité hémodynamique, pneumothorax non drainé</li>
      <li><strong>Critères d'intubation/ventilation invasive</strong> : échec ou contre-indication à la VNI, épuisement respiratoire, trouble de conscience sévère, instabilité hémodynamique majeure, arrêt respiratoire</li>
      <li>Rechercher systématiquement un <strong>facteur déclenchant</strong> à traiter spécifiquement : infection respiratoire, pneumothorax, embolie pulmonaire, insuffisance cardiaque associée, inobservance thérapeutique, sédatifs/opiacés</li>
      <li>Éviter les sédatifs et opiacés autant que possible (dépression du centre respiratoire) ; kinésithérapie de désencombrement bronchique dès que l'état clinique le permet</li>
    </ol>
  </div>

  <div class="card" id="proto-pneumothorax">
    <h3>🫁 Pneumothorax (spontané / suffocant)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après la BTS Pleural Disease Guideline 2023 et l'ATLS. <strong>Spontané primaire</strong> (sujet jeune, longiligne, sans pathologie pulmonaire connue — rupture de bulle sous-pleurale), <strong>spontané secondaire</strong> (BPCO, tuberculose, pneumopathie sous-jacente — moins bien toléré), <strong>traumatique</strong>, ou <strong>suffocant/compressif</strong> (mécanisme à clapet, urgence vitale immédiate).</p>
    <table style="margin-bottom:10px;">
      <tr><th>Type</th><th>Signes</th><th>Conduite</th></tr>
      <tr>
        <td class="grave">Suffocant (compressif)</td>
        <td>Détresse respiratoire aiguë brutale, abolition unilatérale du murmure vésiculaire, tympanisme, déviation trachéale controlatérale, turgescence jugulaire, choc obstructif</td>
        <td><strong>Diagnostic clinique — ne jamais attendre l'imagerie.</strong> Exsufflation à l'aiguille immédiate</td>
      </tr>
      <tr>
        <td class="modere">Spontané primaire, bien toléré</td>
        <td>Douleur thoracique brutale ± dyspnée modérée, hémodynamique stable, taille limitée</td>
        <td>Surveillance simple ± oxygène haut débit (accélère la résorption de l'air pleural) ; pas de drainage systématique</td>
      </tr>
      <tr>
        <td class="grave">Spontané large / secondaire / mal toléré</td>
        <td>Dyspnée franche, terrain pulmonaire sous-jacent, pneumothorax volumineux</td>
        <td>Drainage thoracique</td>
      </tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Exsufflation à l'aiguille en urgence</strong> (pneumothorax suffocant) : cathéter court de gros calibre (14-16G), <strong>2e espace intercostal, ligne médio-claviculaire</strong> (site historique ATLS) — <strong>ou 4e/5e espace intercostal, ligne axillaire moyenne</strong> (site alternatif recommandé par les mises à jour récentes, paroi thoracique plus fine à cet endroit, taux d'échec plus faible), en passant au bord supérieur de la côte inférieure (évite le paquet vasculo-nerveux intercostal)</li>
      <li><strong>Drainage thoracique</strong> (definitif) après exsufflation, ou d'emblée si pneumothorax volumineux/mal toléré : dans le <strong>triangle de sécurité</strong> (bord latéral du grand pectoral, bord antérieur du grand dorsal, ligne horizontale mamelonnaire, 5e espace intercostal ligne axillaire moyenne), drain connecté à un système sous eau (bocal à valve unidirectionnelle) ou à une valve de Heimlich, ± aspiration douce selon protocole local</li>
      <li>Oxygène haut débit systématique en attendant/pendant le geste, voie veineuse, monitorage (SpO2, scope)</li>
      <li><strong>Pneumothorax spontané primaire minime/asymptomatique :</strong> prise en charge conservatrice possible (abstention), voire ambulatoire chez un patient bien entouré avec accès rapide aux soins — selon les nouvelles recommandations BTS 2023 favorisant une approche moins invasive</li>
      <li>Antalgie adaptée (la douleur pleurale limite l'ampliation thoracique et favorise l'encombrement)</li>
      <li><strong>Contre-indication formelle au transport aérien/en altitude</strong> tant que le pneumothorax n'est pas drainé ou radiologiquement résolu (risque d'expansion et de decompensation brutale par diminution de la pression atmosphérique)</li>
      <li><strong>Surveillance post-drainage :</strong> radiographie thoracique de contrôle, recherche d'un bullage persistant (fuite aérienne continue = évoquer une fistule bronchopleurale), oscillations du liquide dans le système (témoigne de la perméabilité du drain), retrait du drain après résolution complète et épreuve de clampage concluante</li>
      <li>Rechercher et traiter la cause chez le sujet secondaire (BPCO, tuberculose, pneumocystose) ; discuter pleurodèse/chirurgie (bullectomie/thoracoscopie) en prévention de récidive selon le terrain et le nombre d'épisodes</li>
    </ol>
  </div>

  <div class="card" id="proto-coma">
    <h3>🧠 Coma / Trouble de conscience</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Démarche ABCDE systématique, puis recherche étiologique orientée.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Protéger les voies aériennes si GCS≤8 (position latérale de sécurité en attendant, discuter intubation)</li>
      <li><strong>Gestes immédiats à ne jamais oublier :</strong> glycémie capillaire (corriger hypoglycémie), SpO2/O2, température</li>
      <li>Si suspicion d'intoxication aux opiacés : <strong>Naloxone (Narcan®)</strong> 0,4-2 mg IV/IM/IN (titration), répétable</li>
      <li>Examen neurologique : GCS, pupilles (taille, symétrie, réactivité), signes de localisation, signes méningés, recherche de traumatisme</li>
      <li>Bilan orienté : glycémie, ionogramme (Na+ particulièrement), fonction rénale/hépatique, gazométrie, toxiques si disponible, imagerie cérébrale si suspicion lésion structurelle (TC, AVC), PL si suspicion méningite/encéphalite (après TDM si signe de localisation)</li>
      <li>Mnémotechnique étiologies : <strong>AEIOU-TIPS</strong> (Alcool/Acidose, Épilepsie/Électrolytes, Insuline, Overdose/Oxygène, Urémie, Trauma/Température, Infection, Psychiatrique, Stroke/Shock)</li>
    </ol>
  </div>

  <div class="card" id="proto-convulsions">
    <h3>⚡ Convulsion isolée (crise épileptique unique)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Crise convulsive généralisée avec reprise de conscience, ne remplissant pas les critères d'état de mal (durée &lt;5 min, épisode unique). Distinct de l'<strong>état de mal épileptique</strong> — <em>voir protocole dédié ci-dessous</em>.</p>
