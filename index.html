      <li><strong>Antibiothérapie</strong> réservée aux formes sévères (raccourcit la durée de la diarrhée et l'excrétion du vibrion) : <strong>Doxycycline</strong> 300 mg PO en dose unique chez l'adulte (azithromycine 1 g PO dose unique en alternative, notamment si grossesse, enfant &lt;8 ans ou résistance suspectée), à débuter dès que les vomissements sont contrôlés</li>
      <li>Surveiller et corriger une <strong>hypokaliémie</strong> (fréquente, pertes digestives majeures) et une <strong>hypoglycémie</strong> (surtout chez l'enfant dénutri)</li>
      <li>Mesures d'hygiène et d'isolement : lavage des mains, désinfection des selles/vomissements, points d'eau potable et de SRO dédiés — essentiels pour limiter la transmission en contexte épidémique</li>
      <li>Toute diarrhée aiguë sévère fébrile ou avec rectorragie doit faire reconsidérer un autre diagnostic (shigellose, amibiase) — le choléra classique n'est habituellement pas fébrile</li>
    </ol>
  </div>

  <div class="card" id="proto-drepanocytose">
    <h3>🔴 Crise vaso-occlusive drépanocytaire</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Douleur osseuse/articulaire intense chez un patient drépanocytaire connu, déclenchée par le froid, la déshydratation, une infection, un effort ou une hypoxie. Pathologie fréquente en Afrique/Océan Indien — la douleur est souvent sous-estimée et sous-traitée. Rechercher systématiquement une complication grave associée : <strong>syndrome thoracique aigu</strong>, <strong>priapisme</strong>, séquestration splénique aiguë (surtout enfant), AVC (surtout enfant — imagerie cérébrale en urgence si déficit, cf. protocole AVC).</p>

    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">1. Crise vaso-occlusive simple</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Bilan :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>NFS (comparer à l'hémoglobine de base du patient), réticulocytes</li>
      <li>CRP (habituellement augmentée), ionogramme, bilan hépatique</li>
      <li>LDH (augmentées en cas d'hémolyse), Rx thorax</li>
      <li>Hémocultures et BU si fièvre ; β-HCG si femme en âge de procréer</li>
      <li>Scanner/échographie abdominale si CVO abdominale, pour éliminer un diagnostic différentiel chirurgical</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Analgésie — priorité absolue</strong> (1ère dose dans les 30-60 min suivant l'arrivée, ne jamais sous-traiter) :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>MEOPA</strong> (protoxyde d'azote) le plus tôt possible si disponible — équipement souvent limité hors grands centres à Madagascar</li>
      <li><strong>Morphine</strong> IVD titrée : 0,1 mg/kg puis 3 mg toutes les 5 min IVD jusqu'à EVA &lt;4. Si pompe PCA disponible : 2 mg/mL, bolus 2 mg, période réfractaire 10 min (puis 2 min si besoin), dose maximale 45 mg/4h et 270 mg/24h — à défaut de PCA, poursuivre la titration IV répétée avec réévaluation toutes les 30-60 min</li>
      <li>En cas d'échec : <strong>kétamine (Ketalar®)</strong> IVSE 0,15 mg/kg/h, sans dépasser 1 mg/kg/h</li>
      <li>Douleur modérée : <strong>paracétamol</strong> 1 g toutes les 6h ± AINS si pas de contre-indication (insuffisance rénale fréquente sur ce terrain — à vérifier avant prescription)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Hydratation :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Sérum physiologique : 1 L/j sur la 1ère heure</li>
      <li>Puis G5% + 4 g NaCl/L + 2 g KCl/L (ne pas dépasser 2 L/j par voie IV — éviter toute surcharge, risque de syndrome thoracique aigu iatrogène)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Autres traitements :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Acide folique</strong> 5 mg/j PO (2 cp/j)</li>
      <li><strong>Oxygénothérapie</strong> systématique 3 L/min, à adapter selon la SpO2 (non systématique si saturation normale, mais large marge en pratique)</li>
      <li><strong>Hydroxyzine (Atarax®)</strong> 25 à 100 mg/j PO si anxiété</li>
      <li>Fièvre sans point d'appel : <strong>amoxicilline</strong> 1 g/8h IVL (antibiothérapie probabiliste couvrant les germes encapsulés — asplénie fonctionnelle)</li>
      <li>Anticoagulation préventive : <strong>énoxaparine (Lovenox®)</strong> 0,4 mL/j SC</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Surveillance :</strong> TA, FC, SpO2 toutes les 8h ; réévaluation de l'EVA</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Transfusion :</strong> pas de transfusion en urgence sauf avis spécialisé — non systématique dans la CVO simple non compliquée</p>

    <p style="margin-top:14px; font-weight:600; color:var(--accent2);">2. Syndrome thoracique aigu</p>
    <p style="font-size:13.5px; margin-bottom:8px;">Urgence vitale. Définition : association d'au moins 2 critères parmi anomalies auscultatoires pulmonaires, douleur thoracique, anomalies radiologiques pulmonaires (infiltrat).</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Critères de gravité :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Cliniques : FR &gt;30/min ou &lt;10/min, difficulté à parler, troubles de conscience, anomalies auscultatoires étendues, insuffisance cardiaque droite</li>
      <li>Gazométriques : PaO2 &lt;60 mmHg, acidose</li>
      <li>Radiologiques : atteinte pulmonaire étendue</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Bilan :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>NFS, réticulocytes ; CRP (augmentée) ; ionogramme, LDH, BNP si disponible</li>
      <li>Groupe sanguin, RAI, TP-TCA ; GDS</li>
      <li>Hémocultures et ECBU si fièvre ; Rx thorax</li>
      <li>Angioscanner thoracique à la recherche d'une embolie pulmonaire si ≥2 critères parmi : absence de crise douloureuse osseuse concomitante, Hb &gt;8,2 g/dL, plaquettes &gt;440×10⁹/L, PaCO2 &lt;38 mmHg (selon plateau technique disponible)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Hydratation :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Sérum physiologique : 1,5 L/j sur la 1ère heure</li>
      <li>Puis G5% + 4 g NaCl/L + 2 g KCl/L (ne pas dépasser 2 L/j par voie IV)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Analgésie</strong> (idem CVO — MEOPA, morphine titrée ± PCA) ; si échec : associer <strong>kétamine (Ketalar®)</strong> 0,15 mg/kg IVSE</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Autres traitements :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Acide folique 5 mg/j PO</li>
      <li>Oxygénothérapie systématique 3 L/min ou à adapter aux GDS, objectif SpO2 entre 94 et 96%</li>
      <li>Hydroxyzine (Atarax®) 25 à 100 mg/j PO si anxiété</li>
      <li><strong>Antibiothérapie systématique si fièvre</strong> (le syndrome thoracique aigu peut être d'origine infectieuse, embolique ou par infarctus pulmonaire — traiter comme une pneumopathie dans le doute) :
        <ul style="margin-left:18px;">
          <li>Pneumopathie simple : <strong>amoxicilline</strong> 1 g × 3/j IV (si allergie : <strong>lévofloxacine</strong> 500 mg × 2/j PO)</li>
          <li>Pneumopathie avec critères de gravité : <strong>céfotaxime</strong> 1 g × 3/j IVL, associé à un macrolide (<strong>spiramycine</strong> 3 MUI × 3/j, ou <strong>azithromycine</strong> selon disponibilité) pour couvrir les germes atypiques</li>
        </ul>
      </li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Échange transfusionnel — indications</strong> (avis spécialisé/réanimation) :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Au moins un critère de gravité</li>
      <li>Anémie &lt;6 g/dL</li>
      <li>Femme enceinte ou post-partum immédiat</li>
      <li>Patient en programme transfusionnel au long cours</li>
      <li>Absence d'amélioration après 72 heures</li>
      <li>Sepsis grave ; période postopératoire</li>
    </ul>

    <p style="margin-top:14px; font-weight:600; color:var(--accent2);">3. Priapisme</p>
    <p style="font-size:13.5px; margin-bottom:8px;">Urgence urologique — le pronostic fonctionnel dépend de la rapidité de prise en charge.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Bilan :</strong> NFS-plaquettes, TP-TCA, ionogramme, créatininémie</li>
      <li><strong>Mise en condition :</strong> voie veineuse (sérum physiologique 500 mL/24h), scope, PANI</li>
      <li><strong>De 1ère intention (entre 30 min et 4h) — petits moyens :</strong> exercice musculaire (flexion-extension des cuisses, montée-descente d'escalier) pour induire un vol vasculaire, douche froide, application de glace</li>
      <li><strong>Si échec ou après 4h :</strong> appel urologue en urgence ; gazométrie sur sang intracaverneux (souffrance anoxique si PaO2 &lt;30 mmHg, PaCO2 &gt;60 mmHg, pH &lt;7,25) ; ponction caverneuse (perpendiculaire et latérale à la verge, seringue de 50 mL, après anesthésie locale) avec évacuation du sang noir jusqu'à retour de sang rouge</li>
      <li><strong>Injection intracaverneuse d'un vasoconstricteur</strong> — <strong>étiléfrine (Effortil®)</strong> 2 mg (1 ampoule de 1 mL = 10 mg, diluer dans une seringue à insuline), répétable toutes les 10 min pendant la 1ère heure si échec, dose maximale 10 mg (après avis urologue). Si étiléfrine non disponible : <strong>adrénaline</strong> fortement diluée (10-20 µg par injection intracaverneuse) peut être utilisée en alternative selon avis urologique, sous surveillance tensionnelle/ECG</li>
      <li><strong>Si échec :</strong> chirurgie urologique — shunt uni ou bilatéral</li>
    </ol>

    <p style="margin-top:10px; font-size:13px; color:var(--muted);"><strong>Ordonnance de sortie</strong> (CVO simple résolutive) : acide folique (Spéciafoldine®) 5 mg/j, antalgie par paracétamol 1 à 4 g/j, hydratation orale abondante. Voir aussi le protocole AVC pour la prise en charge de l'AVC drépanocytaire.</p>
  </div>

  <div class="card" id="proto-accident-transfusionnel">
    <h3>🩸 Accident transfusionnel aigu</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les recommandations AABB (Association for the Advancement of Blood & Biotherapies). Tout symptôme nouveau pendant ou dans les heures suivant une transfusion doit faire évoquer un accident transfusionnel et faire arrêter la transfusion par précaution, même en cas de doute.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Geste réflexe immédiat devant tout symptôme suspect</strong> : <strong>arrêter la transfusion</strong> sans la débrancher (garder la voie veineuse avec du NaCl 0,9% sur une tubulure séparée), surveillance rapprochée (scope, PA, SpO2, température), prévenir le médecin</li>
      <li><strong>Vérifier immédiatement la concordance</strong> : identité du patient, groupe sanguin/Rh, numéro de poche, compatibilité — la cause la plus fréquente et la plus grave (hémolyse aiguë) résulte d'une erreur d'attribution de poche</li>
      <li><strong>Réaction hémolytique aiguë</strong> (incompatibilité ABO) : fièvre/frissons brutaux, douleur lombaire, douleur au point de perfusion, hypotension/choc, hémoglobinurie (urines rouge-brun), CIVD, insuffisance rénale aiguë — <strong>urgence vitale</strong> : arrêt immédiat et définitif de la poche, remplissage vasculaire pour maintenir une diurèse &gt;100 mL/h (protection rénale), alcalinisation des urines si disponible, renvoyer la poche + un tube de sang du patient au laboratoire (groupage, RAI, test de Coombs direct, recherche d'hémolyse), traitement du choc/CIVD associé</li>
      <li><strong>Réaction fébrile non hémolytique</strong> (la plus fréquente, bénigne) : fièvre/frissons isolés sans signe de gravité — arrêter transitoirement la transfusion, <strong>Paracétamol</strong> 1g, éliminer une réaction plus grave avant de reprendre prudemment (souvent poursuivie à débit ralenti sous surveillance après avis médical)</li>
      <li><strong>Réaction allergique/anaphylactique</strong> : urticaire isolée légère → antihistaminique (<strong>Déxchlorphéniramine — Polaramine®</strong>) et reprise prudente possible ; si bronchospasme/angio-œdème/hypoTA → arrêt définitif, prise en charge complète de l'anaphylaxie (<em>voir protocole dédié</em> — adrénaline IM sans délai si critères remplis)</li>
      <li><strong>TRALI</strong> (Transfusion-Related Acute Lung Injury) : détresse respiratoire aiguë hypoxémiante brutale pendant ou dans les 6h suivant la transfusion, infiltrats pulmonaires bilatéraux à la radiographie, <strong>sans surcharge volémique</strong> (distinct du TACO) — traitement symptomatique : oxygénothérapie/ventilation selon sévérité (proche de la prise en charge du SDRA), arrêt définitif de la poche en cause, signalement pour traçabilité du donneur</li>
      <li><strong>TACO</strong> (surcharge volémique post-transfusionnelle) : dyspnée, orthopnée, crépitants, hypertension, distension jugulaire, souvent chez un patient âgé/insuffisant cardiaque ou après transfusion trop rapide — traitement identique à l'OAP cardiogénique (<strong>Furosémide — Lasilix®</strong>, position demi-assise, oxygène) ; prévention par un débit de transfusion ralenti chez les sujets à risque</li>
      <li><strong>Contamination bactérienne de la poche</strong> (rare, surtout concentrés plaquettaires) : fièvre élevée brutale, frissons, choc septique précoce — arrêt immédiat, hémocultures (patient + poche), antibiothérapie probabiliste large spectre sans délai (cf. protocole sepsis)</li>
      <li><strong>Toute réaction transfusionnelle doit être déclarée</strong> selon le circuit d'hémovigilance local, avec conservation de la poche et de la tubulure pour analyse</li>
    </ol>
  </div>

  <div class="card" id="proto-organophosphores">
    <h3>🌾 Intoxication aux organophosphorés / carbamates (pesticides)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Syndrome cholinergique par inhibition de l'acétylcholinestérase, très fréquent en milieu agricole malgache (ingestion volontaire ou accidentelle). Pronostic vital engagé principalement par la détresse respiratoire (bronchorrhée, paralysie des muscles respiratoires).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Protection du personnel AVANT tout contact</strong> : gants, tablier imperméable, éviter tout contact cutané avec les vêtements souillés, les vomissements ou le liquide gastrique — des cas documentés de contamination secondaire de soignants existent</li>
      <li><strong>Décontamination cutanée immédiate</strong> : retrait complet des vêtements contaminés, lavage abondant à l'eau et au savon ; ne jamais réaliser de lavage gastrique sans protection adaptée</li>
      <li><strong>ABCDE</strong> : aspiration des sécrétions, oxygénothérapie, <strong>intubation précoce</strong> si détresse respiratoire ou trouble de conscience — éviter la <strong>succinylcholine</strong> (métabolisée par les cholinestérases, effet imprévisible et prolongé), préférer un curare non dépolarisant</li>
      <li><strong>Reconnaître le syndrome cholinergique</strong> : myosis serré, hypersécrétions (bronchorrhée, sialorrhée, sueurs profuses, larmoiement), bradycardie, fasciculations musculaires, diarrhée, confusion, convulsions</li>
      <li><strong>Atropine IV (Atropine Aguettant®)</strong> : 1-2 mg (enfant : 0,02 mg/kg), <strong>doses doublées toutes les 5 minutes</strong> jusqu'à assèchement des sécrétions bronchiques et disparition du bronchospasme (pas de cible de fréquence cardiaque) — les doses cumulées nécessaires peuvent être très élevées (plusieurs dizaines de mg), sans plafond fixe</li>
      <li><strong>Pralidoxime (Contrathion®)</strong> si disponible : bolus initial 1-2 g IV lent (15-30 min), puis perfusion continue 400-600 mg/h chez l'adulte (10-20 mg/kg/h chez l'enfant) — d'autant plus efficace si débuté précocement (idéalement &lt;24-48h), à poursuivre tant que les signes cholinergiques/besoins en atropine persistent ; toujours associé à l'atropine, jamais en monothérapie</li>
      <li><strong>Benzodiazépines (Diazépam — Valium®)</strong> en cas de convulsions ou d'agitation associée</li>
      <li><strong>Médicaments contre-indiqués</strong> : morphine, théophylline/aminophylline, phénothiazines (aggravent la toxicité cholinergique et la dépression respiratoire)</li>
      <li><strong>Surveillance prolongée 48-72h minimum</strong> : risque de <strong>syndrome intermédiaire</strong> (faiblesse musculaire proximale et respiratoire retardée, typiquement entre J1 et J4, après amélioration initiale apparente) — surveillance CPK et kaliémie (rhabdomyolyse), fonction rénale</li>
    </ol>
  </div>

  <div class="card" id="proto-co">
    <h3>💨 Intoxication au monoxyde de carbone (CO)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Gaz inodore et incolore, source fréquente : groupes électrogènes, braseros/charbon utilisés en espace clos, incendie, appareils de chauffage défectueux. À évoquer systématiquement devant des céphalées, nausées ou une confusion touchant plusieurs personnes du même foyer simultanément.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Retirer immédiatement la victime de la source d'exposition</strong> et aérer les lieux avant toute autre prise en charge</li>
      <li><strong>La SpO2 est faussement normale</strong> — l'oxymètre de pouls standard ne différencie pas la carboxyhémoglobine (HbCO) de l'oxyhémoglobine : ne jamais se fier à une SpO2 normale pour écarter le diagnostic</li>
      <li><strong>Oxygénothérapie 100% au masque à haute concentration</strong>, débutée immédiatement dès la suspicion clinique, sans attendre la confirmation biologique, poursuivie plusieurs heures — accélère nettement l'élimination de l'HbCO (demi-vie réduite d'environ 5h en air ambiant à 1-1,5h sous oxygène pur)</li>
      <li>Dosage de la carboxyhémoglobine si disponible (gaz du sang avec CO-oxymétrie) pour confirmer et quantifier l'exposition</li>
      <li><strong>Oxygénothérapie hyperbare</strong> à discuter si disponible, en cas de : perte de connaissance même brève, signes neurologiques ou cardiaques, grossesse (le CO traverse le placenta et expose à une toxicité fœtale majorée), ou HbCO très élevée — bénéfice maximal si débutée précocement</li>
      <li><strong>ECG systématique</strong> : une ischémie myocardique est possible même chez un sujet jeune sans coronaropathie connue</li>
      <li>Informer le patient et l'entourage du risque de <strong>syndrome neurologique post-intervallaire</strong> (troubles cognitifs, de l'humeur ou moteurs) pouvant apparaître entre 3 et 21 jours après une intoxication apparemment résolue — consultation de contrôle recommandée</li>
      <li>En contexte d'incendie en espace clos, <strong>évoquer une intoxication cyanhydrique associée</strong> (fumées de combustion) devant un choc ou une acidose lactique majeure disproportionnée par rapport à l'intoxication au CO seule</li>
    </ol>
  </div>

  <div class="card" id="proto-agitation">
    <h3>🌪️ Agitation aiguë — Sédation d'urgence</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Motif fréquent aux urgences. Une cause organique doit toujours être recherchée et éliminée avant d'attribuer l'agitation à une origine purement psychiatrique — hypoglycémie, hypoxie, sepsis, intoxication, sevrage, traumatisme crânien peuvent tous se présenter comme une agitation aiguë.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Sécurité avant tout :</strong> éloigner les objets potentiellement dangereux, s'assurer d'un personnel en nombre suffisant, privilégier en 1ère intention la <strong>désescalade verbale</strong> (ton calme, respect de l'espace personnel, éviter la confrontation directe)</li>
      <li><strong>Éliminer une cause organique urgente</strong> avant toute sédation lorsque possible : glycémie capillaire, SpO2, température, recherche de traumatisme crânien, signes d'intoxication ou de sevrage — une cause réversible non traitée peut être masquée par la sédation</li>
      <li><strong>Contention physique</strong> en dernier recours et le plus brièvement possible, jamais isolée (toujours associée à une surveillance rapprochée continue) — privilégier une contention à 2 points plutôt qu'à 4 points lorsqu'elle est suffisante</li>
      <li><strong>Sédation médicamenteuse</strong> si agitation sévère avec risque pour le patient ou pour autrui :<br>
        • <strong>Halopéridol (Haldol®)</strong> 5 mg IM (2,5 mg chez le sujet âgé/fragile), délai d'action ~30-60 min, répétable<br>
        • <strong>Midazolam (Hypnovel®)</strong> 5 mg IM ou IV lente, délai d'action rapide (5-10 min), à privilégier si sédation rapide nécessaire — surveiller étroitement le risque de dépression respiratoire<br>
        • L'<strong>association Halopéridol + Midazolam</strong> (ou + une benzodiazépine) est souvent plus efficace qu'une monothérapie et permet de réduire la dose de chaque agent</li>
      <li><strong>Surveillance systématique post-sédation</strong> : fréquence respiratoire, SpO2, scope si benzodiazépine à dose significative ou association médicamenteuse — risque de dépression respiratoire</li>
      <li><strong>Précautions :</strong> éviter l'halopéridol en cas d'allongement du QT connu ou de trouble ionique majeur non corrigé (risque de torsade de pointes) ; réduire les doses chez le sujet âgé ou insuffisant hépatique</li>
      <li>Une fois le patient calmé : réévaluation clinique et biologique complète pour rechercher la cause sous-jacente, avis psychiatrique si une origine psychiatrique est confirmée</li>
      <li><strong>Documenter précisément</strong> le motif de la contention/sédation, les mesures utilisées et leur durée — exigence éthique et médico-légale</li>
    </ol>
  </div>

  <div class="card" id="proto-suicidaire">
    <h3>💭 Crise suicidaire — Évaluation et prise en charge aux urgences</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Toute expression d'idées suicidaires ou toute tentative doit être prise au sérieux, quelle que soit sa gravité apparente. L'objectif immédiat est d'assurer la sécurité du patient avant toute autre démarche diagnostique ou thérapeutique.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Accueil non jugeant</strong>, entretien dans un lieu calme et sécurisé — retirer de l'environnement immédiat les objets potentiellement dangereux (médicaments, objets tranchants, ceinture, cordons)</li>
      <li><strong>Évaluer directement et sans détour le risque suicidaire</strong> : idées actuelles, existence d'un scénario/plan élaboré, accès à des moyens létaux, antécédent personnel de tentative, degré d'intentionnalité, facteurs précipitants récents — poser la question directement ne majore pas le risque, contrairement à une idée reçue répandue</li>
      <li><strong>Rechercher les facteurs de risque</strong> : antécédents psychiatriques (dépression, trouble bipolaire, psychose), addictions, isolement social, événement de vie récent (deuil, rupture, perte d'emploi), antécédent familial de suicide, accès facilité à des moyens (armes, médicaments, pesticides agricoles)</li>
      <li><strong>Ne jamais laisser seul un patient à haut risque</strong> — surveillance rapprochée continue jusqu'à l'évaluation psychiatrique</li>
      <li>Prise en charge somatique en priorité en cas de tentative avec moyen physique (intoxication médicamenteuse, plaie auto-infligée) — se référer aux protocoles spécifiques correspondants (intoxications aiguës, hémorragie)</li>
      <li><strong>Avis psychiatrique systématique</strong> avant toute décision de sortie, y compris si le patient minimise son geste a posteriori ou demande à partir</li>
      <li>Décision d'hospitalisation (avec ou sans consentement, selon le cadre légal en vigueur) si le risque immédiat est jugé élevé, en l'absence de facteur protecteur solide, ou si un environnement sécurisant ne peut être assuré en ambulatoire</li>
      <li>Si une sortie est envisagée : élaborer avec le patient un <strong>plan de sécurité écrit</strong> (signes d'alerte personnels, personnes-ressources à contacter, restriction de l'accès aux moyens létaux au domicile), impliquer un proche de confiance, organiser un contact de suivi rapproché (dans les 24-72h)</li>
      <li>Une tentative de suicide antérieure est le facteur prédictif le plus fort de récidive ou de décès par suicide — ne jamais banaliser un geste jugé "peu grave" sur le plan somatique</li>
    </ol>
  </div>

renderers.protocoles = renderProtocoles;

function toggleProtoToc(){
  const toc=document.getElementById('proto-toc');
  if(toc) toc.classList.toggle('collapsed');
}

function toggleTocCat(catEl){
  catEl.classList.toggle('collapsed');
  const group = catEl.nextElementSibling;
  if(group && group.classList.contains('toc-group')){
    group.classList.toggle('collapsed');
  }
}

function init_protocoles(){
  const content = document.getElementById('content');
  const toc = document.getElementById('proto-toc');
  if(!content || !toc) return;
  content.querySelectorAll('.card[id^="proto-"]').forEach(card=>{
    if(card.querySelector('.back-to-toc')) return;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'back-to-toc';
    btn.innerHTML = '↑ Retour au sommaire';
    btn.onclick = ()=>{
      toc.classList.remove('collapsed');
      toc.scrollIntoView({behavior:'smooth', block:'start'});
    };
    card.appendChild(btn);
  });
}

      <tr><td><strong>Morphine</strong></td><td>Analgésie, OAP</td><td>0,05–0,1 mg/kg IV lent (titration 2 mg)</td><td>Histaminolibération, prudence si bronchospasme</td></tr>

  </div>

  <div class="card">

    <table>

      <tr><td><strong>Rocuronium</strong></td><td>Non dépolarisant (ISR haute dose)</td><td>1,2 mg/kg IV</td><td>30-60 min (réversible par sugammadex)</td></tr>
      <tr><td><strong>Vécuronium</strong></td><td>Non dépolarisant</td><td>0,1 mg/kg IV</td><td>25-40 min</td></tr>
      <tr><td><strong>Atracurium</strong></td><td>Non dépolarisant (IRC/IHC)</td><td>0,5 mg/kg IV</td><td>20-35 min (élimination Hofmann)</td></tr>
    </table>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">CI succinylcholine : hyperkaliémie, brûlures étendues, crush syndrome, immobilisation prolongée, myopathies.</p>

  <div class="card">

    <table>
      <tr><th>Drogue</th><th>Indication</th><th>Posologie</th></tr>
      <tr><td><strong>Amiodarone</strong></td><td>FV/TV réfractaire, FA rapide</td><td>ACR : 300 mg IV bolus, puis 150 mg. FA/TSV : 5 mg/kg IVL en 1h, relais 10-15 mg/kg/24h</td></tr>
      <tr><td><strong>Atropine</strong></td><td>Bradycardie symptomatique</td><td>0,5–1 mg IV, répétable toutes 3-5 min, max 3 mg</td></tr>

      <tr><td><strong>Furosémide</strong></td><td>OAP, surcharge</td><td>OAP : 40–80 mg IV direct, titrer selon réponse</td></tr>
      <tr><td><strong>Dérivés nitrés</strong></td><td>OAP, SCA avec PA conservée</td><td>TNT sublingual 0,4 mg × 1-3 ; IV si disponible</td></tr>
    </table>
  </div>

  <div class="card">
    <h3>🧪 Antidotes principaux</h3>
    <table>
      <tr><th>Toxique</th><th>Antidote</th><th>Posologie</th></tr>
      <tr><td>Opiacés</td><td>Naloxone</td><td>0,4–2 mg IV/IM/IN, titration, répétable (demi-vie courte !)</td></tr>
      <tr><td>BZD</td><td>Flumazénil</td><td>0,2 mg IV lent, répétable/min, max 1 mg — attention convulsions si BZD au long cours</td></tr>
      <tr><td>Organophosphorés</td><td>Atropine + Pralidoxime</td><td>Atropine 2–4 mg IV toutes 5-10 min jusqu'à tarissement des sécrétions</td></tr>
      <tr><td>Paracétamol</td><td>N-acétylcystéine</td><td>150 mg/kg en 1h → 50 mg/kg en 4h → 100 mg/kg en 16h IV</td></tr>
      <tr><td>AVK</td><td>Vitamine K1 + PPSB si urgence</td><td>Vit K1 5-10 mg IV lent ; PPSB 25 UI/kg IV si hémorragie grave</td></tr>
      <tr><td>CO</td><td>O2 100%</td><td>Masque haute concentration 15 L/min ; discuter caisson hyperbare</td></tr>
      <tr><td>Cyanures</td><td>Hydroxocobalamine</td><td>5 g IV en 15 min (70 mg/kg enfant)</td></tr>
    </table>
  </div>

  <div class="card" id="drogues-gravite">
    <h3>💧 Compositions standards & administration par gravité (sans pousse-seringue)</h3>
    <div class="warn-box">⚠️ La perfusion par gravité est <strong>moins précise</strong> qu'un pousse-seringue électrique (PSE) : débit influencé par la hauteur de la poche, la position du patient, un coude du tubulure. Pour les catécholamines, utiliser <strong>impérativement une burette de précision / chambre de comptage (60 gouttes/mL)</strong> si disponible, jamais un simple macro-perfuseur si évitable — et recompter le débit toutes les 15-30 min. Un <a onclick="document.querySelector('[data-mod=calculateurs]').click(); setTimeout(()=>document.getElementById('gtt-card')?.scrollIntoView({behavior:'smooth'}),100)" style="color:var(--accent); cursor:pointer; text-decoration:underline;">calculateur de débit en gouttes/min</a> est disponible dans le module Calculateurs.</div>
    <table style="margin-top:10px;">
      <tr><th>Drogue</th><th>Ampoule/Flacon standard*</th><th>Dilution de référence pour gravité</th><th>Concentration obtenue</th></tr>
      <tr><td><strong>Noradrénaline</strong></td><td>8 mg / 4 mL</td><td>1 ampoule (8 mg) dans 250 mL SSI 0,9%</td><td>32 µg/mL</td></tr>
      <tr><td><strong>Adrénaline</strong> (perfusion continue)</td><td>1 mg / 1 mL</td><td>5 ampoules (5 mg) dans 250 mL SSI 0,9%</td><td>20 µg/mL</td></tr>
      <tr><td><strong>Dobutamine</strong></td><td>250 mg / 20 mL</td><td>1 flacon (250 mg) dans 250 mL SSI 0,9% ou G5%</td><td>1 mg/mL (1000 µg/mL)</td></tr>
      <tr><td><strong>Dopamine</strong></td><td>200 mg / 5 mL</td><td>1 ampoule (200 mg) dans 250 mL SSI 0,9% ou G5%</td><td>0,8 mg/mL (800 µg/mL)</td></tr>
      <tr><td><strong>Nicardipine</strong> (Loxen®)</td><td>10 mg / 10 mL</td><td>1 ampoule (10 mg) dans 40 mL SSI 0,9% (soit 50 mL au total)</td><td>0,2 mg/mL (200 µg/mL)</td></tr>
    </table>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">*Le dosage des ampoules varie selon le fabricant (génériques, marques locales) — <strong>toujours vérifier la concentration inscrite sur l'ampoule réellement disponible</strong> avant de préparer la dilution ; les valeurs ci-dessus sont les plus courantes en pratique francophone mais ne remplacent pas la lecture de l'étiquette. Le calculateur du module Calculateurs permet d'adapter le calcul à n'importe quelle composition réelle.</p>
    <p style="margin-top:6px; font-size:13px; color:var(--muted);">Pour un débit trop lent à compter (&lt;5 gouttes/min en macro-perfuseur 20 gtt/mL), préférer une dilution plus concentrée dans un volume plus petit (ex. 100 mL) plutôt qu'un débit impossible à titrer manuellement — ou utiliser une burette microgouttes qui rend un débit lent bien plus précis.</p>
  </div>

  <div class="card" id="drogues-pediatrie">
    <h3>👶 Réanimation pédiatrique — Doses par kg</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Chez l'enfant, <strong>toutes les doses sont calculées au poids</strong>. Utiliser le poids réel mesuré si disponible — sinon estimation par l'âge (formules ci-dessous), à n'utiliser qu'en urgence si la pesée est impossible. Un <a onclick="document.querySelector('[data-mod=calculateurs]').click(); setTimeout(()=>document.getElementById('pedia-card')?.scrollIntoView({behavior:'smooth'}),100)" style="color:var(--accent); cursor:pointer; text-decoration:underline;">calculateur interactif</a> est disponible dans le module Calculateurs.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Tranche d'âge</th><th>Estimation du poids (kg)</th></tr>
      <tr><td>0–12 mois</td><td>(0,5 × âge en mois) + 4</td></tr>
      <tr><td>1–5 ans</td><td>(2 × âge en années) + 8</td></tr>
      <tr><td>6–12 ans</td><td>(3 × âge en années) + 7</td></tr>
    </table>
    <table>
      <tr><th>Situation</th><th>Drogue</th><th>Dose pédiatrique</th></tr>
      <tr><td class="grave">ACR</td><td><strong>Adrénaline</strong> IV/IO</td><td>0,01 mg/kg (dilution 1:10 000 → 0,1 mL/kg), répétable toutes les 3-5 min, max 1 mg/dose</td></tr>
      <tr><td class="grave">ACR</td><td><strong>Amiodarone</strong></td><td>5 mg/kg IV/IO bolus (max 300 mg), répétable ×2 si FV/TV réfractaire</td></tr>
      <tr><td class="grave">Anaphylaxie</td><td><strong>Adrénaline</strong> IM (1:1000)</td><td>0,01 mg/kg (max 0,3 mg &lt;6 ans, 0,5 mg au-delà), face antéro-latérale de cuisse, répétable /5-15 min</td></tr>
      <tr><td class="modere">Bradycardie symptomatique</td><td><strong>Atropine</strong></td><td>0,02 mg/kg IV (dose min 0,1 mg pour éviter une bradycardie paradoxale, max 0,5 mg/dose enfant — 1 mg ado)</td></tr>
      <tr><td class="grave">Convulsions</td><td><strong>Diazépam</strong></td><td>IV : 0,3 mg/kg (max 10 mg) — Intra-rectal : 0,5 mg/kg (max 10 mg)</td></tr>
      <tr><td class="grave">Convulsions</td><td><strong>Midazolam</strong></td><td>IV : 0,15 mg/kg (max 10 mg) — Intranasal/buccal : 0,3 mg/kg (max 10 mg), utile en 1ère intention si pas de voie IV</td></tr>
      <tr><td class="grave">Hypoglycémie</td><td><strong>Glucose G10%</strong></td><td>2 mL/kg IV lente (= 200 mg/kg), réévaluer glycémie à 10-15 min, relais si besoin</td></tr>
      <tr><td class="modere">Intoxication opiacés</td><td><strong>Naloxone</strong></td><td>0,01 mg/kg IV/IM/IN (max 2 mg), répétable — surveillance prolongée (re-narcotisation)</td></tr>
      <tr><td class="modere">ISR / Induction</td><td><strong>Kétamine</strong></td><td>IV : 1–2 mg/kg — IM : 4–5 mg/kg si pas de voie d'abord</td></tr>
      <tr><td class="modere">ISR</td><td><strong>Succinylcholine</strong></td><td>1,5–2 mg/kg IV (dose relative plus élevée que l'adulte, surtout &lt;1 an) — mêmes CI que l'adulte</td></tr>
      <tr><td class="modere">Choc / déshydratation</td><td><strong>Remplissage vasculaire</strong></td><td>Bolus cristalloïdes 10–20 mL/kg sur 15-20 min, <strong>réévaluer systématiquement après chaque bolus</strong> (auscultation, hépatomégalie, FR) — prudence particulière en zone d'endémie palustre/anémie où un remplissage agressif peut être délétère (cf. essai FEAST)</td></tr>
      <tr><td class="leger">Antalgie/fièvre</td><td><strong>Paracétamol</strong></td><td>15 mg/kg/6h IV/PO (max 60 mg/kg/j, max 1g/dose)</td></tr>
      <tr><td class="modere">Ingestion toxique</td><td><strong>Charbon activé</strong></td><td>1 g/kg PO (max 50 g), si &lt;1-2h post-ingestion et voies aériennes protégées</td></tr>
      <tr><td class="grave">Intoxication paracétamol</td><td><strong>N-acétylcystéine</strong></td><td>Même schéma pondéral que l'adulte (150→50→100 mg/kg) mais <strong>diluer dans des volumes réduits chez l'enfant &lt;20 kg</strong> pour limiter le risque de surcharge/hyponatrémie iatrogène</td></tr>
      <tr><td class="leger">OAP/surcharge</td><td><strong>Furosémide</strong></td><td>1 mg/kg IV, à titrer</td></tr>
      <tr><td class="grave">Insuffisance surrénale aiguë</td><td><strong>Hydrocortisone</strong></td><td>2–4 mg/kg IV bolus (max 100 mg), puis entretien 2 mg/kg/6h</td></tr>
    </table>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">⚠️ Chez le nourrisson &lt;1 an et le nouveau-né, les doses et voies d'abord sont plus spécifiques encore (ex. voie intra-osseuse en 1ère intention si accès veineux difficile) — se référer à un protocole de réanimation néonatale dédié en cas de doute, en particulier &lt;28 jours de vie.</p>
  </div>

  <div class="card">
    <h3>⚠️ Règles de sécurité</h3>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Catécholamines toujours sur voie centrale dédiée (sauf urgence absolue en périphérique transitoire).</li>
      <li>Ne jamais administrer KCl IV pur non dilué.</li>
      <li>Calcium IV et bicarbonate incompatibles sur la même voie (précipitation).</li>
      <li>Propofol : changer flacon et tubulure toutes les 12h.</li>
      <li>Tracer systématiquement heure, dose, opérateur pour chaque médicament.</li>
    </ul>
  </div>`;
}
renderers.drogues = renderDrogues;

/* ===================== MODULE VENTILATION & O2 ===================== */
function renderVentilation(){
  return `
  <h2 class="module-title">🫁 Ventilation & Oxygénothérapie</h2>
  <p class="module-sub">Réglages de base selon pathologie — à adapter à la clinique et aux gaz du sang.</p>

  <div class="card">
    <h3>🌬️ Oxygénothérapie — dispositifs et FiO2</h3>
    <table>
      <tr><th>Dispositif</th><th>Débit (L/min)</th><th>FiO2 approx.</th><th>Indication</th></tr>
      <tr><td>Lunettes nasales</td><td>1–6</td><td>24–44%</td><td>IR légère, BPCO stable</td></tr>
      <tr><td>Masque simple</td><td>5–10</td><td>35–55%</td><td>Hypoxémie modérée</td></tr>
      <tr><td>Masque haute concentration (+ réservoir)</td><td>10–15</td><td>60–90%</td><td>Hypoxémie sévère, ACR, intoxication CO</td></tr>
      <tr><td>Venturi</td><td>Variable</td><td>24–60% (contrôlé)</td><td>BPCO, besoin de FiO2 précise</td></tr>
      <tr><td>OHD nasale (HFNC)</td><td>20–60</td><td>21–100%</td><td>IRA hypoxémique, alternative à VNI</td></tr>
    </table>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">Cible SpO2 : 92–96% (88–92% si BPCO/hypercapnie documentée). Éviter l'hyperoxyémie inutile.</p>
  </div>

  <div class="card">
    <h3>🩺 Ventilation Non Invasive (VNI)</h3>
    <table>
      <tr><th>Mode</th><th>Indication</th><th>Réglages initiaux</th></tr>
      <tr><td><strong>CPAP</strong></td><td>OAP cardiogénique, SAOS</td><td>PEP 5–10 cmH2O, titrer selon SpO2</td></tr>
      <tr><td><strong>BiPAP / VS-AI-PEP</strong></td><td>BPCO exacerbée, OAP, IRA hypercapnique</td><td>AI 8–12 cmH2O / PEP 4–8 cmH2O / FiO2 cible SpO2</td></tr>
    </table>
    <p style="margin-top:8px; font-size:13.5px; color:var(--muted);">CI VNI : arrêt respiratoire imminent, vomissements actifs, GCS &lt;10, absence de coopération, pneumothorax non drainé, trauma facial. Réévaluer à 1h — intuber sans délai si pas d'amélioration.</p>
  </div>

  <div class="card">
    <h3>🔧 Ventilation Mécanique Invasive — Réglages initiaux</h3>
    <table>
      <tr><th>Paramètre</th><th>Valeur de départ</th><th>Objectif</th></tr>
      <tr><td>Mode</td><td>VAC / VCV</td><td>Référence en réanimation initiale</td></tr>
      <tr><td>Volume courant (Vt)</td><td>6–8 mL/kg <strong>PIT*</strong></td><td>SDRA : 6 mL/kg strict, Pplateau &lt;30 cmH2O</td></tr>
      <tr><td>Fréquence respiratoire</td><td>14–18/min</td><td>Adapter aux GDS (pH 7,35-7,45)</td></tr>
      <tr><td>FiO2</td><td>1,0 puis titrer</td><td>Minimum pour SpO2 92-96%</td></tr>
      <tr><td>PEP (PEEP)</td><td>5 cmH2O</td><td>SDRA : 8-14+ (tables ARDSNet)</td></tr>
      <tr><td>Rapport I:E</td><td>1:2</td><td>BPCO/asthme : 1:3 ou 1:4</td></tr>
    </table>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">*PIT Homme = 50 + 0,91 × (taille cm − 152,4) | Femme = 45,5 + 0,91 × (taille cm − 152,4)</p>
  </div>

  <div class="card">
    <h3>🎯 Réglages par pathologie</h3>
    <table>
      <tr><th>Pathologie</th><th>Spécificités</th></tr>
      <tr><td><strong>SDRA</strong></td><td>Vt 6 mL/kg PIT, Pplateau &lt;30, PEP élevée (8-18 selon sévérité), décubitus ventral ≥16h/j si PaO2/FiO2 &lt;150, curarisation précoce si sévère</td></tr>
      <tr><td><strong>BPCO exacerbée</strong></td><td>FR basse 12-14/min, I:E 1:3-4, tolérer hypercapnie permissive (pH ≥ 7,25), PEP ≤ auto-PEP intrinsèque</td></tr>
      <tr><td><strong>Asthme sévère</strong></td><td>Bronchodilatateurs en circuit, éviter PEP élevée (air-trapping), risque pneumothorax</td></tr>
      <tr><td><strong>TC grave</strong></td><td>Normocapnie stricte PaCO2 35-40 mmHg, PEEP ≤5, SpO2 &gt;95%, PAM ≥80 mmHg</td></tr>
    </table>
  </div>

  <div class="card">
    <h3>🔓 Sevrage ventilatoire</h3>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">

      <li>Si échec EVS → identifier cause, renouveler après 24h</li>

  </div>`;
}
renderers.ventilation = renderVentilation;

/* ===================== MODULE VOIES VEINEUSES & ABORDS ===================== */
function renderAbords(){
  return `
  <h2 class="module-title">🩸 Voies veineuses & Abords vasculaires</h2>
  <p class="module-sub">Indications, sites, technique et complications. Asepsie rigoureuse pour tous les gestes.</p>

  <div class="card">
    <h3>🩺 Voie veineuse périphérique (VVP)</h3>
    <table>
      <tr><th>Cathéter</th><th>Couleur</th><th>Débit max</th><th>Usage</th></tr>
      <tr><td>14G</td><td>Orange</td><td>~270 mL/min</td><td>Remplissage massif, choc hémorragique</td></tr>
      <tr><td>16G</td><td>Gris</td><td>~180 mL/min</td><td>Remplissage rapide, urgence</td></tr>
      <tr><td>18G</td><td>Vert</td><td>~90 mL/min</td><td>Urgence courante, transfusion</td></tr>
      <tr><td>20G</td><td>Rose</td><td>~55 mL/min</td><td>Médicaments courants, maintenance</td></tr>
      <tr><td>22G</td><td>Bleu</td><td>~31 mL/min</td><td>Enfants, veines fragiles</td></tr>
    </table>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">Privilégier avant-bras/pli du coude. Éviter membres inférieurs. Changer toutes les 72-96h en dehors de l'urgence.</p>
  </div>

  <div class="card">
    <h3>🔵 Voie Veineuse Centrale (VVC)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Indications :</strong> catécholamines, solutions hyperosmolaires, accès veineux difficile, mesure PVC.</p>
    <table>
      <tr><th>Site</th><th>Avantages</th><th>Risques</th></tr>
      <tr><td><strong>Jugulaire interne D</strong></td><td>Repères fiables, trajet direct OD</td><td>Carotide, pneumothorax rare</td></tr>
      <tr><td><strong>Sous-clavière</strong></td><td>Confort patient, faible infection</td><td>Pneumothorax +++, hémothorax</td></tr>
      <tr><td><strong>Fémorale</strong></td><td>Pas de pneumothorax, urgence facile</td><td>Infection +++, thrombose</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Technique Seldinger :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Asepsie chirurgicale stricte (masque, charlotte, gants stériles, champ large)</li>
      <li>Repérage du site (idéalement sous échoguidance)</li>

      <li>Vérification radio thorax systématique + refluent veineux</li>
    </ol>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">Surveillance quotidienne site d'insertion. Pansement stérile J0-J2 puis tous les 7j.</p>
  </div>

  <div class="card">
    <h3>🦴 Voie Intra-Osseuse (IO)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Indication :</strong> urgence vitale (ACR, choc) quand VVP impossible en &lt;2 min. Toutes drogues administrables.</p>
    <table>
      <tr><th>Site</th><th>Repères</th></tr>
      <tr><td><strong>Tibia proximal (1er choix)</strong></td><td>2 cm en dessous et en dedans de la tubérosité tibiale antérieure. Aiguille perpendiculaire, rotation douce jusqu'à perte de résistance</td></tr>
      <tr><td><strong>Humérus proximal</strong></td><td>Face antéro-latérale, dispositif EZ-IO en rotation active</td></tr>

    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9; margin-top:10px;">

function plausibilityWarnings(fields){
  // fields: [{val, min, max, label, unit}]
  const bad = fields.filter(f => !isNaN(f.val) && (f.val < f.min || f.val > f.max));
  if(bad.length === 0) return '';
  return `<div class="warn-box">⚠️ Valeur(s) hors plage physiologique plausible — vérifier la saisie avant d'utiliser ce résultat :<br>`
    + bad.map(f => `• ${f.label} = ${f.val} ${f.unit||''} (plage attendue : ${f.min}–${f.max} ${f.unit||''})`).join('<br>')
    + `</div>`;
}

const GTT_PRESETS = {
  noradrenaline: {mg:8, vol:250, mode:'ugkgmin', dose:0.2, note:'Vasopresseur puissant — burette microgouttes fortement recommandée.'},
  adrenaline: {mg:5, vol:250, mode:'ugkgmin', dose:0.1, note:'Titration très prudente, idem noradrénaline.'},
  dobutamine: {mg:250, vol:250, mode:'ugkgmin', dose:5, note:'Mieux tolérée en gravité mais surveiller tachycardie/arythmies.'},
  dopamine: {mg:200, vol:250, mode:'ugkgmin', dose:5, note:'Alternative si noradrénaline indisponible.'},
  nicardipine: {mg:10, vol:50, mode:'mgh', dose:5, note:"Dosage en mg/h (pas de poids nécessaire), débit de départ usuel 5 mg/h, à titrer par paliers jusqu'à 15 mg/h max. Titration fine difficile en gravité — burette microgouttes indispensable, recompter toutes les 5-15 min."}
};
function fillGttPreset(){
  const key = document.getElementById('gtt_drug').value;
  const noteEl = document.getElementById('gtt_note');
  if(key==='custom' || !GTT_PRESETS[key]){ noteEl.textContent=''; return; }
  const p = GTT_PRESETS[key];
  document.getElementById('gtt_mg').value = p.mg;
  document.getElementById('gtt_vol').value = p.vol;
  document.getElementById('gtt_mode').value = p.mode;
  document.getElementById('gtt_dose').value = p.dose;
  noteEl.textContent = '💡 ' + p.note + " Vérifier la concentration réelle de l'ampoule disponible.";
}

function calcGtt(){
  const mg = parseFloat(document.getElementById('gtt_mg').value);
  const vol = parseFloat(document.getElementById('gtt_vol').value);
  const mode = document.getElementById('gtt_mode').value;
  const dose = parseFloat(document.getElementById('gtt_dose').value);
  const facteur = parseFloat(document.getElementById('gtt_facteur').value);
  const poids = parseFloat(document.getElementById('gtt_poids').value);

  if([mg,vol,dose,facteur].some(isNaN) || vol<=0){ alert('Remplir la quantité de médicament, le volume total, la dose souhaitée et le facteur de gouttes'); return; }
  if(mode==='ugkgmin' && (isNaN(poids) || poids<=0)){ alert('Le poids du patient est requis pour un dosage en µg/kg/min'); return; }

  const concUgMl = (mg*1000)/vol; // µg/mL
  let debitMlH;
  if(mode==='ugkgmin'){
    debitMlH = (dose*poids*60)/concUgMl;
  } else {
    debitMlH = (dose*1000)/concUgMl; // mg/h -> µg/h / concentration
  }
  const gttMin = (debitMlH*facteur)/60;
  const gtt15s = gttMin/4;

  const warnFields = [{val:mg, min:0.1, max:1000, label:'Quantité de médicament', unit:'mg'}, {val:vol, min:10, max:1000, label:'Volume de dilution', unit:'mL'}];
  if(!isNaN(poids)) warnFields.push({val:poids, min:1, max:300, label:'Poids', unit:'kg'});
  let warn = plausibilityWarnings(warnFields);

  let precisionWarn = '';
  if(gttMin < 5){
    precisionWarn = `<div class="warn-box">⚠️ Débit très lent (${gttMin.toFixed(1)} gtt/min) — difficile à titrer avec précision par gravité. Envisager une burette microgouttes (60 gtt/mL) si ce n'est pas déjà le cas, ou une dilution plus concentrée dans un volume plus petit.</div>`;
  } else if(gttMin > 100){
    precisionWarn = `<div class="warn-box">⚠️ Débit très rapide (${gttMin.toFixed(0)} gtt/min) — revérifier le calcul et la concentration ; envisager une dilution plus concentrée dans un volume plus petit pour un débit plus gérable.</div>`;
  }

  document.getElementById('gtt_result').classList.remove('hidden');
  document.getElementById('gtt_result').innerHTML = warn + precisionWarn +
    `<strong>Concentration = ${concUgMl.toFixed(1)} µg/mL</strong> (${(concUgMl/1000).toFixed(3)} mg/mL)<br>
    <strong>Débit = ${debitMlH.toFixed(1)} mL/h</strong><br>
    <strong style="color:var(--accent2); font-size:16px;">≈ ${gttMin.toFixed(1)} gouttes/min</strong> (soit environ ${gtt15s.toFixed(1)} gouttes par 15 secondes)<br>
    <small style="color:var(--muted)">Facteur de gouttes utilisé : ${facteur} gtt/mL. Recompter le débit réel régulièrement — la gravité seule ne garantit pas la dose exacte.</small>`;
}

function calcPedia(){
  let poids = parseFloat(document.getElementById('pedia_poids').value);
  const age = parseFloat(document.getElementById('pedia_age').value);
  const unite = document.getElementById('pedia_unite').value;
  let methode = '';
  if(!isNaN(poids) && poids>0){
    methode = `Poids réel saisi : <strong>${poids} kg</strong>`;
  } else if(!isNaN(age) && age>=0){
    if(unite==='mois'){ poids = 0.5*age + 4; }
    else if(unite==='ans1_5'){ poids = 2*age + 8; }
    else { poids = 3*age + 7; }
    methode = `Poids estimé par l'âge (${age} ${unite==='mois'?'mois':'ans'}) : <strong>${poids.toFixed(1)} kg</strong> — <span style="color:var(--warn)">à confirmer par pesée dès que possible</span>`;
  } else {
    alert("Saisir le poids réel ou l'âge de l'enfant");
    return;
  }
  const warn = plausibilityWarnings([{val:poids, min:1, max:60, label:'Poids estimé/saisi', unit:'kg'}]);

  const rows = [
    ['ACR — Adrénaline IV/IO', `${(poids*0.01).toFixed(2)} mg (= ${(poids*0.1).toFixed(1)} mL de dilution 1:10 000), max 1 mg/dose`],
    ['ACR — Amiodarone', `${Math.min(poids*5,300).toFixed(0)} mg IV/IO bolus (max 300 mg)`],
    ['Anaphylaxie — Adrénaline IM', `${Math.min(poids*0.01, poids<20?0.3:0.5).toFixed(2)} mg (1:1000)`],
    ['Bradycardie — Atropine', `${Math.max(Math.min(poids*0.02,0.5),0.1).toFixed(2)} mg IV (min 0,1 mg, max 0,5 mg)`],
    ['Convulsions — Diazépam IV', `${Math.min(poids*0.3,10).toFixed(1)} mg (max 10 mg)`],
    ['Convulsions — Midazolam IV', `${Math.min(poids*0.15,10).toFixed(1)} mg (max 10 mg)`],
    ['Hypoglycémie — Glucose G10%', `${(poids*2).toFixed(0)} mL IV lente (= ${(poids*200).toFixed(0)} mg/kg)`],
    ['Opiacés — Naloxone', `${Math.min(poids*0.01,2).toFixed(2)} mg IV/IM/IN (max 2 mg)`],
    ['ISR — Kétamine IV', `${(poids*1).toFixed(1)}–${(poids*2).toFixed(1)} mg`],
    ['ISR — Succinylcholine IV', `${(poids*1.5).toFixed(1)}–${(poids*2).toFixed(1)} mg`],
    ['Choc — Remplissage vasculaire', `${(poids*10).toFixed(0)}–${(poids*20).toFixed(0)} mL cristalloïdes en bolus (réévaluer après chaque bolus)`],
    ['Antalgie — Paracétamol', `${Math.min(poids*15,1000).toFixed(0)} mg /6h (max ${(poids*60).toFixed(0)} mg/j)`],
    ['Ingestion — Charbon activé', `${Math.min(poids*1,50).toFixed(0)} g PO (max 50 g)`],
    ['Surcharge — Furosémide', `${(poids*1).toFixed(1)} mg IV`],
    ['Insuff. surrénale — Hydrocortisone', `${Math.min(poids*3,100).toFixed(0)} mg IV bolus (max 100 mg)`],
  ];

  document.getElementById('pedia_result').classList.remove('hidden');
  document.getElementById('pedia_result').innerHTML = warn + methode +
    `<table style="margin-top:10px;"><tr><th>Situation</th><th>Dose calculée</th></tr>` +
    rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('') +
    `</table><p style="margin-top:8px; font-size:12px; color:var(--muted)">Doses indicatives — vérifier systématiquement avant administration, notamment chez le nourrisson &lt;1 an.</p>`;
}

function calcPIT(){
  const sex=document.getElementById('pit_sex').value;
  const t=parseFloat(document.getElementById('pit_taille').value);
  const reel=parseFloat(document.getElementById('pit_poids').value);
  if(isNaN(t)){alert('Saisir la taille');return;}
  const warn = plausibilityWarnings([
    {val:t, min:100, max:250, label:'Taille', unit:'cm'},
    {val:reel, min:20, max:300, label:'Poids réel', unit:'kg'}
  ]);
  const pit=sex==='M'?50+0.91*(t-152.4):45.5+0.91*(t-152.4);
  const imc=isNaN(reel)?null:(reel/((t/100)**2));
  let txt=warn+`<strong>PIT = ${pit.toFixed(1)} kg</strong>`;
  if(imc) txt+=` | IMC = ${imc.toFixed(1)} kg/m²`;
  if(!isNaN(reel)&&reel>pit*1.2){
    const paj=(reel-pit)*0.4+pit;
    txt+=`<br>Poids Ajusté (obésité) = <strong>${paj.toFixed(1)} kg</strong>`;
  }
  txt+=`<br><small style="color:var(--muted)">Vt ventilateur (6–8 mL/kg PIT) : ${(pit*6).toFixed(0)}–${(pit*8).toFixed(0)} mL</small>`;
  document.getElementById('pit_result').classList.remove('hidden');
  document.getElementById('pit_result').innerHTML=txt;
}

function calcSE(){
  const p=parseFloat(document.getElementById('se_poids').value);
  const d=parseFloat(document.getElementById('se_dose').value);
  const c=parseFloat(document.getElementById('se_conc').value);
  if([p,d,c].some(isNaN)){alert('Remplir tous les champs');return;}
  if(c<=0){alert('La concentration doit être supérieure à 0');return;}
  const warn = plausibilityWarnings([
    {val:p, min:1, max:300, label:'Poids', unit:'kg'},
    {val:d, min:0.001, max:50, label:'Dose', unit:'µg/kg/min'},
    {val:c, min:0.1, max:100000, label:'Concentration', unit:'µg/mL'}
  ]);
  const debit=(d*p*60)/c;
  document.getElementById('se_result').classList.remove('hidden');
  document.getElementById('se_result').innerHTML=warn+
    `<strong>Débit SE = ${debit.toFixed(2)} mL/h</strong><br>
    <small style="color:var(--muted)">Pour ${p} kg — dose ${d} µg/kg/min — concentration ${c} µg/mL</small>`;
}

function calcDEL(){
  const sex=document.getElementById('del_sex').value;
  const p=parseFloat(document.getElementById('del_poids').value);
  const na=parseFloat(document.getElementById('del_na').value);
  const nacible=parseFloat(document.getElementById('del_nacible').value);
  if([p,na,nacible].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:p, min:1, max:300, label:'Poids', unit:'kg'},
    {val:na, min:100, max:200, label:'Na+ actuel', unit:'mmol/L'},
    {val:nacible, min:120, max:160, label:'Na+ cible', unit:'mmol/L'}
  ]);
  const coeff=sex==='M'?0.6:0.5;
  const eauTotale=coeff*p;
  // Formule standard du déficit en eau libre (Adrogué-Madias) :
  // Déficit (L) = Eau corporelle totale × [(Na+ actuel / Na+ cible) − 1]
  const deficit=eauTotale*((na/nacible)-1);
  const vitesse=deficit/48;
  document.getElementById('del_result').classList.remove('hidden');
  document.getElementById('del_result').innerHTML=warn+
    `<strong>Déficit eau libre = ${deficit.toFixed(2)} L</strong><br>
    Correction sur 48h : ${vitesse.toFixed(2)} L/h (max −10-12 mmol/L de Na+ par 24h)<br>
    <small style="color:var(--muted)">Eau totale estimée = ${eauTotale.toFixed(1)} L</small>`;
}

function calcCalcium(){
  const ca=parseFloat(document.getElementById('ca_total').value);
  const alb=parseFloat(document.getElementById('ca_alb').value);
  if([ca,alb].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:ca, min:0.5, max:5, label:'Calcium total', unit:'mmol/L'},
    {val:alb, min:5, max:60, label:'Albumine', unit:'g/L'}
  ]);
  const caCorr=ca+0.02*(40-alb);
  let interp,cls;
  if(caCorr<2.20){interp="HYPOCALCÉMIE";cls="grave";}
  else if(caCorr>2.60){interp="HYPERCALCÉMIE";cls="modere";}
  else{interp="Normal";cls="leger";}
  document.getElementById('ca_result').classList.remove('hidden');
  document.getElementById('ca_result').innerHTML=warn+
    `<strong>Calcium corrigé = ${caCorr.toFixed(2)} mmol/L</strong> — <span class="${cls}">${interp}</span><br>
    <small style="color:var(--muted)">Formule : Ca corrigé = Ca mesuré + 0,02 × (40 − Albumine g/L)</small>`;
}

function calcCG(){
  const age=parseFloat(document.getElementById('cg_age').value);
  const sex=document.getElementById('cg_sex').value;
  const p=parseFloat(document.getElementById('cg_poids').value);
  const cr=parseFloat(document.getElementById('cg_creat').value);
  if([age,p,cr].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:age, min:0, max:120, label:'Âge', unit:'ans'},
    {val:p, min:1, max:300, label:'Poids', unit:'kg'},
    {val:cr, min:10, max:2000, label:'Créatinine', unit:'µmol/L'}
  ]);
  let clcr=(140-age)*p/(0.814*cr);
  if(sex==='F') clcr*=0.85;
  let stade,cls;
  if(clcr>=90){stade="G1 — Normale ou élevée";cls="leger";}
  else if(clcr>=60){stade="G2 — Légèrement diminuée";cls="leger";}
  else if(clcr>=45){stade="G3a — Légère à modérée";cls="modere";}
  else if(clcr>=30){stade="G3b — Modérée à sévère";cls="modere";}
  else if(clcr>=15){stade="G4 — Sévère";cls="grave";}
  else{stade="G5 — IRT (épuration extra-rénale à discuter)";cls="grave";}
  document.getElementById('cg_result').classList.remove('hidden');
  document.getElementById('cg_result').innerHTML=warn+
    `<strong>Clairance créatinine = ${clcr.toFixed(0)} mL/min</strong><br>
    <span class="${cls}">${stade}</span><br>
    <small style="color:var(--muted)">Adapter posologies des médicaments à élimination rénale.</small>`;
}

function calcOsm(){
  const na=parseFloat(document.getElementById('osm_na').value);
  const gly=parseFloat(document.getElementById('osm_gly').value);
  const uree=parseFloat(document.getElementById('osm_uree').value);
  if([na,gly,uree].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:na, min:100, max:200, label:'Na+', unit:'mmol/L'},
    {val:gly, min:1, max:60, label:'Glycémie', unit:'mmol/L'},
    {val:uree, min:0.5, max:60, label:'Urée', unit:'mmol/L'}
  ]);
  const osm=2*na+gly+uree;
  let interp,cls;
  if(osm<275){interp="Hypo-osmolarité";cls="modere";}
  else if(osm<=295){interp="Normale";cls="leger";}
  else if(osm<=320){interp="Hyperosmolarité modérée";cls="modere";}
  else{interp="Hyperosmolarité sévère";cls="grave";}
  document.getElementById('osm_result').classList.remove('hidden');
  document.getElementById('osm_result').innerHTML=warn+
    `<strong>Osmolarité calculée = ${osm.toFixed(0)} mOsm/kg</strong> — <span class="${cls}">${interp}</span><br>
    <small style="color:var(--muted)">Normale : 275–295 mOsm/kg. Formule : 2×Na + Glycémie + Urée (mmol/L)</small>`;
}

function calcTA(){
  const na=parseFloat(document.getElementById('ta_na').value);
  const cl=parseFloat(document.getElementById('ta_cl').value);
  const hco3=parseFloat(document.getElementById('ta_hco3').value);
  const alb=parseFloat(document.getElementById('ta_alb').value)||42;
  if([na,cl,hco3].some(isNaN)){alert('Remplir Na, Cl et HCO3');return;}
  const warn = plausibilityWarnings([
    {val:na, min:100, max:200, label:'Na+', unit:'mmol/L'},
    {val:cl, min:50, max:150, label:'Cl-', unit:'mmol/L'},
    {val:hco3, min:0, max:45, label:'HCO3-', unit:'mmol/L'},
    {val:alb, min:5, max:60, label:'Albumine', unit:'g/L'}
  ]);
  const ta=na-cl-hco3;
  const taCorr=ta+0.25*(42-alb);
  let interp,cls;
  if(taCorr<=12){interp="Normal (TA ≤12 mmol/L)";cls="leger";}
  else{interp="TA ÉLEVÉ → acidose métabolique à TA augmenté (lactates, cétones, toxiques, urémie)";cls="grave";}
  document.getElementById('ta_result').classList.remove('hidden');
  document.getElementById('ta_result').innerHTML=warn+
    `<strong>TA brut = ${ta.toFixed(0)} mmol/L</strong> | TA corrigé à l'albumine = <strong>${taCorr.toFixed(0)} mmol/L</strong><br>
    <span class="${cls}">${interp}</span><br>
    <small style="color:var(--muted)">Normale : 8–12 mmol/L. TA corrigé = TA + 0,25 × (42 − albumine g/L)</small>`;
}

function renderAbreviations(){
  const items = ABBR_DATA.map(([abbr, full])=>{
    const norm = normalizeText(abbr+' '+full);
    return `<li class="abbr-item" data-norm="${norm}"><strong>${abbr}</strong> — ${full}</li>`;
  }).join('');
  return `
  <h2 class="module-title">🔤 Abréviations</h2>
  <p class="module-sub">Lexique des abréviations médicales utilisées dans l'application. Recherche instantanée par sigle ou par mot-clé.</p>
  <div class="card">
    <input type="text" id="abbr-search" class="local-search-input" placeholder="Rechercher une abréviation (ex. IVSE, SCA, PEEP...)">
    <div id="abbr-count">${ABBR_DATA.length} abréviations</div>
    <ul class="abbr-list" id="abbr-list">${items}</ul>
    <p class="abbr-empty" id="abbr-empty">Aucune abréviation ne correspond à cette recherche.</p>
  </div>`;
}
renderers.abreviations = renderAbreviations;
window.init_abreviations = function(){
  const input = document.getElementById('abbr-search');
  const list = document.getElementById('abbr-list');
  const empty = document.getElementById('abbr-empty');
  const count = document.getElementById('abbr-count');
  if(!input) return;
  input.addEventListener('input', ()=>{
    const q = normalizeText(input.value.trim());
    let visible = 0;
    list.querySelectorAll('.abbr-item').forEach(li=>{
      const match = !q || li.dataset.norm.includes(q);
      li.style.display = match ? '' : 'none';
      if(match) visible++;
    });
    empty.style.display = visible === 0 ? 'block' : 'none';
    count.textContent = q ? `${visible} résultat(s)` : `${ABBR_DATA.length} abréviations`;
  });
  input.focus();
};

// Navigation logic
function ensureCardIds(container, key){
  container.querySelectorAll('.card').forEach((card, idx)=>{
    if(!card.id){ card.id = key+'-card-'+idx; }
  });
}

function showModule(key, focusId){
  document.getElementById('content').innerHTML = renderers[key] ? renderers[key]() : placeholderModule(key);
  ensureCardIds(document.getElementById('content'), key);
  document.querySelectorAll('#nav-list button').forEach(b=>b.classList.toggle('active', b.dataset.mod===key));
  document.getElementById('topbar-title').textContent = MODULES[key].title;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  if(typeof window['init_'+key] === 'function'){ window['init_'+key](); }
  if(focusId){
    requestAnimationFrame(()=>{
      const el = document.getElementById(focusId);
      if(el){
        el.scrollIntoView({behavior:'smooth', block:'start'});
        el.classList.add('search-highlight');
        setTimeout(()=>el.classList.remove('search-highlight'), 2500);
      } else { window.scrollTo(0,0); }
    });
  } else {
    window.scrollTo(0,0);
  }
}

document.querySelectorAll('#nav-list button').forEach(btn=>{
  btn.addEventListener('click', ()=> showModule(btn.dataset.mod));
});
document.getElementById('menu-toggle').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});

/* ——— Recherche globale (tout le contenu, pas seulement les noms de modules) ——— */
function normalizeText(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

let SEARCH_INDEX = [];
function buildSearchIndex(){
  const tmp = document.createElement('div');
  tmp.style.display = 'none';
  document.body.appendChild(tmp);
  Object.keys(MODULES).forEach(key=>{
    if(key==='accueil' || !renderers[key]) return;
    tmp.innerHTML = renderers[key]();
    ensureCardIds(tmp, key);
    tmp.querySelectorAll('.card').forEach(card=>{
      const titleEl = card.querySelector('h3');
      const title = titleEl ? titleEl.textContent.trim() : MODULES[key].title;
      const text = card.textContent.trim();
      SEARCH_INDEX.push({
        module:key,
        moduleTitle: MODULES[key].title,
        id: card.id,
        title: title,
        norm: normalizeText(title+' '+text)
      });
    });
  });
  document.body.removeChild(tmp);
}
buildSearchIndex();

const searchInput = document.getElementById('nav-search');
const resultsList = document.getElementById('search-results');
const navList = document.getElementById('nav-list');

searchInput.addEventListener('input', (e)=>{
  const raw = e.target.value.trim();
  const q = normalizeText(raw);
  if(!q){
    resultsList.classList.remove('show');
    resultsList.innerHTML = '';
    navList.style.display = '';
    return;
  }
  navList.style.display = 'none';
  const matches = SEARCH_INDEX.filter(item => item.norm.includes(q)).slice(0, 40);
  if(matches.length === 0){
    resultsList.innerHTML = '<li class="sr-empty">Aucun résultat pour "'+raw.replace(/</g,'&lt;')+'"</li>';
  } else {
    resultsList.innerHTML = matches.map(m =>
      `<li><a data-mod="${m.module}" data-target="${m.id}">
        <span class="sr-mod">${MODULES[m.module].icon} ${m.moduleTitle}</span>${m.title}
      </a></li>`
    ).join('');
  }
  resultsList.classList.add('show');
});

resultsList.addEventListener('click', (e)=>{
  const a = e.target.closest('a[data-mod]');
  if(!a) return;
  const mod = a.dataset.mod;
  const target = a.dataset.target;
  searchInput.value = '';
  resultsList.classList.remove('show');
  resultsList.innerHTML = '';
  navList.style.display = '';
  showModule(mod, target);
});

showModule('accueil');
</script>
