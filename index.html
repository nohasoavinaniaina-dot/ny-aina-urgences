      <li><strong>Hydrocortisone IV (Hydrocortisone Roussel®, Solu-Cortef®)</strong> 100 mg en bolus, puis 50 mg IV toutes les 6h (ou 200 mg/24h en perfusion continue) — à poursuivre jusqu'à stabilisation puis décroissance progressive avec relais oral</li>
      <li>Remplissage vasculaire rapide par NaCl 0,9% (1L sur la 1ère heure puis adapter), correction de l'hypoglycémie associée (fréquente) par sérum glucosé</li>
      <li>Correction prudente d'une hyperkaliémie sévère si présente (souvent améliorée par l'hydrocortisone et la réhydratation seules)</li>
      <li>Rechercher et traiter le facteur déclenchant (infection, chirurgie, arrêt brutal d'une corticothérapie au long cours, stress majeur)</li>
      <li>Pas besoin de fludrocortisone en phase aiguë (l'hydrocortisone à forte dose a déjà un effet minéralocorticoïde suffisant) — à réintroduire au relais oral une fois la dose d'hydrocortisone diminuée</li>
      <li>Surveillance rapprochée : TA, glycémie, ionogramme, diurèse — bonne réponse habituellement rapide (quelques heures) sous traitement adapté</li>
    </ol>
  </div>

  <div class="card" id="proto-thyroide">
    <h3>🦋 Crise thyréotoxique / Coma myxœdémateux</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les ATA (American Thyroid Association) Guidelines 2016. Deux urgences endocriniennes opposées, rares mais gravissimes en l'absence de traitement.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Crise thyréotoxique (thyroid storm) :</strong> décompensation aiguë d'une hyperthyroïdie (souvent maladie de Basedow méconnue/mal traitée), déclenchée par une infection, chirurgie, arrêt des antithyroïdiens, prise d'iode. Score de <strong>Burch-Wartofsky</strong> utile pour quantifier la probabilité (fièvre, tachycardie/FA, troubles digestifs, troubles neuropsychiques, insuffisance cardiaque) — diagnostic avant tout clinique, ne pas attendre les hormones thyroïdiennes pour traiter</li>
      <li><strong>Traitement de la crise thyréotoxique (séquence à respecter) :</strong>
        <ol style="margin-left:18px;">
          <li><strong>Antithyroïdien de synthèse</strong> — <strong>Propylthiouracile (PTU)</strong> 500-1000 mg dose de charge puis 250 mg toutes les 4h (bloque aussi la conversion périphérique T4→T3, préféré en 1ère intention dans la crise), ou <strong>Carbimazole (Néo-Mercazole®)</strong> 20-30 mg toutes les 6-8h si PTU indisponible</li>
          <li><strong>Au moins 1h après</strong> l'antithyroïdien (jamais avant — risque d'accélérer la synthèse hormonale par effet Wolff-Chaikoff paradoxal) : <strong>solution iodée</strong> (Lugol fort) pour bloquer la libération hormonale</li>
          <li><strong>Bêtabloquant</strong> — <strong>Propranolol (Avlocardyl®)</strong> 60-80 mg PO toutes les 4h ou 0,5-1 mg IV lent (répétable) : contrôle la tachycardie et bloque également la conversion périphérique T4→T3 ; prudence/contre-indication relative si insuffisance cardiaque décompensée (préférer alors Esmolol titrable)</li>
          <li><strong>Hydrocortisone (Solu-Cortef®)</strong> 100 mg IV toutes les 8h — bloque la conversion T4→T3 et couvre une possible insuffisance surrénalienne relative associée</li>
          <li>Refroidissement si hyperthermie (paracétamol — <strong>éviter l'aspirine</strong> qui déplace la T4 de sa protéine porteuse et aggrave la thyrotoxicose), réhydratation, correction des troubles ioniques, traitement du facteur déclenchant (antibiothérapie si infection)</li>
        </ol>
      </li>
      <li><strong>Coma myxœdémateux :</strong> décompensation aiguë d'une hypothyroïdie sévère non traitée, favorisée par le froid, une infection, des sédatifs/opiacés — hypothermie, bradycardie, hypoventilation avec hypercapnie, troubles de conscience jusqu'au coma, hyponatrémie fréquente. <strong>Mortalité élevée</strong> (jusqu'à 30-40%) — traiter sur suspicion clinique sans attendre les hormones thyroïdiennes</li>
      <li><strong>Traitement du coma myxœdémateux :</strong> <strong>Lévothyroxine IV</strong> — dose de charge 200-400 µg IV, puis 50-100 µg/j IV (relais oral dès que possible) ; associer systématiquement <strong>Hydrocortisone (Solu-Cortef®)</strong> 100 mg IV toutes les 8h <strong>avant/avec</strong> la lévothyroxine (une insuffisance surrénalienne associée est fréquente et la lévothyroxine seule peut précipiter une crise surrénalienne) ; réchauffement passif prudent (jamais actif agressif — risque de vasodilatation et de collapsus) ; ventilation assistée si hypercapnie/détresse respiratoire ; restriction hydrique si hyponatrémie (éviter la correction trop rapide, cf. protocole troubles ioniques) ; traiter le facteur déclenchant (infection +++)</li>
      <li>Éviter les sédatifs et opiacés dans les deux situations (masquent/aggravent les tableaux), surveillance rapprochée en unité de soins intensifs</li>
    </ol>
  </div>

  <div class="card" id="proto-sevrage-alcool">
    <h3>🍺 Sevrage alcoolique sévère / Délirium tremens</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Apparaît typiquement 48-96h après l'arrêt/la réduction de la consommation chez un patient alcoolo-dépendant. Formes de gravité croissante : tremblements/anxiété simples → hallucinose alcoolique → crises convulsives → <strong>délirium tremens</strong> (confusion, agitation, hallucinations, hyperactivité neurovégétative) — mortalité significative si non traité.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Évaluation de la sévérité par un score clinique type <strong>CIWA-Ar</strong> si disponible, pour guider et adapter le traitement</li>
      <li><strong>Benzodiazépines</strong> — traitement de référence : <strong>Diazépam (Valium®)</strong> PO/IV (10-20 mg répétés selon réponse) ou <strong>Lorazépam (Temesta®)</strong> (préféré si insuffisance hépatique sévère, pas de métabolite actif) — titration selon la symptomatologie, doses parfois élevées nécessaires (tolérance croisée avec l'alcool)</li>
      <li><strong>Vitamine B1 (Thiamine — Vitamine B1 Aguettant®) systématique</strong> 200-500 mg IV, à administrer <strong>avant tout apport glucosé</strong> — prévention de l'encéphalopathie de Gayet-Wernicke (confusion, ataxie, troubles oculomoteurs), risque majoré si perfusion de glucosé sans thiamine préalable</li>
      <li>Correction des troubles hydro-électrolytiques fréquemment associés : hypokaliémie, hypomagnésémie, hypophosphorémie (surveiller et corriger, la magnésémie basse favorise la persistance des convulsions)</li>
      <li>Si convulsions : benzodiazépines en 1ère intention (pas d'antiépileptique spécifique nécessaire en général) ; éliminer une autre cause de convulsions (hypoglycémie, traumatisme crânien associé, trouble ionique sévère)</li>
      <li>Environnement calme, réorientation fréquente, contention physique uniquement si nécessaire pour la sécurité du patient/de l'équipe, en complément (non substitut) du traitement médicamenteux</li>
      <li>Surveillance rapprochée : constantes, état neurologique, glycémie — hospitalisation en unité de surveillance continue si délirium tremens constitué</li>
    </ol>
  </div>

  <div class="card" id="proto-rhabdomyolyse">
    <h3>🧬 Rhabdomyolyse</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Destruction du tissu musculaire strié avec libération de myoglobine, CK, potassium et phosphore. Causes fréquentes : traumatisme/écrasement, immobilisation prolongée, effort intense, convulsions prolongées, hyperthermie, toxiques (statines, alcool), électrisation. Complication principale : insuffisance rénale aiguë (précipitation tubulaire de myoglobine).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Diagnostic :</strong> CK &gt;5x la normale (souvent très élevées, &gt;1000-5000 UI/L), urines foncées ("coca-cola"), bandelette urinaire positive pour le sang sans hématies au sédiment (myoglobinurie)</li>
      <li><strong>Hyperhydratation précoce et agressive</strong> — pierre angulaire du traitement : NaCl 0,9% IV, débuter dès la suspicion (avant même la confirmation biologique si contexte évocateur, notamment traumatisme/écrasement) — débit initial élevé (ex. 500 mL/h à 1L/h chez l'adulte selon terrain), objectif diurèse ≥200-300 mL/h tant que les CK restent très élevées</li>
      <li>Surveillance rapprochée du <strong>potassium</strong> — hyperkaliémie souvent précoce et potentiellement menaçante (rhabdomyolyse = relargage massif de K+ intracellulaire) ; ECG et traitement en urgence si signes de gravité (cf. protocole hyperkaliémie)</li>
      <li>Alcalinisation des urines par bicarbonate de sodium : bénéfice non formellement démontré par les études récentes, à discuter au cas par cas (limiter si hypocalcémie associée, ne pas retarder l'hyperhydratation pour ce geste)</li>
      <li>Surveiller et corriger une hypocalcémie (fréquente en phase initiale, généralement ne pas la corriger si asymptomatique — risque de précipitation calcique tissulaire secondaire)</li>
      <li>Rechercher et traiter un syndrome des loges associé (traumatisme/écrasement, immobilisation prolongée) — pressions intracompartimentales, avis chirurgical si suspicion</li>
      <li>Épuration extra-rénale (hémodialyse) si insuffisance rénale sévère avec hyperkaliémie menaçante, surcharge hydrosodée ou acidose réfractaires au traitement médical</li>
      <li>Traiter la cause déclenchante (arrêt du toxique, traitement des convulsions, prise en charge chirurgicale d'un écrasement, refroidissement si hyperthermie associée)</li>
    </ol>
  </div>

  <div class="card" id="proto-sepsis">
    <h3>🦠 Sepsis / Choc septique — Prise en charge en réanimation</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Définitions (Sepsis-3, 2016, toujours en vigueur) :</strong> le <strong>sepsis</strong> est une dysfonction d'organe menaçant le pronostic vital, causée par une réponse dérégulée de l'hôte à une infection (augmentation du score SOFA ≥2 points liée à l'infection). Le terme historique <strong>« sepsis sévère »</strong> a été abandonné par Sepsis-3 : il correspond en fait à ce qui est aujourd'hui simplement appelé « sepsis » (le sepsis « non compliqué » sans dysfonction d'organe n'existe plus comme catégorie distincte) — le terme reste toutefois largement utilisé en pratique courante francophone/africaine par habitude. Le <strong>choc septique</strong> est un sous-groupe de sepsis avec anomalies circulatoires et métaboliques profondes : besoin de vasopresseurs pour maintenir une PAM ≥65 mmHg <strong>ET</strong> lactates &gt;2 mmol/L malgré un remplissage vasculaire adéquat.</p>
    <p style="margin-top:8px; font-size:13.5px; margin-bottom:8px;"><strong>Repérage :</strong> le <strong>qSOFA</strong> (FR≥22/min, PAS≤100 mmHg, GCS&lt;15 — cf. module Scores cliniques) est un outil de dépistage au lit du patient hors réanimation, simple et rapide, mais <strong>ne pose pas le diagnostic</strong> de sepsis — il identifie les patients à risque de mauvaise évolution nécessitant une évaluation approfondie (lactates, bilan infectieux, recherche de dysfonction d'organe). Devant toute suspicion clinique d'infection avec signe de gravité, débuter la prise en charge sans attendre la confirmation biologique complète.</p>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">Bundle de la 1ère heure (Surviving Sepsis Campaign 2021, actualisé 2026) — à débuter dès la reconnaissance, en parallèle :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Mesurer les lactates</strong> — répéter la mesure si élevés (&gt;2 mmol/L) pour guider la réanimation ; ne pas chercher à normaliser à tout prix mais suivre la clairance (décroissance) associée à la réévaluation clinique</li>
      <li><strong>Hémocultures</strong> (au moins 2 paires) <strong>avant l'antibiothérapie</strong> si cela ne retarde pas celle-ci de plus de 45 minutes — sinon débuter l'antibiothérapie sans attendre</li>
      <li><strong>Antibiothérapie probabiliste à large spectre dans l'heure</strong> suivant la reconnaissance du sepsis/choc septique — chaque heure de retard augmente la mortalité ; adapter au foyer suspecté et à l'écologie locale, réévaluer/désescalader à 48-72h selon les résultats microbiologiques. Exemples : <strong>Ceftriaxone (Rocéphine®)</strong> 2g/j IV, ou <strong>Pipéracilline-Tazobactam (Tazocilline®)</strong> 4g x3-4/j IV si suspicion de foyer nosocomial/abdominal, à associer selon le foyer (aminoside en cas de choc septique sévère pour élargir le spectre initial)</li>
      <li><strong>Remplissage vasculaire</strong> par <strong>cristalloïdes équilibrés (Ringer Lactate)</strong>, préférés au NaCl 0,9% : <strong>au moins 30 mL/kg IV dans les 3 premières heures</strong> en cas d'hypoperfusion tissulaire ou de choc — volume à individualiser ensuite selon la réponse (ne pas poursuivre le remplissage systématiquement jusqu'à normalisation des lactates), avec réévaluation rapprochée (temps de recoloration cutanée, diurèse, auscultation pulmonaire) pour éviter la sur-résuscitation</li>
      <li><strong>Vasopresseurs</strong> si hypotension persistante malgré le remplissage, pour maintenir une <strong>PAM ≥65 mmHg</strong> (cible plus prudente de 60-65 mmHg chez le sujet ≥65 ans, pour limiter la iatrogénie liée aux fortes doses) — <strong>Noradrénaline (Noradrénaline Aguettant®)</strong> IVSE en 1ère intention : dose initiale 0,05-0,1 µg/kg/min, titrée par paliers selon la PAM cible, sans plafond fixe ; voie veineuse centrale à mettre en place rapidement mais une VVP de gros calibre ne doit pas retarder l'initiation en urgence</li>
    </ol>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Choc septique réfractaire :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Si PAM cible non atteinte malgré une dose de Noradrénaline atteignant <strong>0,25-0,5 µg/kg/min</strong> : ajouter <strong>Vasopressine (Vasopressine Aguettant®)</strong> à dose fixe <strong>0,03 UI/min</strong> (indépendante du poids, non titrée) plutôt que d'escalader la Noradrénaline seule — effet d'épargne catécholaminergique</li>
      <li>Si PAM toujours insuffisante sous Noradrénaline + Vasopressine : ajouter <strong>Adrénaline (Adrénaline Aguettant®)</strong> IVSE, titrée</li>
      <li><strong>Hydrocortisone (Hydrocortisone Upjohn®)</strong> IV <strong>200 mg/j</strong> (50 mg toutes les 6h ou en continu) si choc réfractaire, c'est-à-dire besoin persistant de Noradrénaline/Adrénaline ≥0,25 µg/kg/min depuis au moins 4h malgré remplissage adapté</li>
      <li><strong>Terlipressine déconseillée</strong> dans le choc septique (nouveauté SSC 2026, absence de bénéfice démontré) ; pas de recommandation en faveur de la vitamine C IV en routine</li>
    </ol>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Complément indispensable :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Contrôle du foyer infectieux</strong> dès que possible (dans les 6-12h idéalement) : drainage d'un abcès, ablation d'un cathéter/dispositif infecté, geste chirurgical si péritonite/foyer chirurgical — sans ce contrôle, l'antibiothérapie seule est souvent insuffisante</li>
      <li>Oxygénothérapie/ventilation selon la tolérance respiratoire ; envisager la ventilation mécanique précoce en cas de détresse respiratoire associée ou de choc majeur non contrôlé</li>
      <li>Surveillance rapprochée : PAM, diurèse horaire (objectif &gt;0,5 mL/kg/h), lactates répétés, état de conscience, marbrures/temps de recoloration cutanée (outil simple et validé pour guider la réanimation, en complément des lactates)</li>
      <li>Rechercher et corriger les défaillances associées : hyperglycémie (contrôle glycémique modéré, éviter l'hypoglycémie), coagulopathie/CIVD, insuffisance rénale aiguë (épuration extra-rénale si indication), thromboprophylaxie systématique sauf contre-indication</li>
      <li>Réévaluation quotidienne de la nécessité de chaque traitement (désescalade antibiotique, sevrage des vasopresseurs, allègement de la sédation) — la prise en charge du sepsis ne s'arrête pas à la 1ère heure, elle se poursuit tout au long du séjour</li>
    </ol>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">⚠️ Pour le choc septique dans le cadre spécifique d'un purpura fulminans (méningococcémie), voir le protocole dédié ci-dessous — l'antibiothérapie y prime sur tout le reste et doit être administrée sur place avant tout transfert.</p>
  </div>

  <div class="card" id="proto-meningite">
    <h3>🦠 Méningite / Encéphalite bactérienne aiguë</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Triade classique (fièvre, raideur de nuque, céphalées) souvent incomplète — méfiance chez le nourrisson (irritabilité, fontanelle bombée) et le sujet âgé (confusion isolée possible). Urgence absolue : chaque heure de retard d'antibiothérapie augmente la mortalité.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Ne jamais retarder l'antibiothérapie</strong> pour réaliser l'imagerie ou la ponction lombaire — hémocultures avant la 1ère dose d'ATB si possible mais sans délai significatif</li>
      <li>TDM cérébrale <strong>avant PL</strong> uniquement si signe de localisation, trouble de conscience sévère (GCS &lt;12), crise convulsive récente, immunodépression ou signe d'engagement — sinon PL directe</li>
      <li><strong>Antibiothérapie probabiliste IV immédiate :</strong> <strong>Ceftriaxone (Rocéphine®)</strong> 2g x2/j (4g/j) ou <strong>Céfotaxime (Claforan®)</strong> — associer <strong>Amoxicilline (Clamoxyl®)</strong> si suspicion de Listeria (sujet &gt;50 ans, immunodépression, signes de rhombencéphalite)</li>
      <li><strong>Dexaméthasone (Soludécadron®)</strong> 10 mg IV toutes les 6h × 4 jours, à débuter <strong>en même temps ou juste avant</strong> la 1ère dose d'antibiotique (inefficace si donnée après) — réduit les séquelles auditives et neurologiques, surtout si pneumocoque</li>
      <li>Isolement gouttelettes systématique jusqu'à 24h d'antibiothérapie efficace si suspicion de méningocoque ; déclaration obligatoire et antibioprophylaxie des sujets contacts proches (<strong>Rifampicine — Rifadine®</strong> 600 mg PO x2/j pendant 2 jours chez l'adulte — 10 mg/kg x2/j chez l'enfant >1 mois, 5 mg/kg x2/j chez le nourrisson <1 mois — contre-indiquée chez la femme enceinte ; ou <strong>Ciprofloxacine — Ciflox®</strong> 500 mg PO dose unique chez l'adulte, 20 mg/kg PO dose unique chez l'enfant ≥2 ans, max 500 mg)</li>
      <li>Analyse du LCR : cytologie, protéinorachie, glycorachie (rapport glycorachie/glycémie &lt;0,4 évocateur de bactérien), examen direct, culture, PCR selon disponibilité (méningocoque, pneumocoque, herpès si encéphalite)</li>
      <li>Si encéphalite suspectée (confusion, convulsions, signes focaux, contexte) : <strong>Aciclovir IV (Zovirax®)</strong> 10 mg/kg/8h empirique dès la suspicion (herpétique jusqu'à preuve du contraire), sans attendre la PCR</li>
      <li>Surveillance rapprochée : conscience, pupilles, signes d'engagement, convulsions — traiter une HTIC associée si présente (cf. protocole dédié)</li>
    </ol>
  </div>

  <div class="card" id="proto-purpura-fulminans">
    <h3>🟣 Purpura fulminans (méningococcémie grave)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Extrême urgence : purpura extensif, nécrotique ou ecchymotique (≥1 élément &gt;3mm), fébrile, associé à des signes de choc — mortalité très élevée sans traitement immédiat. Ne pas attendre l'hospitalisation pour traiter.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Antibiothérapie immédiate sur place</strong>, avant tout transfert, dès le diagnostic évoqué (ne pas attendre l'arrivée à l'hôpital ni les prélèvements) : <strong>Ceftriaxone IV/IM (Rocéphine®)</strong> 1-2g (50-100 mg/kg chez l'enfant) — geste qui prime sur tout le reste</li>
      <li>Appel immédiat du SAMU/réanimation, transfert médicalisé en urgence absolue vers un centre disposant d'une réanimation</li>
      <li>Prise en charge du choc septique associé en parallèle : remplissage vasculaire rapide (cristalloïdes 20 mL/kg en bolus, répétable), amines vasopressives précoces si non-réponse au remplissage (cf. protocole états de choc)</li>
      <li>Hémocultures si possible sans retarder l'antibiothérapie ; PL contre-indiquée en phase de choc (à différer)</li>
      <li>Isolement gouttelettes du patient, antibioprophylaxie systématique des sujets contacts proches (<strong>Rifampicine — Rifadine®</strong> 600 mg PO x2/j pendant 2 jours chez l'adulte, 10 mg/kg x2/j chez l'enfant >1 mois — contre-indiquée chez la femme enceinte ; ou <strong>Ciprofloxacine — Ciflox®</strong> 500 mg PO dose unique ; ou <strong>Ceftriaxone — Rocéphine®</strong> 250 mg IM dose unique chez l'adulte (125 mg chez l'enfant <15 ans) — à privilégier chez la femme enceinte), déclaration obligatoire</li>
      <li>Surveillance étroite : extension du purpura, diurèse, marbrures, lactates, coagulation (risque de CIVD) — orientation en réanimation systématique</li>
    </ol>
  </div>

  <div class="card" id="proto-hic">
    <h3>🧠 Hypertension intracrânienne aiguë / Engagement cérébral</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">À évoquer devant céphalées intenses, vomissements en jet, troubles de conscience évolutifs, mydriase unilatérale (signe d'engagement temporal — urgence extrême), triade de Cushing (HTA, bradycardie, respiration irrégulière = signe tardif et péjoratif).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>ABCDE, protection des voies aériennes si GCS ≤8 (intubation), <strong>éviter l'hypoxie et l'hypotension</strong> (aggravent les lésions secondaires) — objectif SpO2 &gt;94%, TA moyenne adaptée pour maintenir la pression de perfusion cérébrale</li>
      <li><strong>Positionnement :</strong> tête surélevée à 30°, axe tête-cou droit (éviter la compression jugulaire), éviter toute manœuvre augmentant la pression intrathoracique</li>
      <li><strong>Osmothérapie en urgence</strong> si signe d'engagement ou détérioration neurologique aiguë : <strong>Mannitol 20% (Mannitol Aguettant®, Mannitol Baxter®)</strong> 0,25-1 g/kg IV en 15-20 min, OU <strong>sérum salé hypertonique</strong> (NaCl 3-7,5%) selon disponibilité et statut volémique — ne pas attendre l'imagerie si signes cliniques d'engagement francs</li>
      <li>Hyperventilation modérée transitoire (PaCO2 cible ~30-35 mmHg) réservée aux situations d'engagement aigu avec détérioration rapide, en mesure temporisatrice dans l'attente d'un geste définitif — à ne pas prolonger (vasoconstriction cérébrale, risque ischémique)</li>
      <li>Contrôle de la température (normothermie stricte) et de la glycémie (éviter hypo- et hyperglycémie, toutes deux délétères)</li>
      <li>Imagerie cérébrale en urgence dès stabilisation pour rechercher une cause chirurgicale (hématome, hydrocéphalie aiguë) — avis neurochirurgical sans délai si lésion accessible à un geste (dérivation, évacuation)</li>
      <li>Traiter la cause sous-jacente : hémorragie, tumeur, abcès, hydrocéphalie, œdème cérébral (post-AVC, post-traumatique, métabolique — cf. acidocétose diabétique chez l'enfant)</li>
      <li>Sédation/analgésie adaptée pour limiter les pics de pression intracrânienne (agitation, douleur, toux) sans masquer l'examen neurologique de façon prolongée</li>
    </ol>
  </div>

  <div class="card" id="proto-syndrome-serotoninergique">
    <h3>💊 Syndrome sérotoninergique / Syndrome malin des neuroleptiques</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Deux tableaux à différencier — <strong>syndrome sérotoninergique</strong> : début rapide (&lt;24h) après introduction/association de sérotoninergiques (IRS, IRSNA, tramadol, triptans, IMAO...), triade neuromusculaire (myoclonies, hyperréflexie, tremblements), agitation, hyperthermie. <strong>Syndrome malin des neuroleptiques</strong> : début plus progressif (jours) après antipsychotiques, tétrade rigidité "en tuyau de plomb", hyperthermie, instabilité neurovégétative, confusion.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Arrêt immédiat</strong> du/des médicament(s) en cause — geste le plus important dans les deux tableaux</li>
      <li>ABCDE, refroidissement actif si hyperthermie significative (cf. protocole coup de chaleur), remplissage vasculaire, correction des troubles ioniques</li>
      <li>Benzodiazépines en 1ère intention dans les deux syndromes pour l'agitation, les myoclonies et la rigidité (<strong>Diazépam — Valium®</strong> 5-10 mg IV lent, répétable, ou <strong>Lorazépam — Temesta®</strong> 1-4 mg IV titré)</li>
      <li><strong>Syndrome sérotoninergique modéré à sévère :</strong> <strong>Cyproheptadine (Périactine®)</strong> (antagoniste sérotoninergique, uniquement per os ou par sonde nasogastrique — pas de forme injectable) : dose de charge 12 mg PO/SNG, puis 2 mg toutes les 2h tant que les symptômes persistent, jusqu'à un maximum de 32 mg/24h ; dose d'entretien 8 mg toutes les 6h une fois amélioré — en complément des benzodiazépines, évolution habituellement favorable en 24-72h après arrêt du médicament causal</li>
      <li><strong>Syndrome malin des neuroleptiques sévère :</strong> <strong>Dantrolène IV (Dantrium®)</strong> 1-2,5 mg/kg (jusqu'à 10 mg/kg/j) si rigidité majeure/hyperthermie sévère ; <strong>Bromocriptine (Parlodel®)</strong> (agoniste dopaminergique) PO/SNG 2,5 mg 2 à 3 fois/jour, à augmenter progressivement selon la réponse jusqu'à 45 mg/j au total si nécessaire, en complément selon disponibilité</li>
      <li>Surveillance rapprochée : CK (rhabdomyolyse fréquente dans les deux tableaux — cf. protocole dédié), fonction rénale, coagulation, température, conscience</li>
      <li>Ne pas réintroduire l'agent causal ; en cas de nécessité de reprise d'un traitement psychotrope, le faire avec prudence et sous surveillance après résolution complète</li>
    </ol>
  </div>

  <div class="card" id="proto-tetanos">
    <h3>🦷 Tétanos</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Toxi-infection à Clostridium tetani, rare en zone vaccinée mais à évoquer devant un trismus fébrile, une hypertonie généralisée avec spasmes paroxystiques (opisthotonos), souvent déclenchés par les stimuli, sur une plaie souillée ou vaccination incomplète/inconnue.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>ABCDE — risque de détresse respiratoire par spasme laryngé/rigidité thoracique et de dysautonomie sévère (formes graves) ; environnement calme et peu stimulant (limiter les stimuli déclenchants)</li>
      <li><strong>Immunoglobulines antitétaniques humaines (Gammatétanos®)</strong> IM : <strong>3000 à 6000 UI</strong> en dose unique dans le tétanos déclaré (dose curative, supérieure à la dose préventive de 250-500 UI utilisée en prophylaxie post-plaie) — une partie peut être infiltrée autour de la porte d'entrée si celle-ci est identifiable, le reste en IM à distance ; <strong>en un site différent</strong> du vaccin (neutralise la toxine circulante non encore fixée aux terminaisons nerveuses, sans effet sur la toxine déjà fixée)</li>
      <li>Parage chirurgical soigneux de la plaie porte d'entrée (excision des tissus nécrosés, retrait des corps étrangers) après administration des immunoglobulines</li>
      <li><strong>Antibiothérapie :</strong> <strong>Métronidazole IV (Flagyl®)</strong> 500 mg IV toutes les 6-8h pendant 7 à 10 jours (préféré à la pénicilline G, moins d'effet GABA-antagoniste théorique) — alternative : Pénicilline G 2-4 millions UI IV toutes les 4-6h</li>
      <li>Contrôle des spasmes/rigidité : <strong>Benzodiazépines</strong> à fortes doses, titrées — <strong>Diazépam (Valium®)</strong> 5-10 mg IV en bolus répétable toutes les quelques minutes selon la réponse clinique, ou perfusion continue titrée à l'effet (doses cumulées quotidiennes pouvant atteindre plusieurs centaines de mg/j dans les formes sévères, sous surveillance rapprochée de la fonction respiratoire) — sédation profonde par perfusion continue si besoin, myorelaxants/curarisation et ventilation mécanique en réanimation si formes sévères (spasmes laryngés, détresse respiratoire)</li>
      <li>Prise en charge de la dysautonomie (formes sévères) : <strong>Labétalol (Trandate®)</strong> 5-20 mg IV en bolus répétable (ou perfusion continue 0,5-2 mg/min) ; <strong>Esmolol (Brevibloc®)</strong> bolus 500 µg/kg IV puis perfusion 50-200 µg/kg/min — pour l'instabilité tensionnelle/tachycardie ; sulfate de magnésium (schéma identique au protocole éclampsie) parfois utilisé en complément (réduit les spasmes et l'instabilité autonome)</li>
      <li>Vaccination antitétanique à jour à réaliser (le tétanos ne confère pas d'immunité naturelle, le vaccin reste nécessaire même après l'épisode), en un site différent des immunoglobulines</li>
      <li>Prévention avant tout : vérification et mise à jour systématique du statut vaccinal devant toute plaie, selon le type de plaie et l'ancienneté de la dernière dose</li>
    </ol>
  </div>

  <div class="card" id="proto-fasciite-necrosante">
    <h3>🦠 Fasciite nécrosante / Infections nécrosantes des tissus mous</h3>
    <div class="warn-box">⚠️ Urgence chirurgicale absolue — le délai avant débridement conditionne directement la survie (mortalité ~4% si chirurgie &lt;12h vs jusqu'à 38% en cas de retard). Ne jamais attendre l'imagerie ou la biologie en cas de forte suspicion clinique.</div>
    <p style="font-weight:600; color:var(--accent2); margin-bottom:6px;">Signes cliniques évocateurs (à rechercher activement, souvent frustres au stade précoce) :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Douleur disproportionnée</strong> par rapport à l'aspect cutané initial — signe le plus précoce et le plus sensible</li>
      <li><strong>Induration sous-cutanée "en bois"</strong> s'étendant au-delà des limites visibles de l'érythème cutané</li>
      <li>Œdème tendu, bulles hémorragiques, taches cyaniques/nécrotiques cutanées (signes tardifs)</li>
      <li>Crépitation sous-cutanée (gaz) — évocatrice mais inconstante, absente dans de nombreux cas confirmés</li>
      <li>Fièvre élevée, tachycardie disproportionnée, altération rapide de l'état général, signes de sepsis/choc septique</li>
      <li><strong>Absence d'amélioration après 24-48h d'antibiothérapie</strong> bien conduite pour une infection cutanée présumée simple — doit faire reconsidérer le diagnostic</li>
      <li>Terrain à risque : diabète, immunodépression, plaie/morsure/injection récente, chirurgie récente, toxicomanie IV — mais peut survenir sur peau apparemment saine</li>
      <li><strong>Gangrène de Fournier</strong> : forme périnéale/génitale, souvent chez l'homme diabétique, point de départ ano-rectal ou urogénital — même urgence chirurgicale</li>
    </ul>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Score LRINEC (Laboratory Risk Indicator for Necrotizing Fasciitis) — outil d'aide, ne remplace jamais le jugement clinique :</p>
    <table>
      <tr><th>Paramètre</th><th>Points</th></tr>
      <tr><td>CRP ≥150 mg/L</td><td>4</td></tr>
      <tr><td>Leucocytes 15 000-25 000/mm³ / &gt;25 000/mm³</td><td>1 / 2</td></tr>
      <tr><td>Hémoglobine 11-13,5 g/dL / &lt;11 g/dL</td><td>1 / 2</td></tr>
      <tr><td>Natrémie &lt;135 mmol/L</td><td>2</td></tr>
      <tr><td>Créatinine &gt;141 µmol/L</td><td>2</td></tr>
      <tr><td>Glycémie &gt;10 mmol/L (1,80 g/L)</td><td>1</td></tr>
    </table>
    <p style="font-size:13.5px; margin-top:6px;">Score ≥6 : suspicion à prendre au sérieux (VPP ~92%) ; score ≥8 : risque élevé. <strong>Un score bas n'élimine pas le diagnostic</strong> (sensibilité imparfaite, environ 40% des fasciites confirmées ont un score &lt;6) — la décision opératoire reste avant tout clinique.</p>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Prise en charge :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Appel chirurgical immédiat</strong> dès la suspicion clinique — le débridement chirurgical radical est le seul traitement curatif, l'imagerie (TDM/échographie) ne doit jamais retarder l'intervention en cas de suspicion forte</li>
      <li><strong>Réanimation hémodynamique</strong> — remplissage vasculaire (<strong>Ringer Lactate/NaCl 0,9% — Baxter®</strong>), prise en charge du choc septique associé selon protocole dédié</li>
      <li><strong>Antibiothérapie probabiliste large spectre immédiate</strong> (avant même le débridement, sans le retarder) :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Antibiotique</th><th>Posologie</th></tr>
      <tr><td><strong>Ceftriaxone (Rocéphine®)</strong> ou <strong>Céfotaxime</strong></td><td>2g IV x2/j (couverture des bacilles Gram négatif)</td></tr>
      <tr><td><strong>Métronidazole (Flagyl®)</strong></td><td>500mg IV toutes les 8h (couverture des anaérobies)</td></tr>
      <tr><td><strong>Clindamycine (Dalacine®)</strong> — si disponible</td><td>900mg IV toutes les 8h — <strong>essentielle</strong> : inhibe la synthèse des toxines bactériennes (effet anti-toxinique, notamment sur le streptocoque du groupe A)</td></tr>
      <tr><td>Alternative si Clindamycine indisponible</td><td>Association Pénicilline G (3-4 MUI IV toutes les 4-6h) + Gentamicine (Gentalline®) 5mg/kg/j en 1 injection</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Débridement chirurgical radical</strong> de tous les tissus nécrotiques (peau, tissu sous-cutané, fascia atteint) — reprises chirurgicales itératives toutes les 24-36h jusqu'à absence de progression de la nécrose ; amputation parfois salvatrice si atteinte d'un membre avec choc septique réfractaire</li>
      <li>Prélèvements peropératoires (bactériologie, anatomopathologie) pour adapter l'antibiothérapie et confirmer le diagnostic</li>
      <li>Surveillance rapprochée en réanimation — le choc septique et la défaillance multiviscérale sont fréquents dans les premières 24-48h</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Rocéphine®, Flagyl® et Gentalline® sont largement disponibles à tous les niveaux hospitaliers. La Clindamycine (Dalacine®) est disponible principalement en pharmacie hospitalière de CHU/CHRR — en son absence, l'association Pénicilline G/Gentamicine reste une alternative acceptable, sans l'effet anti-toxinique spécifique de la clindamycine. Le plateau chirurgical (bloc opératoire, disponibilité de sang pour transfusion) doit être mobilisé sans délai ; un transfert vers un centre chirurgical de référence ne doit jamais retarder l'antibiothérapie initiale.</p>
  </div>

  <div class="card" style="border-left:4px solid var(--warn);">
    <h3>💊 Note sur les noms commerciaux</h3>
    <p style="font-size:13px; color:var(--muted)">Les noms commerciaux cités ci-dessous (Doliprane®, Profenid®, Augmentin®...) sont les plus répandus en pharmacie francophone (France/Afrique francophone) à titre de repère. La disponibilité réelle varie selon les dépôts, hôpitaux et génériqueurs locaux (Biogaran, Mylan, Micro Labs...) — <strong>le nom en DCI (molécule) reste la référence fiable</strong> pour toute prescription. Vérifier la liste des médicaments enregistrés à Madagascar (AMM.mg) ou l'étiquette du produit disponible sur place.</p>
  </div>

  <div class="card" id="proto-triage">
    <h3>🏥 Triage à l'arrivée aux urgences</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Objectif : identifier en quelques minutes les patients nécessitant une prise en charge immédiate, avant l'enregistrement administratif complet. Le triage n'est pas un diagnostic mais une estimation du degré d'urgence.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Niveau</th><th>Délai de PEC</th><th>Exemples</th></tr>
      <tr><td class="grave">1 — Immédiat</td><td>0 min (déchoquage)</td><td>ACR, détresse respiratoire/circulatoire majeure, coma, hémorragie massive</td></tr>
      <tr><td class="grave">2 — Très urgent</td><td>&lt;15 min</td><td>Douleur thoracique, AVC suspecté, sepsis avec signes de choc débutant, polytraumatisme stable</td></tr>
      <tr><td class="modere">3 — Urgent</td><td>&lt;60 min</td><td>Douleur abdominale intense, fracture déplacée, asthme modéré, fièvre chez le nourrisson</td></tr>
      <tr><td class="modere">4 — Moins urgent</td><td>&lt;120 min</td><td>Plaie simple, entorse, douleur modérée stable</td></tr>
      <tr><td class="leger">5 — Non urgent</td><td>Variable</td><td>Certificat, renouvellement d'ordonnance, symptôme mineur ancien</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Prise des constantes vitales systématique dès l'arrivée (FC, TA, FR, SpO2, température, glycémie capillaire si trouble de conscience) — elles orientent souvent plus que le motif de consultation déclaré</li>
      <li>Repérer les <strong>signes de gravité immédiats</strong> ne nécessitant aucune attente : détresse respiratoire, marbrures/froideur des extrémités, trouble de conscience, douleur thoracique avec instabilité, saignement actif non contrôlé</li>
      <li>Réévaluer un patient en salle d'attente si son état se modifie ou si le délai de triage initial est dépassé — le triage est dynamique, non figé</li>
      <li>Toute femme enceinte avec douleur/saignement, tout nourrisson fébrile &lt;3 mois, toute suspicion d'AVC (délai de thrombolyse) doivent être orientés en priorité même si les constantes semblent rassurantes</li>
    </ol>
  </div>

  <div class="card" id="proto-embolie-pulmonaire">
    <h3>🫁 Embolie pulmonaire (EP)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">À évoquer devant une dyspnée aiguë inexpliquée, une douleur thoracique pleurétique, une tachycardie, ou un malaise/syncope inexpliqué, surtout avec facteur de risque thromboembolique (chirurgie récente, alitement, cancer, grossesse/post-partum, contraception œstroprogestative, antécédent de TVP/EP).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluer la probabilité clinique</strong> (score de Wells ou de Genève révisé) avant tout examen complémentaire — oriente la stratégie diagnostique</li>
      <li>Probabilité <strong>faible/intermédiaire</strong> : dosage des <strong>D-dimères</strong> — si négatifs, EP exclue (bonne valeur prédictive négative) ; si positifs ou probabilité forte d'emblée → angioscanner thoracique (ou scintigraphie V/Q si CI à l'iode/grossesse)</li>
      <li><strong>Rechercher les signes de gravité</strong> immédiatement : hypotension/choc (EP à haut risque), signes de cœur pulmonaire aigu à l'échographie (dilatation VD), désaturation sévère — orientent vers un traitement urgent sans attendre la confirmation formelle si l'instabilité est majeure</li>
      <li><strong>EP à haut risque (choc/hypotension)</strong> : <strong>thrombolyse</strong> par <strong>Altéplase (Actilyse®)</strong> — 100 mg IV en perfusion continue sur 2h (10 mg en bolus sur 1-2 min puis 90 mg sur 2h), ou schéma accéléré 0,6 mg/kg (max 50 mg) en bolus sur 15 min si arrêt cardiaque imminent — après échocardiographie de confirmation si possible, en l'absence de contre-indication majeure</li>
      <li><strong>EP sans instabilité hémodynamique</strong> : anticoagulation curative d'emblée —
        <strong>Héparine non fractionnée (Héparine Choay®)</strong> : bolus 80 UI/kg IV puis 18 UI/kg/h IVSE (adapté au TCA), à privilégier si risque hémorragique élevé, insuffisance rénale sévère ou instabilité potentielle (réversible rapidement) ;
        ou <strong>Énoxaparine (Lovenox®)</strong> 100 UI/kg (1 mg/kg) SC toutes les 12h (à adapter à la clairance rénale) ;
        ou <strong>Rivaroxaban (Xarelto®)</strong> 15 mg x2/j PO pendant 21 jours puis 20 mg/j en relais, si forme non grave et pas de contre-indication</li>
      <li>Oxygénothérapie selon SpO2, antalgie si douleur pleurétique, éviter le remplissage vasculaire agressif en cas de choc (peut aggraver la défaillance ventriculaire droite) — privilégier un remplissage prudent (250-500 mL) avec réévaluation</li>
      <li>Score de <strong>PESI</strong> (Pulmonary Embolism Severity Index) utile pour évaluer le pronostic et orienter la décision d'hospitalisation vs prise en charge ambulatoire des formes de faible gravité</li>
    </ol>
  </div>

  <div class="card" id="proto-ischemie-membre">
    <h3>🦵 Ischémie aiguë de membre</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les ESVS (European Society for Vascular Surgery) Guidelines 2020. Urgence chirurgicale vasculaire — le pronostic du membre (et vital) dépend directement du délai de revascularisation. Causes principales : embolie (origine cardiaque — FA +++, thrombus intracardiaque, anévrisme), thrombose in situ sur artère pathologique (athérome), dissection artérielle, traumatisme.</p>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Les 6 P (règle mnémotechnique) :</strong> Pain (douleur brutale), Pallor (pâleur), Pulselessness (abolition des pouls), Paresthesia (paresthésies), Paralysis (déficit moteur — signe de gravité extrême, ischémie évoluée), Poikilothermia (froideur cutanée).</p>
    <table style="margin-bottom:10px;">
      <tr><th>Stade (Rutherford)</th><th>Signes</th><th>Conduite</th></tr>
      <tr><td class="leger">I — Viable</td><td>Pas de perte sensitive/motrice, Doppler artériel/veineux audible</td><td>Anticoagulation + bilan étiologique + revascularisation différée possible (quelques heures)</td></tr>
      <tr><td class="modere">II — Menacé (marginalement / immédiatement)</td><td>Perte sensitive (orteils) ± discret déficit moteur ; Doppler artériel souvent inaudible</td><td>Revascularisation urgente (&lt;6h idéalement)</td></tr>
      <tr><td class="grave">III — Irréversible</td><td>Anesthésie complète, paralysie, rigidité musculaire ("rigor"), Doppler artériel et veineux inaudibles</td><td>Amputation d'emblée le plus souvent — la revascularisation expose au risque de syndrome de revascularisation/rhabdomyolyse létale</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Anticoagulation immédiate dès la suspicion</strong> (ne pas attendre l'imagerie) : <strong>Héparine non fractionnée (Héparine Choay®)</strong> — bolus 50-100 UI/kg IV, puis perfusion continue adaptée au TCA — prévient l'extension du thrombus et protège la circulation collatérale</li>
      <li>Antalgie systématique (douleur ischémique souvent intense) : <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min</li>
      <li>Membre en position déclive (favorise la perfusion distale par gravité), protection des zones à risque (talon), éviter tout traumatisme/compression supplémentaire</li>
      <li><strong>Bilan étiologique en parallèle</strong> : ECG (fibrillation atriale), échocardiographie (thrombus intracardiaque, valvulopathie), écho-Doppler artériel des membres ± angioscanner/angio-IRM selon disponibilité et délai — sans retarder la revascularisation si stade II-III</li>
      <li><strong>Revascularisation en urgence</strong> selon le stade et la cause : embolectomie chirurgicale (sonde de Fogarty) si embolie proximale, ou thrombolyse in situ/thrombectomie percutanée si thrombose sur lésion athéromateuse, selon le plateau technique disponible et le délai d'ischémie</li>
      <li><strong>Stade III (ischémie dépassée/irréversible) :</strong> l'amputation prime sur la tentative de revascularisation — le rétablissement du flux sur un membre nécrosé libère potassium, myoglobine et acide lactique (syndrome de revascularisation), pouvant provoquer un arrêt cardiaque hyperkaliémique et une insuffisance rénale aiguë</li>
      <li>Après revascularisation : surveiller un <strong>syndrome des loges</strong> (douleur disproportionnée, tension des loges musculaires) — aponévrotomie de décharge si suspicion, et une rhabdomyolyse de reperfusion (CPK, fonction rénale, hyperkaliémie)</li>
    </ol>
  </div>

  <div class="card" id="proto-tvp">
    <h3>🩸 Thrombose veineuse profonde (TVP)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les ESC/ESVS Guidelines sur la maladie thromboembolique veineuse. Signes évocateurs : douleur/tuméfaction unilatérale d'un membre, augmentation de chaleur locale, œdème prenant le godet, dilatation veineuse superficielle, signe de Homans (peu fiable, non recommandé isolément).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluer la probabilité clinique</strong> (score de Wells pour TVP) avant tout examen complémentaire</li>
      <li>Probabilité <strong>faible/intermédiaire</strong> : <strong>D-dimères</strong> — si négatifs, TVP exclue ; si positifs ou probabilité forte d'emblée → <strong>écho-Doppler veineux</strong> des membres inférieurs (examen de référence, non invasif)</li>
      <li><strong>Anticoagulation curative d'emblée</strong> dès confirmation (ou dès forte suspicion si l'imagerie ne peut être obtenue rapidement) : <strong>Énoxaparine (Lovenox®)</strong> 100 UI/kg (1 mg/kg) SC toutes les 12h (à adapter à la clairance rénale), ou <strong>Héparine non fractionnée (Héparine Choay®)</strong> IVSE si risque hémorragique élevé/insuffisance rénale sévère, ou <strong>Rivaroxaban (Xarelto®)</strong> 15 mg x2/j PO pendant 21 jours puis 20 mg/j si forme non compliquée</li>
      <li>Durée du traitement : au moins <strong>3 mois</strong>, à prolonger selon le contexte (facteur déclenchant transitoire vs TVP non provoquée/récidivante/cancer actif — avis spécialisé)</li>
      <li><strong>Recherche systématique de signes d'embolie pulmonaire associée</strong> (dyspnée, douleur thoracique, tachycardie) — <em>voir protocole dédié</em> si suspicion</li>
      <li>Contention élastique/bas de compression pour réduire l'œdème et le risque de syndrome post-thrombotique, mobilisation précoce encouragée (ne pas immobiliser le membre, contrairement à une croyance répandue)</li>
      <li><strong>TVP proligérante ilio-fémorale avec phlegmatia cœrulea dolens</strong> (ischémie veineuse aiguë par obstruction massive) : urgence — surélévation du membre, anticoagulation, avis vasculaire pour thrombolyse/thrombectomie en urgence (risque de gangrène veineuse)</li>
      <li>Rechercher une cause sous-jacente si TVP non provoquée : néoplasie occulte (bilan orienté selon l'âge/le terrain), thrombophilie (bilan à distance de l'épisode aigu et de l'anticoagulation), syndrome des anti-phospholipides</li>
      <li>Contre-indication à la thrombolyse systémique en 1ère intention pour une TVP simple (réservée aux formes proximales sévères menaçant le membre)</li>
    </ol>
  </div>

  <div class="card" id="proto-envenimations">
    <h3>🦂 Envenimations — Piqûres de scorpion, morsures de serpent/araignée</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Contexte Madagascar :</strong> aucun serpent malgache ne possède de venin mortel pour l'homme — la grande majorité des ~100 espèces locales sont non venimeuses (dont les boas, non venimeux) ; seules quelques espèces à venin faible (crochets postérieurs) causent au pire des nausées et un œdème local. Le risque principal d'envenimation grave localement provient des <strong>piqûres de scorpion</strong> (certaines espèces du genre <em>Grosphus</em>), plus rarement des araignées. Les principes ci-dessous restent valables pour toute morsure de serpent, y compris d'espèces exotiques ou en cas de doute.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Morsure de serpent — gestes immédiats :</strong> rassurer, immobiliser le membre atteint en position déclive ou neutre, retirer bagues/bracelets avant l'apparition d'un œdème, transport rapide vers une structure de soins — <strong>ne jamais</strong> inciser, sucer la plaie, appliquer un garrot serré, ou appliquer de la glace (aggravent les lésions locales sans bénéfice prouvé)</li>
      <li>Surveiller l'apparition de signes locaux (œdème extensif, nécrose) ou systémiques (troubles de coagulation, signes neurologiques, choc) — rares avec les espèces malgaches mais à surveiller systématiquement les premières heures</li>
      <li>Antivenin réservé aux envenimations systémiques confirmées et selon protocole local — non recommandé de façon systématique en l'absence de signes de gravité</li>
      <li><strong>Piqûre de scorpion :</strong> douleur locale intense immédiate, œdème modéré ; les formes graves (rares) associent sueurs profuses, vomissements, troubles du rythme, œdème pulmonaire, HTA — surveillance clinique et scope si symptômes systémiques ou piqûre chez un enfant en bas âge</li>
      <li>Antalgie adaptée à l'intensité — <strong>Paracétamol (Doliprane®, Efferalgan®)</strong> 1 g PO/IV toutes les 6h (max 4 g/j), voire <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min si douleur sévère non contrôlée — désinfection locale, vérification du statut antitétanique</li>
      <li>Formes systémiques sévères de piqûre de scorpion : prise en charge symptomatique (contrôle tensionnel, traitement de l'OAP si présent), avis spécialisé/toxicologique si disponible</li>
      <li><strong>Morsure d'araignée</strong> à Madagascar : généralement bénigne (douleur locale et œdème comparables à une piqûre de guêpe) — traitement symptomatique suffisant dans la grande majorité des cas</li>
      <li>Antibioprophylaxie non systématique sauf signe d'infection secondaire de la plaie ; prévention antitétanique systématique comme pour toute plaie</li>
    </ol>
  </div>

  <div class="card" id="proto-tc-leger">
    <h3>🤕 Traumatisme crânien léger à modéré</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">TC léger : Glasgow 13-15 après traumatisme crânien. La majorité évolue favorablement, mais certains patients nécessitent une imagerie pour ne pas méconnaître une lésion intracrânienne significative (hématome, contusion).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Glasgow, examen neurologique complet (pupilles, motricité, recherche de signes de fracture de la base du crâne : otorragie, ecchymose périorbitaire/mastoïdienne, rhinorrhée claire)</li>
      <li><strong>Indications de TDM cérébrale</strong> (règle de Canadian CT Head, à adapter au contexte) : Glasgow &lt;15 à 2h post-traumatisme, suspicion de fracture ouverte/embarrure ou de fracture de la base, vomissements ≥2 épisodes, âge ≥65 ans, amnésie rétrograde &gt;30 min, mécanisme dangereux (chute &gt;1m ou &gt;5 marches, choc à haute cinétique), traitement anticoagulant/antiagrégant, convulsion post-traumatique, céphalée sévère progressive</li>
      <li>En l'absence de ces critères et d'imagerie disponible : <strong>surveillance clinique</strong> plusieurs heures (constantes, Glasgow répété), consignes de surveillance écrites à la sortie si retour à domicile (réveiller pour vérifier la vigilance, reconsulter si vomissements, confusion, céphalée croissante, faiblesse d'un membre)</li>
      <li>Patient sous anticoagulant/antiagrégant : seuil d'imagerie plus bas et surveillance prolongée (risque d'hématome retardé), même pour un traumatisme apparemment mineur</li>
      <li>Si signes de localisation, Glasgow &lt;13, ou détérioration secondaire → prise en charge comme un traumatisme crânien grave (cf. protocole HIC/engagement cérébral), avis neurochirurgical</li>
      <li>Pas d'anti-inflammatoires non stéroïdiens en phase aiguë (risque hémorragique théorique), antalgie par <strong>Paracétamol (Doliprane®, Efferalgan®)</strong> 1 g PO/IV toutes les 6h (max 4 g/j)</li>
      <li>Enfant : mêmes principes avec règles pédiatriques dédiées (PECARN) — seuil de vigilance encore plus bas chez le nourrisson (difficulté de l'examen clinique)</li>
    </ol>
  </div>

  <div class="card" id="proto-plaies-morsures">
    <h3>🩹 Plaies et morsures</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Toute plaie nécessite une évaluation de sa profondeur, du risque infectieux, et du statut vaccinal antitétanique avant suture ou fermeture.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Exploration</strong> : rechercher une atteinte des structures profondes (tendon, nerf, vaisseau, articulation), un corps étranger — sous anesthésie locale si besoin pour une exploration complète et indolore</li>
      <li><strong>Parage</strong> soigneux : lavage abondant au sérum physiologique (irrigation à pression modérée), excision des tissus dévitalisés/nécrotiques, ablation des corps étrangers visibles</li>
      <li><strong>Suture</strong> si plaie propre &lt;6-12h (délai plus court au visage pour raisons esthétiques, plus long accepté pour le cuir chevelu/visage bien vascularisés) — plaie souillée, morsure, ou délai dépassé : envisager une fermeture différée ou une cicatrisation dirigée</li>
      <li><strong>Morsures</strong> (humaine, chien, chat) : <strong>ne pas suturer d'emblée</strong> la plupart des morsures (risque infectieux élevé, surtout morsure de chat = inoculation profonde), sauf plaie du visage pour raison esthétique après parage rigoureux — antibioprophylaxie systématique par <strong>Amoxicilline-Acide clavulanique (Augmentin®)</strong> 1 g/125 mg PO toutes les 8h (ou 1 g/200 mg IV toutes les 8h si voie IV) pendant 5-7 jours, pour les morsures à risque (main, visage, morsure de chat, patient immunodéprimé)</li>
      <li><strong>Prévention antitétanique</strong> systématique selon le statut vaccinal et le type de plaie (plaie tétanigène = souillée, profonde, avec délabrement) — rappel de <strong>vaccin dTPolio</strong>, associé si besoin à des <strong>Immunoglobulines antitétaniques humaines (Gammatétanos®)</strong> 250 UI IM en un site différent du vaccin</li>
      <li><strong>Risque rabique</strong> (morsure d'animal, notamment chien errant en zone d'enzootie) : nettoyage immédiat et prolongé au savon (15 min), puis selon catégorie d'exposition — <strong>Vaccin antirabique (Verorab®)</strong> schéma Essen (J0-J3-J7-J14-J28) ou Zagreb, associé si morsure grave/catégorie III à des <strong>Immunoglobulines antirabiques (Imogam Rage® ou Favirab®)</strong> infiltrées autour de la plaie — ne jamais différer l'évaluation du risque rabique</li>
      <li>Consignes de surveillance de plaie (rougeur, chaleur, écoulement purulent, fièvre) et de retrait des fils/agrafes adaptées à la localisation (5-7j visage, 10-14j membres/tronc)</li>
    </ol>
  </div>

  <div class="card" id="proto-epigastralgie">
    <h3>🔥 Épigastralgie intense — Ulcère gastroduodénal / Gastrite aiguë</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Douleur épigastrique en crampe/brûlure, souvent rythmée par les repas (postprandiale précoce dans la gastrite, à jeun/nocturne calmée par l'alimentation dans l'ulcère duodénal). Objectif prioritaire : éliminer un diagnostic différentiel grave et dépister une complication (perforation, hémorragie) avant de traiter symptomatiquement.</p>

    <p style="margin-top:6px; font-weight:600; color:var(--accent2);">⚠️ Diagnostics différentiels à éliminer en priorité :</p>
    <div class="row2" style="font-size:13px; margin-bottom:8px;">
      <div>🔹 <strong>SCA / IDM inférieur</strong> (épigastralgie atypique, terrain vasculaire → ECG systématique)<br>🔹 <strong>Pancréatite aiguë</strong> (douleur transfixiante, lipase)<br>🔹 <strong>Perforation d'ulcère</strong> (défense/contracture, pneumopéritoine)</div>
      <div>🔹 <strong>Cholécystite/colique hépatique</strong> (hypochondre droit, Murphy)<br>🔹 <strong>Dissection aortique</strong> si irradiation dorsale, terrain à risque<br>🔹 <strong>Hémorragie digestive haute</strong> (méléna, hématémèse, anémie)</div>
    </div>

    <table style="margin-top:6px;">
      <tr><th>Présentation</th><th>Signes d'orientation</th><th>Conduite</th></tr>
      <tr>
        <td class="leger">Gastrite aiguë simple</td>
        <td>Brûlure épigastrique postprandiale, nausées, pas de signe de gravité, souvent contexte déclenchant (AINS, alcool, stress, infection)</td>
        <td>Traitement symptomatique ambulatoire possible si pas de signe de gravité — cf. traitement ci-dessous</td>
      </tr>
      <tr>
        <td class="modere">Ulcère gastroduodénal non compliqué</td>
        <td>Douleur rythmée par les repas, ancienneté/récidive, ± antécédent H. pylori ou prise d'AINS/aspirine au long cours</td>
        <td>IPP à dose curative, arrêt du facteur causal, bilan étiologique différé (endoscopie), recherche H. pylori</td>
      </tr>
      <tr>
        <td class="grave">Suspicion de complication</td>
        <td><strong>Perforation :</strong> douleur brutale en coup de poignard, défense/contracture généralisée, tachycardie, fébricule. <strong>Hémorragie :</strong> méléna, hématémèse, pâleur, tachycardie, hypoTA</td>
        <td>Urgence chirurgicale/endoscopique — à jeun strict, VVP(x2) gros calibre, bilan en urgence, avis chirurgical (perforation) ou protocole hémorragie digestive dédié</td>
      </tr>
    </table>

    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Prise en charge initiale (épigastralgie intense sans signe de gravité) :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluation initiale :</strong> constantes (TA, FC, température), recherche de défense/contracture, toucher rectal si suspicion hémorragique, ECG si doute sur origine coronarienne ou terrain à risque</li>
      <li><strong>À jeun</strong> tant que le diagnostic n'est pas éclairci (au cas où un geste chirurgical ou endoscopique serait nécessaire)</li>
      <li><strong>Antisécrétoire — IPP IV :</strong> <strong>Oméprazole ou Pantoprazole (Inipomp®, Eupantol®)</strong> 80 mg IV en bolus lent (si disponible), sinon 40 mg IV, puis relais 40 mg IV/12h ou en perfusion continue selon disponibilité — traitement de référence, à débuter précocement même avant confirmation endoscopique en cas de suspicion d'ulcère ou d'hémorragie</li>
      <li><strong>Antiacide/pansement gastrique</strong> en complément pour soulagement symptomatique rapide si disponible (hydroxyde d'alumine/magnésium) — effet immédiat mais transitoire, n'attendre que sur la douleur, pas sur la cicatrisation</li>
      <li><strong>Antispasmodique</strong> (<strong>Phloroglucinol — Spasfon®</strong>) 40-80 mg IV/IM (1-2 ampoules) ou 80 mg PO, répétable jusqu'à 3-4 fois/jour, si composante spasmodique associée</li>
      <li><strong>Antalgie :</strong> <strong>Paracétamol (Perfalgan® IV, Doliprane® PO)</strong> 1 g toutes les 6h en 1ère intention — <strong>proscrire les AINS et l'aspirine</strong> (aggravent la lésion muqueuse et le risque hémorragique) ; si douleur réfractaire, titration de Morphine possible sans retarder le diagnostic</li>
      <li><strong>Antiémétique</strong> si nausées/vomissements associés (<strong>Métoclopramide — Primpéran®</strong> 10 mg IV/IM/PO, jusqu'à 3 fois/jour, max 30 mg/j)</li>
      <li><strong>Arrêt impératif du(des) facteur(s) déclenchant(s) :</strong> AINS, aspirine, corticoïdes, alcool, tabac — cause majeure et souvent réversible de gastrite/ulcère</li>
      <li><strong>Rechercher une prise d'AINS/aspirine au long cours</strong> et évaluer l'indication d'une protection gastrique définitive (IPP au long cours) si le traitement causal ne peut être arrêté</li>
      <li>Bilan biologique : NFS (anémie évocatrice de saignement chronique/aigu), CRP, groupe sanguin/RAI si doute hémorragique, lipase (éliminer pancréatite)</li>
      <li><strong>Recherche de H. pylori</strong> (test respiratoire à l'urée, sérologie, ou biopsies lors de l'endoscopie) — son éradication réduit fortement le risque de récidive ulcéreuse</li>
      <li><strong>Endoscopie digestive haute</strong> à programmer (non systématiquement en urgence si pas de signe de gravité) pour confirmer le diagnostic, éliminer une cause néoplasique (surtout si terrain à risque, âge &gt;50 ans, altération de l'état général, dysphagie associée) et faire les biopsies</li>
      <li><strong>Signes devant faire réévaluer en urgence :</strong> apparition d'une défense abdominale, hématémèse/méléna, malaise, tachycardie/hypoTA, fièvre élevée → basculer vers le protocole hémorragie digestive ou abdomen chirurgical selon le tableau</li>
    </ol>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">La distinction formelle gastrite/ulcère nécessite l'endoscopie ; en phase aiguë, la conduite thérapeutique symptomatique (IPP, arrêt du facteur causal, antalgie sans AINS) est similaire dans les deux cas.</p>
  </div>

  <div class="card" id="proto-abdomen-aigu">
    <h3>🫃 Douleur abdominale aiguë / Abdomen chirurgical</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Motif de consultation fréquent regroupant des causes bénignes et des urgences chirurgicales potentiellement fatales — l'enjeu est de ne pas méconnaître un abdomen chirurgical (péritonite, occlusion, ischémie).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes de gravité à rechercher systématiquement :</strong> défense/contracture abdominale, choc, fièvre élevée, distension abdominale majeure, arrêt des matières et des gaz, sang dans les selles/vomissements</li>
      <li>Localisation de la douleur oriente le diagnostic : FID (appendicite), hypochondre droit (cholécystite), fosse lombaire (colique néphrétique/pyélonéphrite), épigastrique (ulcère, pancréatite), diffuse avec défense (péritonite)</li>
      <li>Chez la femme en âge de procréer : <strong>toujours éliminer une grossesse extra-utérine</strong> (β-hCG systématique) devant une douleur abdomino-pelvienne aiguë</li>
      <li>Bilan de base : NFS, CRP, ionogramme, lipase (si suspicion pancréatite), bilan hépatique, ECBU, β-hCG — imagerie orientée (échographie abdominale en 1ère intention, TDM si suspicion de perforation/occlusion/ischémie ou échographie non contributive)</li>
      <li><strong>Signes évocateurs de péritonite</strong> (contracture, défense généralisée, fièvre, arrêt du transit) : à jeun strict, VVP, antalgie (ne retarde pas le diagnostic chirurgical contrairement à une idée reçue ancienne), avis chirurgical en urgence</li>
      <li><strong>Suspicion d'ischémie mésentérique</strong> (douleur intense disproportionnée par rapport à l'examen clinique, terrain vasculaire/fibrillation auriculaire) : urgence diagnostique et thérapeutique, angioscanner en urgence, avis chirurgical immédiat — mortalité très élevée si retard</li>
      <li>Antalgie systématique dès la prise en charge, ne pas attendre l'avis chirurgical pour soulager la douleur — <strong>Paracétamol (Perfalgan® IV, Doliprane® PO)</strong> 1 g toutes les 6h en 1ère intention, puis <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min si douleur intense non contrôlée (éviter les AINS si suspicion de perforation/ulcère)</li>
      <li>Réévaluation clinique répétée indispensable : un abdomen initialement rassurant peut se dégrader en quelques heures (appendicite débutante, ischémie)</li>
    </ol>
  </div>

  <div class="card" id="proto-ischemie-mesenterique">
    <h3>🩸 Ischémie mésentérique aiguë</h3>
    <p class="module-sub" style="margin-bottom:8px;">D'après les recommandations WSES (World Society of Emergency Surgery, 2022) et ESVS. Pathologie rare mais grevée d'une mortalité de 30-70% en cas de retard diagnostique — à évoquer systématiquement devant une douleur abdominale disproportionnée par rapport à l'examen clinique.</p>
    <div class="warn-box">⚠️ La douleur abdominale intense avec un examen clinique initialement pauvre (ventre souple, sans défense) est le signe le plus évocateur au stade précoce — ne pas être rassuré par la discordance clinico-radiologique.</div>
    <p style="font-weight:600; color:var(--accent2); margin-bottom:6px;">Terrain et présentations à évoquer :</p>
    <table>
      <tr><th>Mécanisme</th><th>Terrain évocateur</th></tr>
      <tr><td>Embolique (artère mésentérique supérieure)</td><td>Fibrillation atriale, valvulopathie, thrombus intracardiaque, antécédent embolique — début brutal</td></tr>
      <tr><td>Thrombotique sur athérome</td><td>Artériopathie connue, angor abdominal préexistant (douleur post-prandiale chronique) — début plus progressif</td></tr>
      <tr><td>Non occlusive (bas débit — NOMI)</td><td>Patient de réanimation sous vasopresseurs, choc, insuffisance cardiaque sévère, hémodialyse</td></tr>
      <tr><td>Thrombose veineuse mésentérique</td><td>Thrombophilie, cirrhose/hypertension portale, syndrome myéloprolifératif, contexte post-opératoire</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Ne pas retarder l'imagerie</strong> — angioscanner abdominal (angio-TDM) en urgence dès la suspicion clinique, examen de référence (sensibilité et spécificité élevées) ; ne pas se contenter d'une radiographie standard, non contributive</li>
      <li><strong>Lactates</strong> — un taux normal n'élimine pas le diagnostic au stade précoce (marqueur d'ischémie déjà constituée, pas de l'ischémie débutante) ; leur élévation, associée à une acidose métabolique, est un signe de gravité (souffrance intestinale engagée)</li>
      <li><strong>Réanimation initiale dès la suspicion</strong> — remplissage vasculaire (<strong>Ringer Lactate/NaCl 0,9% — Baxter®</strong>) pour optimiser la perfusion splanchnique, correction des troubles hydro-électrolytiques, sonde nasogastrique de décompression si distension/vomissements, arrêt de toute alimentation orale</li>
      <li><strong>Antibiothérapie probabiliste large spectre</strong> dès la suspicion diagnostique (couverture Gram négatif et anaérobies) — <strong>Ceftriaxone (Rocéphine®)</strong> 2g IV/j + <strong>Métronidazole (Flagyl®)</strong> 500mg IV toutes les 8h</li>
      <li><strong>Avis chirurgical immédiat</strong> — laparotomie exploratrice en urgence en cas de signes de péritonite/nécrose intestinale constituée (résection des segments nécrosés, revascularisation si possible, laparotomie "damage control" avec réintervention programmée à 24-48h pour réévaluer la viabilité intestinale)</li>
      <li><strong>Revascularisation</strong> — chirurgie ouverte (embolectomie/pontage) dans la majorité des structures malgaches ; les techniques endovasculaires (thrombolyse in situ, angioplastie) ne sont généralement pas accessibles localement</li>
      <li><strong>Forme non occlusive (NOMI)</strong> — corriger la cause du bas débit (optimisation hémodynamique, sevrage des vasoconstricteurs si possible), éviter la digoxine et les vasopresseurs purs alpha si évitable (aggravent la vasoconstriction splanchnique)</li>
      <li><strong>Anticoagulation</strong> — héparine à discuter au cas par cas selon le mécanisme (notamment thrombose veineuse mésentérique) et le risque hémorragique post-opératoire</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : l'angioscanner et la chirurgie vasculaire de revascularisation ne sont disponibles que dans un nombre restreint de centres (CHU Antananarivo principalement) — un transfert précoce doit être envisagé dès la suspicion chez un patient transportable, en parallèle de la réanimation et de l'antibiothérapie déjà débutées. En l'absence d'imagerie disponible en urgence, une dégradation clinique rapide malgré une réanimation bien conduite doit faire discuter une laparotomie exploratrice à visée diagnostique et thérapeutique.</p>
  </div>

  <div class="card" id="proto-colique-nephretique">
    <h3>🪨 Colique néphrétique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Douleur lombaire unilatérale brutale, intense, à irradiation antérieure/descendante vers les organes génitaux externes, souvent avec agitation caractéristique (patient incapable de rester immobile, contrairement à la péritonite).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Antalgie de 1ère intention :</strong> <strong>Kétoprofène (Profenid®)</strong> 100 mg IV lente (perfusion sur 20 min) ou IM, renouvelable une fois à 8h si besoin (max 200 mg/j) — efficacité supérieure aux antalgiques classiques sur ce type de douleur, en l'absence de contre-indication (insuffisance rénale, grossesse, allergie, ulcère évolutif)</li>
      <li>Antalgie de 2e intention/complément : <strong>Paracétamol (Perfalgan® IV, Doliprane® PO)</strong> 1 g toutes les 6h ± <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min si douleur non contrôlée par les AINS seuls</li>
      <li><strong>Rechercher les critères de gravité</strong> nécessitant une prise en charge urgente (drainage) : fièvre (pyélonéphrite obstructive = urgence urologique), anurie ou rein fonctionnellement unique, insuffisance rénale aiguë, doute diagnostique (anévrisme de l'aorte notamment chez le sujet âgé)</li>
      <li>Bandelette urinaire et ECBU systématiques (recherche de leucocyturie/nitrites évocateurs d'infection associée), bilan sanguin (créatinine, NFS, CRP) si signes de gravité ou doute diagnostique</li>
      <li>Imagerie : <strong>échographie rénale</strong> en 1ère intention (recherche de dilatation des cavités pyélocalicielles) — TDM sans injection si doute diagnostique, discordance clinico-échographique, ou colique néphrétique compliquée</li>
      <li>Colique néphrétique simple (sans fièvre ni signe de gravité) : traitement ambulatoire par antalgiques ± <strong>Tamsulosine (Omix® LP, Josir® LP)</strong> 0,4 mg PO une fois par jour (facilite l'expulsion si calcul &lt;10mm), filtration des urines, hydratation normale (pas de sur-hydratation forcée)</li>
      <li><strong>Colique néphrétique fébrile ou avec anurie</strong> : hospitalisation, antibiothérapie probabiliste par <strong>Céfotaxime</strong> ou <strong>Ceftriaxone (Rocéphine®)</strong> 1-2 g/j IV si fièvre (adapter à l'antibiogramme secondairement), <strong>drainage urgent</strong> (sonde JJ ou néphrostomie percutanée) par l'urologue — ne pas différer</li>
    </ol>
  </div>

  <div class="card" id="proto-torsion-testiculaire">
    <h3>🥚 Torsion testiculaire / Bourse aiguë</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Urgence chirurgicale vraie — douleur scrotale brutale, intense, souvent avec nausées/vomissements. Le pronostic de sauvegarde testiculaire dépend directement du délai de prise en charge chirurgicale (viabilité testiculaire fortement compromise au-delà de 6h).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Ne jamais retarder l'avis chirurgical/urologique en attendant l'imagerie</strong> si la présentation clinique est évocatrice (douleur brutale, testicule ascensionné, horizontalisé, réflexe crémastérien aboli) — le diagnostic reste avant tout clinique</li>
      <li>L'échographie doppler testiculaire (si disponible rapidement et sans délai significatif) peut aider au diagnostic différentiel mais ne doit jamais retarder une exploration chirurgicale en cas de forte suspicion clinique</li>
      <li>À jeun strict dès la suspicion, VVP, antalgie par <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min (la douleur est souvent intense), préparation à une exploration chirurgicale en urgence (détorsion ± orchidopexie bilatérale, ou orchidectomie si nécrose constituée)</li>
      <li>Diagnostics différentiels à évoquer : torsion d'hydatide (douleur souvent plus localisée au pôle supérieur, point bleu douloureux), orchi-épididymite (contexte infectieux, fièvre, évolution plus progressive) — en cas de doute, privilégier l'hypothèse de torsion (principe de précaution)</li>
      <li>Chez l'enfant/adolescent, toute douleur scrotale aiguë doit être considérée comme une torsion testiculaire jusqu'à preuve du contraire</li>
    </ol>
  </div>

  <div class="card" id="proto-glaucome-aigu">
    <h3>👁️ Glaucome aigu par fermeture de l'angle</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Urgence ophtalmologique vraie — douleur oculaire intense brutale, œil rouge, baisse d'acuité visuelle, halos colorés autour des lumières, souvent associée à des nausées/vomissements pouvant égarer vers une cause digestive.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Examen : œil rouge, cornée trouble/œdémateuse, pupille semi-mylatriase aréactive, globe oculaire dur à la palpation comparative — mesure de la pression intraoculaire si tonomètre disponible (typiquement très élevée, &gt;40-50 mmHg)</li>
      <li><strong>Avis ophtalmologique en urgence absolue</strong> — le pronostic visuel dépend de la rapidité de la baisse de pression intraoculaire</li>
      <li>Traitement médical initial pour faire baisser la pression en urgence :
        <strong>Acétazolamide (Diamox®)</strong> 500 mg IV lente (ou PO si voie orale possible) puis 250 mg PO toutes les 6-8h ;
        <strong>Timolol collyre (Timoptol® 0,5%)</strong> 1 goutte dans l'œil atteint, à répéter selon protocole local ;
        <strong>Apraclonidine collyre (Iopidine® 0,5-1%)</strong> 1 goutte en complément ;
        <strong>Mannitol 20% (Mannitol Aguettant®/Baxter®)</strong> 1-2 g/kg IV en perfusion sur 30-60 min si pression très élevée et échec du traitement précédent —
        puis <strong>iridotomie au laser</strong> ou iridectomie chirurgicale en traitement définitif dès que possible ;
        une fois la pression abaissée, <strong>Pilocarpine collyre 2%</strong> 1 goutte peut être ajoutée (myotique, inefficace tant que la pression reste très élevée)</li>
      <li>Antalgiques (<strong>Paracétamol</strong> IV/PO, voire morphine titrée si douleur intense) et antiémétiques (<strong>Métoclopramide (Primpéran®)</strong> 10 mg IV) associés</li>
      <li>Ne pas dilater la pupille (contre-indication formelle des mydriatiques) — l'examen ne doit pas aggraver la fermeture de l'angle</li>
      <li>Diagnostic différentiel à éliminer : conjonctivite (œil rouge mais indolore/peu douloureux, pas de baisse d'acuité), uvéite antérieure aiguë, kératite — l'association douleur intense + baisse de vision + œil dur oriente fortement vers le glaucome aigu</li>
    </ol>
  </div>

  <div class="card" id="proto-trauma-oculaire">
    <h3>👁️ Traumatisme oculaire grave (globe ouvert / brûlure chimique)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Distinct du glaucome aigu (couvert ci-dessus) — ici l'urgence est traumatique/chimique. Pronostic visuel directement lié à la rapidité de la prise en charge, en particulier pour les brûlures chimiques (irrigation) et les plaies du globe (protection).</p>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">1. Brûlure chimique oculaire — urgence absolue, traiter avant tout examen</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Irrigation oculaire abondante et immédiate</strong> — ne jamais attendre l'identification exacte du produit ni un avis spécialisé : eau du robinet ou <strong>NaCl 0,9%</strong> en continu pendant <strong>au moins 15-30 min</strong>, paupières bien écartées, en éversant la paupière supérieure pour rincer le cul-de-sac conjonctival ; utiliser un système de type Morgan Lens si disponible</li>
      <li><strong>Mesurer le pH du cul-de-sac conjonctival</strong> après irrigation (bandelette urinaire ou papier pH) — poursuivre l'irrigation jusqu'à normalisation (pH 7-7,5) et stable 5-10 min après arrêt du rinçage</li>
      <li><strong>Brûlures alcalines</strong> (chaux, soude, produits d'entretien, ciment) — généralement plus graves que les acides (pénétration tissulaire profonde par saponification, poursuit sa progression même après rinçage) : irrigation prolongée impérative</li>
      <li>Classification de <strong>Roper-Hall</strong> utile pour le pronostic : grade I-II (atteinte limbique &lt;1/3, cornée claire à légèrement trouble — bon pronostic) à grade III-IV (atteinte limbique &gt;1/2 à totale, cornée opaque masquant l'iris — pronostic réservé)</li>
      <li>Après irrigation complète : retrait de tout corps étranger résiduel (particules de chaux ++), examen à la fluorescéine, <strong>collyre cycloplégique</strong> (atropine 1%) pour le confort, <strong>antibiotique local</strong> prophylactique, antalgiques systémiques, <strong>avis ophtalmologique en urgence</strong> dans tous les cas (même les formes légères en apparence)</li>
      <li>Ne jamais utiliser de neutralisant chimique (acide contre base ou inversement) — réaction exothermique aggravant les lésions</li>
    </ol>
    <p style="margin-top:14px; font-weight:600; color:var(--accent2);">2. Traumatisme à globe ouvert (plaie perforante)</p>
    <p style="font-size:13.5px; margin-bottom:8px;">À évoquer devant tout traumatisme oculaire avec baisse d'acuité visuelle, notamment après projection d'un corps étranger à haute vélocité (meulage, bricolage) ou plaie pénétrante.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes évocateurs</strong> : plaie visible de la cornée/sclère, pupille déformée en goutte ("teardrop pupil"), hypotonie du globe, hémorragie sous-conjonctivale importante, hyphéma, issue de contenu intraoculaire (uvée pigmentée visible), chambre antérieure plate/asymétrique</li>
      <li><strong>Protection immédiate</strong> avec une coque rigide (pas de pansement compressif) — <strong>ne jamais exercer de pression sur le globe</strong> (risque d'expulsion du contenu intraoculaire), ne pas tenter de retirer un corps étranger enclavé</li>
      <li><strong>Ne pas instiller de collyre ni de pommade</strong> tant que la plaie n'est pas évaluée par l'ophtalmologiste (risque de contamination intraoculaire par pénétration)</li>
      <li>À jeun strict (chirurgie probable), antalgiques et antiémétiques systémiques prudents (éviter tout effort de vomissement — augmente la pression intraoculaire et le risque d'extrusion), <strong>éviter les AINS et l'aspirine</strong> (risque hémorragique)</li>
      <li><strong>Antibioprophylaxie systémique précoce</strong> (couverture large spectre, prévention de l'endophtalmie) et <strong>vaccination antitétanique</strong> à vérifier/mettre à jour</li>
      <li><strong>Avis et transfert ophtalmologique/chirurgical en urgence</strong> — exploration et fermeture chirurgicale de la plaie dans les meilleurs délais (idéalement &lt;24h) pour optimiser le pronostic visuel</li>
      <li>Imagerie (TDM orbitaire, jamais d'IRM si suspicion de corps étranger métallique) pour rechercher un corps étranger intraoculaire ou une fracture associée</li>
    </ol>
  </div>

  <div class="card" id="proto-epistaxis">
    <h3>🩸 Épistaxis</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Saignement nasal — le plus souvent bénin et antérieur (zone de la tache vasculaire de Kiesselbach), mais peut être sévère chez le sujet âgé, hypertendu, sous anticoagulant/antiagrégant, ou en cas d'origine postérieure.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Position assise, tête penchée en avant</strong> (jamais en arrière — favorise la déglutition de sang et masque l'importance réelle du saignement, risque d'inhalation)</li>
      <li><strong>Compression bidigitale</strong> des ailes du nez contre le septum, en continu pendant <strong>10-15 min sans relâcher</strong> (chronométrer) — se moucher au préalable pour évacuer les caillots si saignement actif abondant</li>
