      <li>Si persistance : <strong>mèche nasale imbibée d'un vasoconstricteur local</strong> (Xylométazoline/Oxymétazoline — Déturgylone®, Aturgyl®) ± anesthésique local, mise en place antérieure, à laisser en place 24-48h</li>
      <li>Si échec du méchage antérieur simple : <strong>tamponnement antérieur</strong> avec mèche résorbable ou dispositif gonflable (type Rapid Rhino®), ou cautérisation au nitrate d'argent si le point de saignement est visible et accessible (jamais bilatérale dans le même temps — risque de perforation septale)</li>
      <li><strong>Épistaxis postérieure</strong> (saignement abondant, bilatéral, s'écoulant dans le pharynx malgré compression antérieure correcte) : <strong>tamponnement postérieur</strong> (sonde à double ballonnet ou sonde de Foley) — nécessite souvent une hospitalisation, surveillance cardiorespiratoire (réflexe naso-cardiaque), avis ORL</li>
      <li>Rechercher et corriger un facteur favorisant/aggravant : <strong>HTA</strong> non contrôlée (à traiter mais ne pas faire chuter brutalement la TA), trouble de la coagulation (bilan si saignement inhabituel/récidivant), <strong>anticoagulants/antiagrégants</strong> (évaluer individuellement le rapport bénéfice-risque avant toute suspension, avis spécialisé si besoin d'antagonisation en urgence), traumatisme, tumeur (épistaxis unilatérale récidivante inexpliquée chez l'adulte — bilan ORL à distance)</li>
      <li>Si saignement abondant/prolongé : bilan biologique (NFS, bilan de coagulation, groupe sanguin) et surveillance hémodynamique (TA, FC), remplissage/transfusion si retentissement hémodynamique</li>
      <li>Consignes de sortie après contrôle : éviter le mouchage forcé et les efforts intenses pendant 48-72h, éviter l'eau très chaude/l'alcool (vasodilatation), pommade cicatrisante nasale si besoin, consultation ORL si récidives fréquentes</li>
    </ol>
  </div>

  <div class="card" id="proto-corps-etranger">
    <h3>🫁 Corps étranger des voies aériennes (obstruction)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Urgence vitale immédiate en cas d'obstruction complète — distinguer obstruction partielle (toux efficace, capacité à parler) d'obstruction complète (incapacité à parler/tousser/respirer, cyanose rapide).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Obstruction partielle (toux efficace) :</strong> encourager la toux, ne pas intervenir activement, surveiller étroitement — l'intervention peut transformer une obstruction partielle en obstruction complète</li>
      <li><strong>Obstruction complète chez l'adulte/enfant conscient :</strong> 5 claques dans le dos (entre les omoplates, patient penché en avant) alternées avec 5 compressions abdominales (manœuvre de Heimlich, juste au-dessus de l'ombilic, vers l'arrière et le haut) — répéter jusqu'à désobstruction ou perte de conscience</li>
      <li><strong>Nourrisson &lt;1 an :</strong> 5 claques dans le dos (à plat ventre sur l'avant-bras, tête plus basse que le tronc) alternées avec 5 compressions thoraciques (2 doigts au centre du thorax, comme pour un massage cardiaque) — <strong>jamais de compression abdominale chez le nourrisson</strong> (risque de lésion viscérale)</li>
      <li><strong>Femme enceinte / obésité importante :</strong> compressions thoraciques à la place des compressions abdominales</li>
      <li><strong>Perte de conscience :</strong> débuter la RCP standard (compressions thoraciques 30:2) — à chaque ouverture des voies aériennes pour la ventilation, inspecter la bouche et retirer tout corps étranger visible (ne jamais réaliser de balayage digital à l'aveugle)</li>
      <li>Après désobstruction réussie : examen clinique, surveillance (risque de lésion des voies aériennes par la manœuvre elle-même, ou de fragment résiduel), avis ORL/pneumologique pour extraction endoscopique si doute sur un corps étranger résiduel</li>
      <li>Chez l'enfant avec suspicion de corps étranger sans obstruction complète mais avec toux/sibilants persistants après un épisode d'inhalation : endoscopie bronchique diagnostique et thérapeutique (ne pas attendre la résolution spontanée)</li>
    </ol>
  </div>

  <div class="card" id="proto-retention-urine">
    <h3>🚰 Rétention aiguë d'urine</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Impossibilité brutale et douloureuse d'uriner, avec globe vésical palpable — à distinguer de l'anurie (pas de production d'urine, vessie vide). Cause fréquente chez l'homme : hypertrophie bénigne de la prostate ; autres causes : fécalome, sténose urétrale, caillotage, cause médicamenteuse (anticholinergiques), post-opératoire, compression médullaire (à évoquer si troubles sensitifs/moteurs associés).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Sondage vésical évacuateur</strong> en urgence dès le diagnostic confirmé (globe vésical) — soulagement immédiat de la douleur, geste diagnostique et thérapeutique</li>
      <li>Si échec du sondage urétral (obstacle) : cathéter sus-pubien par un opérateur entraîné, ou avis urologique en urgence</li>
      <li>Évacuation progressive si globe très volumineux/ancien (certains protocoles recommandent un clampage intermittent pour limiter le risque d'hématurie a vacuo et d'hypotension par levée d'obstacle) — surveillance de la diurèse post-évacuation (polyurie de levée d'obstacle possible, surveiller ionogramme et hydratation si diurèse importante)</li>
      <li>Rechercher une cause déclenchante à traiter (fécalome à évacuer, revoir un traitement anticholinergique/opiacé en cause, infection urinaire associée)</li>
      <li><strong>Signes d'alerte neurologique</strong> (troubles sensitifs en selle, déficit moteur des membres inférieurs, incontinence associée) : évoquer un syndrome de la queue de cheval — urgence neurochirurgicale, IRM médullaire en urgence</li>
      <li>Antibiothérapie non systématique — si infection urinaire confirmée associée : <strong>Ciprofloxacine (Ciflox®)</strong> 500 mg PO toutes les 12h, ou <strong>Amoxicilline-Acide clavulanique (Augmentin®)</strong> 1 g/125 mg toutes les 8h selon l'antibiogramme ; antalgie par <strong>Paracétamol (Perfalgan® IV, Doliprane® PO)</strong> 1 g adaptée avant et pendant le geste</li>
      <li>Orientation en urologie pour bilan étiologique et suivi — <strong>Tamsulosine (Omix® LP, Josir® LP)</strong> 0,4 mg PO une fois par jour souvent prescrite avant l'ablation de sonde chez l'homme (favorise la reprise des mictions), ablation de sonde différée selon le contexte</li>
    </ol>
  </div>

  <div class="card" id="proto-geu">
    <h3>🤰 Grossesse extra-utérine (GEU) — Forme rompue/hémorragique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">À évoquer systématiquement devant douleur pelvienne + retard de règles/métrorragies chez une femme en âge de procréer, β-hCG positif sans grossesse intra-utérine visible à l'échographie. La forme rompue est une <strong>urgence chirurgicale vitale</strong> (hémopéritoine).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes de rupture/gravité :</strong> douleur pelvienne brutale et intense, défense abdominale, signes de choc hémorragique (tachycardie, hypoTA, pâleur, lipothymie), douleur scapulaire (irritation phrénique par hémopéritoine) — évoquer en urgence absolue</li>
      <li>2 VVP de gros calibre, bilan (groupe/Rh/RAI, NFS, β-hCG quantitatif), commander des culots globulaires si instabilité — <strong>ne pas retarder la prise en charge chirurgicale pour compléter le bilan</strong> si choc franc</li>
      <li>Échographie pelvienne (idéalement endovaginale) en urgence : recherche d'un hémopéritoine, d'une masse latéro-utérine, absence de grossesse intra-utérine malgré β-hCG positif</li>
      <li><strong>GEU rompue avec choc/hémopéritoine :</strong> chirurgie en urgence absolue (cœlioscopie ou laparotomie selon stabilité et plateau technique) — salpingectomie (trompe détruite) ou salpingotomie conservatrice selon l'état tubaire et le désir de fertilité ultérieure, remplissage vasculaire et transfusion en parallèle sans attendre</li>
      <li><strong>GEU non compliquée, asymptomatique, β-hCG bas et décroissants :</strong> abstention/surveillance biologique possible (β-hCG répétés) — option uniquement si patiente compliante et suivi assuré</li>
      <li><strong>Traitement médical par Méthotrexate</strong> (si GEU non rompue, non active, β-hCG &lt;5000 UI/L, absence d'activité cardiaque embryonnaire, patiente stable et compliante au suivi) : 1-1,5 mg/kg ou 50 mg/m² en injection IM unique — surveillance de la décroissance des β-hCG à J4 et J7, répétable si décroissance insuffisante</li>
      <li>Vérifier systématiquement le <strong>groupe Rhésus</strong> : si Rhésus négatif, administrer des <strong>immunoglobulines anti-D (Rhophylac®)</strong> 200 µg (1000 UI) IM en prévention de l'allo-immunisation (dose réduite possible si <12 SA selon le produit disponible), quel que soit le traitement choisi, idéalement dans les 72h</li>
      <li>Soutien psychologique — toute perte de grossesse, y compris ectopique, nécessite une prise en charge empathique en plus du traitement médical</li>
    </ol>
  </div>

  <div class="card" id="proto-fausse-couche">
    <h3>🩸 Fausse couche spontanée hémorragique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Métrorragies ± douleurs pelviennes au 1er trimestre. Distinguer menace de fausse couche (col fermé, grossesse évolutive), fausse couche en cours/incomplète (col ouvert, débris visibles), et fausse couche hémorragique nécessitant un geste en urgence.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluer le retentissement hémodynamique</strong> en priorité — une fausse couche peut saigner abondamment, notamment si rétention de débris ovulaires empêchant la rétraction utérine</li>
      <li>Examen au spéculum : quantifier le saignement, rechercher des débris au niveau du col (parfois responsables d'un choc vagal si enclavés — leur ablation à la pince peut être salvatrice et rapidement efficace)</li>
      <li>Échographie pelvienne pour préciser le type (complète/incomplète/rétention), éliminer une GEU associée (toujours possible même avec grossesse intra-utérine visible en cas de grossesse hétérotopique, rare mais à garder en tête)</li>
      <li><strong>Hémorragie abondante/mal tolérée avec rétention :</strong> évacuation utérine en urgence (aspiration endo-utérine) — ne pas différer si instabilité hémodynamique</li>
      <li>2 VVP si saignement important, bilan (NFS, groupe/Rh/RAI), remplissage/transfusion selon tolérance</li>
      <li>Vérifier le <strong>groupe Rhésus</strong> : <strong>immunoglobulines anti-D (Rhophylac®)</strong> 200 µg (1000 UI) IM si Rhésus négatif, quel que soit le terme, idéalement dans les 72h</li>
      <li>Antalgie adaptée — <strong>Paracétamol</strong> 1 g PO/IV toutes les 6h (max 4 g/j), voire <strong>Morphine</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min si douleurs intenses type contractions</li>
      <li>Fausse couche non hémorragique/peu symptomatique : abstention, traitement médical (misoprostol) ou chirurgical selon le choix éclairé de la patiente — pas d'urgence si bien tolérée</li>
    </ol>
  </div>

  <div class="card" id="proto-hrp-placenta-praevia">
    <h3>🩸 Hématome rétroplacentaire (HRP) / Placenta praevia hémorragique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>HRP :</strong> décollement prématuré du placenta normalement inséré — douleur utérine brutale et intense, utérus "de bois" (contracture permanente), saignement noirâtre parfois minime malgré une gravité majeure (hémorragie souvent décollée non extériorisée), souffrance fœtale aiguë. <strong>Placenta praevia :</strong> saignement rouge vif, indolore, utérus souple, souvent récidivant au cours de la grossesse.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Urgence vitale materno-fœtale</strong> — 2 VVP de gros calibre, bilan (NFS, coagulation avec fibrinogène, groupe/Rh/RAI), commander des culots globulaires ; rechercher un trouble de la coagulation (le HRP peut se compliquer de CIVD)</li>
      <li>Monitoring fœtal continu (RCF) dès que possible — rechercher des signes de souffrance fœtale aiguë (bradycardie, ralentissements)</li>
      <li><strong>HRP avec retentissement materno-fœtal (souffrance fœtale, choc maternel, mort fœtale in utero suspectée)</strong> : <strong>extraction fœtale en urgence</strong> (césarienne en urgence absolue le plus souvent), quel que soit le terme si viable — ne pas retarder pour compléter le bilan si gravité franche</li>
      <li><strong>Placenta praevia hémorragique :</strong> césarienne en urgence si saignement massif/mal toléré ou souffrance fœtale ; expectative sous surveillance stricte (hospitalisation, corticothérapie de maturation pulmonaire fœtale si prématurité) si saignement modéré et bien toléré</li>
      <li>Correction de la coagulopathie : PFC, fibrinogène, culots plaquettaires selon le bilan — risque de CIVD notable en cas d'HRP étendu</li>
      <li>Vérifier le groupe Rhésus : <strong>immunoglobulines anti-D (Rhophylac®)</strong> 200 µg (1000 UI) IM si Rhésus négatif, idéalement dans les 72h</li>
      <li><strong>Ne jamais réaliser de toucher vaginal</strong> avant d'avoir éliminé un placenta praevia par l'échographie (risque d'aggraver une hémorragie sur placenta bas inséré)</li>
      <li>Rechercher un facteur de risque/déclenchant d'HRP : HTA/prééclampsie, traumatisme abdominal, tabac, cocaïne, antécédent d'HRP</li>
    </ol>
  </div>

  <div class="card" id="proto-accouchement-inopine">
    <h3>🍼 Accouchement inopiné (hors maternité / extra-hospitalier)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Accouchement imminent sans possibilité de transfert à temps vers une structure obstétricale — situation fréquente dans les zones à accès limité aux soins. La grande majorité des accouchements se déroulent sans complication ; l'objectif est d'accompagner sans précipiter ni retenir l'accouchement.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluer l'imminence</strong> : envie de pousser irrépressible, tête visible à la vulve (couronnement) → l'accouchement est imminent, ne pas tenter de transférer la patiente</li>
      <li>Installer la patiente en position semi-assise ou gynécologique de fortune, champ propre si disponible, se laver les mains/gants si possible</li>
      <li><strong>Dégagement de la tête</strong> : accompagner la sortie de la tête sans la forcer, en freinant légèrement avec la main pour éviter une sortie trop brutale (prévention des déchirures) ; vérifier l'absence de circulaire du cordon autour du cou (si présent et lâche : le glisser par-dessus la tête ; si serré : clamper et couper rapidement)</li>
      <li><strong>Dégagement des épaules</strong> : traction douce vers le bas pour dégager l'épaule antérieure, puis vers le haut pour l'épaule postérieure — ne jamais tirer sur la tête</li>
      <li>Une fois né, sécher et réchauffer immédiatement le nouveau-né (peau à peau si possible), stimuler tactilement s'il ne crie pas — <strong>évaluer le score d'Apgar à 1 et 5 min</strong> et débuter la réanimation néonatale si nécessaire (cf. protocoles pédiatriques)</li>
      <li><strong>Clampage du cordon</strong> : après 1-3 min si nouveau-né vigoureux (bénéfice démontré du clampage retardé), immédiatement si réanimation néonatale nécessaire — clamper à 2 endroits et couper entre les clamps</li>
      <li><strong>Délivrance</strong ("3e phase du travail") : ne pas tirer sur le cordon ; attendre le décollement placentaire spontané (signes : allongement du cordon, saignement, utérus qui se globalise) — <strong>Oxytocine (Syntocinon®)</strong> 10 UI IM dès la naissance de l'épaule antérieure si disponible, réduit significativement le risque d'hémorragie du post-partum</li>
      <li>Après la délivrance : massage utérin, surveillance des saignements — cf. protocole HPP si hémorragie</li>
      <li>Transfert mère et enfant vers une structure obstétricale/pédiatrique dès que possible pour surveillance post-natale complète, même si l'accouchement s'est bien déroulé</li>
    </ol>
  </div>

  <div class="card" id="proto-procidence-cordon">
    <h3>🪢 Procidence du cordon ombilical</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Le cordon ombilical descend devant la présentation fœtale, souvent après rupture des membranes — urgence obstétricale absolue par risque de compression du cordon et d'asphyxie fœtale aiguë.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Ne jamais repousser le cordon dans l'utérus</strong> — geste inutile et potentiellement délétère</li>
      <li><strong>Décomprimer le cordon manuellement</strong> : main dans le vagin repoussant la présentation fœtale vers le haut (hors du bassin) pour lever la compression du cordon, à maintenir jusqu'à l'extraction — geste à poursuivre en continu, y compris pendant le transfert</li>
      <li><strong>Position maternelle</strong> : genu-pectorale (à quatre pattes) ou Trendelenburg prononcé (bassin surélevé) pour utiliser la gravité et réduire la pression sur le cordon</li>
      <li>Si cordon extériorisé à l'air libre : le réchauffer avec des compresses tièdes humides (éviter le refroidissement/dessèchement qui favorise le vasospasme), sans le manipuler inutilement</li>
      <li>Vérifier la présence de battements du cordon (pouls perçu) — signe de vitalité fœtale, ne signifie pas absence de souffrance</li>
      <li><strong>Extraction fœtale en extrême urgence</strong> : césarienne en urgence absolue le plus souvent (délai le plus court possible), sauf si accouchement voie basse immédiat possible (dilatation complète, présentation basse)</li>
      <li>Oxygénothérapie maternelle haute concentration en attendant l'extraction (optimise l'oxygénation fœtale)</li>
      <li>Prévention : suspicion accrue si présentation non engagée + rupture des membranes, surtout en cas de présentation du siège, de prématurité ou de grossesse multiple</li>
    </ol>
  </div>

  <div class="card" id="proto-dystocie-epaules">
    <h3>💪 Dystocie des épaules</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Impossibilité de dégager les épaules après la sortie de la tête fœtale (signe du "tortue" — la tête recule contre le périnée) — urgence obstétricale avec risque d'asphyxie fœtale et de lésion du plexus brachial. Mnémotechnique <strong>HELPERR</strong>.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>H</strong>elp — Appeler à l'aide immédiatement (obstétricien, sage-femme, pédiatre/réanimateur néonatal), noter l'heure de sortie de la tête</li>
      <li><strong>E</strong>pisiotomie — à envisager pour donner de l'espace pour les manœuvres internes (ne résout pas l'obstruction osseuse elle-même mais facilite l'accès)</li>
      <li><strong>L</strong>egs (manœuvre de McRoberts) — hyperflexion forcée des cuisses maternelles sur l'abdomen (genoux vers les épaules) — 1ère manœuvre à réaliser, résout la majorité des cas à elle seule</li>
      <li><strong>P</strong>ression sus-pubienne — pression ferme et continue (ou en va-et-vient) au-dessus du pubis maternel pour faire pivoter l'épaule antérieure sous la symphyse, associée au McRoberts</li>
      <li><strong>E</strong>nter/manœuvres internes — manœuvre de rotation interne (Wood inversée/Rubin) pour faire pivoter les épaules dans un diamètre oblique plus favorable</li>
      <li><strong>R</strong>emove posterior arm — extraction du bras postérieur (manœuvre souvent très efficace si les précédentes échouent)</li>
      <li><strong>R</strong>oll — mettre la patiente en position à quatre pattes (Gaskin) — change les rapports pelviens et facilite parfois le dégagement</li>
      <li><strong>Ne jamais</strong> exercer de traction excessive sur la tête fœtale ni de pression fondique (risque majeur de lésion du plexus brachial et de rupture utérine) — progresser méthodiquement dans les manœuvres plutôt que de forcer</li>
      <li>Après la naissance : examen néonatal systématique à la recherche d'une lésion du plexus brachial ou d'une fracture de clavicule, information et traçabilité précise du déroulement pour le dossier</li>
    </ol>
  </div>

  <div class="card" id="proto-rupture-uterine">
    <h3>💥 Rupture utérine</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Solution de continuité de la paroi utérine pendant le travail — urgence vitale materno-fœtale. Facteur de risque principal : <strong>utérus cicatriciel</strong> (antécédent de césarienne, surtout en cas de tentative de voie basse après césarienne), mais possible sur utérus sain (grande multiparité, hyperstimulation par ocytociques, traumatisme).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes d'alerte :</strong> douleur abdominale brutale et intense (parfois masquée par l'analgésie péridurale — méfiance), arrêt brutal des contractions utérines après une période d'hyperactivité, anomalies sévères du rythme cardiaque fœtal (bradycardie prolongée), régression de la présentation fœtale déjà engagée, métrorragies, signes de choc maternel</li>
      <li><strong>Extraction fœtale en extrême urgence</strong> — césarienne en urgence absolue dès la suspicion clinique, ne pas attendre de confirmation formelle si le tableau est évocateur</li>
      <li>2 VVP de gros calibre, bilan (NFS, coagulation, groupe/Rh/RAI), transfusion précoce si choc hémorragique — l'hémorragie peut être majeure et rapidement incontrôlable</li>
      <li>Réparation chirurgicale de la déhiscence/rupture au moment de la césarienne — hystérectomie d'hémostase si réparation impossible ou hémorragie incontrôlable engageant le pronostic vital</li>
      <li>Prévention : surveillance rapprochée du travail chez toute patiente à utérus cicatriciel tentant une voie basse (monitoring continu), prudence dans l'utilisation des ocytociques (éviter l'hyperstimulation utérine)</li>
      <li>Réanimation néonatale à anticiper systématiquement (souffrance fœtale aiguë quasi-constante)</li>
    </ol>
  </div>

  <div class="card" id="proto-torsion-annexe">
    <h3>🌀 Torsion d'annexe (torsion ovarienne/tubo-ovarienne)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Douleur pelvienne unilatérale brutale, intense, souvent associée à des nausées/vomissements — urgence chirurgicale par risque de nécrose ovarienne si le délai de prise en charge est trop long. Facteur favorisant fréquent : kyste ovarien préexistant (augmente le risque de torsion).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Ne pas retarder l'avis chirurgical/gynécologique</strong> en attendant une confirmation d'imagerie si la présentation clinique est fortement évocatrice — le diagnostic reste avant tout clinique, l'imagerie peut être faussement rassurante (un flux doppler conservé n'élimine pas une torsion, notamment intermittente)</li>
      <li>Échographie pelvienne (idéalement endovaginale) avec doppler si disponible rapidement, sans retarder la prise en charge chirurgicale en cas de forte suspicion clinique — recherche d'une masse annexielle volumineuse, d'un ovaire augmenté de volume, d'un épanchement</li>
      <li>À jeun strict dès la suspicion, VVP, antalgie (<strong>Paracétamol — Perfalgan®</strong> 1 g IV toutes les 6h, voire <strong>Morphine — Morphine Aguettant®</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min si douleur intense), préparation à une exploration chirurgicale en urgence (cœlioscopie en 1ère intention) — détorsion ± kystectomie si kyste responsable, conservation ovarienne privilégiée chaque fois que possible même en cas d'aspect ischémique (viabilité souvent meilleure que l'aspect macroscopique ne le suggère)</li>
      <li>β-hCG systématique (éliminer une grossesse, y compris ectopique, avant toute décision chirurgicale)</li>
      <li>Diagnostics différentiels à évoquer : GEU, appendicite, torsion d'hydatide, rupture de kyste hémorragique, infection génitale haute — en cas de doute diagnostique persistant, privilégier l'exploration chirurgicale rapide plutôt que la temporisation</li>
    </ol>
  </div>

  <div class="card" id="proto-hellp">
    <h3>🤰 Syndrome HELLP</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>H</strong>emolysis (hémolyse), <strong>E</strong>levated <strong>L</strong>iver enzymes (cytolyse hépatique), <strong>L</strong>ow <strong>P</strong>latelets (thrombopénie) — variante ou complication sévère de la prééclampsie (survient dans 10-20% des prééclampsies sévères), mais peut aussi apparaître isolément, sans HTA franche ni protéinurie dans 10-15% des cas, et jusqu'à 30% des cas se révèlent en post-partum (jusqu'à 7 jours après l'accouchement). Mortalité maternelle jusqu'à 1%, morbidité sévère (hématome sous-capsulaire du foie, CIVD, insuffisance rénale aiguë, œdème pulmonaire, décollement rétinien).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Diagnostic biologique (critères de Tennessee/Mississippi) :</strong> hémolyse (schizocytes, haptoglobine effondrée, LDH &gt;600 UI/L, bilirubine élevée), cytolyse hépatique (ASAT/ALAT &gt;2x la normale), thrombopénie (&lt;100 000-150 000/mm³) — le tableau peut être incomplet (formes partielles)</li>
      <li><strong>Signes d'alerte cliniques :</strong> douleur épigastrique/hypochondre droit (distension capsulaire hépatique — signe cardinal, souvent au premier plan), nausées/vomissements, céphalées, malaise général ; parfois tableau trompeur isolé sans HTA sévère</li>
      <li><strong>Recherche systématique d'une complication hépatique grave :</strong> imagerie (échographie ou TDM abdominale) au moindre doute de douleur épigastrique intense ou de choc inexpliqué — <strong>hématome sous-capsulaire/rupture hépatique</strong> = urgence chirurgicale vitale (laparotomie d'hémostase, embolisation si disponible)</li>
      <li><strong>Sulfate de magnésium</strong> systématique (prévention des convulsions, schéma identique au protocole éclampsie) même en l'absence de convulsions, dès que le diagnostic de prééclampsie sévère/HELLP est posé</li>
      <li><strong>Contrôle tensionnel</strong> si TA ≥160/110 mmHg : Labétalol IV ou Nicardipine IV (cf. protocole éclampsie)</li>
      <li><strong>Bilan de gravité répété</strong> (toutes les 12-24h ou plus rapproché si instable) : NFS/plaquettes, bilan hépatique, coagulation (fibrinogène), fonction rénale, LDH, haptoglobine — surveiller l'aggravation rapide possible</li>
      <li><strong>Transfusion plaquettaire</strong> si plaquettes &lt;20 000-50 000/mm³ selon le contexte (avant césarienne notamment) ou saignement actif ; correction de la coagulopathie associée (PFC, fibrinogène) si CIVD</li>
      <li><strong>Le seul traitement curatif reste l'accouchement</strong> — à discuter en urgence avec l'équipe obstétricale dès la 34e SA, ou avant si dégradation maternelle/fœtale sévère quel que soit le terme ; corticothérapie de maturation pulmonaire fœtale si extraction anticipée et terme le permettant</li>
      <li>Orientation en réanimation/unité de soins intensifs si défaillance d'organe associée (CIVD, insuffisance rénale, OAP, atteinte neurologique)</li>
    </ol>
  </div>

  <div class="card" id="proto-embolie-amniotique">
    <h3>💥 Embolie amniotique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Passage de liquide amniotique/débris fœtaux dans la circulation maternelle déclenchant une réaction anaphylactoïde systémique — <strong>urgence vitale extrême</strong>, imprévisible, survenant typiquement pendant le travail, l'accouchement ou dans les 30 minutes suivant la délivrance (parfois après amniocentèse/traumatisme abdominal). Mortalité maternelle élevée (20-40% selon les séries), risque majeur d'atteinte fœtale/mortalité périnatale.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Présentation classique en 2 phases :</strong> phase 1 — détresse respiratoire aiguë brutale + collapsus cardiovasculaire ± convulsions/arrêt cardiaque d'installation soudaine, souvent précédée d'une agitation ou d'une sensation de mort imminente ; phase 2 (si survie initiale) — <strong>CIVD sévère</strong> et hémorragie massive incoercible (atonie utérine associée fréquente)</li>
      <li><strong>Diagnostic clinique d'élimination</strong> — aucun test de confirmation rapide disponible ; évoquer devant l'association brutale hypoxie + hypotension/choc + coagulopathie en péri-partum, en éliminant les autres causes (embolie pulmonaire, choc hémorragique isolé, anaphylaxie, éclampsie, cardiomyopathie du péri-partum)</li>
      <li><strong>Prise en charge = réanimation cardio-respiratoire immédiate et symptomatique</strong> — oxygénothérapie à haut débit d'emblée, intubation précoce si détresse respiratoire sévère ou trouble de conscience ; si ACR : RCP standard avec déplacement utérin gauche manuel (cf. protocole ACR chez la femme enceinte) — <strong>extraction fœtale en urgence (césarienne périmortem) si arrêt cardiaque et grossesse ≥20 SA</strong>, améliore le pronostic maternel ET fœtal</li>
      <li><strong>Support hémodynamique :</strong> remplissage vasculaire prudent (risque d'aggraver l'OAP si dysfonction ventriculaire droite associée), <strong>noradrénaline</strong> en 1ère ligne si choc, échocardiographie précoce si disponible (dysfonction ventriculaire droite fréquente, guide le remplissage/inotropes — dobutamine ou milrinone à discuter)</li>
      <li><strong>Correction agressive et précoce de la coagulopathie</strong> dès les premiers signes (ne pas attendre le bilan complet si hémorragie active) : PFC, fibrinogène concentré/cryoprécipités, culots plaquettaires, transfusion massive protocolisée — la CIVD est quasi-constante et souvent au premier plan du pronostic</li>
      <li><strong>Prise en charge obstétricale simultanée :</strong> traitement de l'atonie utérine associée (utérotoniques, cf. protocole HPP), extraction fœtale sans délai si non encore réalisée et fœtus in utero avec signes de souffrance</li>
      <li>Orientation systématique en réanimation ; annonce et accompagnement de l'entourage dès que possible compte tenu de la gravité du pronostic</li>
    </ol>
  </div>

  <div class="card" id="proto-acr-grossesse">
    <h3>🫀 Arrêt cardio-respiratoire chez la femme enceinte / césarienne périmortem</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les recommandations ERC 2021 (circonstances particulières) et AHA. La RCP chez la femme enceinte (grossesse ≥20 SA, utérus palpable au-dessus de l'ombilic) nécessite des adaptations spécifiques liées à la compression aorto-cave par l'utérus gravide, qui réduit drastiquement le retour veineux et l'efficacité du massage cardiaque.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>RCP standard immédiate</strong> (algorithme ACR habituel : massage cardiaque, ventilation, DAE/défibrillation dès que possible — aucune contre-indication à la défibrillation ni aux médicaments de l'ACR pendant la grossesse) avec les adaptations suivantes</li>
      <li><strong>Déplacement utérin manuel vers la gauche</strong> par un assistant dédié (une ou deux mains, l'utérus poussé/soulevé vers la gauche du patient) — <strong>à privilégier par rapport à l'inclinaison latérale du corps</strong>, qui diminue l'efficacité du massage cardiaque ; ne jamais utiliser de billot/coussin sous le bassin si cela compromet la qualité des compressions</li>
      <li>Massage cardiaque : position des mains légèrement plus haute sur le sternum que d'habitude (l'utérus gravide surélève le diaphragme) ; intubation précoce recommandée (risque d'inhalation majoré, œdème des voies aériennes supérieures possible) par l'opérateur le plus expérimenté disponible</li>
      <li><strong>Rechercher activement les causes réversibles spécifiques à la grossesse</strong> en plus des 4H/4T classiques : hémorragie (HPP, HRP, rupture utérine, GEU rompue), embolie amniotique, embolie pulmonaire, prééclampsie/éclampsie/HELLP, iatrogénie (surdosage sulfate de magnésium, anesthésie locorégionale — toxicité aux anesthésiques locaux, overdose d'anesthésiques), cardiomyopathie du péri-partum, dissection aortique</li>
      <li><strong>Antidote sulfate de magnésium si surdosage suspecté</strong> : Gluconate de calcium 10%, 10 mL IV (cf. protocole éclampsie)</li>
      <li><strong>Césarienne périmortem (extraction fœtale de sauvetage maternel) :</strong> décision à prendre dès le début de la RCP si utérus gravide ≥20 SA (fond utérin palpable au-dessus de l'ombilic) — <strong>débuter le geste si absence de retour à une circulation spontanée dans les 4 minutes de RCP bien conduite</strong>, objectif d'extraction fœtale dans la 5e minute. Ne pas attendre de matériel spécifique ni de transfert : geste réalisable sur place avec un simple bistouri, sans anesthésie (patiente en ACR)</li>
      <li>La césarienne périmortem est réalisée avant tout <strong>pour améliorer les chances de survie maternelle</strong> (lève la compression aorto-cave, améliore le retour veineux et l'efficacité du massage cardiaque) — le bénéfice fœtal est secondaire mais réel si le geste est rapide</li>
      <li><strong>Poursuivre la RCP pendant et après l'extraction</strong>, sans interrompre les compressions thoraciques pour le geste chirurgical ; prise en charge néonatale immédiate simultanée par une seconde équipe (cf. protocole réanimation du nouveau-né)</li>
    </ol>
  </div>

  <div class="card" id="proto-inversion-uterine">
    <h3>🔄 Inversion utérine</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Retournement du fond utérin qui s'invagine à travers le col, parfois extériorisé à la vulve — complication rare (≈1/2000 à 1/20000 accouchements) mais gravissime de la délivrance, associant <strong>choc vagal brutal</strong> (souvent disproportionné par rapport aux pertes sanguines visibles) et <strong>hémorragie sévère</strong>. Favorisée par une traction excessive sur le cordon ou une pression fundique avant décollement placentaire complet.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Reconnaître le tableau :</strong> douleur pelvienne intense brutale au moment de la délivrance, choc vagal (bradycardie, hypotension) souvent au premier plan avant même l'hémorragie extériorisée, masse violacée extériorisée à la vulve ou fond utérin non palpable à la palpation abdominale (dépression en cupule)</li>
      <li><strong>Alerte immédiate</strong> — appel à l'aide (obstétricien/sage-femme expérimentée), 2 VVP de gros calibre, bilan (NFS, coagulation, groupe/Rh/RAI), remplissage vasculaire et traitement du choc vagal (atropine si bradycardie sévère symptomatique)</li>
      <li><strong>Ne pas retirer le placenta avant la réduction</strong> si celui-ci est encore inséré — le retrait précoce peut aggraver l'hémorragie ; la réduction manuelle prime</li>
      <li><strong>Réduction manuelle immédiate (manœuvre de Johnson) :</strong> repousser le fond utérin inversé à travers le col avec la paume de la main, en direction de l'ombilic, le plus rapidement possible après le diagnostic — plus la réduction est précoce, plus elle est facile (l'anneau cervical se rétracte rapidement autour de l'utérus inversé)</li>
      <li><strong>Relâchement utérin transitoire</strong> pour faciliter la réduction si nécessaire (résistance importante) : tocolytique (Terbutaline) ou agent anesthésique halogéné selon disponibilité — <strong>arrêter tout utérotonique</strong> avant/pendant la manœuvre de réduction</li>
      <li><strong>Après réduction réussie :</strong> reprendre immédiatement les utérotoniques (Oxytocine en 1ère ligne) pour maintenir la rétraction utérine et prévenir la récidive immédiate/l'atonie secondaire ; maintenir une contre-pression manuelle transabdominale quelques minutes</li>
      <li><strong>Si échec de la réduction manuelle :</strong> réduction hydrostatique (instillation de sérum tiède dans le vagin, cul-de-sac obturé) ou reprise chirurgicale (laparotomie, intervention de Huntington/Haultain) selon plateau technique disponible</li>
      <li>Traitement de l'hémorragie et de la coagulopathie associées selon le protocole HPP ; transfusion précoce si choc hémorragique</li>
    </ol>
  </div>

  <div class="card" id="proto-sepsis-puerperal">
    <h3>🦠 Sepsis puerpéral / chorioamniotite</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Infection génitale survenant pendant le travail/l'accouchement (chorioamniotite) ou dans les 6 semaines du post-partum (endométrite, plus rarement avortement septique) — cause majeure de mortalité maternelle évitable, particulièrement dans les contextes à ressources limitées où les avortements non sécurisés restent fréquents. Peut évoluer très rapidement vers un choc septique.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes évocateurs :</strong> fièvre ≥38°C (ou hypothermie dans les formes sévères), douleur pelvienne/utérine, lochies fétides ou purulentes, utérus mal involué et douloureux à la palpation, tachycardie maternelle/fœtale ; rechercher systématiquement des critères de sepsis (qSOFA, lactates) devant tout tableau fébrile en péri-partum</li>
      <li><strong>Facteurs de risque à rechercher :</strong> rupture prématurée des membranes prolongée, travail prolongé, touchers vaginaux répétés, rétention de débris placentaires, manœuvres endo-utérines (révision utérine, délivrance artificielle), avortement provoqué en conditions non sécurisées, césarienne</li>
      <li><strong>Prélèvements avant antibiothérapie</strong> si possible sans retarder le traitement : hémocultures, prélèvement vaginal/endocervical, ECBU ; bilan biologique (NFS, CRP, lactates, fonction rénale, bilan de coagulation)</li>
      <li><strong>Antibiothérapie probabiliste précoce (dans l'heure)</strong>, large spectre couvrant germes à Gram négatif, streptocoques et anaérobies : association <strong>Amoxicilline-Acide clavulanique</strong> ou <strong>Céphalosporine 3G (Ceftriaxone)</strong> + <strong>Métronidazole</strong> IV ; ajouter un aminoside (Gentamicine) en cas de sepsis sévère/choc septique — adapter secondairement aux prélèvements</li>
      <li><strong>Recherche et évacuation d'une rétention utérine</strong> (débris placentaires, produits de conception) — cause fréquente d'entretien du sepsis, échographie pelvienne puis évacuation utérine (aspiration/curetage) dès stabilisation hémodynamique, sous couverture antibiotique</li>
      <li><strong>Prise en charge du choc septique si présent</strong> : remplissage vasculaire par cristalloïdes, noradrénaline si hypotension réfractaire, objectifs identiques au protocole sepsis général (cf. protocole dédié) — orientation en réanimation</li>
      <li><strong>Si suspicion d'avortement septique :</strong> évacuation utérine en urgence après début de l'antibiothérapie, recherche de complications (perforation utérine, péritonite, CIVD, insuffisance rénale aiguë par nécrose corticale) ; vaccination antitétanique à vérifier/compléter selon le contexte</li>
      <li>Prévention du choc septique gravissime (fasciite nécrosante périnéale, gangrène gazeuse utérine) : réévaluation rapprochée, avis chirurgical si non-amélioration sous 24-48h d'antibiothérapie adaptée ou aggravation locale/systémique</li>
    </ol>
  </div>

  <div class="card" id="proto-trauma-grossesse">
    <h3>🚑 Traumatisme chez la femme enceinte</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après ATLS 10th Ed. (chapitre grossesse et traumatisme). <strong>La priorité reste la réanimation maternelle</strong> — la meilleure prise en charge du fœtus passe par une stabilisation maternelle optimale. Toute femme en âge de procréer victime d'un traumatisme doit bénéficier d'un dosage de β-hCG.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>ABCDE standard</strong> avec adaptations : <strong>décubitus latéral gauche ou déplacement utérin manuel vers la gauche</strong> dès que l'utérus est palpable au-dessus de l'ombilic (≥20 SA), pour lever la compression aorto-cave et améliorer le retour veineux/le débit cardiaque maternel</li>
      <li><strong>Particularités physiologiques de la grossesse à connaître</strong> pour l'interprétation clinique : volume sanguin augmenté de 30-50% (les signes de choc hémorragique peuvent être retardés — jusqu'à 30% de perte volémique avant les premiers signes cliniques francs), tachycardie physiologique relative, hypotension de décubitus dorsal fréquente sans rapport avec une hémorragie</li>
      <li><strong>Remplissage vasculaire et transfusion</strong> : ne pas attendre l'apparition de signes de choc francs pour réanimer activement compte tenu de la réserve physiologique trompeuse ; transfusion précoce si suspicion de choc hémorragique (le fœtus peut être en souffrance avant que la mère ne montre des signes de choc)</li>
      <li><strong>Monitoring fœtal continu ≥4-6h minimum</strong> (cardiotocographie) dès que la mère est stabilisée, même en cas de traumatisme apparemment mineur — le décollement placentaire (HRP traumatique) peut survenir même après un choc abdominal minime et se révéler avec un délai de plusieurs heures</li>
      <li><strong>Signes évocateurs de décollement placentaire post-traumatique :</strong> contractions utérines répétées, douleur/sensibilité utérine, saignement vaginal, anomalies du rythme cardiaque fœtal, utérus hypertonique — échographie obstétricale et avis obstétrical en urgence</li>
      <li><strong>Immunoglobulines anti-D (Rhophylac®)</strong> 200 µg (1000 UI) IM si mère Rhésus négatif, idéalement dans les 72h, quelle que soit la sévérité apparente du traumatisme (risque d'allo-immunisation par passage de sang fœtal dans la circulation maternelle) — dose à augmenter (test de Kleihauer) si hémorragie fœto-maternelle massive suspectée</li>
      <li><strong>Imagerie :</strong> ne pas priver la mère d'une imagerie indiquée (TDM notamment) par crainte de l'irradiation fœtale — les bénéfices d'un diagnostic précis dépassent largement le risque radique aux doses diagnostiques ; protéger l'abdomen/pelvis si possible sans compromettre la qualité de l'examen</li>
      <li><strong>Césarienne périmortem</strong> à envisager sans délai en cas d'arrêt cardiaque maternel post-traumatique et grossesse ≥20 SA (cf. protocole dédié) ; césarienne en urgence (hors ACR) à discuter avec l'équipe obstétricale si détresse fœtale sévère et mère stabilisable</li>
      <li>Prévention de la maladie thromboembolique (mobilisation précoce, bas de contention) et anti-tétanique selon les plaies associées</li>
    </ol>
  </div>

  <div class="card" id="proto-mole-hydatiforme">
    <h3>🩸 Môle hydatiforme hémorragique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Grossesse môlaire (complète ou partielle) — prolifération trophoblastique anormale sans embryon viable (forme complète) ou avec embryon non viable (forme partielle). Se révèle typiquement par des métrorragies du 1er trimestre, un utérus souvent plus gros que l'âge gestationnel théorique, et des β-hCG très élevées. Le risque hémorragique peut être sévère, notamment lors de l'expulsion spontanée ou de l'évacuation utérine.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes évocateurs :</strong> métrorragies souvent abondantes et répétées (parfois expulsion de vésicules caractéristiques « en grappe de raisin »), hyperemesis gravidique marqué, utérus mou et plus volumineux que ne le voudrait le terme, absence de bruits du cœur fœtal (forme complète), signes de prééclampsie précoce (&lt;20 SA — évocateur), kystes ovariens lutéiniques bilatéraux</li>
      <li><strong>Diagnostic :</strong> β-hCG plasmatiques très élevées (souvent &gt;100 000 UI/L), échographie pelvienne caractéristique (image en « tempête de neige » ou « nid d'abeille », absence d'embryon ou embryon malformé avec placenta hydropique)</li>
      <li><strong>Prise en charge de l'hémorragie active :</strong> 2 VVP de gros calibre, bilan (NFS, coagulation, groupe/Rh/RAI), remplissage vasculaire, transfusion précoce si choc hémorragique — l'hémorragie peut être brutale et sévère, notamment au moment de l'évacuation utérine</li>
      <li><strong>Évacuation utérine par aspiration</strong> (méthode de référence) dès stabilisation hémodynamique, sous couverture utérotonique (Oxytocine) débutée pendant le geste pour limiter le saignement — à réaliser en milieu équipé pour transfusion en urgence compte tenu du risque hémorragique et de perforation utérine (utérus fragile)</li>
      <li><strong>Immunoglobulines anti-D (Rhophylac®)</strong> 200 µg (1000 UI) IM si mère Rhésus négatif, idéalement dans les 72h</li>
      <li><strong>Rechercher des complications associées</strong> aux formes évoluées/volumineuses : prééclampsie précoce, hyperthyroïdie (l'hCG a une activité thyréotrope croisée), détresse respiratoire aiguë (embolisation trophoblastique pulmonaire, rare mais décrite lors de l'évacuation de môles volumineuses)</li>
      <li><strong>Suivi post-évacuation impératif</strong> (à organiser avec l'équipe obstétricale/oncologique) : décroissance hebdomadaire puis mensuelle des β-hCG jusqu'à négativation, contraception efficace pendant toute la surveillance (6-12 mois) — risque de tumeur trophoblastique gestationnelle persistante/choriocarcinome nécessitant une chimiothérapie si les β-hCG plafonnent ou remontent</li>
    </ol>
  </div>

  <div class="card" id="proto-map-tocolyse">
    <h3>⏱️ Menace d'accouchement prématuré (MAP) et tocolyse</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Contractions utérines régulières associées à des modifications cervicales entre 22 et 36 SA + 6 jours. L'objectif de la prise en charge n'est pas d'arrêter indéfiniment le travail mais de <strong>gagner le temps nécessaire</strong> à la corticothérapie de maturation pulmonaire fœtale et, si besoin, au transfert vers une structure adaptée au terme (in utero de préférence à un transfert néonatal).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Confirmer le diagnostic :</strong> contractions utérines régulières et douloureuses (≥1 toutes les 10 min pendant ≥30 min) + modifications cervicales (raccourcissement/ouverture au toucher vaginal, ou longueur cervicale &lt;25 mm à l'échographie endovaginale si disponible)</li>
      <li><strong>Éliminer une cause/un facteur déclenchant à traiter spécifiquement :</strong> infection urinaire (ECBU systématique), chorioamniotite (fièvre, tachycardie fœtale — contre-indique la tocolyse, cf. protocole sepsis puerpéral), hématome rétro-placentaire, rupture prématurée des membranes, béance cervicale, grossesse multiple, malformation utérine</li>
      <li><strong>Corticothérapie de maturation pulmonaire fœtale — priorité absolue</strong> entre 24 et 34 SA (à discuter au cas par cas jusqu'à 36 SA+6j selon contexte) : <strong>Bétaméthasone (Célestène Chronodose®)</strong> 12 mg IM, 2 injections à 24h d'intervalle, ou <strong>Dexaméthasone</strong> 6 mg IM toutes les 12h (4 doses) selon disponibilité — bénéfice materno-fœtal majeur (réduction de la mortalité néonatale, du syndrome de détresse respiratoire, de l'hémorragie intraventriculaire)</li>
      <li><strong>Tocolyse de 1ère intention</strong> (objectif : 48h pour laisser le temps à la corticothérapie d'agir, pas au-delà sauf situation particulière) :
        <ul style="margin-top:6px; margin-left:16px; line-height:1.9;">
          <li><strong>Nifédipine (Adalate®)</strong> PO — <strong>dose de charge :</strong> 20 mg PO, à renouveler une fois après 30 min si les contractions persistent (max 2 doses de charge, soit 40 mg dans la 1ère heure) ; <strong>entretien :</strong> 20 mg PO toutes les 4 à 8h (forme LP) — <strong>dose maximale : 160 mg/24h</strong>, durée max 48h ; surveillance TA/FC (risque d'hypotension, notamment si association à un autre antihypertenseur/sulfate de magnésium)</li>
          <li><strong>Atosiban (Tractocile®)</strong> IV — antagoniste de l'ocytocine, schéma en 3 étapes : <strong>1) bolus initial</strong> 6,75 mg IV (0,9 mL de solution à 7,5 mg/mL) en 1 min ; <strong>2) perfusion de charge</strong> 18 mg/h (300 µg/min = 24 mL/h de la solution à 7,5 mg/mL diluée) pendant 3h ; <strong>3) perfusion d'entretien</strong> 6 mg/h (100 µg/min = 8 mL/h) pendant jusqu'à 45h — <strong>durée totale maximale : 48h</strong>, cure unique (retraitement possible si récidive selon RCP) ; meilleur profil de tolérance cardiovasculaire que la Nifédipine mais coût nettement plus élevé</li>
        </ul>
        Efficacité comparable entre les deux molécules à 48h ; choix selon disponibilité, tolérance et comorbidités (préférer Atosiban si cardiopathie/mauvaise tolérance hémodynamique à la Nifédipine)
      </li>
      <li><strong>Contre-indications à la tocolyse</strong> (ne pas retarder l'accouchement dans ces situations) : chorioamniotite, HRP, éclampsie/prééclampsie sévère, mort fœtale in utero, anomalie sévère du rythme cardiaque fœtal, hémorragie maternelle sévère, terme &gt;34-36 SA selon les équipes</li>
      <li><strong>Sulfate de magnésium à visée de neuroprotection fœtale</strong> (et non tocolytique à cette dose) si accouchement prématuré imminent avant 32 SA : schéma de charge puis entretien identique/proche du protocole éclampsie — réduit le risque de paralysie cérébrale chez le prématuré</li>
      <li><strong>Antibioprophylaxie</strong> si suspicion de rupture prématurée des membranes associée (cf. protocoles spécifiques) — ne pas donner d'antibiotiques systématiques en l'absence de rupture des membranes ou d'infection identifiée</li>
      <li>Repos relatif (l'alitement strict prolongé n'est plus recommandé en routine — risque thromboembolique), surveillance du bien-être fœtal, organisation du transfert in utero vers une maternité de niveau adapté au terme si nécessaire</li>
    </ol>
  </div>

  <div class="card" id="proto-violences-sexuelles">
    <h3>⚖️ Violences sexuelles — prise en charge médico-légale et somatique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Prise en charge à double objectif indissociable : soins somatiques/psychologiques immédiats et préservation des éléments médico-légaux, sans que l'un ne retarde l'autre. L'accueil doit se faire dans un lieu calme et confidentiel, par un soignant si possible formé, avec le consentement éclairé de la personne à chaque étape de l'examen.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Priorité aux urgences vitales</strong> (lésions traumatiques associées, hémorragie) avant tout examen médico-légal — la stabilisation somatique prime toujours</li>
      <li><strong>Recueil du consentement éclairé</strong> à chaque étape (examen, prélèvements, dépôt de plainte, réquisition) — respecter le rythme et les refus de la personne, l'examen ne doit jamais être imposé</li>
      <li><strong>Anamnèse structurée</strong> (circonstances, type(s) d'agression, délai depuis les faits, antécédents gynéco-obstétricaux, statut vaccinal) — consigner les propos rapportés entre guillemets, éviter les termes interprétatifs</li>
      <li><strong>Examen clinique complet</strong> : lésions traumatiques générales (à photographier/schématiser avec accord), examen gynécologique (lésions génitales, anales) réalisé avec délicatesse, un seul examinateur si possible pour limiter les touchers répétés</li>
      <li><strong>Préservation des prélèvements médico-légaux</strong> (kit d'agression sexuelle si disponible) le plus précocement possible (idéalement &lt;72h, utile au-delà selon le type de prélèvement) : prélèvements buccaux/vaginaux/anaux/cutanés à visée de recherche de sperme/ADN, avant toute toilette intime — respecter la chaîne de conservation (traçabilité, scellés) pour la recevabilité judiciaire</li>
      <li><strong>Contraception d'urgence</strong> si rapport à risque de grossesse, dans les délais les plus brefs (efficacité décroissante avec le temps) — <strong>Lévonorgestrel</strong> 1,5 mg PO dose unique (efficace jusqu'à 72h, utilisable avec efficacité réduite jusqu'à 96h) ou <strong>Ulipristal acétate (Ellaone®)</strong> 30 mg PO dose unique (efficace jusqu'à 120h/5 jours, à privilégier au-delà de 72h) selon disponibilité et délai</li>
      <li><strong>Prophylaxie post-exposition VIH</strong> à évaluer sans délai selon le contexte (statut de l'agresseur si connu, type de rapport, délai — idéalement &lt;4h, possible jusqu'à 48-72h) : trithérapie <strong>Ténofovir/Lamivudine/Dolutégravir (TDF 300 mg/3TC 300 mg/DTG 50 mg — combinaison fixe « TLD »)</strong> 1 comprimé/jour pendant 28 jours ; <strong>prophylaxie des IST</strong> en prise unique — <strong>Ceftriaxone</strong> 500 mg IM (gonocoque) + <strong>Azithromycine</strong> 1 g PO (Chlamydia) + <strong>Métronidazole</strong> 2 g PO (Trichomonas) ; syphilis dépistée puis traitée si sérologie positive (<strong>Benzathine benzylpénicilline</strong> 2,4 MUI IM dose unique) ; <strong>rappel vaccinal antitétanique</strong> si lésions cutanéo-muqueuses</li>
      <li><strong>Soutien psychologique immédiat</strong> et orientation vers un suivi spécialisé (psychotraumatologie) — proposer systématiquement, sans l'imposer ; information sur les droits (dépôt de plainte à tout moment, y compris différé, associations d'aide aux victimes)</li>
      <li><strong>Rédaction d'un certificat médical initial descriptif</strong> (constatations objectives, sans jugement de valeur ni conclusion sur la réalité des faits qui ne relève pas du rôle médical), remis à la personne ou transmis selon réquisition judiciaire</li>
    </ol>
  </div>

  <div class="card" id="proto-pancreatite">
    <h3>🟠 Pancréatite aiguë</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Inflammation aiguë du pancréas, le plus souvent d'origine biliaire (lithiase) ou alcoolique. Diagnostic retenu devant <strong>au moins 2 critères sur 3</strong> : douleur épigastrique/hypochondre gauche typique (transfixiante, irradiant dans le dos), lipasémie &gt;3x la limite supérieure de la normale, et/ou imagerie évocatrice. La majorité des formes sont bénignes, mais 15-20% évoluent vers une forme sévère avec défaillance d'organe.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Bilan étiologique initial :</strong> échographie abdominale (lithiase vésiculaire/voie biliaire), interrogatoire (alcool), triglycéridémie, calcémie, revue des médicaments récents</li>
      <li><strong>Évaluation de la gravité :</strong> aucun score isolé n'est totalement fiable, mais des critères précoces doivent alerter — SIRS à l'admission, urée/BUN élevée ou en hausse, hématocrite &gt;44%, obésité, âge avancé, comorbidités, épanchement pleural ou infiltrat pulmonaire ; toute défaillance d'organe impose une surveillance en unité monitorée/soins intensifs</li>
      <li><strong>Remplissage vasculaire :</strong> cristalloïdes équilibrés — <strong>Ringer Lactate</strong> à privilégier, débuté à 1,5 mL/kg/h (bolus initial de 10 mL/kg si hypovolémie clinique), avec réévaluation fréquente (diurèse, fréquence cardiaque, lactates) — un remplissage modéré et individualisé est désormais recommandé, un remplissage agressif étant associé à un surcroît de défaillance d'organe et de complications pulmonaires/rénales ; réduire les apports après 48h</li>
      <li><strong>Alimentation précoce :</strong> reprise d'une alimentation orale pauvre en graisses dès que tolérée, dans les 24-48h (ne plus attendre la normalisation de la lipase) — la mise à jeun prolongée n'est plus recommandée ; nutrition entérale par sonde si intolérance orale prolongée, à privilégier sur la nutrition parentérale</li>
      <li><strong>Antalgie :</strong> <strong>Paracétamol (Perfalgan® IV)</strong> 1 g toutes les 6h en 1ère intention, <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3 mg IV toutes les 5-10 min si douleur intense non contrôlée — pas de restriction particulière des opioïdes</li>
      <li><strong>Antibiothérapie non systématique</strong> — réservée à une infection documentée (nécrose infectée, angiocholite associée, bactériémie) ; l'antibioprophylaxie de routine n'a pas démontré de bénéfice</li>
      <li><strong>Angiocholite associée / lithiase de la voie biliaire principale enclavée</strong> (fièvre, ictère, douleur) : CPRE en urgence (&lt;24-48h)</li>
      <li>Prévention de la récidive biliaire : cholécystectomie à programmer durant la même hospitalisation pour les formes légères d'origine biliaire (réduit le risque de récidive/complication)</li>
      <li><strong>Surveillance des complications :</strong> nécrose pancréatique (à suspecter si aggravation ou absence d'amélioration après 5-7 jours), pseudokyste, insuffisance rénale aiguë, SDRA, hyperglycémie — reconsulter/réévaluer en urgence en cas de dégradation clinique</li>
    </ol>
  </div>

  <div class="card" id="proto-rage">
    <h3>🐕 Rage — Prise en charge post-exposition</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Contexte Madagascar :</strong> zone d'enzootie rabique canine — toute morsure, griffure ou léchage sur peau lésée/muqueuse par un animal suspect (notamment chien errant) doit être évaluée sans délai. La rage est mortelle à quasi 100% une fois les symptômes déclarés, mais entièrement évitable par une prophylaxie post-exposition (PPE) bien conduite et précoce.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Catégorie OMS</th><th>Type de contact</th><th>Conduite</th></tr>
      <tr><td class="leger">I</td><td>Contact ou alimentation de l'animal, léchage sur peau intacte</td><td>Aucune PPE si l'anamnèse est fiable</td></tr>
      <tr><td class="modere">II</td><td>Peau découverte mordillée, griffure ou érosion sans saignement</td><td>Vaccination seule, sans délai</td></tr>
      <tr><td class="grave">III</td><td>Morsure(s)/griffure(s) transdermique(s) uniques ou multiples, léchage sur peau lésée ou muqueuse, contact avec une chauve-souris</td><td>Vaccination + immunoglobulines antirabiques</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Nettoyage immédiat de la plaie</strong> : lavage abondant au savon et à l'eau courante pendant <strong>15 minutes minimum</strong>, puis application d'un antiseptique (povidone iodée) — geste le plus efficace pour réduire la charge virale, à ne jamais différer même si la PPE n'est pas immédiatement disponible</li>
      <li><strong>Ne pas suturer d'emblée</strong> la plaie (favorise la diffusion du virus le long des trajets nerveux), sauf nécessité hémostatique/esthétique impérative — si suture indispensable, réaliser après infiltration des immunoglobulines et attendre si possible</li>
      <li><strong>Vaccination antirabique (Verorab®)</strong> — schéma recommandé par l'OMS depuis 2018 : <strong>schéma Essen à 4 doses IM</strong> (J0-J3-J7-J14), qui remplace désormais le schéma classique à 5 doses ; alternative acceptée : schéma Zagreb 2-1-1 (2 doses J0, puis 1 dose J7 et 1 dose J21)</li>
      <li><strong>Catégorie III :</strong> <strong>Immunoglobulines antirabiques (Imogam Rage® humaines ou Favirab® équines)</strong> — 20 UI/kg (humaines) ou 40 UI/kg (équines), infiltrées autour et dans la plaie autant que le volume le permette, le reste en IM à distance ; <strong>toujours en un site différent</strong> du vaccin, administrées idéalement le jour J0 (possible jusqu'à J7 après la 1ère dose de vaccin si non disponible initialement)</li>
      <li><strong>Prévention antitétanique</strong> systématique selon le statut vaccinal, et antibioprophylaxie (<strong>Amoxicilline-Acide clavulanique — Augmentin®</strong>) pour les morsures à risque infectieux élevé</li>
      <li><strong>Ne jamais différer la PPE</strong> dans l'attente d'observation de l'animal, sauf exception : un chien ou chat domestique apparemment sain, identifiable et observable peut être surveillé 10 jours — si l'animal reste vivant et asymptomatique à J10, la PPE peut être interrompue ; en cas de doute ou d'animal errant/sauvage/non retrouvé, la PPE complète doit être menée à son terme</li>
      <li><strong>Une fois les symptômes rabiques déclarés</strong> (agitation, hydrophobie, paralysie) : aucun traitement curatif disponible, prise en charge exclusivement palliative — isolement du patient et précautions contact/gouttelettes pour protéger le personnel soignant (salive hautement contaminante)</li>
    </ol>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">Voir aussi le protocole <strong>Plaies et morsures</strong> pour la prise en charge locale complète de la plaie.</p>
  </div>

  <div class="card" id="proto-cholera">
    <h3>🚱 Choléra / Diarrhée aiguë sévère avec déshydratation</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Diarrhée aqueuse profuse d'apparition brutale ("eau de riz"), pouvant entraîner une déshydratation sévère et un choc hypovolémique fatal en quelques heures. Contexte épidémique récurrent à Madagascar — priorité absolue à la réhydratation rapide, avant même la confirmation étiologique.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Plan OMS</th><th>Degré de déshydratation</th><th>Conduite</th></tr>
      <tr><td class="leger">A</td><td>Absente/minime</td><td>SRO à domicile après chaque selle liquide</td></tr>
      <tr><td class="modere">B</td><td>Modérée (soif, yeux légèrement enfoncés, pli cutané lent)</td><td>SRO 75 mL/kg sur 4h en structure de soins, réévaluation</td></tr>
      <tr><td class="grave">C</td><td>Sévère (léthargie/inconscience, incapable de boire, pli cutané très lent ≥2 sec, pouls radial faible/absent)</td><td>Réhydratation IV en urgence</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Déshydratation sévère (Plan C) :</strong> <strong>Ringer Lactate IV</strong>, 100 mL/kg au total (sérum salé 0,9% en 2e choix si RL indisponible ; jamais de soluté glucosé seul, qui ne corrige pas l'acidose) — schéma adulte/enfant ≥1 an : <strong>30 mL/kg en 30 min</strong> (répéter une fois si le pouls radial reste faible/imperceptible) puis <strong>70 mL/kg sur les 2h30 suivantes</strong> (total 3h) ; nourrisson &lt;1 an : 30 mL/kg en 1h puis 70 mL/kg sur 5h (total 6h)</li>
      <li>Réévaluer toutes les 15-30 minutes jusqu'à obtention d'un pouls radial fort, puis au moins toutes les heures — accélérer le débit si le pouls reste faible</li>
      <li>Dès que le patient peut boire (souvent après 3-4h) : reprendre le <strong>SRO</strong> en complément, 500-1000 mL/h selon tolérance, en plus ou en relais de la perfusion, et reprise de l'alimentation</li>
      <li><strong>Antibiothérapie</strong> réservée aux formes sévères (raccourcit la durée de la diarrhée et l'excrétion du vibrion) : <strong>Doxycycline</strong> 300 mg PO en dose unique chez l'adulte (azithromycine 1 g PO dose unique en alternative, notamment si grossesse, enfant &lt;8 ans ou résistance suspectée), à débuter dès que les vomissements sont contrôlés</li>
      <li>Surveiller et corriger une <strong>hypokaliémie</strong> (fréquente, pertes digestives majeures) et une <strong>hypoglycémie</strong> (surtout chez l'enfant dénutri)</li>
      <li>Mesures d'hygiène et d'isolement : lavage des mains, désinfection des selles/vomissements, points d'eau potable et de SRO dédiés — essentiels pour limiter la transmission en contexte épidémique</li>
      <li>Toute diarrhée aiguë sévère fébrile ou avec rectorragie doit faire reconsidérer un autre diagnostic (shigellose, amibiase) — le choléra classique n'est habituellement pas fébrile</li>
    </ol>
  </div>

  <div class="card" id="proto-drepanocytose">
    <h3>🔴 Crise vaso-occlusive drépanocytaire</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Douleur osseuse/articulaire intense chez un patient drépanocytaire connu, déclenchée par le froid, la déshydratation, une infection, un effort ou une hypoxie. Pathologie fréquente en Afrique/Océan Indien — la douleur est souvent sous-estimée et sous-traitée. Rechercher systématiquement une complication grave associée : <strong>syndrome thoracique aigu</strong>, <strong>priapisme</strong>, séquestration splénique aiguë (surtout enfant), AVC (surtout enfant — imagerie cérébrale en urgence si déficit, cf. protocole AVC).</p>

    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">1. Crise vaso-occlusive simple</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Bilan :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>NFS (comparer à l'hémoglobine de base du patient), réticulocytes</li>
      <li>CRP (habituellement augmentée), ionogramme, bilan hépatique</li>
      <li>LDH (augmentées en cas d'hémolyse), Rx thorax</li>
      <li>Hémocultures et BU si fièvre ; β-HCG si femme en âge de procréer</li>
      <li>Scanner/échographie abdominale si CVO abdominale, pour éliminer un diagnostic différentiel chirurgical</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Analgésie — priorité absolue</strong> (1ère dose dans les 30-60 min suivant l'arrivée, ne jamais sous-traiter) :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>MEOPA</strong> (protoxyde d'azote) le plus tôt possible si disponible — équipement souvent limité hors grands centres à Madagascar</li>
      <li><strong>Morphine</strong> IVD titrée : 0,1 mg/kg puis 3 mg toutes les 5 min IVD jusqu'à EVA &lt;4. Si pompe PCA disponible : 2 mg/mL, bolus 2 mg, période réfractaire 10 min (puis 2 min si besoin), dose maximale 45 mg/4h et 270 mg/24h — à défaut de PCA, poursuivre la titration IV répétée avec réévaluation toutes les 30-60 min</li>
      <li>En cas d'échec : <strong>kétamine (Ketalar®)</strong> IVSE 0,15 mg/kg/h, sans dépasser 1 mg/kg/h</li>
      <li>Douleur modérée : <strong>paracétamol</strong> 1 g toutes les 6h ± AINS si pas de contre-indication (insuffisance rénale fréquente sur ce terrain — à vérifier avant prescription)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Hydratation :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Sérum physiologique : 1 L/j sur la 1ère heure</li>
      <li>Puis G5% + 4 g NaCl/L + 2 g KCl/L (ne pas dépasser 2 L/j par voie IV — éviter toute surcharge, risque de syndrome thoracique aigu iatrogène)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Autres traitements :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Acide folique</strong> 5 mg/j PO (2 cp/j)</li>
      <li><strong>Oxygénothérapie</strong> systématique 3 L/min, à adapter selon la SpO2 (non systématique si saturation normale, mais large marge en pratique)</li>
      <li><strong>Hydroxyzine (Atarax®)</strong> 25 à 100 mg/j PO si anxiété</li>
      <li>Fièvre sans point d'appel : <strong>amoxicilline</strong> 1 g/8h IVL (antibiothérapie probabiliste couvrant les germes encapsulés — asplénie fonctionnelle)</li>
      <li>Anticoagulation préventive : <strong>énoxaparine (Lovenox®)</strong> 0,4 mL/j SC</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Surveillance :</strong> TA, FC, SpO2 toutes les 8h ; réévaluation de l'EVA</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Transfusion :</strong> pas de transfusion en urgence sauf avis spécialisé — non systématique dans la CVO simple non compliquée</p>

    <p style="margin-top:14px; font-weight:600; color:var(--accent2);">2. Syndrome thoracique aigu</p>
    <p style="font-size:13.5px; margin-bottom:8px;">Urgence vitale. Définition : association d'au moins 2 critères parmi anomalies auscultatoires pulmonaires, douleur thoracique, anomalies radiologiques pulmonaires (infiltrat).</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Critères de gravité :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Cliniques : FR &gt;30/min ou &lt;10/min, difficulté à parler, troubles de conscience, anomalies auscultatoires étendues, insuffisance cardiaque droite</li>
      <li>Gazométriques : PaO2 &lt;60 mmHg, acidose</li>
      <li>Radiologiques : atteinte pulmonaire étendue</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Bilan :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>NFS, réticulocytes ; CRP (augmentée) ; ionogramme, LDH, BNP si disponible</li>
      <li>Groupe sanguin, RAI, TP-TCA ; GDS</li>
      <li>Hémocultures et ECBU si fièvre ; Rx thorax</li>
      <li>Angioscanner thoracique à la recherche d'une embolie pulmonaire si ≥2 critères parmi : absence de crise douloureuse osseuse concomitante, Hb &gt;8,2 g/dL, plaquettes &gt;440×10⁹/L, PaCO2 &lt;38 mmHg (selon plateau technique disponible)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Hydratation :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Sérum physiologique : 1,5 L/j sur la 1ère heure</li>
      <li>Puis G5% + 4 g NaCl/L + 2 g KCl/L (ne pas dépasser 2 L/j par voie IV)</li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Analgésie</strong> (idem CVO — MEOPA, morphine titrée ± PCA) ; si échec : associer <strong>kétamine (Ketalar®)</strong> 0,15 mg/kg IVSE</p>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Autres traitements :</strong></p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Acide folique 5 mg/j PO</li>
      <li>Oxygénothérapie systématique 3 L/min ou à adapter aux GDS, objectif SpO2 entre 94 et 96%</li>
      <li>Hydroxyzine (Atarax®) 25 à 100 mg/j PO si anxiété</li>
      <li><strong>Antibiothérapie systématique si fièvre</strong> (le syndrome thoracique aigu peut être d'origine infectieuse, embolique ou par infarctus pulmonaire — traiter comme une pneumopathie dans le doute) :
        <ul style="margin-left:18px;">
          <li>Pneumopathie simple : <strong>amoxicilline</strong> 1 g × 3/j IV (si allergie : <strong>lévofloxacine</strong> 500 mg × 2/j PO)</li>
          <li>Pneumopathie avec critères de gravité : <strong>céfotaxime</strong> 1 g × 3/j IVL, associé à un macrolide (<strong>spiramycine</strong> 3 MUI × 3/j, ou <strong>azithromycine</strong> selon disponibilité) pour couvrir les germes atypiques</li>
        </ul>
      </li>
    </ul>
    <p style="font-size:13.5px; margin:6px 0 2px;"><strong>Échange transfusionnel — indications</strong> (avis spécialisé/réanimation) :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Au moins un critère de gravité</li>
      <li>Anémie &lt;6 g/dL</li>
      <li>Femme enceinte ou post-partum immédiat</li>
      <li>Patient en programme transfusionnel au long cours</li>
      <li>Absence d'amélioration après 72 heures</li>
      <li>Sepsis grave ; période postopératoire</li>
    </ul>

    <p style="margin-top:14px; font-weight:600; color:var(--accent2);">3. Priapisme</p>
    <p style="font-size:13.5px; margin-bottom:8px;">Urgence urologique — le pronostic fonctionnel dépend de la rapidité de prise en charge.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Bilan :</strong> NFS-plaquettes, TP-TCA, ionogramme, créatininémie</li>
      <li><strong>Mise en condition :</strong> voie veineuse (sérum physiologique 500 mL/24h), scope, PANI</li>
      <li><strong>De 1ère intention (entre 30 min et 4h) — petits moyens :</strong> exercice musculaire (flexion-extension des cuisses, montée-descente d'escalier) pour induire un vol vasculaire, douche froide, application de glace</li>
      <li><strong>Si échec ou après 4h :</strong> appel urologue en urgence ; gazométrie sur sang intracaverneux (souffrance anoxique si PaO2 &lt;30 mmHg, PaCO2 &gt;60 mmHg, pH &lt;7,25) ; ponction caverneuse (perpendiculaire et latérale à la verge, seringue de 50 mL, après anesthésie locale) avec évacuation du sang noir jusqu'à retour de sang rouge</li>
      <li><strong>Injection intracaverneuse d'un vasoconstricteur</strong> — <strong>étiléfrine (Effortil®)</strong> 2 mg (1 ampoule de 1 mL = 10 mg, diluer dans une seringue à insuline), répétable toutes les 10 min pendant la 1ère heure si échec, dose maximale 10 mg (après avis urologue). Si étiléfrine non disponible : <strong>adrénaline</strong> fortement diluée (10-20 µg par injection intracaverneuse) peut être utilisée en alternative selon avis urologique, sous surveillance tensionnelle/ECG</li>
      <li><strong>Si échec :</strong> chirurgie urologique — shunt uni ou bilatéral</li>
    </ol>

    <p style="margin-top:10px; font-size:13px; color:var(--muted);"><strong>Ordonnance de sortie</strong> (CVO simple résolutive) : acide folique (Spéciafoldine®) 5 mg/j, antalgie par paracétamol 1 à 4 g/j, hydratation orale abondante. Voir aussi le protocole AVC pour la prise en charge de l'AVC drépanocytaire.</p>
  </div>

  <div class="card" id="proto-accident-transfusionnel">
    <h3>🩸 Accident transfusionnel aigu</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les recommandations AABB (Association for the Advancement of Blood & Biotherapies). Tout symptôme nouveau pendant ou dans les heures suivant une transfusion doit faire évoquer un accident transfusionnel et faire arrêter la transfusion par précaution, même en cas de doute.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Geste réflexe immédiat devant tout symptôme suspect</strong> : <strong>arrêter la transfusion</strong> sans la débrancher (garder la voie veineuse avec du NaCl 0,9% sur une tubulure séparée), surveillance rapprochée (scope, PA, SpO2, température), prévenir le médecin</li>
      <li><strong>Vérifier immédiatement la concordance</strong> : identité du patient, groupe sanguin/Rh, numéro de poche, compatibilité — la cause la plus fréquente et la plus grave (hémolyse aiguë) résulte d'une erreur d'attribution de poche</li>
      <li><strong>Réaction hémolytique aiguë</strong> (incompatibilité ABO) : fièvre/frissons brutaux, douleur lombaire, douleur au point de perfusion, hypotension/choc, hémoglobinurie (urines rouge-brun), CIVD, insuffisance rénale aiguë — <strong>urgence vitale</strong> : arrêt immédiat et définitif de la poche, remplissage vasculaire pour maintenir une diurèse &gt;100 mL/h (protection rénale), alcalinisation des urines si disponible, renvoyer la poche + un tube de sang du patient au laboratoire (groupage, RAI, test de Coombs direct, recherche d'hémolyse), traitement du choc/CIVD associé</li>
      <li><strong>Réaction fébrile non hémolytique</strong> (la plus fréquente, bénigne) : fièvre/frissons isolés sans signe de gravité — arrêter transitoirement la transfusion, <strong>Paracétamol</strong> 1g, éliminer une réaction plus grave avant de reprendre prudemment (souvent poursuivie à débit ralenti sous surveillance après avis médical)</li>
      <li><strong>Réaction allergique/anaphylactique</strong> : urticaire isolée légère → antihistaminique (<strong>Déxchlorphéniramine — Polaramine®</strong> 5 mg IV/IM) et reprise prudente possible ; si bronchospasme/angio-œdème/hypoTA → arrêt définitif, prise en charge complète de l'anaphylaxie (<em>voir protocole dédié</em> — adrénaline IM sans délai si critères remplis)</li>
      <li><strong>TRALI</strong> (Transfusion-Related Acute Lung Injury) : détresse respiratoire aiguë hypoxémiante brutale pendant ou dans les 6h suivant la transfusion, infiltrats pulmonaires bilatéraux à la radiographie, <strong>sans surcharge volémique</strong> (distinct du TACO) — traitement symptomatique : oxygénothérapie/ventilation selon sévérité (proche de la prise en charge du SDRA), arrêt définitif de la poche en cause, signalement pour traçabilité du donneur</li>
      <li><strong>TACO</strong> (surcharge volémique post-transfusionnelle) : dyspnée, orthopnée, crépitants, hypertension, distension jugulaire, souvent chez un patient âgé/insuffisant cardiaque ou après transfusion trop rapide — traitement identique à l'OAP cardiogénique (<strong>Furosémide — Lasilix®</strong>, position demi-assise, oxygène) ; prévention par un débit de transfusion ralenti chez les sujets à risque</li>
      <li><strong>Contamination bactérienne de la poche</strong> (rare, surtout concentrés plaquettaires) : fièvre élevée brutale, frissons, choc septique précoce — arrêt immédiat, hémocultures (patient + poche), antibiothérapie probabiliste large spectre sans délai (cf. protocole sepsis)</li>
      <li><strong>Toute réaction transfusionnelle doit être déclarée</strong> selon le circuit d'hémovigilance local, avec conservation de la poche et de la tubulure pour analyse</li>
    </ol>
  </div>

  <div class="card" id="proto-organophosphores">
    <h3>🌾 Intoxication aux organophosphorés / carbamates (pesticides)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Syndrome cholinergique par inhibition de l'acétylcholinestérase, très fréquent en milieu agricole malgache (ingestion volontaire ou accidentelle). Pronostic vital engagé principalement par la détresse respiratoire (bronchorrhée, paralysie des muscles respiratoires).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Protection du personnel AVANT tout contact</strong> : gants, tablier imperméable, éviter tout contact cutané avec les vêtements souillés, les vomissements ou le liquide gastrique — des cas documentés de contamination secondaire de soignants existent</li>
      <li><strong>Décontamination cutanée immédiate</strong> : retrait complet des vêtements contaminés, lavage abondant à l'eau et au savon ; ne jamais réaliser de lavage gastrique sans protection adaptée</li>
      <li><strong>ABCDE</strong> : aspiration des sécrétions, oxygénothérapie, <strong>intubation précoce</strong> si détresse respiratoire ou trouble de conscience — éviter la <strong>succinylcholine</strong> (métabolisée par les cholinestérases, effet imprévisible et prolongé), préférer un curare non dépolarisant</li>
      <li><strong>Reconnaître le syndrome cholinergique</strong> : myosis serré, hypersécrétions (bronchorrhée, sialorrhée, sueurs profuses, larmoiement), bradycardie, fasciculations musculaires, diarrhée, confusion, convulsions</li>
      <li><strong>Atropine IV (Atropine Aguettant®)</strong> : 1-2 mg (enfant : 0,02 mg/kg), <strong>doses doublées toutes les 5 minutes</strong> jusqu'à assèchement des sécrétions bronchiques et disparition du bronchospasme (pas de cible de fréquence cardiaque) — les doses cumulées nécessaires peuvent être très élevées (plusieurs dizaines de mg), sans plafond fixe</li>
      <li><strong>Pralidoxime (Contrathion®)</strong> si disponible : bolus initial 1-2 g IV lent (15-30 min), puis perfusion continue 400-600 mg/h chez l'adulte (10-20 mg/kg/h chez l'enfant) — d'autant plus efficace si débuté précocement (idéalement &lt;24-48h), à poursuivre tant que les signes cholinergiques/besoins en atropine persistent ; toujours associé à l'atropine, jamais en monothérapie</li>
      <li><strong>Benzodiazépines (Diazépam — Valium®)</strong> en cas de convulsions ou d'agitation associée</li>
      <li><strong>Médicaments contre-indiqués</strong> : morphine, théophylline/aminophylline, phénothiazines (aggravent la toxicité cholinergique et la dépression respiratoire)</li>
