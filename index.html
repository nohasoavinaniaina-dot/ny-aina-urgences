      <li><strong>Antibiothérapie en urgence, sans attendre la confirmation bactériologique</strong> :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Antibiotique</th><th>Posologie</th></tr>
      <tr><td><strong>Streptomycine</strong> (référence historique OMS)</td><td>1g x2/j IM, pendant 10 jours (15mg/kg x2/j chez l'enfant)</td></tr>
      <tr><td><strong>Gentamicine (Gentalline®)</strong> — alternative plus disponible</td><td>5mg/kg/j IM/IV en 1 injection, pendant 10 jours</td></tr>
      <tr><td><strong>Doxycycline (Doxypalu®/Vibramycine®)</strong></td><td>100mg x2/j per os, pendant 10 jours (formes non graves)</td></tr>
      <tr><td><strong>Ciprofloxacine (Ciflox®)</strong></td><td>500-750mg x2/j per os ou 400mg x2/j IV, pendant 10 jours</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Prélèvements avant traitement si possible</strong> — ponction du bubon, hémocultures, prélèvement respiratoire (forme pulmonaire), sans retarder l'antibiothérapie en cas de forme grave</li>
      <li><strong>Signalement immédiat</strong> à la Direction de Veille Sanitaire et de Surveillance Épidémiologique (autorités sanitaires malgaches) — enquête épidémiologique, recherche et prophylaxie post-exposition des sujets contacts (<strong>Doxycycline</strong> 100mg x2/j per os pendant 7 jours)</li>
      <li>Prise en charge symptomatique du choc septique/CIVD selon protocoles dédiés en cas de forme sévère</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : la Gentalline® et la Ciflox® sont largement disponibles à tous les niveaux de soins (LNMEIS). La Streptomycine, historiquement de référence, est devenue plus difficile à trouver (usage antituberculeux en déclin) — la Gentamicine ou la Ciprofloxacine sont les alternatives à privilégier en pratique courante. La Doxycycline est disponible en formulation générique peu coûteuse.</p>
  </div>

  <div class="card" id="proto-dengue">
    <h3>🦟 Dengue grave / Syndrome de choc dengue</h3>
    <p style="font-weight:600; color:var(--accent2); margin-bottom:6px;">Signes d'alerte (à rechercher activement, en particulier à la défervescence, J3-J7) :</p>
    <p style="font-size:13.5px;">🔹 Douleur abdominale intense 🔹 Vomissements persistants 🔹 Saignements des muqueuses 🔹 Léthargie/agitation 🔹 Hépatomégalie douloureuse 🔹 Élévation de l'hématocrite avec chute rapide des plaquettes</p>
    <table style="margin-top:10px;">
      <tr><th>Forme</th><th>Conduite</th></tr>
      <tr><td class="grave">Choc dengue (fuite plasmatique sévère)</td><td>Remplissage vasculaire prudent et titré — <strong>Ringer Lactate/NaCl 0,9% (Baxter®)</strong> 10-20 mL/kg en 1h puis réévaluation, ajusté selon l'hématocrite et la clinique — risque de surcharge si remplissage excessif car la fuite capillaire peut se résoudre brutalement</td></tr>
      <tr><td class="grave">Hémorragies sévères</td><td>Transfusion (CNTS) selon signes cliniques (pas seulement sur le chiffre de plaquettes) — éviter les injections IM et l'aspirine/AINS (majoration du risque hémorragique)</td></tr>
      <tr><td class="modere">Atteinte d'organe</td><td>Surveillance hépatique (hépatite grave), cardiaque (myocardite), neurologique (encéphalopathie)</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Surveillance biologique répétée</strong> — NFS/hématocrite toutes les 6-12h en phase critique, ionogramme, bilan hépatique</li>
      <li><strong>Antipyrétique : Paracétamol (Doliprane®/Efferalgan®) uniquement</strong> — 15mg/kg toutes les 6h chez l'enfant (max 60mg/kg/j), 1g x4/j chez l'adulte (max 4g/j) — contre-indication formelle de l'aspirine (Aspégic®) et des AINS</li>
      <li>Phase critique (défervescence) = période de plus haut risque, même si le patient semble s'améliorer cliniquement sur le plan fébrile</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Doliprane®/Efferalgan® et les solutés de remplissage (Baxter®) sont disponibles à tous les niveaux. Aucun traitement antiviral spécifique n'existe — la prise en charge repose entièrement sur la surveillance et le remplissage titré, réalisables même en structure de base à condition d'une évaluation clinique répétée rigoureuse.</p>
  </div>

  <div class="card" id="proto-leptospirose">
    <h3>💧 Leptospirose sévère</h3>
    <p class="module-sub" style="margin-bottom:8px;">Zoonose bactérienne (contact avec eau/sol souillés par urine de rongeurs) — forme sévère = syndrome de Weil (ictère + insuffisance rénale + hémorragies), fréquente en saison des pluies/après cyclones à Madagascar.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Suspecter devant</strong> — fièvre élevée brutale, myalgies intenses (mollets), céphalées, hyperhémie conjonctivale, contexte d'exposition à l'eau douce/inondation/activité agricole ou rizicole</li>
      <li><strong>Rechercher les signes de gravité</strong> — ictère franc, oligo-anurie, hémorragies (pulmonaires — hémoptysies graves possibles, digestives, cutanéo-muqueuses), détresse respiratoire</li>
      <li><strong>Antibiothérapie précoce</strong> :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Forme</th><th>Antibiotique</th><th>Posologie</th></tr>
      <tr><td>Sévère (hospitalisée)</td><td>Pénicilline G</td><td>1,5 MUI IV toutes les 6h, pendant 7 jours</td></tr>
      <tr><td></td><td>ou Ceftriaxone (Rocéphine®)</td><td>1-2g/j IV en 1 injection, pendant 7 jours</td></tr>
      <tr><td>Non compliquée</td><td>Doxycycline (Doxypalu®/Vibramycine®)</td><td>100mg x2/j per os, pendant 7 jours</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Support d'organe selon les défaillances</strong> — épuration extra-rénale si insuffisance rénale aiguë sévère (accès limité, cf protocole EER), ventilation mécanique si hémorragie pulmonaire/SDRA</li>
      <li>Réaction de Jarisch-Herxheimer possible en début de traitement (aggravation transitoire) — surveillance rapprochée à l'instauration de l'antibiothérapie</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Rocéphine® et Doxycycline sont largement disponibles à tous les niveaux hospitaliers (LNMEIS). La Pénicilline G est également accessible mais de moins en moins utilisée au profit de la Ceftriaxone, plus simple d'administration (1 injection/jour).</p>
  </div>

  <div class="card" id="proto-typhoide">
    <h3>🦠 Fièvre typhoïde compliquée</h3>
    <table>
      <tr><th>Complication</th><th>Signes / Conduite</th></tr>
      <tr><td class="grave">Perforation digestive (iléale)</td><td>Douleur abdominale brutale, défense/contracture, généralement en 2e-3e semaine d'évolution → chirurgie en urgence après réanimation hémodynamique et antibiothérapie</td></tr>
      <tr><td class="grave">Hémorragie digestive</td><td>Méléna/hématochézie sur ulcération des plaques de Peyer → transfusion selon besoin, surveillance rapprochée</td></tr>
      <tr><td class="modere">Encéphalopathie typhoïdique</td><td>Confusion, obnubilation ("typhos") → réévaluer la profondeur du sepsis, rechercher une complication associée</td></tr>
      <tr><td class="modere">Choc septique</td><td>Prise en charge selon protocole sepsis/choc septique dédié</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Antibiothérapie adaptée</strong> — <strong>Ceftriaxone (Rocéphine®)</strong> 2g/j IV en 1 injection (50-75mg/kg/j chez l'enfant) en 1re intention dans les formes sévères (résistances aux fluoroquinolones fréquentes), durée 10-14 jours ; <strong>Azithromycine (Zithromax®)</strong> 500mg/j per os (20mg/kg/j chez l'enfant) pendant 5-7 jours en alternative dans les formes non compliquées</li>
      <li><strong>Corticothérapie à discuter</strong> dans les formes les plus sévères avec troubles de conscience — <strong>Dexaméthasone (Soludécadron®)</strong> 3mg/kg en dose de charge puis 1mg/kg toutes les 6h pendant 48h (schéma historique)</li>
      <li>Hémocultures et coproculture avant antibiothérapie si possible, sans retarder le traitement en cas de forme grave</li>
      <li>Toute défense abdominale chez un patient fébrile doit faire évoquer une perforation typhoïdique, pathologie encore fréquente à Madagascar</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Rocéphine® est disponible à tous les niveaux hospitaliers et constitue le traitement de référence local, les résistances à la Ciflox® étant significatives. Le Zithromax® est disponible en pharmacie privée des grandes villes.</p>
  </div>

  <div class="card" id="proto-malnutrition">
    <h3>🍼 Malnutrition aiguë sévère de l'enfant (protocole OMS)</h3>
    <div class="warn-box">⚠️ Risque majeur de syndrome de renutrition inappropriée ("refeeding syndrome") — la renutrition doit être prudente et progressive, jamais agressive.</div>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Diagnostic</strong> — périmètre brachial &lt;115mm, rapport poids/taille &lt;-3 DS, œdèmes bilatéraux (kwashiorkor) chez l'enfant de 6-59 mois</li>
      <li><strong>Rechercher les signes de danger immédiat</strong> — choc, léthargie/coma, convulsions, déshydratation sévère, hypoglycémie, hypothermie, infection sévère associée</li>
      <li><strong>Traiter/prévenir l'hypoglycémie</strong> systématiquement — Glucosé 10% 5mL/kg per os ou en sonde nasogastrique si &lt;3 mmol/L (ou 5mL/kg IV si voie orale impossible), alimentation fréquente (toutes les 2-3h, jour et nuit)</li>
      <li><strong>Traiter/prévenir l'hypothermie</strong> — réchauffement, contact peau à peau, éviter l'exposition</li>
      <li><strong>Réhydratation prudente si déshydratation</strong> — soluté de réhydratation spécifique <strong>ReSoMal</strong> (formule OMS pour enfant malnutri) 5mL/kg toutes les 30 min pendant 2h, puis 5-10mL/kg/h, distribué via les programmes nationaux de nutrition</li>
      <li><strong>Antibiothérapie systématique à large spectre</strong> — <strong>Amoxicilline (Clamoxyl®)</strong> 25mg/kg x2/j per os en 1re ligne pendant 5 jours ; <strong>Ampicilline 50mg/kg IV toutes les 6h + Gentamicine (Gentalline®) 7,5mg/kg/j IV/IM</strong> si forme compliquée/choc</li>
      <li><strong>Renutrition progressive en 2 phases</strong> — phase de stabilisation (<strong>F-75</strong>, 100 kcal/kg/j en 8-12 repas/j) puis phase de récupération (<strong>F-100</strong> ou <strong>ATPE/Plumpy'Nut®</strong>, jusqu'à 150-220 kcal/kg/j) une fois l'enfant stabilisé</li>
      <li><strong>Supplémentation systématique</strong> — <strong>Vitamine A</strong> dose unique (50 000 UI &lt;6 mois, 100 000 UI 6-12 mois, 200 000 UI &gt;12 mois), <strong>acide folique (Spéciafoldine®)</strong> 5mg à J1 puis 1mg/j, zinc et potassium/magnésium via le mix minéral-vitaminique (CMV) intégré au F-75/F-100 ; <strong>éviter le fer en phase aiguë</strong></li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : F-75, F-100, ATPE (Plumpy'Nut®) et ReSoMal sont distribués via l'Office National de Nutrition (ONN) et les programmes UNICEF/PAM dans les Centres de Récupération Nutritionnelle et Éducation (CRENI/CRENA) — disponibilité généralement bonne dans les structures dédiées à la nutrition, mais pouvant faire défaut en zone très enclavée. Clamoxyl® et Gentalline® sont disponibles à tous les niveaux (LNMEIS).</p>
  </div>

  <div class="card" id="proto-sepsis-pediatrique">
    <h3>🦠 Sepsis / Choc septique de l'enfant</h3>
    <p class="module-sub" style="margin-bottom:8px;">La reconnaissance précoce diffère de l'adulte — l'hypotension est un signe <strong>tardif</strong> chez l'enfant, qui compense longtemps par la tachycardie et la vasoconstriction.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Reconnaître précocement</strong> — altération de la conscience, tachycardie, temps de recoloration cutanée allongé (&gt;2-3 sec), extrémités froides ou au contraire choc chaud vasoplégique, oligurie</li>
      <li><strong>Objectif : antibiothérapie dans l'heure</strong> après reconnaissance du sepsis, précédée si possible d'hémocultures sans retarder le traitement — <strong>Ceftriaxone (Rocéphine®)</strong> 50-100mg/kg/j IV en 1 injection, associée à un aminoside (<strong>Gentamicine/Gentalline®</strong> 5-7mg/kg/j IV en 1 injection) selon le foyer suspecté</li>
      <li><strong>Remplissage vasculaire titré</strong> — bolus de 10-20 mL/kg de <strong>Ringer Lactate/NaCl 0,9% (Baxter®)</strong> en 5-10 min, réévaluation après chaque bolus (signes de surcharge : hépatomégalie, crépitants, galop) — prudence accrue par rapport à l'adulte, risque de surcharge rapide</li>
      <li><strong>Vasopresseurs précoces si choc réfractaire au remplissage</strong> (après 40-60 mL/kg) — <strong>Adrénaline (Adrénaline Aguettant®)</strong> 0,1-1 µg/kg/min IVSE en 1re intention dans le choc froid pédiatrique, <strong>Noradrénaline (Noradrénaline Aguettant®)</strong> 0,1-1 µg/kg/min IVSE si choc chaud vasoplégique ; accès veineux périphérique ou intra-osseux acceptable en urgence en attendant une voie centrale</li>
      <li><strong>Corriger l'hypoglycémie</strong> (Glucosé 10% 2-5mL/kg IV lente) <strong>et l'hypocalcémie</strong> (Gluconate de calcium 100mg/kg IV lente sur 10-15 min) — fréquentes et aggravantes chez l'enfant septique</li>
      <li>Réévaluation clinique très fréquente (fréquence cardiaque, TRC, diurèse, état de conscience) — la présentation évolue vite chez l'enfant</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Rocéphine® et Gentalline® pédiatriques sont disponibles à tous les niveaux hospitaliers. Adrénaline et Noradrénaline Aguettant® sont présentes en réanimation de CHU/CHRR — leur absence en structure de base impose un transfert rapide dès la reconnaissance du choc réfractaire au remplissage.</p>
  </div>

  <div class="card" id="proto-invagination">
    <h3>🌀 Invagination intestinale aiguë</h3>
    <p class="module-sub" style="margin-bottom:8px;">Cause la plus fréquente d'occlusion intestinale chez le nourrisson (typiquement 3 mois-3 ans) — pénétration d'un segment intestinal dans le segment d'aval.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Triade classique</strong> (souvent incomplète) — douleurs abdominales paroxystiques avec accès de pleurs et pâleur, vomissements, rectorragies "gelée de groseille" (signe tardif)</li>
      <li><strong>Signe caractéristique entre les crises</strong> — enfant apathique, prostré, contrastant avec les crises douloureuses paroxystiques</li>
      <li><strong>Échographie abdominale</strong> — examen de référence, image en "cocarde"/"cible" en coupe transversale, sensibilité et spécificité élevées</li>
      <li><strong>Réduction par lavement</strong> (hydrostatique échoguidé, au sérum physiologique — <strong>NaCl 0,9%/Baxter®</strong> réchauffé à 37°C, colonne de 1m de hauteur) — traitement de 1re intention en l'absence de signe de gravité (perforation, péritonite, choc)</li>
      <li><strong>Chirurgie en urgence</strong> si échec du lavement, signes de perforation/péritonite, ou choc associé</li>
      <li><strong>Réanimation hydro-électrolytique</strong> (Ringer Lactate 10-20mL/kg si déshydratation) <strong>et antalgie</strong> (<strong>Paracétamol IV/Perfalgan®</strong> 15mg/kg/6h, éviter les morphiniques qui peuvent masquer une aggravation) avant et pendant la procédure de réduction</li>
      <li>Surveillance post-réduction — récidive possible dans les heures suivantes (jusqu'à 10% des cas)</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : le lavement hydrostatique échoguidé (sérum physiologique) est réalisable dans les centres disposant d'une échographie et d'un pédiatre/chirurgien pédiatrique formé (principalement CHU) ; en son absence, un transfert rapide est préférable dès la suspicion clinique forte, le risque de nécrose intestinale augmentant avec le délai.</p>
  </div>

  <div class="card" id="proto-stt-drepanocytaire">
    <h3>🔴 Syndrome thoracique aigu drépanocytaire</h3>
    <div class="warn-box">⚠️ Complication grave et potentiellement mortelle de la drépanocytose — première cause de décès chez l'adulte drépanocytaire, à différencier d'une simple crise vaso-occlusive.</div>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Diagnostic</strong> — nouvelle opacité radiologique/scannographique associée à au moins un signe parmi : douleur thoracique, fièvre, tachypnée, sibilants/crépitants, hypoxémie — chez un patient drépanocytaire connu</li>
      <li><strong>Oxygénothérapie systématique</strong> — objectif SpO2 &gt;95%, à adapter à la valeur de base du patient</li>
      <li><strong>Analgésie efficace</strong> — <strong>Paracétamol (Perfalgan®)</strong> 15mg/kg toutes les 6h (enfant) ou 1g x4/j (adulte) systématique + <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 0,1mg/kg IV (enfant) ou 2-3mg IV (adulte), tout en évitant la sédation excessive qui favoriserait l'hypoventilation (aggravation de la falciformation par hypoxie régionale)</li>
      <li><strong>Antibiothérapie systématique probabiliste</strong> (couvrant pneumocoque, mycoplasme, chlamydia) — <strong>Ceftriaxone (Rocéphine®)</strong> 50mg/kg/j (max 2g/j) + <strong>Azithromycine (Zithromax®)</strong> 10mg/kg/j (max 500mg/j) — la distinction infection/infarctus pulmonaire est souvent impossible cliniquement</li>
      <li><strong>Hyperhydratation prudente</strong> — <strong>Ringer Lactate/NaCl 0,9% (Baxter®)</strong> aux besoins de base (éviter de dépasser 1,5x les besoins d'entretien), éviter la surcharge (risque d'aggravation de l'atteinte pulmonaire), éviter aussi la déshydratation qui favorise la falciformation</li>
      <li><strong>Transfusion</strong> — culots globulaires simples (CNTS) 10-15mL/kg si anémie mal tolérée/aggravation ; <strong>échange transfusionnel (exsanguino-transfusion)</strong> en urgence si forme sévère/multilobaire, hypoxémie progressive, ou défaillance d'organe associée — disponibilité limitée aux centres de référence disposant d'une banque de sang étoffée</li>
      <li><strong>Kinésithérapie respiratoire incitative</strong> et mobilisation précoce — réduit le risque d'atélectasie et de majoration du syndrome</li>
      <li>Surveillance rapprochée — risque d'aggravation rapide vers une détresse respiratoire nécessitant la ventilation mécanique</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Rocéphine®, Zithromax®, Perfalgan® et Morphine Aguettant® sont disponibles dans les hôpitaux de référence. L'échange transfusionnel dépend fortement de la disponibilité des culots au CNTS — anticiper largement la commande et envisager un transfert précoce vers un CHU si la forme s'aggrave et que la structure locale ne dispose pas de banque de sang suffisante.</p>
  </div>

function toggleProtoToc(){
  const toc=document.getElementById('proto-toc');
  if(toc) toc.classList.toggle('collapsed');
}

function toggleTocCat(catEl){
  catEl.classList.toggle('collapsed');
  const group = catEl.nextElementSibling;
  if(group && group.classList.contains('toc-group')){
    group.classList.toggle('collapsed');
  }
}

function init_protocoles(){
  const content = document.getElementById('content');
  const toc = document.getElementById('proto-toc');
  if(!content || !toc) return;
  content.querySelectorAll('.card[id^="proto-"]').forEach(card=>{
    if(card.querySelector('.back-to-toc')) return;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'back-to-toc';
    btn.innerHTML = '↑ Retour au sommaire';
    btn.onclick = ()=>{
      toc.classList.remove('collapsed');
      toc.scrollIntoView({behavior:'smooth', block:'start'});
    };
    card.appendChild(btn);
  });
}

      <li>Tracer systématiquement heure, dose, opérateur pour chaque médicament.</li>
    </ul>
  </div>`;
}

      <tr><td><strong>BPCO exacerbée</strong></td><td>FR basse 12-14/min, I:E 1:3-4, tolérer hypercapnie permissive (pH ≥ 7,25), PEP ≤ auto-PEP intrinsèque</td></tr>
      <tr><td><strong>Asthme sévère</strong></td><td>Bronchodilatateurs en circuit, éviter PEP élevée (air-trapping), risque pneumothorax</td></tr>
      <tr><td><strong>TC grave</strong></td><td>Normocapnie stricte PaCO2 35-40 mmHg, PEEP ≤5, SpO2 &gt;95%, PAM ≥80 mmHg</td></tr>
    </table>
  </div>

  <div class="card">
    <h3>🔓 Sevrage ventilatoire</h3>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Critères : cause initiale traitée, éveillable, hémodynamique stable, FiO2 ≤ 0,4 pour SpO2 ≥ 92%, toux efficace</li>
      <li>Épreuve ventilation spontanée (EVS) 30-120 min : pièce en T ou AI minimale (5 cmH2O)</li>
      <li>Signes d'intolérance : FR &gt;35, SpO2 &lt;90%, agitation, tirage, tachycardie, hypoTA</li>
      <li>Si EVS réussie → évaluer déglutition et toux → extubation</li>
      <li>Si échec EVS → identifier cause, renouveler après 24h</li>
    </ol>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">Post-extubation : OHD nasale si disponible (réduit risque de ré-intubation). Surveiller 1-2h.</p>
  </div>`;
}

/* ——— Fonctions de calcul ——— */
function plausibilityWarnings(fields){
  // fields: [{val, min, max, label, unit}]
  const bad = fields.filter(f => !isNaN(f.val) && (f.val < f.min || f.val > f.max));
  if(bad.length === 0) return '';
  return `<div class="warn-box">⚠️ Valeur(s) hors plage physiologique plausible — vérifier la saisie avant d'utiliser ce résultat :<br>`
    + bad.map(f => `• ${f.label} = ${f.val} ${f.unit||''} (plage attendue : ${f.min}–${f.max} ${f.unit||''})`).join('<br>')
    + `</div>`;
}

const GTT_PRESETS = {
  noradrenaline: {mg:8, vol:250, mode:'ugkgmin', dose:0.2, note:'Vasopresseur puissant — burette microgouttes fortement recommandée.'},
  adrenaline: {mg:5, vol:250, mode:'ugkgmin', dose:0.1, note:'Titration très prudente, idem noradrénaline.'},
  dobutamine: {mg:250, vol:250, mode:'ugkgmin', dose:5, note:'Mieux tolérée en gravité mais surveiller tachycardie/arythmies.'},
  dopamine: {mg:200, vol:250, mode:'ugkgmin', dose:5, note:'Alternative si noradrénaline indisponible.'},
  nicardipine: {mg:10, vol:50, mode:'mgh', dose:5, note:"Dosage en mg/h (pas de poids nécessaire), débit de départ usuel 5 mg/h, à titrer par paliers jusqu'à 15 mg/h max. Titration fine difficile en gravité — burette microgouttes indispensable, recompter toutes les 5-15 min."}
};
function fillGttPreset(){
  const key = document.getElementById('gtt_drug').value;
  const noteEl = document.getElementById('gtt_note');
  if(key==='custom' || !GTT_PRESETS[key]){ noteEl.textContent=''; return; }
  const p = GTT_PRESETS[key];
  document.getElementById('gtt_mg').value = p.mg;
  document.getElementById('gtt_vol').value = p.vol;
  document.getElementById('gtt_mode').value = p.mode;
  document.getElementById('gtt_dose').value = p.dose;
  noteEl.textContent = '💡 ' + p.note + " Vérifier la concentration réelle de l'ampoule disponible.";
}

function calcGtt(){
  const mg = parseFloat(document.getElementById('gtt_mg').value);
  const vol = parseFloat(document.getElementById('gtt_vol').value);
  const mode = document.getElementById('gtt_mode').value;
  const dose = parseFloat(document.getElementById('gtt_dose').value);
  const facteur = parseFloat(document.getElementById('gtt_facteur').value);
  const poids = parseFloat(document.getElementById('gtt_poids').value);

  if([mg,vol,dose,facteur].some(isNaN) || vol<=0){ alert('Remplir la quantité de médicament, le volume total, la dose souhaitée et le facteur de gouttes'); return; }
  if(mode==='ugkgmin' && (isNaN(poids) || poids<=0)){ alert('Le poids du patient est requis pour un dosage en µg/kg/min'); return; }

  const concUgMl = (mg*1000)/vol; // µg/mL
  let debitMlH;
  if(mode==='ugkgmin'){
    debitMlH = (dose*poids*60)/concUgMl;
  } else {
    debitMlH = (dose*1000)/concUgMl; // mg/h -> µg/h / concentration
  }
  const gttMin = (debitMlH*facteur)/60;
  const gtt15s = gttMin/4;

  const warnFields = [{val:mg, min:0.1, max:1000, label:'Quantité de médicament', unit:'mg'}, {val:vol, min:10, max:1000, label:'Volume de dilution', unit:'mL'}];
  if(!isNaN(poids)) warnFields.push({val:poids, min:1, max:300, label:'Poids', unit:'kg'});
  let warn = plausibilityWarnings(warnFields);

  let precisionWarn = '';
  if(gttMin < 5){
    precisionWarn = `<div class="warn-box">⚠️ Débit très lent (${gttMin.toFixed(1)} gtt/min) — difficile à titrer avec précision par gravité. Envisager une burette microgouttes (60 gtt/mL) si ce n'est pas déjà le cas, ou une dilution plus concentrée dans un volume plus petit.</div>`;
  } else if(gttMin > 100){
    precisionWarn = `<div class="warn-box">⚠️ Débit très rapide (${gttMin.toFixed(0)} gtt/min) — revérifier le calcul et la concentration ; envisager une dilution plus concentrée dans un volume plus petit pour un débit plus gérable.</div>`;
  }

  document.getElementById('gtt_result').classList.remove('hidden');
  document.getElementById('gtt_result').innerHTML = warn + precisionWarn +
    `<strong>Concentration = ${concUgMl.toFixed(1)} µg/mL</strong> (${(concUgMl/1000).toFixed(3)} mg/mL)<br>
    <strong>Débit = ${debitMlH.toFixed(1)} mL/h</strong><br>
    <strong style="color:var(--accent2); font-size:16px;">≈ ${gttMin.toFixed(1)} gouttes/min</strong> (soit environ ${gtt15s.toFixed(1)} gouttes par 15 secondes)<br>
    <small style="color:var(--muted)">Facteur de gouttes utilisé : ${facteur} gtt/mL. Recompter le débit réel régulièrement — la gravité seule ne garantit pas la dose exacte.</small>`;
}

function calcPedia(){
  let poids = parseFloat(document.getElementById('pedia_poids').value);
  const age = parseFloat(document.getElementById('pedia_age').value);
  const unite = document.getElementById('pedia_unite').value;
  let methode = '';
  if(!isNaN(poids) && poids>0){
    methode = `Poids réel saisi : <strong>${poids} kg</strong>`;
  } else if(!isNaN(age) && age>=0){
    if(unite==='mois'){ poids = 0.5*age + 4; }
    else if(unite==='ans1_5'){ poids = 2*age + 8; }
    else { poids = 3*age + 7; }
    methode = `Poids estimé par l'âge (${age} ${unite==='mois'?'mois':'ans'}) : <strong>${poids.toFixed(1)} kg</strong> — <span style="color:var(--warn)">à confirmer par pesée dès que possible</span>`;
  } else {
    alert("Saisir le poids réel ou l'âge de l'enfant");
    return;
  }
  const warn = plausibilityWarnings([{val:poids, min:1, max:60, label:'Poids estimé/saisi', unit:'kg'}]);

  const rows = [
    ['ACR — Adrénaline IV/IO', `${(poids*0.01).toFixed(2)} mg (= ${(poids*0.1).toFixed(1)} mL de dilution 1:10 000), max 1 mg/dose`],
    ['ACR — Amiodarone', `${Math.min(poids*5,300).toFixed(0)} mg IV/IO bolus (max 300 mg)`],
    ['Anaphylaxie — Adrénaline IM', `${Math.min(poids*0.01, poids<30?0.3:0.5).toFixed(2)} mg (1:1000)`],
    ['Bradycardie — Atropine', `${Math.max(Math.min(poids*0.02,0.5),0.1).toFixed(2)} mg IV (min 0,1 mg, max 0,5 mg)`],
    ['Convulsions — Diazépam IV', `${Math.min(poids*0.3,10).toFixed(1)} mg (max 10 mg)`],
    ['Convulsions — Midazolam IV', `${Math.min(poids*0.15,10).toFixed(1)} mg (max 10 mg)`],
    ['Hypoglycémie — Glucose G10%', `${(poids*2).toFixed(0)} mL IV lente (= ${(poids*200).toFixed(0)} mg/kg)`],
    ['Opiacés — Naloxone', `${Math.min(poids*0.01,2).toFixed(2)} mg IV/IM/IN (max 2 mg)`],
    ['ISR — Kétamine IV', `${(poids*1).toFixed(1)}–${(poids*2).toFixed(1)} mg`],
    ['ISR — Succinylcholine IV', `${(poids*1.5).toFixed(1)}–${(poids*2).toFixed(1)} mg`],
    ['Choc — Remplissage vasculaire', `${(poids*10).toFixed(0)}–${(poids*20).toFixed(0)} mL cristalloïdes en bolus (réévaluer après chaque bolus)`],
    ['Antalgie — Paracétamol', `${Math.min(poids*15,1000).toFixed(0)} mg /6h (max ${(poids*60).toFixed(0)} mg/j)`],
    ['Ingestion — Charbon activé', `${Math.min(poids*1,50).toFixed(0)} g PO (max 50 g)`],
    ['Surcharge — Furosémide', `${(poids*1).toFixed(1)} mg IV`],
    ['Insuff. surrénale — Hydrocortisone', `${Math.min(poids*3,100).toFixed(0)} mg IV bolus (max 100 mg)`],
  ];

  document.getElementById('pedia_result').classList.remove('hidden');
  document.getElementById('pedia_result').innerHTML = warn + methode +
    `<table style="margin-top:10px;"><tr><th>Situation</th><th>Dose calculée</th></tr>` +
    rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('') +
    `</table><p style="margin-top:8px; font-size:12px; color:var(--muted)">Doses indicatives — vérifier systématiquement avant administration, notamment chez le nourrisson &lt;1 an.</p>`;
}

function calcPIT(){
  const sex=document.getElementById('pit_sex').value;
  const t=parseFloat(document.getElementById('pit_taille').value);
  const reel=parseFloat(document.getElementById('pit_poids').value);
  if(isNaN(t)){alert('Saisir la taille');return;}
  const warn = plausibilityWarnings([
    {val:t, min:100, max:250, label:'Taille', unit:'cm'},
    {val:reel, min:20, max:300, label:'Poids réel', unit:'kg'}
  ]);
  const pit=sex==='M'?50+0.91*(t-152.4):45.5+0.91*(t-152.4);
  const imc=isNaN(reel)?null:(reel/((t/100)**2));
  let txt=warn+`<strong>PIT = ${pit.toFixed(1)} kg</strong>`;
  if(imc) txt+=` | IMC = ${imc.toFixed(1)} kg/m²`;
  if(!isNaN(reel)&&reel>pit*1.2){
    const paj=(reel-pit)*0.4+pit;
    txt+=`<br>Poids Ajusté (obésité) = <strong>${paj.toFixed(1)} kg</strong>`;
  }
  txt+=`<br><small style="color:var(--muted)">Vt ventilateur (6–8 mL/kg PIT) : ${(pit*6).toFixed(0)}–${(pit*8).toFixed(0)} mL</small>`;
  document.getElementById('pit_result').classList.remove('hidden');
  document.getElementById('pit_result').innerHTML=txt;
}

function calcSE(){
  const p=parseFloat(document.getElementById('se_poids').value);
  const d=parseFloat(document.getElementById('se_dose').value);
  const c=parseFloat(document.getElementById('se_conc').value);
  if([p,d,c].some(isNaN)){alert('Remplir tous les champs');return;}
  if(c<=0){alert('La concentration doit être supérieure à 0');return;}
  const warn = plausibilityWarnings([
    {val:p, min:1, max:300, label:'Poids', unit:'kg'},
    {val:d, min:0.001, max:50, label:'Dose', unit:'µg/kg/min'},
    {val:c, min:0.1, max:100000, label:'Concentration', unit:'µg/mL'}
  ]);
  const debit=(d*p*60)/c;
  document.getElementById('se_result').classList.remove('hidden');
  document.getElementById('se_result').innerHTML=warn+
    `<strong>Débit SE = ${debit.toFixed(2)} mL/h</strong><br>
    <small style="color:var(--muted)">Pour ${p} kg — dose ${d} µg/kg/min — concentration ${c} µg/mL</small>`;
}

function calcDEL(){
  const sex=document.getElementById('del_sex').value;
  const p=parseFloat(document.getElementById('del_poids').value);
  const na=parseFloat(document.getElementById('del_na').value);
  const nacible=parseFloat(document.getElementById('del_nacible').value);
  if([p,na,nacible].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:p, min:1, max:300, label:'Poids', unit:'kg'},
    {val:na, min:100, max:200, label:'Na+ actuel', unit:'mmol/L'},
    {val:nacible, min:120, max:160, label:'Na+ cible', unit:'mmol/L'}
  ]);
  const coeff=sex==='M'?0.6:0.5;
  const eauTotale=coeff*p;
  // Formule standard du déficit en eau libre (Adrogué-Madias) :
  // Déficit (L) = Eau corporelle totale × [(Na+ actuel / Na+ cible) − 1]
  const deficit=eauTotale*((na/nacible)-1);
  const vitesse=deficit/48;
  document.getElementById('del_result').classList.remove('hidden');
  document.getElementById('del_result').innerHTML=warn+
    `<strong>Déficit eau libre = ${deficit.toFixed(2)} L</strong><br>
    Correction sur 48h : ${vitesse.toFixed(2)} L/h (max −10-12 mmol/L de Na+ par 24h)<br>
    <small style="color:var(--muted)">Eau totale estimée = ${eauTotale.toFixed(1)} L</small>`;
}

function calcCalcium(){
  const ca=parseFloat(document.getElementById('ca_total').value);
  const alb=parseFloat(document.getElementById('ca_alb').value);
  if([ca,alb].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:ca, min:0.5, max:5, label:'Calcium total', unit:'mmol/L'},
    {val:alb, min:5, max:60, label:'Albumine', unit:'g/L'}
  ]);
  const caCorr=ca+0.02*(40-alb);
  let interp,cls;
  if(caCorr<2.20){interp="HYPOCALCÉMIE";cls="grave";}
  else if(caCorr>2.60){interp="HYPERCALCÉMIE";cls="modere";}
  else{interp="Normal";cls="leger";}
  document.getElementById('ca_result').classList.remove('hidden');
  document.getElementById('ca_result').innerHTML=warn+
    `<strong>Calcium corrigé = ${caCorr.toFixed(2)} mmol/L</strong> — <span class="${cls}">${interp}</span><br>
    <small style="color:var(--muted)">Formule : Ca corrigé = Ca mesuré + 0,02 × (40 − Albumine g/L)</small>`;
}

function calcCG(){
  const age=parseFloat(document.getElementById('cg_age').value);
  const sex=document.getElementById('cg_sex').value;
  const p=parseFloat(document.getElementById('cg_poids').value);
  const cr=parseFloat(document.getElementById('cg_creat').value);
  if([age,p,cr].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:age, min:0, max:120, label:'Âge', unit:'ans'},
    {val:p, min:1, max:300, label:'Poids', unit:'kg'},
    {val:cr, min:10, max:2000, label:'Créatinine', unit:'µmol/L'}
  ]);
  let clcr=(140-age)*p/(0.814*cr);
  if(sex==='F') clcr*=0.85;
  let stade,cls;
  if(clcr>=90){stade="G1 — Normale ou élevée";cls="leger";}
  else if(clcr>=60){stade="G2 — Légèrement diminuée";cls="leger";}
  else if(clcr>=45){stade="G3a — Légère à modérée";cls="modere";}
  else if(clcr>=30){stade="G3b — Modérée à sévère";cls="modere";}
  else if(clcr>=15){stade="G4 — Sévère";cls="grave";}
  else{stade="G5 — IRT (épuration extra-rénale à discuter)";cls="grave";}
  document.getElementById('cg_result').classList.remove('hidden');
  document.getElementById('cg_result').innerHTML=warn+
    `<strong>Clairance créatinine = ${clcr.toFixed(0)} mL/min</strong><br>
    <span class="${cls}">${stade}</span><br>
    <small style="color:var(--muted)">Adapter posologies des médicaments à élimination rénale.</small>`;
}

function calcOsm(){
  const na=parseFloat(document.getElementById('osm_na').value);
  const gly=parseFloat(document.getElementById('osm_gly').value);
  const uree=parseFloat(document.getElementById('osm_uree').value);
  if([na,gly,uree].some(isNaN)){alert('Remplir tous les champs');return;}
  const warn = plausibilityWarnings([
    {val:na, min:100, max:200, label:'Na+', unit:'mmol/L'},
    {val:gly, min:1, max:60, label:'Glycémie', unit:'mmol/L'},
    {val:uree, min:0.5, max:60, label:'Urée', unit:'mmol/L'}
  ]);
  const osm=2*na+gly+uree;
  let interp,cls;
  if(osm<275){interp="Hypo-osmolarité";cls="modere";}
  else if(osm<=295){interp="Normale";cls="leger";}
  else if(osm<=320){interp="Hyperosmolarité modérée";cls="modere";}
  else{interp="Hyperosmolarité sévère";cls="grave";}
  document.getElementById('osm_result').classList.remove('hidden');
  document.getElementById('osm_result').innerHTML=warn+
    `<strong>Osmolarité calculée = ${osm.toFixed(0)} mOsm/kg</strong> — <span class="${cls}">${interp}</span><br>
    <small style="color:var(--muted)">Normale : 275–295 mOsm/kg. Formule : 2×Na + Glycémie + Urée (mmol/L)</small>`;
}

function calcTA(){
  const na=parseFloat(document.getElementById('ta_na').value);
  const cl=parseFloat(document.getElementById('ta_cl').value);
  const hco3=parseFloat(document.getElementById('ta_hco3').value);
  const alb=parseFloat(document.getElementById('ta_alb').value)||40;
  if([na,cl,hco3].some(isNaN)){alert('Remplir Na, Cl et HCO3');return;}
  const warn = plausibilityWarnings([
    {val:na, min:100, max:200, label:'Na+', unit:'mmol/L'},
    {val:cl, min:50, max:150, label:'Cl-', unit:'mmol/L'},
    {val:hco3, min:0, max:45, label:'HCO3-', unit:'mmol/L'},
    {val:alb, min:5, max:60, label:'Albumine', unit:'g/L'}
  ]);
  const ta=na-cl-hco3;
  const taCorr=ta+0.25*(40-alb);
  let interp,cls;
  if(taCorr<=12){interp="Normal (TA ≤12 mmol/L)";cls="leger";}
  else{interp="TA ÉLEVÉ → acidose métabolique à TA augmenté (lactates, cétones, toxiques, urémie)";cls="grave";}
  document.getElementById('ta_result').classList.remove('hidden');
  document.getElementById('ta_result').innerHTML=warn+
    `<strong>TA brut = ${ta.toFixed(0)} mmol/L</strong> | TA corrigé à l'albumine = <strong>${taCorr.toFixed(0)} mmol/L</strong><br>

    <small style="color:var(--muted)">Normale : 8–12 mmol/L. TA corrigé = TA + 0,25 × (40 − albumine g/L)</small>`;
}

function renderAbreviations(){
  const items = ABBR_DATA.map(([abbr, full])=>{
    const norm = normalizeText(abbr+' '+full);
    return `<li class="abbr-item" data-norm="${norm}"><strong>${abbr}</strong> — ${full}</li>`;
  }).join('');
  return `
  <h2 class="module-title">🔤 Abréviations</h2>
  <p class="module-sub">Lexique des abréviations médicales utilisées dans l'application. Recherche instantanée par sigle ou par mot-clé.</p>
  <div class="card">
    <input type="text" id="abbr-search" class="local-search-input" placeholder="Rechercher une abréviation (ex. IVSE, SCA, PEEP...)">
    <div id="abbr-count">${ABBR_DATA.length} abréviations</div>
    <ul class="abbr-list" id="abbr-list">${items}</ul>
    <p class="abbr-empty" id="abbr-empty">Aucune abréviation ne correspond à cette recherche.</p>
  </div>`;
}
renderers.abreviations = renderAbreviations;
window.init_abreviations = function(){
  const input = document.getElementById('abbr-search');
  const list = document.getElementById('abbr-list');
  const empty = document.getElementById('abbr-empty');
  const count = document.getElementById('abbr-count');
  if(!input) return;
  input.addEventListener('input', ()=>{
    const q = normalizeText(input.value.trim());
    let visible = 0;
    list.querySelectorAll('.abbr-item').forEach(li=>{
      const match = !q || li.dataset.norm.includes(q);
      li.style.display = match ? '' : 'none';
      if(match) visible++;
    });
    empty.style.display = visible === 0 ? 'block' : 'none';
    count.textContent = q ? `${visible} résultat(s)` : `${ABBR_DATA.length} abréviations`;
  });
  input.focus();
};

// Navigation logic
function ensureCardIds(container, key){
  container.querySelectorAll('.card').forEach((card, idx)=>{
    if(!card.id){ card.id = key+'-card-'+idx; }
  });
}

function showModule(key, focusId){
  document.getElementById('content').innerHTML = renderers[key] ? renderers[key]() : placeholderModule(key);
  ensureCardIds(document.getElementById('content'), key);
  document.querySelectorAll('#nav-list button').forEach(b=>b.classList.toggle('active', b.dataset.mod===key));
  document.getElementById('topbar-title').textContent = MODULES[key].title;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  if(typeof window['init_'+key] === 'function'){ window['init_'+key](); }
  if(focusId){
    requestAnimationFrame(()=>{
      const el = document.getElementById(focusId);
      if(el){
        el.scrollIntoView({behavior:'smooth', block:'start'});
        el.classList.add('search-highlight');
        setTimeout(()=>el.classList.remove('search-highlight'), 2500);
      } else { window.scrollTo(0,0); }
    });
  } else {
    window.scrollTo(0,0);
  }
}

document.querySelectorAll('#nav-list button').forEach(btn=>{
  btn.addEventListener('click', ()=> showModule(btn.dataset.mod));
});
document.getElementById('menu-toggle').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
});
document.getElementById('overlay').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});

/* ——— Recherche globale (tout le contenu, pas seulement les noms de modules) ——— */
function normalizeText(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

let SEARCH_INDEX = [];
function buildSearchIndex(){
  const tmp = document.createElement('div');
  tmp.style.display = 'none';
  document.body.appendChild(tmp);
  Object.keys(MODULES).forEach(key=>{
    if(key==='accueil' || !renderers[key]) return;
    tmp.innerHTML = renderers[key]();
    ensureCardIds(tmp, key);
    tmp.querySelectorAll('.card').forEach(card=>{
      const titleEl = card.querySelector('h3');
      const title = titleEl ? titleEl.textContent.trim() : MODULES[key].title;
      const text = card.textContent.trim();
      SEARCH_INDEX.push({
        module:key,
        moduleTitle: MODULES[key].title,
        id: card.id,
        title: title,
        norm: normalizeText(title+' '+text)
      });
    });
  });
  document.body.removeChild(tmp);
}
buildSearchIndex();

const searchInput = document.getElementById('nav-search');
const resultsList = document.getElementById('search-results');
const navList = document.getElementById('nav-list');

searchInput.addEventListener('input', (e)=>{
  const raw = e.target.value.trim();
  const q = normalizeText(raw);
  if(!q){
    resultsList.classList.remove('show');
    resultsList.innerHTML = '';
    navList.style.display = '';
    return;
  }
  navList.style.display = 'none';
  const matches = SEARCH_INDEX.filter(item => item.norm.includes(q)).slice(0, 40);
  if(matches.length === 0){
    resultsList.innerHTML = '<li class="sr-empty">Aucun résultat pour "'+raw.replace(/</g,'&lt;')+'"</li>';
  } else {
    resultsList.innerHTML = matches.map(m =>
      `<li><a data-mod="${m.module}" data-target="${m.id}">
        <span class="sr-mod">${MODULES[m.module].icon} ${m.moduleTitle}</span>${m.title}
      </a></li>`
    ).join('');
  }
  resultsList.classList.add('show');
});

resultsList.addEventListener('click', (e)=>{
  const a = e.target.closest('a[data-mod]');
  if(!a) return;
  const mod = a.dataset.mod;
  const target = a.dataset.target;
  searchInput.value = '';
  resultsList.classList.remove('show');
  resultsList.innerHTML = '';
  navList.style.display = '';
  showModule(mod, target);
});

showModule('accueil');
</script>
