    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Calcul de l'osmolarité plasmatique :</strong> [2 × (Na + K) + glycémie (mmol/L) + urée (mmol/L)]. Normale : 290 ± 5 mOsm/L. Si &gt;320 mOsm/L : hyperosmolarité. Radiographie de thorax systématique (recherche du facteur déclenchant).</p>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Monitorage :</strong> PANI, scope, SpO2 ; sonde urinaire ou pénilex.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Réhydratation</strong> massive mais prudente (déficit hydrique souvent &gt;8-10 L) : sérum physiologique (NaCl 0,9%) 1 000 mL en 30 min, PUIS 2 000 mL en 2h, PUIS solution Ringer Lactate ou sérum physiologique avec 2 g/L de KCl, PUIS 4 000 mL en 24h — à adapter au terrain (patient souvent âgé/cardiopathe). Correction de l'hypernatrémie de l'ordre de 10 mEq par jour. Vitamine B1 100 mg IVL systématique</li>
      <li><strong>Insulinothérapie</strong> : différer tant que la réhydratation seule fait baisser la glycémie. Objectif glycémique 11 mM. Débuter par <strong>Insuline rapide (Actrapid®)</strong> 0,1 UI/kg/h ; si inefficace au bout de 2h, passer à 0,2 UI/kg/h, puis adapter en fonction de la glycémie. Dès que la glycémie est &lt;11 mM, remplacer le sérum physiologique par du G5%. Dès que l'hydratation est corrigée, relais par insuline rapide SC toutes les 4h à la posologie de 0,5 UI/kg/j. Une insulinothérapie trop précoce/agressive expose à une chute osmotique brutale et un collapsus</li>
      <li><strong>Oxygénothérapie</strong> avec un objectif de SpO2 compris entre 94 et 97 %</li>
      <li><strong>Recharge potassique :</strong> KCl IVSE 1 g/h si kaliémie &lt;3,3 mmol/L ; 0,5 g/h si kaliémie &lt;4 mmol/L — surveillance rapprochée</li>
      <li><strong>Anticoagulation préventive systématique :</strong> Lovenox® 0,4 mL SC/j (risque thromboembolique majeur lié à l'hyperosmolarité, sauf contre-indication)</li>
      <li>Rechercher et traiter le facteur déclenchant : infection +++, AVC, IDM, déshydratation, médicaments hyperglycémiants/diurétiques</li>
      <li>Objectif : baisse osmolaire progressive et lente (≈3-8 mOsm/kg/h) ; mortalité plus élevée que l'ACD, surveillance prolongée</li>
      <li><strong>Surveillance :</strong>
        <ul style="margin-left:18px;">
          <li>Toutes les heures : glycémie, cétonémie</li>
          <li>Toutes les 2h : fréquence cardiaque, PAS, PAD, bandelette urinaire (BU)</li>
          <li>Diurèse horaire</li>
          <li>À H6, H12, H18 : GDS, ionogramme, ECG</li>
        </ul>
      </li>
    </ol>
  </div>

  <div class="card" id="proto-acidose-lactique">
    <h3>⚗️ Acidose lactique (notamment acidose lactique associée à la metformine — MALA)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Critères : lactates &gt;5 mmol/L (ou &gt;2-5 mmol/L selon contexte clinique) avec pH&lt;7,35, trou anionique augmenté (&gt;16 mmol/L), <strong>sans cétose franche</strong> (distingue de l'ACD) ni hyperglycémie majeure obligatoire. Terrain typique : diabétique sous metformine + insuffisance rénale aiguë/déshydratation (accumulation du médicament), sepsis, choc, hypoxie tissulaire.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Arrêt immédiat de la metformine (Glucophage®, Stagid®)</strong> et de tout autre facteur causal/aggravant (AINS, IEC/ARA2, produit de contraste iodé récent — rechercher systématiquement une insuffisance rénale)</li>
      <li>Rechercher et traiter la cause sous-jacente : choc (hypovolémique, cardiogénique, septique — cf. protocole sepsis), hypoxie tissulaire sévère, insuffisance hépatique, intoxication (metformine, biguanides, alcool, méthanol/éthylène glycol)</li>
      <li>Réanimation hémodynamique standard : remplissage vasculaire adapté, correction de l'hypoxie/hypoperfusion, vasopresseurs si choc persistant</li>
      <li>Épuration extra-rénale (hémodialyse) à discuter précocement si : lactates &gt;20 mmol/L, pH&lt;7,0, choc, défaillance multiviscérale, ou insuffisance rénale sévère associée — la dialyse épure efficacement à la fois la metformine et les lactates</li>
      <li>Bicarbonates : pas de bénéfice démontré en routine, discuter au cas par cas si acidose extrême avec instabilité hémodynamique (même réserve que pour l'ACD)</li>
      <li>Surveillance rapprochée : lactates, gaz du sang, fonction rénale, kaliémie</li>
    </ol>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">⚠️ Ne pas confondre avec l'ACD : ici pas de cétose marquée, contexte évocateur (metformine + IRA), trou anionique élevé principalement porté par les lactates.</p>
  </div>

  <div class="card" id="proto-paludisme">
    <h3>🦟 Paludisme grave (accès palustre grave)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après l'OMS. Urgence médicale — traitement parentéral à débuter sans délai, avant même la confirmation biologique si suspicion clinique forte.</p>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">Critères de gravité (au moins 1 suffit) :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Trouble de conscience/coma, convulsions répétées, prostration</li>
      <li>Détresse respiratoire (SDRA), collapsus circulatoire/choc</li>
      <li>Insuffisance rénale aiguë, ictère avec autre signe de gravité associé</li>
      <li>Anémie sévère (Hb &lt;7 g/dL), hypoglycémie, acidose métabolique</li>
      <li>Hémorragie spontanée/CIVD, hémoglobinurie macroscopique</li>
      <li>Parasitémie ≥5% (P. falciparum)</li>
    </ul>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Artésunate IV (Artesun®)</strong> (traitement de référence) : 2,4 mg/kg à H0, H12, H24, puis une fois par jour jusqu'à ce que la voie orale soit possible (minimum 24h de traitement parentéral)</li>
      <li>Si Artésunate IV indisponible en attendant le transfert : Artésunate intrarectal en pré-transfert (notamment chez l'enfant &lt;6 ans), ou <strong>Artéméther IM (Paluther®)</strong>, ou <strong>Quinine IV (Quinimax®, Quinine Lafran®)</strong> en alternative</li>
      <li>Dès que le patient tolère la voie orale ET parasitémie ≤1% : relais par une CTA (combinaison thérapeutique à base d'artémisinine) orale complète — ex. <strong>Artéméther-Luméfantrine (Coartem®, Riamet®)</strong> ou <strong>Artésunate-Amodiaquine (Coarsucam®, ASAQ Winthrop®)</strong></li>
      <li>Traitement symptomatique associé : correction de l'hypoglycémie (fréquente, à rechercher systématiquement), transfusion si anémie sévère mal tolérée, gestion des convulsions (benzodiazépines), oxygénothérapie/ventilation si détresse respiratoire, épuration extra-rénale si insuffisance rénale sévère</li>
      <li>Surveillance rapprochée : glycémie répétée (risque d'hypoglycémie sous artésunate/quinine), état neurologique, diurèse</li>
      <li>Surveiller une anémie hémolytique retardée post-artésunate (jusqu'à 4 semaines après traitement) — contrôle NFS à distance</li>
    </ol>
  </div>

  <div class="card" id="proto-eclampsie">
    <h3>🤰 Prééclampsie sévère / Éclampsie</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Prééclampsie sévère :</strong> TA ≥160/110 mmHg + protéinurie (ou signe de gravité : céphalées, troubles visuels, douleur épigastrique, œdème pulmonaire, thrombopénie, cytolyse hépatique). <strong>Éclampsie :</strong> convulsions généralisées chez une femme enceinte/post-partum avec prééclampsie — urgence vitale materno-fœtale.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Sulfate de magnésium (Magnésium Sulfate Lavoisier®, Cooper®)</strong> (prévention et traitement des convulsions — traitement de référence, OMS) : dose de charge 4 g IV en 15-20 min, puis entretien 1 g/h IV continu (schéma Zuspan) — alternative en ressources limitées (schéma Pritchard) : 4g IV + 10g IM (5g dans chaque fesse), puis 5g IM toutes les 4h</li>
      <li>Surveillance stricte de la toxicité au magnésium : réflexes ostéotendineux présents, FR &gt;12/min, diurèse conservée (&gt;25 mL/h) — si signe de surdosage : arrêter la perfusion, <strong>Gluconate de calcium 10% (Calcium Gluconate Lavoisier®)</strong> 10 mL IV en antidote</li>
      <li>Si convulsion malgré le traitement : nouveau bolus de 2g de Sulfate de magnésium</li>
      <li><strong>Antihypertenseur</strong> si TA ≥160/110 mmHg : <strong>Labétalol (Trandate®)</strong> IV, ou <strong>Nifédipine (Adalate®)</strong> PO/<strong>Nicardipine (Loxen®)</strong> IV selon disponibilité — objectif TA &lt;160/110 sans chute brutale (préserver la perfusion utéro-placentaire)</li>
      <li>Décubitus latéral gauche (limite la compression aortocave), oxygène, voie veineuse, restriction hydrique prudente (risque d'OAP)</li>
      <li>Bilan de gravité : NFS/plaquettes, bilan hépatique, fonction rénale, protéinurie, bilan de coagulation (rechercher un HELLP syndrome)</li>
      <li><strong>Le seul traitement curatif est l'accouchement</strong> — organiser l'extraction fœtale dès stabilisation maternelle, en coordination avec l'équipe obstétricale</li>
    </ol>
  </div>

  <div class="card" id="proto-hpp">
    <h3>🩸 Hémorragie du post-partum (HPP)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Définition : pertes sanguines ≥500 mL après accouchement voie basse ou ≥1000 mL après césarienne. Cause principale : atonie utérine (≈80% des cas). Première cause de mortalité maternelle évitable dans le monde.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Alerte immédiate</strong> — appel à l'aide, 2 VVP de gros calibre, bilan (NFS, coagulation, groupe/Rh, RAI), commander des culots globulaires</li>
      <li><strong>Massage utérin</strong> bimanuel immédiat + vérifier la vacuité vésicale (sondage)</li>
      <li><strong>Utérotonique de 1ère ligne :</strong> <strong>Oxytocine (Syntocinon®)</strong> 10 UI IM ou IV lente, puis perfusion continue d'entretien. Si inefficace : <strong>Ergométrine (Méthergin®)</strong> IM (contre-indiquée si hypertension/prééclampsie) ou <strong>Misoprostol (Cytotec®, Misotac®)</strong> 800 µg voie sublinguale</li>
      <li><strong>Acide tranexamique (Exacyl®)</strong> 1g IV en 10 min, dans les 3h suivant l'accouchement (réduit la mortalité) — répétable une fois si saignement persistant après 30 min</li>
      <li>Remplissage vasculaire par cristalloïdes isotoniques ; transfusion précoce si choc hémorragique (ne pas attendre les résultats biologiques si instabilité franche)</li>
      <li>Rechercher et traiter la cause (règle des 4T) : <strong>T</strong>onus (atonie utérine — cause la plus fréquente), <strong>T</strong>issu (rétention placentaire — révision utérine), <strong>T</strong>rauma (déchirure cervico-vaginale — examen sous valves), <strong>T</strong>hrombine (trouble de la coagulation)</li>
      <li>Si hémorragie réfractaire aux utérotoniques : tamponnement par ballonnet intra-utérin (efficace dans &gt;80% des cas s'il est posé avant l'état de choc avancé), sinon geste chirurgical/radiologie interventionnelle selon plateau technique disponible</li>
      <li>Vêtement anti-choc non pneumatique (NASG) si disponible, en attendant/pendant le transfert — réduit la mortalité de près de moitié en ressources limitées</li>
    </ol>
  </div>

  <div class="card" id="proto-reanimation-nn">
    <h3>👶 Réanimation du nouveau-né en salle de naissance</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après l'algorithme NRP (Neonatal Resuscitation Program) / ILCOR 2020. <strong>~90% des nouveau-nés</strong> n'ont besoin d'aucune assistance ; les gestes de réanimation, quand nécessaires, doivent être initiés dans la <strong>1ère minute de vie</strong> ("Golden Minute").</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluation initiale immédiate (3 questions) :</strong> terme atteint ? bon tonus ? respire ou crie ? — si les 3 réponses sont oui : soins de routine (séchage, contact peau à peau, clampage retardé du cordon ≥30-60s). Si une réponse est non : débuter la prise en charge ci-dessous</li>
      <li><strong>Étapes initiales (30 premières secondes) :</strong> installer sous une source de chaleur radiante, sécher vigoureusement (stimulation tactile essentielle), position neutre de la tête ("sniffing position"), désobstruction des voies aériennes uniquement si sécrétions visibles/obstructives (aspiration douce bouche puis nez, éviter l'aspiration systématique agressive)</li>
      <li><strong>Réévaluation à 30-60s :</strong> fréquence cardiaque (auscultation ou saturomètre/ECG), respiration, tonus, coloration</li>
      <li><strong>Si apnée/gasping ou FC &lt;100/min :</strong> <strong>ventilation en pression positive (VPP)</strong> au masque sans délai — priorité absolue, 40-60 insufflations/min, air ambiant chez le nouveau-né à terme (FiO2 21%), oxygène titré selon SpO2 cible (objectifs différents selon l'âge en minutes de vie — cibles progressivement croissantes de ~60% à 5min jusqu'à ~90% à 10min) chez le prématuré. Vérifier l'efficacité par le soulèvement thoracique et l'amélioration de la FC — si inefficace : repositionner la tête, réaspirer, ouvrir la bouche, augmenter la pression</li>
      <li><strong>Si FC &lt;60/min malgré 30s de VPP efficace</strong> (voies aériennes libres, thorax se soulevant) : <strong>intuber</strong> (ou masque laryngé) et débuter les <strong>compressions thoraciques</strong> — ratio <strong>3 compressions / 1 insufflation</strong> (90 compressions + 30 insufflations par minute), 2 pouces au tiers inférieur du sternum, technique encerclant le thorax ; ventiler en oxygène pur (FiO2 100%) pendant les compressions</li>
      <li><strong>Si FC reste &lt;60/min après 60s de compressions + ventilation bien conduites :</strong> <strong>Adrénaline (Adrénaline Aguettant®)</strong> — 0,01-0,03 mg/kg (soit 0,1-0,3 mL/kg d'une dilution à 1:10 000) IV/IO, répétable toutes les 3-5 min ; voie intratrachéale possible en 1ère dose si voie IV/IO non encore disponible (dose plus élevée requise, 0,05-0,1 mg/kg)</li>
      <li><strong>Rechercher une cause traitable</strong> si absence de réponse : hypovolémie (remplissage NaCl 0,9% ou sang O négatif 10 mL/kg si hémorragie), pneumothorax (transillumination/exsufflation), malformation des voies aériennes</li>
      <li><strong>Prévention de l'hypothermie</strong> tout au long de la réanimation (facteur de morbi-mortalité indépendant) : source de chaleur radiante, séchage immédiat, bonnet, sac plastique si grand prématuré</li>
      <li>Score d'<strong>Apgar</strong> à 1, 5 et 10 min — utile pour documenter l'évolution mais ne doit jamais retarder ou guider les gestes de réanimation (l'algorithme se base sur la FC et la respiration en temps réel)</li>
      <li>Après stabilisation : surveillance rapprochée, glycémie (risque d'hypoglycémie post-asphyxie), transfert en néonatologie si réanimation avancée nécessaire (VPP prolongée, intubation, adrénaline)</li>
    </ol>
  </div>

  <div class="card" id="proto-convulsions-febriles">
    <h3>🌡️ Convulsions fébriles de l'enfant</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les recommandations AAP (American Academy of Pediatrics). Concerne les enfants de <strong>6 mois à 5 ans</strong>, en contexte fébrile, en l'absence d'infection intracrânienne ou de cause métabolique identifiée, sans antécédent de crise afébrile. Pathologie fréquente et bénigne dans sa forme simple, mais nécessite d'éliminer les diagnostics différentiels graves.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Type</th><th>Caractéristiques</th></tr>
      <tr><td class="leger">Simple (~70-75% des cas)</td><td>Généralisée, durée &lt;15 min, unique dans les 24h, retour rapide (&lt;1h) à un état neurologique normal</td></tr>
      <tr><td class="modere">Complexe</td><td>Focale, ou durée &gt;15 min, ou récidive dans les 24h, ou déficit post-critique (Todd) prolongé</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Gestes immédiats</strong> : position latérale de sécurité, protection contre les traumatismes, ne rien mettre dans la bouche, chronométrer la crise, libérer les voies aériennes</li>
      <li><strong>Si crise &gt;5 min :</strong> traiter comme un <strong>état de mal épileptique</strong> (<em>voir protocole dédié</em>) — <strong>Diazépam intrarectal</strong> 0,5 mg/kg (max 10 mg) ou <strong>Midazolam buccal/intranasal</strong> 0,3 mg/kg (max 10 mg)</li>
      <li><strong>Recherche du foyer infectieux</strong> déclenchant (le plus souvent viral — ORL, virose banale) : examen clinique complet, sans bilan systématique si crise simple et enfant bien portant après la crise</li>
      <li><strong>Ponction lombaire</strong> à discuter (non systématique) si : enfant &lt;12 mois avec état clinique préoccupant, signes méningés, léthargie persistante, antécédent de vaccination anti-Hib/pneumocoque incomplet, ou tout signe d'alarme faisant suspecter une méningite/encéphalite sous-jacente (<em>voir protocole méningite</em>)</li>
      <li><strong>Antipyrétique</strong> (<strong>Paracétamol</strong> 15 mg/kg) pour le confort de l'enfant — ne prévient pas la récidive de convulsion fébrile mais traite l'inconfort lié à la fièvre</li>
      <li><strong>Convulsion fébrile complexe ou signes d'alarme</strong> (léthargie prolongée, déficit focal, âge &lt;6 mois, immunodépression) : bilan complémentaire orienté (NFS, CRP, ionogramme, glycémie, imagerie cérébrale si déficit focal persistant), hospitalisation pour surveillance</li>
      <li><strong>Convulsion fébrile simple :</strong> pas de bilan biologique ni d'imagerie systématique, retour à domicile possible après une période d'observation, avec consignes de surveillance et d'éducation parentale (bon pronostic global, risque de récidive ~30-40% mais risque d'épilepsie ultérieure très faible, à peine supérieur à la population générale)</li>
      <li>Ne pas prescrire de traitement antiépileptique prophylactique au long cours après une convulsion fébrile simple isolée (rapport bénéfice-risque défavorable)</li>
    </ol>
  </div>

  <div class="card" id="proto-bronchiolite">
    <h3>😮‍💨 Bronchiolite aiguë du nourrisson</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les recommandations AAP/NICE. Infection virale des voies aériennes basses (VRS le plus souvent), typique chez le <strong>nourrisson &lt;2 ans</strong> (pic 2-6 mois) : toux, polypnée, sibilants et/ou crépitants diffus, difficultés alimentaires, précédés d'une rhinite. Diagnostic essentiellement <strong>clinique</strong> — pas de radiographie ni de bilan biologique systématique dans les formes typiques.</p>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">Signes de gravité (au moins 1 suffit à indiquer une hospitalisation) :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Âge &lt;6 semaines, prématurité, cardiopathie/pneumopathie chronique sous-jacente</li>
      <li>Détresse respiratoire marquée : FR &gt;60-70/min, tirage intense, battement des ailes du nez, geignement, apnées</li>
      <li>SpO2 &lt;92-94% en air ambiant, cyanose</li>
      <li>Difficultés alimentaires (&lt;50% des apports habituels) ou signes de déshydratation</li>
      <li>Altération de l'état général, léthargie</li>
    </ul>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Traitement principalement symptomatique</strong> — pas de traitement curatif spécifique : <strong>désobstruction rhinopharyngée</strong> au sérum physiologique avant chaque repas et avant chaque prise en charge respiratoire, fractionnement des repas, position proclive à 30°</li>
      <li><strong>Oxygénothérapie</strong> si SpO2 &lt;92-94% (selon les seuils locaux), pour maintenir une saturation correcte — lunettes nasales ou masque selon le débit nécessaire</li>
      <li><strong>Ne pas prescrire en routine</strong> (absence de bénéfice démontré dans la bronchiolite typique, recommandations AAP/NICE) : bronchodilatateurs (Salbutamol), corticoïdes systémiques ou inhalés, antibiotiques (sauf surinfection bactérienne documentée), kinésithérapie respiratoire de désencombrement classique (clapping) — un essai thérapeutique unique de bronchodilatateur peut être envisagé au cas par cas chez le nourrisson à antécédents atopiques/familiaux, à poursuivre uniquement si réponse clinique nette</li>
      <li><strong>Hydratation/nutrition</strong> : fractionner les biberons/tétées, sonde nasogastrique ou hydratation IV si apports &lt;50% ou détresse respiratoire empêchant une alimentation sûre</li>
      <li><strong>Ventilation non invasive (CPAP)</strong> à discuter précocement en cas de détresse respiratoire sévère ou d'épuisement, avant l'intubation si possible</li>
      <li>Critères de sortie : SpO2 stable &gt;92-94% en air ambiant, alimentation correcte reprise, absence de détresse respiratoire significative, entourage capable d'assurer la surveillance à domicile</li>
      <li>Prévention : lavage des mains, éviction de la collectivité en phase aiguë, prophylaxie par <strong>Palivizumab</strong> réservée aux nourrissons à très haut risque (grands prématurés, cardiopathie sévère) selon les protocoles locaux disponibles</li>
    </ol>
  </div>

  <div class="card" id="proto-laryngite-epiglottite">
    <h3>🫁 Laryngite aiguë (croup) / Épiglottite</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Deux causes d'obstruction aiguë des voies aériennes supérieures chez l'enfant, à ne pas confondre — l'épiglottite est une urgence vitale extrême nécessitant une prise en charge radicalement différente.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Critère</th><th>Laryngite aiguë (croup)</th><th>Épiglottite</th></tr>
      <tr><td>Âge typique</td><td>6 mois - 6 ans</td><td>Tout âge (rare depuis la vaccination anti-Hib)</td></tr>
      <tr><td>Début</td><td>Progressif, souvent nocturne, précédé d'un rhume</td><td>Brutal, en quelques heures</td></tr>
      <tr><td>Signes clés</td><td>Toux rauque "aboyante", voix rauque, stridor inspiratoire variable selon l'agitation</td><td>Fièvre élevée, hypersialorrhée (refus de déglutir), position assise penchée en avant ("position du renifleur"), voix étouffée, <strong>absence de toux aboyante</strong>, aspect toxique</td></tr>
      <tr><td>Fièvre</td><td>Absente à modérée</td><td>Élevée, altération sévère de l'état général</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Épiglottite suspectée — règle absolue :</strong> <strong>ne jamais examiner la gorge/abaisser la langue, ne jamais allonger l'enfant, ne jamais l'agiter ou le séparer des parents</strong> — tout geste anxiogène ou stimulant peut précipiter une obstruction complète et un arrêt respiratoire. Laisser l'enfant dans la position qu'il choisit spontanément (souvent assis penché en avant)</li>
      <li><strong>Épiglottite — conduite :</strong> transfert immédiat en milieu équipé pour intubation difficile (bloc opératoire/réanimation), appel anesthésiste/ORL en urgence — l'intubation doit être réalisée par une équipe expérimentée, au bloc, avec matériel de trachéotomie de sauvetage prêt (l'intubation peut être extrêmement difficile du fait de l'œdème épiglottique) ; <strong>antibiothérapie IV</strong> large spectre couvrant <em>Haemophilus influenzae</em> (Céfotaxime/Ceftriaxone) dès la sécurisation des voies aériennes</li>
      <li><strong>Laryngite aiguë légère</strong> (stridor uniquement à l'agitation/pleurs, pas de détresse au repos) : <strong>Dexaméthasone</strong> PO/IV 0,15-0,6 mg/kg (dose unique, efficace même à faible dose), rassurer et garder l'enfant calme (l'agitation aggrave le stridor), air humidifié non prouvé efficace mais souvent utilisé, retour à domicile possible avec consignes de surveillance</li>
      <li><strong>Laryngite modérée à sévère</strong> (stridor au repos, tirage) : <strong>Adrénaline nébulisée</strong> (1 mg/mL, 0,5 mL/kg dilués, max 5 mL) — effet rapide mais transitoire (1-2h), <strong>surveillance obligatoire ≥3-4h après la nébulisation</strong> (risque de rebond à la levée de l'effet vasoconstricteur), associée systématiquement à la <strong>Dexaméthasone</strong> (effet plus tardif mais prolongé, prévient le rebond)</li>
      <li><strong>Signes de gravité extrême</strong> (laryngite) : stridor au repos ne s'améliorant pas après nébulisation, épuisement respiratoire, cyanose, troubles de conscience → milieu équipé pour intubation, discuter l'hospitalisation en soins intensifs</li>
      <li>Oxygénothérapie si désaturation, éviter tout examen ou geste anxiogène inutile dans les deux pathologies (l'agitation augmente la demande en oxygène et peut précipiter la décompensation)</li>
      <li>Diagnostic différentiel à garder à l'esprit : corps étranger des voies aériennes (début brutal en pleine santé, syndrome de pénétration — <em>voir protocole dédié</em>), abcès rétropharyngé/périamygdalien, trachéite bactérienne (aspect toxique avec sécrétions purulentes, évolution défavorable sous traitement de croup)</li>
    </ol>
  </div>

  <div class="card" id="proto-deshydratation-enfant">
    <h3>🍼 Déshydratation sévère de l'enfant (OMS)</h3>
    <table style="margin-bottom:10px;">
      <tr><th>Plan</th><th>Signes</th><th>Conduite</th></tr>
      <tr><td class="leger">Plan A (aucune déshydratation)</td><td>Pas de signe de déshydratation</td><td>Réhydratation orale (<strong>SRO — Adiaril®</strong>, sachets OMS) après chaque selle, poursuite de l'alimentation/allaitement</td></tr>
      <tr><td class="modere">Plan B (déshydratation modérée)</td><td>Soif, yeux creux, pli cutané qui s'efface lentement, agitation</td><td><strong>SRO (Adiaril®)</strong> 75 mL/kg sur 4h sous surveillance, réévaluer ensuite</td></tr>
      <tr><td class="grave">Plan C (déshydratation sévère)</td><td>Léthargie/inconscience, yeux très creux, pli cutané persistant &gt;2s, incapacité à boire</td><td>Réhydratation IV en urgence (voir ci-dessous)</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Plan C — Ringer Lactate ou NaCl 0,9% IV :</strong> 100 mL/kg au total, répartis selon l'âge — Nourrisson &lt;12 mois : 30 mL/kg en 1h puis 70 mL/kg sur les 5h suivantes ; Enfant ≥12 mois : 30 mL/kg en 30 min puis 70 mL/kg sur les 2h30 suivantes</li>
      <li>Réévaluer toutes les 15-30 min : si pouls radial toujours faible/imperceptible, accélérer le débit</li>
      <li>Dès que l'enfant peut boire (généralement après 3-4h) : débuter les SRO en complément de la perfusion</li>
      <li>Si voie IV impossible : voie intra-osseuse sans délai, ou SRO par sonde nasogastrique (20 mL/kg/h) en alternative si ni IV ni IO disponibles</li>
      <li>Rechercher et corriger une hypoglycémie associée (fréquente chez le jeune enfant déshydraté)</li>
      <li>Réévaluer l'état d'hydratation après chaque phase de traitement et reclasser le plan si besoin</li>
      <li>Chez le nourrisson dénutri sévère : réhydratation plus prudente et plus lente (protocoles spécifiques OMS — risque de surcharge et de décompensation cardiaque)</li>
    </ol>
  </div>

  <div class="card" id="proto-polytraumatisme">
    <h3>🚑 Polytraumatisme — Approche ABCDE (ATLS)</h3>
    <table>
      <tr><th>Étape</th><th>Évaluation / Action</th></tr>
      <tr><td><strong>A</strong> — Airway + rachis cervical</td><td>Perméabilité des voies aériennes, immobilisation cervicale systématique si trauma à haute cinétique, libération des voies aériennes (aspiration, canule de Guedel), intubation si nécessaire</td></tr>
      <tr><td><strong>B</strong> — Breathing</td><td>Inspection/palpation/auscultation thoracique, rechercher pneumothorax suffocant (exsufflation/drainage en urgence — <em>voir <a onclick="document.getElementById('proto-pneumothorax').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">Pneumothorax</a></em>), volet costal, hémothorax. O2 haut débit systématique</td></tr>
      <tr><td><strong>C</strong> — Circulation</td><td>Contrôle des hémorragies externes (compression, garrot si nécessaire), 2 VVP gros calibre, recherche d'hémorragie interne (abdomen, bassin, fémurs), remplissage prudent (hypotension permissive si hémorragie non contrôlée), transfusion précoce si choc hémorragique</td></tr>
      <tr><td><strong>D</strong> — Disability</td><td>GCS, pupilles, glycémie, recherche de déficit moteur/sensitif, signes de lésion médullaire</td></tr>
      <tr><td><strong>E</strong> — Exposure / Environnement</td><td>Déshabillage complet, examen corps entier (face postérieure incluse en bloc/log-roll), prévention de l'hypothermie (couverture chauffante)</td></tr>
    </table>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">Réévaluation continue du A au E à chaque dégradation. La "triade létale" (hypothermie, acidose, coagulopathie) doit être activement prévenue — <em>protocole de réchauffement détaillé (stadification, spécificités de la RCP) : voir <a onclick="document.getElementById('proto-hypothermie').scrollIntoView({behavior:'smooth',block:'start'})" style="color:var(--accent); cursor:pointer;">Hypothermie accidentelle</a></em>. <strong>Acide tranexamique (Exacyl®)</strong> 1g IV en 10 min dans les 3h post-trauma si hémorragie significative, puis 1g sur 8h (CRASH-2).</p>
  </div>

  <div class="card" id="proto-hemorragie-digestive">
    <h3>🩸 Hémorragie digestive aiguë (haute / basse)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Hématémèse, méléna ou rectorragie abondante. Priorité : évaluer et corriger le retentissement hémodynamique avant/parallèlement à la recherche étiologique. Cause la plus fréquente d'HD haute : ulcère gastro-duodénal ; ne pas oublier la rupture de varices œsophagiennes chez le cirrhotique.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluation de gravité</strong> : FC, TA, marbrures, TRC, état de conscience — un score de Glasgow-Blatchford ou de Rockall peut aider à stratifier le risque</li>
      <li><strong>2 VVP de gros calibre</strong>, bilan (NFS, groupe/Rh/RAI, coagulation, fonction rénale, lactates), commander des culots globulaires si instabilité</li>
      <li>Remplissage cristalloïdes prudent ; transfusion si Hb &lt;7 g/dL (seuil restrictif recommandé, hors coronaropathie/instabilité sévère où le seuil peut être &lt;8-9 g/dL) — objectif TA systolique ~90-100 mmHg, éviter la sur-transfusion (risque de resaignement des varices)</li>
      <li>Correction d'une coagulopathie : <strong>vitamine K (Vitamine K1 Roche®)</strong>, PFC/CCP si sous AVK, arrêt des anticoagulants/antiagrégants selon la balance bénéfice-risque, transfusion plaquettaire si &lt;50 G/L et saignement actif</li>
      <li><strong>IPP IV</strong> (<strong>Oméprazole — Mopral®</strong>/<strong>Pantoprazole — Eupantol®, Inipomp®</strong> 80 mg bolus puis 8 mg/h ou 40 mg x2/j) dès suspicion d'HD haute non variqueuse — réduit le risque de resaignement, à débuter avant l'endoscopie</li>
      <li><strong>Suspicion de rupture de varices œsophagiennes (cirrhotique) :</strong> <strong>Terlipressine (Glypressin®)</strong> IV (ou <strong>Octréotide — Sandostatine®</strong> selon disponibilité) dès l'admission + antibioprophylaxie systématique (Céphalosporine 3G — <strong>Ceftriaxone, Rocéphine®</strong>, réduit la mortalité) ; sonde de Blakemore/Sengstaken en tamponnement si hémorragie incontrôlable dans l'attente de l'endoscopie</li>
      <li><strong>Endoscopie digestive</strong> dans les 24h (voire &lt;12h si instabilité hémodynamique persistante ou suspicion de varices) — diagnostique et thérapeutique (clip, sclérose, ligature élastique)</li>
      <li>Sonde nasogastrique non systématique mais utile pour évacuer/confirmer un saignement actif si diagnostic incertain</li>
      <li>Si échec du traitement endoscopique ou hémorragie massive incontrôlable : radiologie interventionnelle (embolisation) ou chirurgie selon plateau technique disponible</li>
    </ol>
  </div>

  <div class="card" id="proto-encephalopathie-hepatique">
    <h3>🧠 Encéphalopathie hépatique</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Dysfonction cérébrale liée à une insuffisance hépatique et/ou un shunt porto-systémique, en l'absence d'autre cause neurologique — le plus souvent chez le cirrhotique (type C), plus rarement en hépatite fulminante (type A — cf. protocole Coma/Trouble de conscience pour la prise en charge générale de l'insuffisance hépatique aiguë) ou sur shunt porto-systémique sans cirrhose (type B). Toujours déclenchée par un facteur précipitant qu'il faut rechercher systématiquement.</p>
    <table style="margin-bottom:10px;">
      <tr><th>Grade (West Haven)</th><th>Présentation clinique</th></tr>
      <tr><td class="leger">Grade I</td><td>Discret changement de comportement/humeur, troubles du sommeil (inversion), asterixis discret ou absent — diagnostic clinique difficile, souvent rétrospectif</td></tr>
      <tr><td class="modere">Grade II</td><td>Léthargie, désorientation temporelle, changement de personnalité, asterixis net — définit l'<strong>encéphalopathie hépatique patente (overt)</strong> à partir de ce grade</td></tr>
      <tr><td class="grave">Grade III</td><td>Confusion marquée, désorientation spatio-temporelle, somnolence importante mais réveillable, réponse aux ordres simples conservée</td></tr>
      <tr><td class="grave">Grade IV</td><td>Coma, absence de réponse aux stimuli douloureux — risque majeur d'inhalation, protection des voies aériennes impérative</td></tr>
    </table>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">1. Rechercher et corriger le(s) facteur(s) déclenchant(s) — étape la plus importante, présente dans la grande majorité des épisodes :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Hémorragie digestive</strong> (notamment varices œsophagiennes) — cf. protocole dédié</li>
      <li><strong>Infection</strong>, en particulier <strong>infection du liquide d'ascite (péritonite bactérienne spontanée)</strong> — ponction d'ascite systématique au moindre doute chez le cirrhotique ascitique</li>
      <li><strong>Constipation</strong> (augmente la production/absorption d'ammoniac) — cause fréquente et facilement corrigible</li>
      <li><strong>Troubles hydro-électrolytiques</strong> : hypokaliémie, hyponatrémie, déshydratation — souvent iatrogènes (diurétiques, laxatifs surdosés)</li>
      <li><strong>Prise de sédatifs/benzodiazépines ou opioïdes</strong> — à rechercher systématiquement à l'interrogatoire de l'entourage</li>
      <li>Insuffisance rénale aiguë, non-observance du traitement (lactulose/rifaximine arrêtés), pose récente de <strong>TIPS</strong>, consommation d'alcool, progression de la maladie hépatique sous-jacente</li>
    </ul>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">2. Prise en charge symptomatique et spécifique :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Grade III-IV :</strong> orientation en unité de soins intensifs/réanimation, évaluation systématique du score de Glasgow, <strong>protection des voies aériennes</strong> (position latérale de sécurité, aspiration ; intubation si GCS ≤8 ou réflexes de protection abolis — risque élevé d'inhalation)</li>
      <li><strong>Lactulose (Duphalac®, Lactulose Merck®)</strong> — traitement de 1ère ligne : per os/sonde nasogastrique 20-30 mL toutes les 1-2h jusqu'à l'obtention des premières selles, puis titration pour obtenir <strong>2 à 3 selles molles par jour</strong> (dose d'entretien habituelle 20-30 mL x2-3/j) ; en cas de trouble de conscience empêchant la prise orale (grade III-IV) : <strong>lacet de rétention rectale</strong> — 300 mL de lactulose dilués dans 700 mL d'eau, à conserver 30-60 min, répétable toutes les 4-6h jusqu'à reprise de la voie orale</li>
      <li>Titrer prudemment : le surdosage (&gt;4-6 selles/j) peut lui-même précipiter une encéphalopathie (déshydratation, hypernatrémie, hypokaliémie) — <strong>polyéthylène glycol (PEG 3350, Macrogol — Forlax®, Movicol®)</strong> en alternative si intolérance/distension abdominale au lactulose</li>
      <li><strong>Rifaximine (Rifagut®, Xifaxan®)</strong> 550 mg PO/SNG toutes les 12h en association au lactulose dès l'épisode aigu (bénéfice incrémental démontré par rapport au lactulose seul) — antibiotique non résorbable qui diminue la production intestinale d'ammoniac ; à poursuivre en prévention secondaire après un épisode, surtout en cas de récidive sous lactulose seul</li>
      <li><strong>Proscrire les sédatifs et benzodiazépines</strong> (aggravent l'encéphalopathie) ; en cas d'encéphalopathie précipitée par une benzodiazépine documentée, le <strong>Flumazénil (Anexate®)</strong> 0,2-1 mg IV titré peut apporter une amélioration transitoire (n'agit pas sur la cause hépatique sous-jacente)</li>
      <li><strong>Ne pas restreindre les apports protidiques</strong> (pratique obsolète, aggrave la dénutrition sans bénéfice démontré) : apport protéique cible <strong>1,2-1,5 g/kg/j</strong>, fractionné avec une collation nocturne ; recours aux <strong>acides aminés ramifiés (BCAA)</strong> si les besoins ne peuvent être couverts par l'alimentation standard, notamment en cas d'intolérance protéique</li>
      <li><strong>Supplémentation en zinc</strong> à discuter si carence documentée et symptômes persistants malgré lactulose + rifaximine bien conduits</li>
      <li>Le dosage de l'<strong>ammoniémie</strong> n'est pas nécessaire au diagnostic (mauvaise corrélation avec la sévérité clinique) — une ammoniémie normale chez un patient confus doit faire rechercher un <strong>diagnostic alternatif</strong> (autre cause métabolique, toxique, structurelle)</li>
    </ol>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">3. Si absence d'amélioration après 48-72h de traitement bien conduit et facteurs précipitants corrigés :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Rechercher une <strong>cause alternative</strong> à l'altération de conscience : imagerie cérébrale (hématome sous-dural fréquent chez le cirrhotique — troubles de coagulation, chutes), méningite, trouble métabolique non corrigé, sédatif non identifié</li>
      <li>Évoquer un <strong>shunt porto-systémique large</strong> non contrôlé (notamment après TIPS) — discussion d'embolisation du shunt en cas d'encéphalopathie réfractaire au traitement médical optimisé, si la fonction hépatique le permet</li>
      <li>Réévaluer l'indication d'une orientation vers un centre de transplantation hépatique si insuffisance hépatocellulaire sévère sous-jacente</li>
    </ul>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">⚠️ Toute encéphalopathie hépatique de novo ou qui s'aggrave chez un cirrhotique doit faire éliminer en priorité une hémorragie digestive et une infection (notamment péritonite bactérienne spontanée) avant d'incriminer la seule maladie hépatique.</p>
  </div>

  <div class="card" id="proto-intoxications">
    <h3>☠️ Intoxications aiguës — Prise en charge générale et antidotes</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Approche systématique : ABCDE en premier lieu (une intoxication grave tue par dépression respiratoire, trouble du rythme ou coma avec inhalation). Identifier le toxique, l'heure et la dose si possible ; contacter un centre antipoison si disponible.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Décontamination digestive :</strong> Charbon activé (1g/kg, max 50g) utile si ingestion &lt;1-2h d'un toxique adsorbable et voies aériennes protégées — pas de lavage gastrique systématique (bénéfice non démontré, risques d'inhalation)</li>
      <li>Ne jamais provoquer de vomissements ; protéger les voies aériennes (position latérale de sécurité ou intubation) si trouble de conscience</li>
      <li>Rechercher systématiquement une co-ingestion (alcool, autres médicaments) et une cause psychiatrique sous-jacente si geste volontaire</li>
    </ol>
    <table style="margin-top:10px;">
      <tr><th>Toxique</th><th>Signes évocateurs</th><th>Antidote / Conduite spécifique</th></tr>
      <tr>
        <td class="grave">Paracétamol</td>
        <td>Souvent asymptomatique les premières 24h, puis cytolyse hépatique (J2-J4) ; doser la paracétamolémie à H4 et reporter sur le nomogramme de Rumack-Matthew</td>
        <td><strong>N-acétylcystéine IV (Exomuc®, Fluimucil®, Hidonac®)</strong> — schéma classique en 3 poches sur 21h : 150 mg/kg en 1h, puis 50 mg/kg sur 4h, puis 100 mg/kg sur 16h (dose totale 300 mg/kg). Débuter sans délai si dose toxique probable (&gt;150 mg/kg) sans attendre le dosage si le délai avant résultat est long. Efficacité maximale si débutée &lt;8h post-ingestion</td>
      </tr>
      <tr>
        <td class="grave">Benzodiazépines</td>
        <td>Somnolence, ataxie, dépression respiratoire modérée (rarement sévère isolément)</td>
        <td><strong>Flumazénil (Anexate®)</strong> 0,2 mg IV lente, répétable jusqu'à 1-2 mg — <strong>usage restrictif</strong> : contre-indiqué si co-ingestion de proconvulsivants (tricycliques) ou consommation chronique de BZD (risque de convulsions par levée d'inhibition). Le traitement de référence reste la surveillance et le support ventilatoire</td>
      </tr>
      <tr>
        <td class="grave">Opiacés</td>
        <td>Triade : myosis serré, dépression respiratoire (bradypnée), coma</td>
        <td><strong>Naloxone (Narcan®)</strong> 0,4 mg IV/IM/IN, titrée par bolus de 0,04-0,4 mg jusqu'à reprise d'une ventilation efficace — durée d'action courte (30-90 min), répéter/perfusion continue si opiacé longue durée (méthadone) : risque de re-narcotisation à surveiller plusieurs heures</td>
      </tr>
      <tr>
        <td class="grave">Organophosphorés / carbamates</td>
        <td>Syndrome cholinergique : myosis, hypersécrétions (bronchorrhée, sialorrhée, sueurs), bradycardie, fasciculations, convulsions</td>
        <td><strong>Atropine IV (Atropine Aguettant®)</strong> 1-2 mg toutes les 5-10 min jusqu'à assèchement des sécrétions bronchiques (pas de cible de FC) — doses cumulées parfois très élevées nécessaires. <strong>Pralidoxime (Contrathion®)</strong> (réactivateur de cholinestérase) en complément si disponible, d'autant plus efficace si débuté précocement. Décontamination cutanée (retrait des vêtements, lavage) et protection du personnel soignant</td>
      </tr>
      <tr>
        <td class="grave">Monoxyde de carbone (CO)</td>
        <td>Céphalées, nausées, confusion, syncope ; alerte si plusieurs personnes du même foyer symptomatiques. SpO2 faussement normale (ne distingue pas HbCO)</td>
        <td><strong>Oxygène normobare 100% au masque à haute concentration</strong> immédiatement, poursuivi plusieurs heures (accélère l'élimination de l'HbCO). <strong>Oxygénothérapie hyperbare</strong> à discuter si disponible en cas de perte de connaissance, grossesse, signes neurologiques ou cardiaques, ou HbCO très élevée. Retirer la victime de la source d'exposition</td>
      </tr>
      <tr>
        <td class="grave">Antidépresseurs tricycliques</td>
        <td>Troubles de conduction (QRS élargi), convulsions, hypoTA, coma</td>
        <td><strong>Bicarbonate de sodium</strong> IV (molaire ou semi-molaire) si QRS &gt;100ms ou troubles du rythme — alcalinisation protectrice. Éviter les antiarythmiques de classe Ia/Ic. Pas de flumazénil (risque convulsif) si co-ingestion BZD</td>
      </tr>
    </table>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">En l'absence d'antidote spécifique ou de centre antipoison joignable : traitement symptomatique (ABCDE, surveillance scope, correction des troubles ioniques/acido-basiques) reste la base de toute prise en charge toxicologique.</p>
  </div>

  <div class="card" id="proto-brulures">
    <h3>🔥 Brûlures graves — Formule de Parkland</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Brûlure grave si surface &gt;20% TBSA (&gt;10% enfant/sujet âgé), brûlure du visage/mains/périnée, brûlure circulaire, inhalation de fumées suspectée, ou brûlure électrique/chimique. Estimation de la surface par la règle des 9 de Wallace (adulte) ou table de Lund-Browder (enfant), en ne comptant que les brûlures du 2e et 3e degré.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>ABCDE</strong> en premier lieu : suspicion d'inhalation (suies dans les narines/bouche, brûlures faciales, voix rauque, toux) → intubation précoce avant l'apparition d'un œdème obstructif des voies aériennes</li>
      <li>Arrêt du processus de brûlure : refroidissement à l'eau tempérée (15-25°C) pendant 10-20 min si &lt;3h post-brûlure — <strong>éviter l'eau glacée</strong> (risque d'hypothermie, surtout si surface étendue)</li>
      <li><strong>Formule de Parkland :</strong> volume total de Ringer Lactate sur 24h = <strong>4 mL × poids (kg) × %TBSA brûlée</strong> (2e/3e degré uniquement) — calcul à partir de l'heure de la brûlure (non de l'arrivée). La moitié du volume sur les 8 premières heures, l'autre moitié sur les 16h suivantes</li>
      <li>Indiqué si TBSA ≥15-20% chez l'adulte (≥10% chez l'enfant) ; volumes de départ souvent revus à la baisse (2 mL/kg/%TBSA) avec titration stricte pour limiter le risque de "fluid creep" (œdèmes, syndrome des loges)</li>
      <li><strong>Titration sur la diurèse</strong> (objectif principal, à réévaluer horairement) : 0,5 mL/kg/h chez l'adulte, 1 mL/kg/h chez l'enfant — objectif plus élevé (1-2 mL/kg/h) si brûlure électrique/rhabdomyolyse associée</li>
      <li>Analgésie systématique (<strong>morphine — Morphine Aguettant®</strong> titrée IV), prévention de l'hypothermie, pansements non circonférentiels si possible (sinon surveiller un syndrome des loges → escarrotomie)</li>
      <li>Antalgie, prévention antitétanique, pas d'antibioprophylaxie systématique (seulement si signes d'infection)</li>
      <li>Transfert vers un centre de brûlés si critères de gravité réunis (TBSA élevée, localisations à risque, terrain fragile, brûlure électrique/chimique)</li>
    </ol>
  </div>

  <div class="card" id="proto-noyade">
    <h3>🌊 Noyade</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Processus altérant la fonction respiratoire par immersion/submersion en milieu liquide. La cause principale de l'ACR est l'<strong>hypoxie</strong> — c'est elle, et non le rythme cardiaque, qui prime dans la prise en charge initiale.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Sécurisation du sauvetage (ne jamais mettre le sauveteur en danger), sortie de l'eau en maintenant l'axe tête-cou-tronc si suspicion de traumatisme associé (plongeon)</li>
      <li><strong>Séquence ABC modifiée</strong> : si arrêt respiratoire/cardiaque, débuter par <strong>5 insufflations initiales</strong> avant les compressions thoraciques (contrairement à l'ACR classique) — l'oxygénation prime</li>
      <li>RCP standard ensuite (30:2), oxygène haute concentration dès que possible ; pas de manœuvre de Heimlich systématique pour "vider" les poumons (inefficace, retarde la RCP)</li>
      <li>Sécher et réchauffer la victime dès la sortie de l'eau (l'hypothermie associée est fréquente et aggrave le pronostic si non corrigée) ; retirer les vêtements mouillés</li>
      <li>Toute noyade avec perte de connaissance, détresse respiratoire ou inhalation de liquide même minime justifie une <strong>surveillance hospitalière d'au moins 6-8h</strong> (risque d'œdème pulmonaire secondaire retardé)</li>
      <li>Rechercher une cause déclenchante (malaise, crise convulsive, traumatisme, intoxication, hypoglycémie) systématiquement</li>
      <li>Ventilation protectrice/PEEP si SDRA secondaire ; antibiothérapie non systématique (seulement si signes d'infection ou eau très souillée)</li>
      <li>Pronostic corrélé à la durée de l'hypoxie/submersion — ne pas arrêter la réanimation sur la seule durée d'immersion, notamment en eau très froide (cas de récupération après immersion prolongée décrits)</li>
    </ol>
  </div>

  <div class="card" id="proto-electrisation">
    <h3>⚡ Électrisation / Électrocution</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Gravité dépendant du voltage (basse vs haute tension), du trajet du courant (risque cardiaque majeur si trajet main-main ou main-pied), de l'intensité et de la durée de contact. Risque de lésions internes disproportionnées par rapport aux lésions cutanées visibles.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Sécurité avant tout</strong> : couper la source de courant avant tout contact avec la victime (ne jamais toucher directement une victime encore en contact avec une source haute tension)</li>
      <li>ABCDE — risque de fibrillation ventriculaire ou d'asystolie immédiate (surtout basse tension domestique, trajet transthoracique) : scope/DAE dès que possible, RCP standard si ACR</li>
      <li>Immobilisation rachis cervical si chute associée (projection fréquente lors de l'électrisation haute tension)</li>
      <li>ECG systématique et surveillance scope minimum 4-24h selon le contexte (risque de trouble du rythme retardé, surtout si perte de connaissance, ECG initial anormal, ou trajet transthoracique)</li>
      <li>Recherche de <strong>rhabdomyolyse</strong> (fréquente, surtout haute tension) : CK, myoglobinurie, fonction rénale — hyperhydratation et alcalinisation des urines selon le protocole rhabdomyolyse (cf. protocole dédié)</li>
      <li>Examen des points d'entrée/sortie du courant (brûlures profondes souvent sous-estimées) ; syndrome des loges à rechercher activement sur les membres atteints (pressions intracompartimentales, pouls distaux, douleur)</li>
      <li>Bilan lésionnel complet : fractures (contractions musculaires violentes lors du choc électrique), lésions viscérales, lésions oculaires/tympaniques (foudroiement)</li>
      <li>Chez la femme enceinte : surveillance obstétricale rapprochée (risque de souffrance fœtale même si la mère est asymptomatique)</li>
    </ol>
  </div>

  <div class="card" id="proto-coup-chaleur">
    <h3>🌡️ Coup de chaleur / Hyperthermie maligne</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Coup de chaleur :</strong> température centrale &gt;40°C associée à une atteinte du système nerveux central (confusion, convulsions, coma), dans un contexte d'exposition à la chaleur (classique) ou d'effort intense (coup de chaleur d'exercice). Urgence vitale — mortalité élevée si refroidissement retardé.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Refroidissement immédiat et agressif</strong> — priorité absolue avant tout autre geste : immersion en eau froide/glacée si possible (méthode la plus efficace, notamment coup de chaleur d'exercice), sinon linges humides + ventilation, glace aux zones de gros vaisseaux (cou, aisselles, aines). Objectif : température centrale &lt;39°C le plus rapidement possible (idéalement &lt;30 min)</li>
      <li>ABCDE, oxygène, remplissage vasculaire prudent (cristalloïdes, souvent hypovolémie associée), correction des troubles ioniques</li>
      <li>Benzodiazépines si convulsions/frissons intenses (les frissons augmentent la production de chaleur et gênent le refroidissement)</li>
      <li>Surveillance rapprochée : température centrale en continu, fonction rénale (risque d'IRA), CK/myoglobine (rhabdomyolyse fréquente), coagulation (risque de CIVD), bilan hépatique</li>
      <li>Arrêter le refroidissement actif dès &lt;38,5-39°C pour éviter une hypothermie de rebond</li>
      <li><strong>Hyperthermie maligne anesthésique</strong> (contexte différent — réaction pharmacogénétique aux halogénés/succinylcholine) : arrêt immédiat de l'agent déclenchant, hyperventilation en O2 100%, <strong>Dantrolène IV (Dantrium®)</strong> 2,5 mg/kg en bolus (répétable jusqu'à 10 mg/kg) — traitement spécifique, refroidissement actif également indiqué</li>
    </ol>
  </div>

  <div class="card" id="proto-hypothermie">
    <h3>🥶 Hypothermie accidentelle</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les ERC Guidelines 2021 (arrêt cardiaque en circonstances particulières) et la classification suisse (Durrer). Mesurer la <strong>température centrale</strong> (épitympanique/œsophagienne si disponible — un thermomètre standard sous-estime souvent en dessous de 34°C).</p>
    <table style="margin-bottom:10px;">
      <tr><th>Stade</th><th>Température / Signes</th><th>Réchauffement</th></tr>
      <tr><td class="leger">HT I</td><td>32-35°C — conscient, frissons présents</td><td>Passif externe (vêtements secs, couvertures, environnement chauffé)</td></tr>
      <tr><td class="modere">HT II</td><td>28-32°C — conscience altérée, sans frissons</td><td>Actif externe (couvertures chauffantes, air pulsé chaud, sources de chaleur au cou/aisselles/aine)</td></tr>
      <tr><td class="grave">HT III</td><td>24-28°C — inconscient, signes vitaux présents</td><td>Actif interne (perfusions réchauffées, lavages cavitaires chauds, ECMO/CEC si disponible)</td></tr>
      <tr><td class="grave">HT IV</td><td>&lt;24°C — absence de signes vitaux / ACR hypothermique</td><td>RCP + réchauffement actif interne en urgence, idéalement par ECMO/CEC</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Manipuler avec une extrême douceur</strong>, éviter toute mobilisation brutale en hypothermie modérée à sévère (risque de déclencher une fibrillation ventriculaire par irritabilité myocardique) — retrait des vêtements mouillés/froids, isolation du sol et du vent, position horizontale</li>
      <li><strong>HT I :</strong> réchauffement passif externe simple, boissons chaudes sucrées si patient conscient et capable de déglutir, mobilisation active possible</li>
      <li><strong>HT II :</strong> réchauffement actif externe (couvertures chauffantes, air pulsé chaud type Bair Hugger® si disponible, bouillottes/coussins chauffants sur les zones à forte vascularisation — cou, aisselles, aine — jamais sur les membres seuls, risque de vasodilatation périphérique et de choc), éviter toute mobilisation active</li>
      <li><strong>HT III-IV :</strong> réchauffement actif interne — perfusions de cristalloïdes réchauffés (38-42°C), lavage péritonéal ou pleural chaud si disponible, <strong>ECMO/circulation extracorporelle = méthode de référence</strong> pour l'hypothermie sévère et l'ACR hypothermique lorsqu'un centre est accessible (vitesse de réchauffement contrôlée, support hémodynamique simultané) — organiser le transfert précoce vers un centre équipé sans retarder les gestes de réanimation de base</li>
      <li><strong>ACR en hypothermie sévère : ne jamais arrêter la réanimation sur la seule absence de signes vitaux</strong> — règle <em>« no one is dead until warm and dead »</em> : poursuivre la RCP jusqu'au réchauffement (température centrale &gt;32-35°C) ou jusqu'à l'arrivée dans un centre avec ECMO, sauf signe de mort évidente (lésions incompatibles avec la vie) ou hypoxie manifestement responsable de l'arrêt avant l'hypothermie</li>
      <li><strong>Spécificités de la RCP en dessous de 30°C :</strong> limiter à <strong>3 chocs</strong> si FV/TV sans pouls réfractaire, puis différer les chocs suivants jusqu'à réchauffement au-delà de 30°C ; ne pas administrer d'adrénaline (ni autre drogue de l'ACR) en dessous de 30°C — entre 30 et 35°C, <strong>doubler l'intervalle</strong> entre les doses d'adrénaline (soit toutes les 6-10 min) ; reprendre le protocole standard au-delà de 35°C</li>
      <li>Éviter un réchauffement trop rapide ou trop agressif : risque d'<strong>« afterdrop »</strong> (chute paradoxale de la température centrale par retour du sang froid périphérique) et d'hypotension de réchauffement (vasodilatation brutale) — surveillance hémodynamique rapprochée pendant tout le réchauffement</li>
      <li>Rechercher et traiter les complications/causes associées : hypoglycémie (dosage systématique), coagulopathie (l'hypothermie altère la cascade de coagulation — cf. triade létale du polytraumatisé), intoxication éthylique, noyade, sepsis, hypothyroïdie/myxœdème, trouble neurologique/immobilisation prolongée (personne âgée à domicile)</li>
    </ol>
  </div>

  <div class="card" id="proto-insuffisance-surrenale">
    <h3>🧂 Insuffisance surrénalienne aiguë (crise addisonienne)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">À évoquer devant un collapsus/choc résistant au remplissage, hypoglycémie, hyponatrémie/hyperkaliémie, douleurs abdominales, chez un patient insuffisant surrénalien connu (contexte de stress/infection/arrêt de corticoïdes) ou révélant une insuffisance surrénalienne jusque-là méconnue.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Ne jamais retarder le traitement en attendant la confirmation biologique</strong> — prélever un cortisol (± ACTH) si possible puis traiter immédiatement sans attendre le résultat</li>
      <li><strong>Hydrocortisone IV (Hydrocortisone Roussel®, Solu-Cortef®)</strong> 100 mg en bolus, puis 50 mg IV toutes les 6h (ou 200 mg/24h en perfusion continue) — à poursuivre jusqu'à stabilisation puis décroissance progressive avec relais oral</li>
      <li>Remplissage vasculaire rapide par NaCl 0,9% (1L sur la 1ère heure puis adapter), correction de l'hypoglycémie associée (fréquente) par sérum glucosé</li>
      <li>Correction prudente d'une hyperkaliémie sévère si présente (souvent améliorée par l'hydrocortisone et la réhydratation seules)</li>
      <li>Rechercher et traiter le facteur déclenchant (infection, chirurgie, arrêt brutal d'une corticothérapie au long cours, stress majeur)</li>
      <li>Pas besoin de fludrocortisone en phase aiguë (l'hydrocortisone à forte dose a déjà un effet minéralocorticoïde suffisant) — à réintroduire au relais oral une fois la dose d'hydrocortisone diminuée</li>
      <li>Surveillance rapprochée : TA, glycémie, ionogramme, diurèse — bonne réponse habituellement rapide (quelques heures) sous traitement adapté</li>
    </ol>
  </div>

  <div class="card" id="proto-thyroide">
    <h3>🦋 Crise thyréotoxique / Coma myxœdémateux</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">D'après les ATA (American Thyroid Association) Guidelines 2016. Deux urgences endocriniennes opposées, rares mais gravissimes en l'absence de traitement.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Crise thyréotoxique (thyroid storm) :</strong> décompensation aiguë d'une hyperthyroïdie (souvent maladie de Basedow méconnue/mal traitée), déclenchée par une infection, chirurgie, arrêt des antithyroïdiens, prise d'iode. Score de <strong>Burch-Wartofsky</strong> utile pour quantifier la probabilité (fièvre, tachycardie/FA, troubles digestifs, troubles neuropsychiques, insuffisance cardiaque) — diagnostic avant tout clinique, ne pas attendre les hormones thyroïdiennes pour traiter</li>
      <li><strong>Traitement de la crise thyréotoxique (séquence à respecter) :</strong>
        <ol style="margin-left:18px;">
          <li><strong>Antithyroïdien de synthèse</strong> — <strong>Propylthiouracile (PTU)</strong> 500-1000 mg dose de charge puis 250 mg toutes les 4h (bloque aussi la conversion périphérique T4→T3, préféré en 1ère intention dans la crise), ou <strong>Carbimazole (Néo-Mercazole®)</strong> 20-30 mg toutes les 6-8h si PTU indisponible</li>
          <li><strong>Au moins 1h après</strong> l'antithyroïdien (jamais avant — risque d'accélérer la synthèse hormonale par effet Wolff-Chaikoff paradoxal) : <strong>solution iodée</strong> (Lugol fort) pour bloquer la libération hormonale</li>
          <li><strong>Bêtabloquant</strong> — <strong>Propranolol (Avlocardyl®)</strong> 60-80 mg PO toutes les 4h ou 0,5-1 mg IV lent (répétable) : contrôle la tachycardie et bloque également la conversion périphérique T4→T3 ; prudence/contre-indication relative si insuffisance cardiaque décompensée (préférer alors Esmolol titrable)</li>
          <li><strong>Hydrocortisone (Solu-Cortef®)</strong> 100 mg IV toutes les 8h — bloque la conversion T4→T3 et couvre une possible insuffisance surrénalienne relative associée</li>
          <li>Refroidissement si hyperthermie (paracétamol — <strong>éviter l'aspirine</strong> qui déplace la T4 de sa protéine porteuse et aggrave la thyrotoxicose), réhydratation, correction des troubles ioniques, traitement du facteur déclenchant (antibiothérapie si infection)</li>
        </ol>
      </li>
      <li><strong>Coma myxœdémateux :</strong> décompensation aiguë d'une hypothyroïdie sévère non traitée, favorisée par le froid, une infection, des sédatifs/opiacés — hypothermie, bradycardie, hypoventilation avec hypercapnie, troubles de conscience jusqu'au coma, hyponatrémie fréquente. <strong>Mortalité élevée</strong> (jusqu'à 30-40%) — traiter sur suspicion clinique sans attendre les hormones thyroïdiennes</li>
      <li><strong>Traitement du coma myxœdémateux :</strong> <strong>Lévothyroxine IV</strong> — dose de charge 200-400 µg IV, puis 50-100 µg/j IV (relais oral dès que possible) ; associer systématiquement <strong>Hydrocortisone (Solu-Cortef®)</strong> 100 mg IV toutes les 8h <strong>avant/avec</strong> la lévothyroxine (une insuffisance surrénalienne associée est fréquente et la lévothyroxine seule peut précipiter une crise surrénalienne) ; réchauffement passif prudent (jamais actif agressif — risque de vasodilatation et de collapsus) ; ventilation assistée si hypercapnie/détresse respiratoire ; restriction hydrique si hyponatrémie (éviter la correction trop rapide, cf. protocole troubles ioniques) ; traiter le facteur déclenchant (infection +++)</li>
      <li>Éviter les sédatifs et opiacés dans les deux situations (masquent/aggravent les tableaux), surveillance rapprochée en unité de soins intensifs</li>
    </ol>
  </div>

  <div class="card" id="proto-sevrage-alcool">
    <h3>🍺 Sevrage alcoolique sévère / Délirium tremens</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Apparaît typiquement 48-96h après l'arrêt/la réduction de la consommation chez un patient alcoolo-dépendant. Formes de gravité croissante : tremblements/anxiété simples → hallucinose alcoolique → crises convulsives → <strong>délirium tremens</strong> (confusion, agitation, hallucinations, hyperactivité neurovégétative) — mortalité significative si non traité.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Évaluation de la sévérité par un score clinique type <strong>CIWA-Ar</strong> si disponible, pour guider et adapter le traitement</li>
      <li><strong>Benzodiazépines</strong> — traitement de référence : <strong>Diazépam (Valium®)</strong> PO/IV (10-20 mg répétés selon réponse) ou <strong>Lorazépam (Temesta®)</strong> (préféré si insuffisance hépatique sévère, pas de métabolite actif) — titration selon la symptomatologie, doses parfois élevées nécessaires (tolérance croisée avec l'alcool)</li>
      <li><strong>Vitamine B1 (Thiamine — Vitamine B1 Aguettant®) systématique</strong> 200-500 mg IV, à administrer <strong>avant tout apport glucosé</strong> — prévention de l'encéphalopathie de Gayet-Wernicke (confusion, ataxie, troubles oculomoteurs), risque majoré si perfusion de glucosé sans thiamine préalable</li>
      <li>Correction des troubles hydro-électrolytiques fréquemment associés : hypokaliémie, hypomagnésémie, hypophosphorémie (surveiller et corriger, la magnésémie basse favorise la persistance des convulsions)</li>
      <li>Si convulsions : benzodiazépines en 1ère intention (pas d'antiépileptique spécifique nécessaire en général) ; éliminer une autre cause de convulsions (hypoglycémie, traumatisme crânien associé, trouble ionique sévère)</li>
      <li>Environnement calme, réorientation fréquente, contention physique uniquement si nécessaire pour la sécurité du patient/de l'équipe, en complément (non substitut) du traitement médicamenteux</li>
      <li>Surveillance rapprochée : constantes, état neurologique, glycémie — hospitalisation en unité de surveillance continue si délirium tremens constitué</li>
    </ol>
  </div>

  <div class="card" id="proto-rhabdomyolyse">
    <h3>🧬 Rhabdomyolyse</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Destruction du tissu musculaire strié avec libération de myoglobine, CK, potassium et phosphore. Causes fréquentes : traumatisme/écrasement, immobilisation prolongée, effort intense, convulsions prolongées, hyperthermie, toxiques (statines, alcool), électrisation. Complication principale : insuffisance rénale aiguë (précipitation tubulaire de myoglobine).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Diagnostic :</strong> CK &gt;5x la normale (souvent très élevées, &gt;1000-5000 UI/L), urines foncées ("coca-cola"), bandelette urinaire positive pour le sang sans hématies au sédiment (myoglobinurie)</li>
      <li><strong>Hyperhydratation précoce et agressive</strong> — pierre angulaire du traitement : NaCl 0,9% IV, débuter dès la suspicion (avant même la confirmation biologique si contexte évocateur, notamment traumatisme/écrasement) — débit initial élevé (ex. 500 mL/h à 1L/h chez l'adulte selon terrain), objectif diurèse ≥200-300 mL/h tant que les CK restent très élevées</li>
      <li>Surveillance rapprochée du <strong>potassium</strong> — hyperkaliémie souvent précoce et potentiellement menaçante (rhabdomyolyse = relargage massif de K+ intracellulaire) ; ECG et traitement en urgence si signes de gravité (cf. protocole hyperkaliémie)</li>
      <li>Alcalinisation des urines par bicarbonate de sodium : bénéfice non formellement démontré par les études récentes, à discuter au cas par cas (limiter si hypocalcémie associée, ne pas retarder l'hyperhydratation pour ce geste)</li>
      <li>Surveiller et corriger une hypocalcémie (fréquente en phase initiale, généralement ne pas la corriger si asymptomatique — risque de précipitation calcique tissulaire secondaire)</li>
      <li>Rechercher et traiter un syndrome des loges associé (traumatisme/écrasement, immobilisation prolongée) — pressions intracompartimentales, avis chirurgical si suspicion</li>
      <li>Épuration extra-rénale (hémodialyse) si insuffisance rénale sévère avec hyperkaliémie menaçante, surcharge hydrosodée ou acidose réfractaires au traitement médical</li>
      <li>Traiter la cause déclenchante (arrêt du toxique, traitement des convulsions, prise en charge chirurgicale d'un écrasement, refroidissement si hyperthermie associée)</li>
    </ol>
  </div>

  <div class="card" id="proto-sepsis">
    <h3>🦠 Sepsis / Choc septique — Prise en charge en réanimation</h3>
    <p style="font-size:13.5px; margin-bottom:8px;"><strong>Définitions (Sepsis-3, 2016, toujours en vigueur) :</strong> le <strong>sepsis</strong> est une dysfonction d'organe menaçant le pronostic vital, causée par une réponse dérégulée de l'hôte à une infection (augmentation du score SOFA ≥2 points liée à l'infection). Le terme historique <strong>« sepsis sévère »</strong> a été abandonné par Sepsis-3 : il correspond en fait à ce qui est aujourd'hui simplement appelé « sepsis » (le sepsis « non compliqué » sans dysfonction d'organe n'existe plus comme catégorie distincte) — le terme reste toutefois largement utilisé en pratique courante francophone/africaine par habitude. Le <strong>choc septique</strong> est un sous-groupe de sepsis avec anomalies circulatoires et métaboliques profondes : besoin de vasopresseurs pour maintenir une PAM ≥65 mmHg <strong>ET</strong> lactates &gt;2 mmol/L malgré un remplissage vasculaire adéquat.</p>
    <p style="margin-top:8px; font-size:13.5px; margin-bottom:8px;"><strong>Repérage :</strong> le <strong>qSOFA</strong> (FR≥22/min, PAS≤100 mmHg, GCS&lt;15 — cf. module Scores cliniques) est un outil de dépistage au lit du patient hors réanimation, simple et rapide, mais <strong>ne pose pas le diagnostic</strong> de sepsis — il identifie les patients à risque de mauvaise évolution nécessitant une évaluation approfondie (lactates, bilan infectieux, recherche de dysfonction d'organe). Devant toute suspicion clinique d'infection avec signe de gravité, débuter la prise en charge sans attendre la confirmation biologique complète.</p>
    <p style="margin-top:8px; font-weight:600; color:var(--accent2);">Bundle de la 1ère heure (Surviving Sepsis Campaign 2021, actualisé 2026) — à débuter dès la reconnaissance, en parallèle :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Mesurer les lactates</strong> — répéter la mesure si élevés (&gt;2 mmol/L) pour guider la réanimation ; ne pas chercher à normaliser à tout prix mais suivre la clairance (décroissance) associée à la réévaluation clinique</li>
      <li><strong>Hémocultures</strong> (au moins 2 paires) <strong>avant l'antibiothérapie</strong> si cela ne retarde pas celle-ci de plus de 45 minutes — sinon débuter l'antibiothérapie sans attendre</li>
      <li><strong>Antibiothérapie probabiliste à large spectre dans l'heure</strong> suivant la reconnaissance du sepsis/choc septique — chaque heure de retard augmente la mortalité ; adapter au foyer suspecté et à l'écologie locale, réévaluer/désescalader à 48-72h selon les résultats microbiologiques. Exemples : <strong>Ceftriaxone (Rocéphine®)</strong> 2g/j IV, ou <strong>Pipéracilline-Tazobactam (Tazocilline®)</strong> 4g x3-4/j IV si suspicion de foyer nosocomial/abdominal, à associer selon le foyer (aminoside en cas de choc septique sévère pour élargir le spectre initial)</li>
      <li><strong>Remplissage vasculaire</strong> par <strong>cristalloïdes équilibrés (Ringer Lactate)</strong>, préférés au NaCl 0,9% : <strong>au moins 30 mL/kg IV dans les 3 premières heures</strong> en cas d'hypoperfusion tissulaire ou de choc — volume à individualiser ensuite selon la réponse (ne pas poursuivre le remplissage systématiquement jusqu'à normalisation des lactates), avec réévaluation rapprochée (temps de recoloration cutanée, diurèse, auscultation pulmonaire) pour éviter la sur-résuscitation</li>
      <li><strong>Vasopresseurs</strong> si hypotension persistante malgré le remplissage, pour maintenir une <strong>PAM ≥65 mmHg</strong> (cible plus prudente de 60-65 mmHg chez le sujet ≥65 ans, pour limiter la iatrogénie liée aux fortes doses) — <strong>Noradrénaline (Noradrénaline Aguettant®)</strong> IVSE en 1ère intention : dose initiale 0,05-0,1 µg/kg/min, titrée par paliers selon la PAM cible, sans plafond fixe ; voie veineuse centrale à mettre en place rapidement mais une VVP de gros calibre ne doit pas retarder l'initiation en urgence</li>
    </ol>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Choc septique réfractaire :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>Si PAM cible non atteinte malgré une dose de Noradrénaline atteignant <strong>0,25-0,5 µg/kg/min</strong> : ajouter <strong>Vasopressine (Vasopressine Aguettant®)</strong> à dose fixe <strong>0,03 UI/min</strong> (indépendante du poids, non titrée) plutôt que d'escalader la Noradrénaline seule — effet d'épargne catécholaminergique</li>
      <li>Si PAM toujours insuffisante sous Noradrénaline + Vasopressine : ajouter <strong>Adrénaline (Adrénaline Aguettant®)</strong> IVSE, titrée</li>
      <li><strong>Hydrocortisone (Hydrocortisone Upjohn®)</strong> IV <strong>200 mg/j</strong> (50 mg toutes les 6h ou en continu) si choc réfractaire, c'est-à-dire besoin persistant de Noradrénaline/Adrénaline ≥0,25 µg/kg/min depuis au moins 4h malgré remplissage adapté</li>
      <li><strong>Terlipressine déconseillée</strong> dans le choc septique (nouveauté SSC 2026, absence de bénéfice démontré) ; pas de recommandation en faveur de la vitamine C IV en routine</li>
    </ol>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Complément indispensable :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Contrôle du foyer infectieux</strong> dès que possible (dans les 6-12h idéalement) : drainage d'un abcès, ablation d'un cathéter/dispositif infecté, geste chirurgical si péritonite/foyer chirurgical — sans ce contrôle, l'antibiothérapie seule est souvent insuffisante</li>
      <li>Oxygénothérapie/ventilation selon la tolérance respiratoire ; envisager la ventilation mécanique précoce en cas de détresse respiratoire associée ou de choc majeur non contrôlé</li>
      <li>Surveillance rapprochée : PAM, diurèse horaire (objectif &gt;0,5 mL/kg/h), lactates répétés, état de conscience, marbrures/temps de recoloration cutanée (outil simple et validé pour guider la réanimation, en complément des lactates)</li>
      <li>Rechercher et corriger les défaillances associées : hyperglycémie (contrôle glycémique modéré, éviter l'hypoglycémie), coagulopathie/CIVD, insuffisance rénale aiguë (épuration extra-rénale si indication), thromboprophylaxie systématique sauf contre-indication</li>
      <li>Réévaluation quotidienne de la nécessité de chaque traitement (désescalade antibiotique, sevrage des vasopresseurs, allègement de la sédation) — la prise en charge du sepsis ne s'arrête pas à la 1ère heure, elle se poursuit tout au long du séjour</li>
    </ol>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">⚠️ Pour le choc septique dans le cadre spécifique d'un purpura fulminans (méningococcémie), voir le protocole dédié ci-dessous — l'antibiothérapie y prime sur tout le reste et doit être administrée sur place avant tout transfert.</p>
  </div>

  <div class="card" id="proto-meningite">
    <h3>🦠 Méningite / Encéphalite bactérienne aiguë</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Triade classique (fièvre, raideur de nuque, céphalées) souvent incomplète — méfiance chez le nourrisson (irritabilité, fontanelle bombée) et le sujet âgé (confusion isolée possible). Urgence absolue : chaque heure de retard d'antibiothérapie augmente la mortalité.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Ne jamais retarder l'antibiothérapie</strong> pour réaliser l'imagerie ou la ponction lombaire — hémocultures avant la 1ère dose d'ATB si possible mais sans délai significatif</li>
      <li>TDM cérébrale <strong>avant PL</strong> uniquement si signe de localisation, trouble de conscience sévère (GCS &lt;12), crise convulsive récente, immunodépression ou signe d'engagement — sinon PL directe</li>
      <li><strong>Antibiothérapie probabiliste IV immédiate :</strong> <strong>Ceftriaxone (Rocéphine®)</strong> 2g x2/j (4g/j) ou <strong>Céfotaxime (Claforan®)</strong> — associer <strong>Amoxicilline (Clamoxyl®)</strong> si suspicion de Listeria (sujet &gt;50 ans, immunodépression, signes de rhombencéphalite)</li>
      <li><strong>Dexaméthasone (Soludécadron®)</strong> 10 mg IV toutes les 6h × 4 jours, à débuter <strong>en même temps ou juste avant</strong> la 1ère dose d'antibiotique (inefficace si donnée après) — réduit les séquelles auditives et neurologiques, surtout si pneumocoque</li>
      <li>Isolement gouttelettes systématique jusqu'à 24h d'antibiothérapie efficace si suspicion de méningocoque ; déclaration obligatoire et antibioprophylaxie des sujets contacts proches (<strong>Rifampicine — Rifadine®</strong> ou <strong>Ciprofloxacine — Ciflox®</strong> dose unique)</li>
      <li>Analyse du LCR : cytologie, protéinorachie, glycorachie (rapport glycorachie/glycémie &lt;0,4 évocateur de bactérien), examen direct, culture, PCR selon disponibilité (méningocoque, pneumocoque, herpès si encéphalite)</li>
      <li>Si encéphalite suspectée (confusion, convulsions, signes focaux, contexte) : <strong>Aciclovir IV (Zovirax®)</strong> 10 mg/kg/8h empirique dès la suspicion (herpétique jusqu'à preuve du contraire), sans attendre la PCR</li>
      <li>Surveillance rapprochée : conscience, pupilles, signes d'engagement, convulsions — traiter une HTIC associée si présente (cf. protocole dédié)</li>
    </ol>
  </div>

  <div class="card" id="proto-purpura-fulminans">
    <h3>🟣 Purpura fulminans (méningococcémie grave)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Extrême urgence : purpura extensif, nécrotique ou ecchymotique (≥1 élément &gt;3mm), fébrile, associé à des signes de choc — mortalité très élevée sans traitement immédiat. Ne pas attendre l'hospitalisation pour traiter.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Antibiothérapie immédiate sur place</strong>, avant tout transfert, dès le diagnostic évoqué (ne pas attendre l'arrivée à l'hôpital ni les prélèvements) : <strong>Ceftriaxone IV/IM (Rocéphine®)</strong> 1-2g (50-100 mg/kg chez l'enfant) — geste qui prime sur tout le reste</li>
      <li>Appel immédiat du SAMU/réanimation, transfert médicalisé en urgence absolue vers un centre disposant d'une réanimation</li>
      <li>Prise en charge du choc septique associé en parallèle : remplissage vasculaire rapide (cristalloïdes 20 mL/kg en bolus, répétable), amines vasopressives précoces si non-réponse au remplissage (cf. protocole états de choc)</li>
      <li>Hémocultures si possible sans retarder l'antibiothérapie ; PL contre-indiquée en phase de choc (à différer)</li>
      <li>Isolement gouttelettes du patient, antibioprophylaxie systématique des sujets contacts proches (<strong>Rifampicine — Rifadine®</strong> ou <strong>Ciprofloxacine — Ciflox®</strong> ou <strong>Ceftriaxone — Rocéphine®</strong> selon terrain), déclaration obligatoire</li>
      <li>Surveillance étroite : extension du purpura, diurèse, marbrures, lactates, coagulation (risque de CIVD) — orientation en réanimation systématique</li>
    </ol>
  </div>

  <div class="card" id="proto-hic">
    <h3>🧠 Hypertension intracrânienne aiguë / Engagement cérébral</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">À évoquer devant céphalées intenses, vomissements en jet, troubles de conscience évolutifs, mydriase unilatérale (signe d'engagement temporal — urgence extrême), triade de Cushing (HTA, bradycardie, respiration irrégulière = signe tardif et péjoratif).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li>ABCDE, protection des voies aériennes si GCS ≤8 (intubation), <strong>éviter l'hypoxie et l'hypotension</strong> (aggravent les lésions secondaires) — objectif SpO2 &gt;94%, TA moyenne adaptée pour maintenir la pression de perfusion cérébrale</li>
      <li><strong>Positionnement :</strong> tête surélevée à 30°, axe tête-cou droit (éviter la compression jugulaire), éviter toute manœuvre augmentant la pression intrathoracique</li>
      <li><strong>Osmothérapie en urgence</strong> si signe d'engagement ou détérioration neurologique aiguë : <strong>Mannitol 20% (Mannitol Aguettant®, Mannitol Baxter®)</strong> 0,25-1 g/kg IV en 15-20 min, OU <strong>sérum salé hypertonique</strong> (NaCl 3-7,5%) selon disponibilité et statut volémique — ne pas attendre l'imagerie si signes cliniques d'engagement francs</li>
      <li>Hyperventilation modérée transitoire (PaCO2 cible ~30-35 mmHg) réservée aux situations d'engagement aigu avec détérioration rapide, en mesure temporisatrice dans l'attente d'un geste définitif — à ne pas prolonger (vasoconstriction cérébrale, risque ischémique)</li>
      <li>Contrôle de la température (normothermie stricte) et de la glycémie (éviter hypo- et hyperglycémie, toutes deux délétères)</li>
