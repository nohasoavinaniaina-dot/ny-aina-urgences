      <li><strong>Surveillance prolongée 48-72h minimum</strong> : risque de <strong>syndrome intermédiaire</strong> (faiblesse musculaire proximale et respiratoire retardée, typiquement entre J1 et J4, après amélioration initiale apparente) — surveillance CPK et kaliémie (rhabdomyolyse), fonction rénale</li>
    </ol>
  </div>

  <div class="card" id="proto-co">
    <h3>💨 Intoxication au monoxyde de carbone (CO)</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Gaz inodore et incolore, source fréquente : groupes électrogènes, braseros/charbon utilisés en espace clos, incendie, appareils de chauffage défectueux. À évoquer systématiquement devant des céphalées, nausées ou une confusion touchant plusieurs personnes du même foyer simultanément.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Retirer immédiatement la victime de la source d'exposition</strong> et aérer les lieux avant toute autre prise en charge</li>
      <li><strong>La SpO2 est faussement normale</strong> — l'oxymètre de pouls standard ne différencie pas la carboxyhémoglobine (HbCO) de l'oxyhémoglobine : ne jamais se fier à une SpO2 normale pour écarter le diagnostic</li>
      <li><strong>Oxygénothérapie 100% au masque à haute concentration</strong>, débutée immédiatement dès la suspicion clinique, sans attendre la confirmation biologique, poursuivie plusieurs heures — accélère nettement l'élimination de l'HbCO (demi-vie réduite d'environ 5h en air ambiant à 1-1,5h sous oxygène pur)</li>
      <li>Dosage de la carboxyhémoglobine si disponible (gaz du sang avec CO-oxymétrie) pour confirmer et quantifier l'exposition</li>
      <li><strong>Oxygénothérapie hyperbare</strong> à discuter si disponible, en cas de : perte de connaissance même brève, signes neurologiques ou cardiaques, grossesse (le CO traverse le placenta et expose à une toxicité fœtale majorée), ou HbCO très élevée — bénéfice maximal si débutée précocement</li>
      <li><strong>ECG systématique</strong> : une ischémie myocardique est possible même chez un sujet jeune sans coronaropathie connue</li>
      <li>Informer le patient et l'entourage du risque de <strong>syndrome neurologique post-intervallaire</strong> (troubles cognitifs, de l'humeur ou moteurs) pouvant apparaître entre 3 et 21 jours après une intoxication apparemment résolue — consultation de contrôle recommandée</li>
      <li>En contexte d'incendie en espace clos, <strong>évoquer une intoxication cyanhydrique associée</strong> (fumées de combustion) devant un choc ou une acidose lactique majeure disproportionnée par rapport à l'intoxication au CO seule</li>
    </ol>
  </div>

  <div class="card" id="proto-agitation">
    <h3>🌪️ Agitation aiguë — Sédation d'urgence</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Motif fréquent aux urgences. Une cause organique doit toujours être recherchée et éliminée avant d'attribuer l'agitation à une origine purement psychiatrique — hypoglycémie, hypoxie, sepsis, intoxication, sevrage, traumatisme crânien peuvent tous se présenter comme une agitation aiguë.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Sécurité avant tout :</strong> éloigner les objets potentiellement dangereux, s'assurer d'un personnel en nombre suffisant, privilégier en 1ère intention la <strong>désescalade verbale</strong> (ton calme, respect de l'espace personnel, éviter la confrontation directe)</li>
      <li><strong>Éliminer une cause organique urgente</strong> avant toute sédation lorsque possible : glycémie capillaire, SpO2, température, recherche de traumatisme crânien, signes d'intoxication ou de sevrage — une cause réversible non traitée peut être masquée par la sédation</li>
      <li><strong>Contention physique</strong> en dernier recours et le plus brièvement possible, jamais isolée (toujours associée à une surveillance rapprochée continue) — privilégier une contention à 2 points plutôt qu'à 4 points lorsqu'elle est suffisante</li>
      <li><strong>Sédation médicamenteuse</strong> si agitation sévère avec risque pour le patient ou pour autrui :<br>
        • <strong>Halopéridol (Haldol®)</strong> 5 mg IM (2,5 mg chez le sujet âgé/fragile), délai d'action ~30-60 min, répétable<br>
        • <strong>Midazolam (Hypnovel®)</strong> 5 mg IM ou IV lente, délai d'action rapide (5-10 min), à privilégier si sédation rapide nécessaire — surveiller étroitement le risque de dépression respiratoire<br>
        • L'<strong>association Halopéridol + Midazolam</strong> (ou + une benzodiazépine) est souvent plus efficace qu'une monothérapie et permet de réduire la dose de chaque agent</li>
      <li><strong>Surveillance systématique post-sédation</strong> : fréquence respiratoire, SpO2, scope si benzodiazépine à dose significative ou association médicamenteuse — risque de dépression respiratoire</li>
      <li><strong>Précautions :</strong> éviter l'halopéridol en cas d'allongement du QT connu ou de trouble ionique majeur non corrigé (risque de torsade de pointes) ; réduire les doses chez le sujet âgé ou insuffisant hépatique</li>
      <li>Une fois le patient calmé : réévaluation clinique et biologique complète pour rechercher la cause sous-jacente, avis psychiatrique si une origine psychiatrique est confirmée</li>
      <li><strong>Documenter précisément</strong> le motif de la contention/sédation, les mesures utilisées et leur durée — exigence éthique et médico-légale</li>
    </ol>
  </div>

  <div class="card" id="proto-suicidaire">
    <h3>💭 Crise suicidaire — Évaluation et prise en charge aux urgences</h3>
    <p style="font-size:13.5px; margin-bottom:8px;">Toute expression d'idées suicidaires ou toute tentative doit être prise au sérieux, quelle que soit sa gravité apparente. L'objectif immédiat est d'assurer la sécurité du patient avant toute autre démarche diagnostique ou thérapeutique.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Accueil non jugeant</strong>, entretien dans un lieu calme et sécurisé — retirer de l'environnement immédiat les objets potentiellement dangereux (médicaments, objets tranchants, ceinture, cordons)</li>
      <li><strong>Évaluer directement et sans détour le risque suicidaire</strong> : idées actuelles, existence d'un scénario/plan élaboré, accès à des moyens létaux, antécédent personnel de tentative, degré d'intentionnalité, facteurs précipitants récents — poser la question directement ne majore pas le risque, contrairement à une idée reçue répandue</li>
      <li><strong>Rechercher les facteurs de risque</strong> : antécédents psychiatriques (dépression, trouble bipolaire, psychose), addictions, isolement social, événement de vie récent (deuil, rupture, perte d'emploi), antécédent familial de suicide, accès facilité à des moyens (armes, médicaments, pesticides agricoles)</li>
      <li><strong>Ne jamais laisser seul un patient à haut risque</strong> — surveillance rapprochée continue jusqu'à l'évaluation psychiatrique</li>
      <li>Prise en charge somatique en priorité en cas de tentative avec moyen physique (intoxication médicamenteuse, plaie auto-infligée) — se référer aux protocoles spécifiques correspondants (intoxications aiguës, hémorragie)</li>
      <li><strong>Avis psychiatrique systématique</strong> avant toute décision de sortie, y compris si le patient minimise son geste a posteriori ou demande à partir</li>
      <li>Décision d'hospitalisation (avec ou sans consentement, selon le cadre légal en vigueur) si le risque immédiat est jugé élevé, en l'absence de facteur protecteur solide, ou si un environnement sécurisant ne peut être assuré en ambulatoire</li>
      <li>Si une sortie est envisagée : élaborer avec le patient un <strong>plan de sécurité écrit</strong> (signes d'alerte personnels, personnes-ressources à contacter, restriction de l'accès aux moyens létaux au domicile), impliquer un proche de confiance, organiser un contact de suivi rapproché (dans les 24-72h)</li>
      <li>Une tentative de suicide antérieure est le facteur prédictif le plus fort de récidive ou de décès par suicide — ne jamais banaliser un geste jugé "peu grave" sur le plan somatique</li>
    </ol>
  </div>

  <div class="card" id="proto-intubation-difficile">
    <h3>🫁 Intubation difficile / Séquence d'induction rapide (RSI)</h3>
    <p style="font-weight:600; color:var(--accent2); margin-bottom:8px;">Préparation systématique (règle des 7P) avant toute intubation en urgence :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Plan</strong> — anticiper un plan A/B/C/D (intubation directe → vidéolaryngoscopie/mandrin → dispositif supraglottique → abord chirurgical)</li>
      <li><strong>Préoxygénation</strong> — FiO2 100% pendant 3 min ou 8 capacités vitales, position proclive 20-30°, VNI/O2 haut débit si désaturation prévisible</li>
      <li><strong>Positionnement</strong> — position amendée de Jackson (oreille-fourchette sternale alignées)</li>
      <li><strong>Matériel prêt</strong> — 2 laryngoscopes/lames fonctionnels, sondes de tailles différentes, mandrin long béquillé, dispositif supraglottique, capnographe, aspiration branchée et testée</li>
      <li><strong>Protocole médicamenteux (RSI)</strong> — induction + curarisation quasi simultanées, sans ventilation au masque dans les formes classiques :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Étape</th><th>Molécule</th><th>Posologie</th></tr>
      <tr><td rowspan="3">Induction</td><td><strong>Kétamine (Ketalar®)</strong></td><td>1,5-2 mg/kg IV directe (privilégiée en instabilité hémodynamique)</td></tr>
      <tr><td><strong>Étomidate (Hypnomidate®)</strong></td><td>0,3 mg/kg IV directe</td></tr>
      <tr><td><strong>Propofol (Diprivan®)</strong></td><td>1,5-2,5 mg/kg IV directe si patient stable</td></tr>
      <tr><td rowspan="2">Curarisation</td><td><strong>Succinylcholine (Célocurine®)</strong></td><td>1-1,5 mg/kg IV (délai d'action ~45 sec)</td></tr>
      <tr><td><strong>Rocuronium (Esmeron®)</strong></td><td>1,2 mg/kg IV si contre-indication à la succinylcholine (délai ~60 sec)</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Kétamine et Diazépam sont les plus largement disponibles, y compris en CHRR/CHRD (agents d'anesthésie de base, LNMEIS). Propofol, Étomidate et Rocuronium sont réservés aux blocs opératoires/réanimations des CHU (Antananarivo, Mahajanga, Toamasina...). La Succinylcholine (Célocurine®) est présente dans la plupart des pharmacies hospitalières disposant d'un bloc opératoire.</p>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Critères prédictifs d'intubation difficile — mnémotechnique LEMON :</p>
    <p style="font-size:13px;">🔹 <strong>L</strong>ook (morphologie externe) 🔹 <strong>E</strong>valuate 3-3-2 (ouverture bouche/distance thyromentale/hyomentale) 🔹 <strong>M</strong>allampati 🔹 <strong>O</strong>bstruction/Obésité 🔹 <strong>N</strong>eck mobility (mobilité cervicale)</p>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">Échec d'intubation après 2 tentatives optimisées → appeler à l'aide, passer au plan B (dispositif supraglottique) → si échec de ventilation/oxygénation → situation "ne peut ni intuber ni oxygéner" (NINO) → abord chirurgical immédiat (crico-thyroïdotomie).</p>
  </div>

  <div class="card" id="proto-cricothyroidotomie">
    <h3>🔪 Crico-thyroïdotomie — Échec d'intubation ("ne peut ni intuber ni oxygéner")</h3>
    <div class="warn-box">⚠️ Geste de sauvetage exceptionnel, réservé à la situation NINO (Ne peut Intuber, Ne peut Oxygéner) après échec de tous les plans précédents (masque facial, dispositif supraglottique).</div>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Repérer la membrane crico-thyroïdienne</strong> — entre cartilage thyroïde et cartilage cricoïde, sur la ligne médiane</li>
      <li><strong>Anesthésie locale si patient conscient</strong> — <strong>Lidocaïne (Xylocaïne®) 1-2%</strong>, 3-5mL en infiltration sous-cutanée, disponible dans toutes les formations sanitaires (LNMEIS, niveau CSB2 et supérieur)</li>
      <li><strong>Incision cutanée verticale</strong> puis incision horizontale de la membrane crico-thyroïdienne (technique du bistouri-doigt-bougie si disponible)</li>
      <li><strong>Insérer la bougie</strong> puis faire glisser une sonde d'intubation de petit calibre (6.0) ou une canule de trachéotomie le long de la bougie</li>
      <li><strong>Gonfler le ballonnet, ventiler</strong> et confirmer la position par capnographie et auscultation bilatérale</li>
      <li>À défaut de matériel : <strong>technique par ponction à l'aiguille</strong> (cathéter 14G) avec insufflation à haut débit en attendant un abord définitif</li>
    </ol>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">Geste chronométré : l'hypoxie cérébrale s'installe en quelques minutes — ne pas persister sur des tentatives d'intubation itératives au-delà du raisonnable.</p>
  </div>

  <div class="card" id="proto-civd">
    <h3>🩸 CIVD — Coagulation intravasculaire disséminée</h3>
    <p class="module-sub" style="margin-bottom:8px;">Causes principales : sepsis sévère, polytraumatisme, complications obstétricales (HRP, embolie amniotique), pathologie néoplasique, hémolyse aiguë.</p>
    <table>
      <tr><th>Paramètre</th><th>Anomalie évocatrice</th></tr>
      <tr><td>Plaquettes</td><td>Thrombopénie, souvent &lt;100 000/mm³, chute rapide</td></tr>
      <tr><td>TP / TCA</td><td>Allongés (consommation des facteurs de coagulation)</td></tr>
      <tr><td>Fibrinogène</td><td>Effondré (&lt;1 g/L dans les formes sévères)</td></tr>
      <tr><td>D-dimères</td><td>Très élevés (fibrinolyse réactionnelle)</td></tr>
      <tr><td>Frottis</td><td>Schizocytes (hémolyse mécanique)</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Score ISTH (International Society on Thrombosis and Haemostasis) permet de quantifier la CIVD manifeste à partir de ces 4 paramètres.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Traiter la cause déclenchante en priorité</strong> — antibiothérapie du sepsis, évacuation utérine, contrôle chirurgical de l'hémorragie</li>
      <li><strong>Correction transfusionnelle uniquement si saignement actif ou geste invasif prévu</strong> (la transfusion prophylactique sans saignement n'est pas recommandée) :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Produit</th><th>Posologie / Seuil</th></tr>
      <tr><td>Plasma frais congelé (PFC)</td><td>15-20 mL/kg si TP/TCA &gt;1,5x normale avec saignement actif</td></tr>
      <tr><td>Fibrinogène concentré / Cryoprécipités</td><td>1-2g (ou 3-4g si fibrinogène &lt;1g/L) si fibrinogène &lt;1-1,5 g/L avec saignement</td></tr>
      <tr><td>Plaquettes</td><td>1 unité (culot plaquettaire) pour 10kg de poids si &lt;50 000/mm³ avec saignement actif ou &lt;20 000/mm³ en prophylaxie de geste</td></tr>
      <tr><td><strong>Acide tranexamique (Exacyl®)</strong></td><td>1g IV en 10 min — discuté au cas par cas, <strong>contre-indiqué</strong> si CIVD à composante thrombotique dominante</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : PFC et plaquettes dépendent de la banque de sang du CHU/CHRR (Centre National de Transfusion Sanguine, CNTS) — disponibilité variable et souvent limitée hors capitale. Le fibrinogène concentré et les cryoprécipités sont rarement disponibles hors CHU. L'Exacyl® (acide tranexamique) est largement disponible, y compris en pharmacie de gros de district.</p>
  </div>

  <div class="card" id="proto-transfusion-pratique">
    <h3>🩸 Transfusion sanguine — Indications, groupes et posologies</h3>
    <p class="module-sub" style="margin-bottom:8px;">D'après les recommandations AABB 2023 (seuils transfusionnels érythrocytaires), AABB/ICTMG (transfusion plaquettaire), et l'OMS (Clinical Use of Blood). Principes pratiques pour les concentrés de globules rouges (CGR), le plasma frais congelé (PFC) et les plaquettes, chez l'adulte et l'enfant. Voir aussi les protocoles dédiés : CIVD, Transfusion massive, Accident transfusionnel aigu.</p>

    <p style="font-weight:600; color:var(--accent2);">Compatibilité ABO/Rh — choix du groupe à transfuser :</p>
    <table>
      <tr><th>Groupe du receveur</th><th>CGR compatibles</th><th>PFC compatibles</th></tr>
      <tr><td><strong>O</strong></td><td>O uniquement</td><td>O, A, B, AB</td></tr>
      <tr><td><strong>A</strong></td><td>A, O</td><td>A, AB</td></tr>
      <tr><td><strong>B</strong></td><td>B, O</td><td>B, AB</td></tr>
      <tr><td><strong>AB</strong></td><td>AB, A, B, O</td><td>AB uniquement</td></tr>
    </table>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9; margin-top:8px;">
      <li><strong>Urgence vitale immédiate</strong> (avant groupage/RAI disponibles) : culots <strong>O Rh négatif</strong> (donneur universel érythrocytaire) ; plasma <strong>AB</strong> (donneur universel plasmatique) si disponible — dès que le groupage du patient est connu, basculer sur des produits iso-groupe</li>
      <li><strong>Femme en âge de procréer</strong> : privilégier autant que possible le Rh négatif en situation non vitale, pour limiter le risque d'allo-immunisation anti-D compromettant une grossesse future ; si une receveuse Rh négatif a reçu du sang Rh positif par nécessité, discuter une prophylaxie par <strong>immunoglobulines anti-D</strong> selon disponibilité</li>
      <li>Toujours réaliser un <strong>groupage/Rh + recherche d'agglutinines irrégulières (RAI)</strong> et, si possible, une épreuve de compatibilité (cross-match) avant transfusion non vitale</li>
    </ul>

    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Indications et posologies chez l'adulte :</p>
    <table>
      <tr><th>Produit</th><th>Seuil / Indication</th><th>Dose usuelle</th><th>Effet attendu</th></tr>
      <tr><td><strong>CGR</strong></td><td>Hb &lt;7 g/dL chez le patient stable (seuil restrictif) ; &lt;7,5 g/dL en chirurgie cardiaque ; &lt;8 g/dL en chirurgie orthopédique ou cardiopathie connue ; au-delà de ces seuils si anémie symptomatique (angor, dyspnée, instabilité) ou hémorragie active non contrôlée</td><td>1 culot (~250-300 mL)</td><td>+1 g/dL d'Hb ou +3% d'hématocrite ; réévaluer avant transfusion suivante</td></tr>
      <tr><td><strong>PFC</strong></td><td>TP/TCA &gt;1,5x la normale avec saignement actif ou avant geste invasif ; correction d'un surdosage en AVK</td><td>10-15 mL/kg (jusqu'à 15-20 mL/kg)</td><td>+15-20% des facteurs de coagulation</td></tr>
      <tr><td><strong>Plaquettes</strong></td><td>&lt;10 000/mm³ en prophylaxie chez le patient stable afébrile ; &lt;20 000/mm³ si fièvre/sepsis ou avant pose de voie centrale ; &lt;50 000/mm³ avant geste invasif/chirurgie ou saignement actif ; &lt;100 000/mm³ avant neurochirurgie ou chirurgie ophtalmologique</td><td>1 unité d'aphérèse (ou équivalent en mélange de concentrés)</td><td>+30 000 à 50 000/mm³</td></tr>
    </table>

    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Posologies en pédiatrie :</p>
    <table>
      <tr><th>Produit</th><th>Dose</th><th>Débit / Durée</th></tr>
      <tr><td><strong>CGR</strong></td><td>10-15 mL/kg (poids &lt;35-40kg) ou 1 unité si poids ≥35-40kg ; réduire à 5 mL/kg par séance si anémie sévère mal tolérée (risque de surcharge)</td><td>Débit usuel ~5 mL/kg/h ; durée totale 2-4h, à ne jamais dépasser 4h par poche</td></tr>
      <tr><td><strong>PFC</strong></td><td>10-20 mL/kg</td><td>Idem, selon tolérance hémodynamique</td></tr>
      <tr><td><strong>Plaquettes</strong></td><td>10-15 mL/kg (ou environ 1 unité pour 10 kg)</td><td>Idem</td></tr>
    </table>
    <p style="font-size:13.5px; margin-top:8px;">Chez l'enfant hémodynamiquement stable et sans hémoglobinopathie, cardiopathie cyanogène ni hypoxémie sévère, le seuil transfusionnel est également <strong>Hb &lt;7 g/dL</strong> (recommandation AABB 2023, similaire à l'adulte). En contexte de ressources limitées, l'essai <strong>TRACT</strong> (Ouganda/Malawi) a validé la transfusion immédiate de CGR (10-15 mL/kg) chez l'enfant hospitalisé avec anémie sévère (Hb &lt;6 g/dL), sans bénéfice supplémentaire démontré des volumes plus élevés.</p>

    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Précautions pratiques indispensables :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Contrôle ultime au lit du malade</strong> avant chaque poche : concordance stricte entre l'identité du patient, la carte de groupe sanguin, l'étiquette de la poche et la carte de compatibilité — geste non négociable, y compris en situation d'urgence vitale (c'est la principale cause évitable d'accident hémolytique)</li>
      <li><strong>Tubulure à filtre</strong> dédiée (170-200 microns) ; aucune administration de médicament ou de soluté glucosé/calcique sur la même voie que le produit sanguin (uniquement du NaCl 0,9% en cas de rinçage)</li>
      <li><strong>Surveillance clinique rapprochée</strong> : constantes avant transfusion (T0), à 15 minutes puis régulièrement pendant et à la fin de la transfusion (FC, PA, température, SpO2, diurèse) — arrêt immédiat au moindre symptôme suspect (<em>voir protocole Accident transfusionnel aigu</em>)</li>
      <li><strong>Durée maximale de 4h par poche</strong> (risque de prolifération bactérienne au-delà) — transfusion plus lente chez l'insuffisant cardiaque/rénal ou le sujet âgé (risque de TACO), au contraire accélérée en cas de choc hémorragique</li>
      <li><strong>Réchauffement du sang</strong> par un réchauffeur dédié, recommandé en cas de transfusion rapide/massive ou d'agglutinines froides connues — ne jamais improviser un réchauffement (bain-marie, micro-ondes), qui provoque une hémolyse du produit</li>
      <li><strong>Produits irradiés/déleucocytés</strong> à privilégier chez l'immunodéprimé, le nouveau-né ou en contexte d'allogreffe si disponibles (prévention de la réaction du greffon contre l'hôte transfusionnelle)</li>
      <li>Information du patient et recueil du consentement quand la situation le permet ; traçabilité obligatoire (numéro de poche, carte transfusionnelle) et déclaration de toute réaction selon le circuit d'hémovigilance local</li>
    </ul>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : les produits sanguins labiles (CGR, PFC, plaquettes) proviennent du Centre National de Transfusion Sanguine (CNTS) et de ses antennes régionales — disponibilité et délais très variables selon la région, les plaquettes et le PFC étant les plus limités hors CHU. Les produits irradiés/déleucocytés spécifiques ne sont généralement pas disponibles. Anticiper largement toute commande prévisible (obstétrique, chirurgie, anémie chronique sévère) et privilégier le don dirigé par l'entourage si la banque de sang locale est limitée.</p>
  </div>

  <div class="card" id="proto-transfusion-massive">
    <h3>🩸 Protocole de transfusion massive</h3>
    <p class="module-sub" style="margin-bottom:8px;">Défini par la transfusion de ≥10 CGR en 24h, ou ≥4 CGR en 1h avec instabilité persistante, ou remplacement de la masse sanguine totale.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Activer le protocole précocement</strong> — score ABC (Assessment of Blood Consumption) ou score de Shock Index (FC/PAS &gt;1) comme aide à la décision</li>
      <li><strong>Contrôle de l'hémorragie en parallèle</strong> — chirurgie/radiologie interventionnelle/tamponnement, garrot si hémorragie de membre</li>
      <li><strong>Réanimation hémostatique</strong> — objectif <em>damage control resuscitation</em> : hypotension permissive (PAS 80-90 mmHg tant que non contrôlée), limiter les cristalloïdes (<strong>Ringer Lactate/NaCl 0,9% — Baxter®</strong>, 500mL-1L maximum avant produits sanguins)</li>
      <li><strong>Ratio transfusionnel cible 1:1:1</strong> — Concentrés érythrocytaires : Plasma frais congelé : Plaquettes, pour éviter la coagulopathie de dilution</li>
      <li><strong>Acide tranexamique (Exacyl®)</strong> — 1g IV en 10 min puis 1g IV sur 8h, dans les 3h suivant le traumatisme (protocole CRASH-2)</li>
      <li><strong>Calcium ionisé</strong> — surveiller et corriger systématiquement (chélation par le citrate des produits sanguins) ; <strong>gluconate de calcium (Calcium Sandoz®)</strong> 1-2g IV lente (sur 10-15min) si hypocalcémie, répétable</li>
      <li><strong>Prévenir la triade létale</strong> — hypothermie (réchauffement actif, objectif &gt;36°C), acidose, coagulopathie</li>
      <li>Réévaluer biologie toutes les 30-60 min : NFS, TP/TCA, fibrinogène, gaz du sang, calcium ionisé, lactates</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : les concentrés érythrocytaires proviennent du CNTS (Centre National de Transfusion Sanguine) — délai et disponibilité très variables selon la région ; anticiper largement les commandes en cas d'hémorragie prévisible (obstétricale, chirurgicale). Exacyl® et gluconate de calcium sont disponibles en pharmacie hospitalière courante.</p>
  </div>

  <div class="card" id="proto-eer-urgente">
    <h3>🧪 Indications d'épuration extra-rénale (EER) en urgence</h3>
    <p class="module-sub" style="margin-bottom:8px;">Mnémotechnique <strong>AEIOU</strong> pour les indications urgentes de dialyse/hémofiltration :</p>
    <table>
      <tr><th>Indication</th><th>Seuil / Situation</th></tr>
      <tr><td class="grave">Acidose métabolique sévère</td><td>pH &lt;7,1-7,15 réfractaire au traitement médical</td></tr>
      <tr><td class="grave">Électrolytes (hyperkaliémie)</td><td>K+ &gt;6,5 mmol/L ou signes ECG malgré traitement médical maximal</td></tr>
      <tr><td class="grave">Intoxications dialysables</td><td>Metformine (MALA), lithium, salicylés, méthanol/éthylène-glycol, valproate à taux toxique</td></tr>
      <tr><td class="modere">Surcharge hydrique (Overload)</td><td>OAP réfractaire aux diurétiques, anurie avec surcharge menaçante</td></tr>
      <tr><td class="modere">Urémie symptomatique</td><td>Péricardite urémique, encéphalopathie urémique, urée très élevée</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Traitement médical d'attente si EER non accessible :</p>
    <table style="margin-top:6px;">
      <tr><th>Situation</th><th>Traitement</th><th>Posologie</th></tr>
      <tr><td rowspan="4">Hyperkaliémie</td><td>Gluconate de calcium</td><td>1g IV lente en 10 min (stabilisation membranaire, répétable si ECG toujours anormal)</td></tr>
      <tr><td>Insuline rapide (Actrapid®) + Glucosé 30%</td><td>10 UI insuline dans 250mL G30% IV en 30 min (surveiller la glycémie capillaire)</td></tr>
      <tr><td>Salbutamol (Ventoline®)</td><td>10-20mg en nébulisation (5mg/mL, forte dose)</td></tr>
      <tr><td>Bicarbonate de sodium (Lavoisier®) 8,4%</td><td>50-100mL IV (1-2mL/kg) si acidose associée</td></tr>
      <tr><td>Acidose sévère non dialysable</td><td>Bicarbonate de sodium (Lavoisier®) 8,4%</td><td>1-2 mmol/kg IV, à discuter au cas par cas</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : l'hémodialyse en urgence n'est disponible que dans un nombre restreint de centres (principalement CHU Antananarivo). En son absence, le traitement médical maximal ci-dessus doit être optimisé et un transfert organisé si l'état du patient le permet. Insuline, glucosé, calcium et bicarbonate sont disponibles à tous les niveaux hospitaliers (LNMEIS).</p>
  </div>

  <div class="card" id="proto-delirium-reanimation">
    <h3>🧠 Delirium de réanimation</h3>
    <p class="module-sub" style="margin-bottom:8px;">Trouble aigu et fluctuant de l'attention et de la cognition, très fréquent en réanimation (jusqu'à 50-80% des patients ventilés), associé à une surmortalité et des séquelles cognitives.</p>
    <p style="font-weight:600; color:var(--accent2);">Dépistage — CAM-ICU (Confusion Assessment Method for the ICU), positif si :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Début aigu ou évolution fluctuante</strong> de l'état mental (par rapport à l'état de base)</li>
      <li><strong>ET Inattention</strong> (test de vigilance : erreurs à l'épellation d'un mot ou au comptage)</li>
      <li><strong>ET (Pensée désorganisée OU altération du niveau de conscience)</strong> — RASS différent de 0</li>
    </ol>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Prise en charge :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Rechercher et traiter une cause organique</strong> — sepsis, hypoxie, trouble métabolique/ionique, sevrage (alcool, benzodiazépines, opiacés), globe vésical, fécalome, douleur non traitée</li>
      <li><strong>Mesures non pharmacologiques prioritaires</strong> — réorientation répétée, présence des proches, lunettes/appareils auditifs, cycle jour/nuit préservé, mobilisation précoce, limiter les contentions</li>
      <li><strong>Réévaluer/limiter la sédation</strong> — privilégier une sédation légère titrée, éviter les benzodiazépines qui aggravent le delirium</li>
      <li><strong>Traitement pharmacologique en 2e ligne si agitation dangereuse</strong> :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Molécule</th><th>Posologie</th></tr>
      <tr><td><strong>Halopéridol (Haldol®)</strong></td><td>2,5-5mg IV/IM, répétable toutes les 30-60 min si besoin (max ~20mg/j) — surveillance QT systématique</td></tr>
      <tr><td><strong>Quétiapine (Xeroquel®)</strong></td><td>25-50mg x2/j per os si voie orale possible</td></tr>
      <tr><td><strong>Dexmédétomidine (Precedex®)</strong></td><td>0,2-0,7 µg/kg/h IVSE (patient ventilé), alternative aux benzodiazépines</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : l'Haldol® est très largement disponible à tous les niveaux (antipsychotique de base, LNMEIS). La Quétiapine est présente en pharmacie privée des grandes villes. La Dexmédétomidine (Precedex®) n'est généralement disponible qu'en réanimation de CHU — en son absence, privilégier une sédation légère aux benzodiazépines/morphiniques avec fenêtres d'arrêt quotidiennes.</p>
  </div>

  <div class="card" id="proto-prevention-decubitus">
    <h3>🛏️ Prévention des complications de réanimation — Bundles</h3>
    <p class="module-sub" style="margin-bottom:8px;">Ensemble de mesures systématiques appliquées quotidiennement chez tout patient de réanimation, particulièrement s'il est ventilé.</p>
    <p style="font-weight:600; color:var(--accent2);">Bundle "FAST HUG" — check-list quotidienne :</p>
    <table>
      <tr><th>Item</th><th>Action / Posologie</th></tr>
      <tr><td><strong>F</strong>eeding</td><td>Nutrition entérale précoce (dans les 24-48h) sauf contre-indication, débit initial 20-25 mL/h, augmentation progressive selon tolérance</td></tr>
      <tr><td><strong>A</strong>nalgesia</td><td><strong>Paracétamol (Perfalgan®)</strong> 1g x4/j IV (max 4g/j) en 1re intention, <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3mg IV toutes les 5-10 min si besoin</td></tr>
      <tr><td><strong>S</strong>edation</td><td><strong>Midazolam (Hypnovel®)</strong> 0,03-0,1 mg/kg/h IVSE et/ou <strong>Fentanyl/Morphine</strong>, objectif RASS défini, fenêtre d'arrêt quotidienne</td></tr>
      <tr><td><strong>T</strong>hromboembolic prophylaxis</td><td><strong>HBPM (Lovenox®)</strong> 4000 UI (40mg) SC/j en prophylaxie, ou compression pneumatique intermittente si contre-indication</td></tr>
      <tr><td><strong>H</strong>ead of bed elevated</td><td>Décubitus semi-assis 30-45° (prévention des pneumopathies d'inhalation/PAVM)</td></tr>
      <tr><td><strong>U</strong>lcer prevention</td><td><strong>Oméprazole (Mopral®)</strong> 40mg/j IV ou <strong>Pantoprazole (Eupantol®/Inipomp®)</strong> 40mg/j IV si facteurs de risque (ventilation &gt;48h, coagulopathie)</td></tr>
      <tr><td><strong>G</strong>lycemic control</td><td>Contrôle glycémique cible 140-180 mg/dL avec <strong>insuline rapide (Actrapid®)</strong> en IVSE selon protocole de titration horaire (glycémies capillaires répétées)</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Lovenox®, Mopral®/Eupantol®, Doliprane®/Perfalgan®, Actrapid® et Hypnovel® figurent parmi les molécules les plus couramment disponibles dans les pharmacies hospitalières malgaches.</p>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Autres mesures essentielles :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Prévention des escarres — changements de position réguliers, matelas adapté, inspection cutanée quotidienne</li>
      <li>Prévention des infections liées aux cathéters — asepsie à la pose, ablation des dispositifs non indispensables, pansements datés</li>
      <li>Mobilisation précoce et kinésithérapie dès que l'état hémodynamique le permet</li>
      <li>Protocole de sevrage ventilatoire quotidien (cf. module Ventilation)</li>
    </ul>
  </div>

  <div class="card" id="proto-mort-encephalique">
    <h3>⚰️ Mort encéphalique — Diagnostic et prise en charge</h3>
    <p class="module-sub" style="margin-bottom:8px;">Diagnostic clinique reposant sur l'abolition complète et irréversible des fonctions du tronc cérébral, chez un patient normotherme, normotendu, sans sédation ni curare résiduel.</p>
    <p style="font-weight:600; color:var(--accent2);">Prérequis avant l'examen clinique :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li>Cause du coma identifiée et compatible (lésion cérébrale structurelle documentée)</li>
      <li>Exclusion des facteurs confondants : hypothermie (&lt;35°C), sédatifs/curares résiduels, troubles métaboliques ou endocriniens sévères, choc non corrigé</li>
    </ul>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Triade clinique à rechercher (examen répété par 2 médecins, à distance) :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Coma aréactif</strong> — score de Glasgow 3, absence de réponse motrice à la douleur (dans le territoire des nerfs crâniens)</li>
      <li><strong>Abolition de tous les réflexes du tronc cérébral</strong> — photomoteur, cornéen, oculocéphalique, oculo-vestibulaire, toux/nauséeux</li>
      <li><strong>Épreuve d'apnée positive</strong> — absence de tout mouvement respiratoire malgré une PaCO2 &gt;60 mmHg (ou augmentation &gt;20 mmHg par rapport à la valeur de base)</li>
    </ol>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Maintien hémodynamique du patient en attente de décision (si don d'organes envisagé) :</p>
    <p style="font-size:13.5px;">Support par <strong>Noradrénaline (Noradrénaline Aguettant®)</strong> IVSE, débuté à 0,1 µg/kg/min et titré pour objectif de PAM &gt;65 mmHg ; correction du diabète insipide central si présent par <strong>Desmopressine (Minirin®)</strong> 1-4 µg IV/j selon la diurèse (si disponible) ; maintien de la normothermie et de la normoglycémie.</p>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">Confirmation par un examen paraclinique (angioscanner cérébral, EEG, doppler transcrânien) selon le cadre réglementaire local. Aborder la question du don d'organes avec la famille selon la législation en vigueur, en préservant l'hémodynamique et l'oxygénation du patient jusqu'à la décision finale.</p>
  </div>

  <div class="card" id="proto-aaa-rompu">
    <h3>🩸 Anévrysme de l'aorte abdominale (AAA) rompu</h3>
    <div class="warn-box">⚠️ Triade classique (douleur abdominale/lombaire brutale + masse pulsatile + hypotension) présente dans moins de la moitié des cas — y penser devant tout choc hémorragique sans cause évidente chez un patient âgé.</div>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Suspicion clinique</strong> — homme &gt;60 ans, douleur abdominale/lombaire intense brutale, syncope, choc hémorragique, antécédent d'AAA connu ou de tabagisme/HTA</li>
      <li><strong>Ne pas retarder la prise en charge par des examens complémentaires</strong> si patient instable et suspicion forte — appel chirurgical vasculaire immédiat</li>
      <li><strong>Réanimation hémodynamique prudente</strong> — hypotension permissive (PAS cible 80-100 mmHg) avec <strong>Ringer Lactate/NaCl 0,9% (Baxter®)</strong> par bolus de 250-500mL réévalués, éviter le remplissage agressif qui majore le saignement avant contrôle chirurgical</li>
      <li><strong>Groupe sanguin, commande de culots</strong> en urgence auprès du CNTS, activer le protocole de transfusion massive si besoin (<strong>Exacyl®</strong> 1g IV en 10 min puis 1g IV sur 8h)</li>
      <li>Échographie abdominale au lit (FAST) si disponible pour confirmation rapide ; angioscanner uniquement si patient stabilisé transportable</li>
      <li><strong>Transfert immédiat au bloc</strong> — chirurgie ouverte (seule option réaliste dans la majorité des structures malgaches, l'endoprothèse/EVAR n'étant disponible que dans de très rares centres équipés)</li>
    </ol>
  </div>

  <div class="card" id="proto-torsades-pointes">
    <h3>⚡ Torsades de pointes / QT long acquis</h3>
    <table>
      <tr><th>Cause fréquente à rechercher</th><th>Exemple</th></tr>
      <tr><td>Médicamenteuse</td><td>Antiarythmiques (amiodarone, sotalol), antipsychotiques, macrolides, méthadone, antifongiques azolés</td></tr>
      <tr><td>Électrolytique</td><td>Hypokaliémie, hypomagnésémie, hypocalcémie</td></tr>
      <tr><td>Bradycardie sévère</td><td>BAV de haut grade — favorise les torsades "pause-dépendantes"</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Si instabilité hémodynamique ou TV soutenue</strong> → choc électrique non synchronisé immédiat (défibrillation, 200J biphasique)</li>
      <li><strong>Arrêter tout médicament allongeant le QT</strong> en cours</li>
      <li><strong>Sulfate de magnésium (Sulfate de magnésium Lavoisier®)</strong> — 2g IV en 10-15 min (même si magnésémie normale), répétable une fois, puis entretien 1-2g/h IVSE pendant plusieurs heures</li>
      <li><strong>Corriger la kaliémie</strong> — cible haute normale (4,5-5 mmol/L), chlorure de potassium 1-1,5g dilué IVSE sur 1h (jamais en bolus direct)</li>
      <li><strong>Accélérer la fréquence cardiaque</strong> si torsades pause-dépendantes — <strong>Isoprénaline (Isuprel®)</strong> 0,5-10 µg/min IVSE, titrée pour objectif FC 90-110/min, ou entraînement électrosystolique (pacing) temporaire</li>
      <li>Éviter les antiarythmiques de classe Ia/III (procaïnamide, <strong>Amiodarone/Cordarone®</strong>) qui allongent davantage le QT</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : le sulfate de magnésium injectable est très largement disponible (également utilisé en obstétrique pour l'éclampsie — présent jusqu'au niveau CHRD). L'Isoprénaline (Isuprel®) et le matériel d'entraînement électrosystolique sont réservés aux CHU disposant d'une unité de cardiologie/réanimation.</p>
  </div>

  <div class="card" id="proto-fa-rapide">
    <h3>⚡ Fibrillation atriale (FA) à haute fréquence — patient stable</h3>
    <p style="font-size:13px; color:var(--muted); margin-bottom:8px;">Si instabilité hémodynamique (hypotension sévère, OAP, angor, choc) → se référer au protocole "Tachycardies instables" : cardioversion électrique synchronisée immédiate.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Confirmer le diagnostic</strong> — ECG : rythme irrégulier, absence d'onde P organisée</li>
      <li><strong>Contrôle de la fréquence</strong> (stratégie de 1re intention chez la majorité des patients) :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Contexte</th><th>Molécule</th><th>Posologie</th></tr>
      <tr><td rowspan="3">FEVG préservée</td><td><strong>Esmolol (Brevibloc®)</strong></td><td>Bolus 500 µg/kg IV en 1 min, puis 50-200 µg/kg/min IVSE</td></tr>
      <tr><td><strong>Propranolol (Avlocardyl®)</strong></td><td>1mg IV lente, répétable toutes les 5 min (max 5mg) ou 10-40mg x3/j per os</td></tr>
      <tr><td><strong>Diltiazem (Tildiem®)</strong></td><td>0,25 mg/kg IV en 2 min, puis 5-15 mg/h IVSE</td></tr>
      <tr><td rowspan="2">Insuffisance cardiaque / FEVG altérée</td><td><strong>Digoxine (Digoxine Nativelle®)</strong></td><td>0,5mg IV puis 0,25mg toutes les 6h (max 1,5mg/24h), relais per os 0,125-0,25mg/j</td></tr>
      <tr><td><strong>Amiodarone (Cordarone®)</strong></td><td>300mg IV en 1h puis 900-1200mg/24h IVSE</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Anticoagulation — score CHA₂DS₂-VASc :</p>
    <p style="font-size:13.5px;">Évaluer précocement le risque thromboembolique et initier une anticoagulation si indiquée — <strong>HBPM (Lovenox®)</strong> 100 UI/kg x2/j SC en relais initial puis <strong>Warfarine (Coumadine®)</strong> 5mg/j ajustée à l'INR (cible 2-3) si disponibilité de la surveillance INR, en tenant compte du risque hémorragique (score HAS-BLED) et du délai de FA (&lt;48h vs &gt;48h/indéterminé, qui module la faisabilité d'une cardioversion précoce).</p>
    <p style="margin-top:8px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Cordarone® et Digoxine Nativelle® sont largement disponibles. Les anticoagulants oraux directs (AOD) sont peu répandus et coûteux — la Warfarine reste l'option la plus accessible mais nécessite une surveillance INR régulière, souvent limitée aux grandes villes.</p>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">Rechercher systématiquement un facteur déclenchant : sepsis, hyperthyroïdie, embolie pulmonaire, sevrage alcoolique, hypokaliémie.</p>
  </div>

  <div class="card" id="proto-endocardite">
    <h3>🫀 Endocardite infectieuse aiguë</h3>
    <p class="module-sub" style="margin-bottom:8px;">Y penser devant fièvre prolongée inexpliquée + souffle cardiaque nouveau/modifié, terrain à risque (valvulopathie, notamment rhumatismale — très fréquente à Madagascar, prothèse valvulaire, toxicomanie IV, dispositif intracardiaque).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Hémocultures</strong> — 3 paires à au moins 30 min d'intervalle, sur sites différents, <strong>avant toute antibiothérapie</strong> si patient stable</li>
      <li><strong>Échocardiographie</strong> (transthoracique puis transœsophagienne si forte suspicion et ETT non concluante) — recherche de végétation, abcès, désinsertion de prothèse</li>
      <li><strong>Antibiothérapie probabiliste précoce si sepsis sévère/choc septique</strong> — sans attendre les résultats bactériologiques :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Association</th><th>Posologie</th></tr>
      <tr><td><strong>Amoxicilline (Clamoxyl®)</strong> + <strong>Gentamicine (Gentalline®)</strong></td><td>Amoxicilline 200mg/kg/j IV en 4-6 injections (max 12g/j) + Gentamicine 3mg/kg/j IV en 1 injection</td></tr>
      <tr><td><strong>Ceftriaxone (Rocéphine®)</strong> + Gentamicine</td><td>Ceftriaxone 2g/j IV en 1 injection + Gentamicine 3mg/kg/j IV, si allergie/résistance suspectée</td></tr>
      <tr><td><strong>Cloxacilline</strong> + Gentamicine</td><td>Cloxacilline 2g x6/j IV + Gentamicine 3mg/kg/j, si suspicion staphylococcique</td></tr>
    </table>
    <p style="margin-top:8px; font-size:13.5px;">Durée totale de traitement : 4 à 6 semaines selon le germe et la présence d'une valve prothétique.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Rechercher les signes de gravité</strong> — insuffisance cardiaque aiguë par fuite valvulaire, trouble de conduction (BAV = abcès septal), embolies systémiques (AVC, ischémie de membre, infarctus splénique/rénal)</li>
      <li><strong>Avis chirurgical cardiaque précoce</strong> si insuffisance cardiaque réfractaire, infection non contrôlée, végétation volumineuse à haut risque embolique, ou abcès péri-annulaire — la chirurgie cardiaque n'étant disponible qu'à l'étranger ou dans de très rares centres, anticiper un transfert précoce si l'indication est posée</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Clamoxyl®, Gentalline® et Rocéphine® sont disponibles à tous les niveaux hospitaliers (LNMEIS). La Cloxacilline et la Céfazoline sont d'accès plus limité, surtout hors CHU.</p>
  </div>

  <div class="card" id="proto-pericardite-myocardite">
    <h3>🫀 Péricardite aiguë / Myocardite fulminante</h3>
    <table>
      <tr><th>Situation</th><th>Éléments clés</th></tr>
      <tr><td>Péricardite aiguë simple</td><td>Douleur thoracique positionnelle (soulagée en antéflexion), frottement péricardique, sus-décalage ST diffus concave sans miroir, sous-décalage PQ</td></tr>
      <tr><td class="grave">Myocardite fulminante</td><td>Douleur thoracique + signes d'insuffisance cardiaque aiguë/choc cardiogénique + troubles du rythme/conduction, élévation des troponines disproportionnée</td></tr>
    </table>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Péricardite aiguë simple, non compliquée :</p>
    <ul style="margin-left:18px; font-size:13.5px; line-height:1.9;">
      <li><strong>Ibuprofène (Brufen®/Nurofen®)</strong> 600-800mg x3/j per os <em>ou</em> <strong>Aspirine (Aspégic®)</strong> 750-1000mg x3/j per os, pendant 1-2 semaines puis décroissance</li>
      <li>+ <strong>Colchicine (Colchicine Opocalcium®)</strong> 0,5mg x2/j (0,5mg/j si &lt;70kg) pendant 3 mois — réduction du risque de récidive</li>
      <li>Repos, éviter l'effort physique jusqu'à résolution des symptômes et normalisation biologique</li>
      <li>Rechercher un épanchement associé par échocardiographie — surveiller le risque de tamponnade</li>
    </ul>
    <p style="margin-top:10px; font-weight:600; color:var(--accent2);">Myocardite fulminante — urgence vitale :</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Monitorage continu</strong> — risque de trouble du rythme ventriculaire et de choc cardiogénique rapidement évolutif</li>
      <li><strong>Support hémodynamique</strong> selon présentation — <strong>Dobutamine (Dobutrex®)</strong> 5-15 µg/kg/min IVSE ou <strong>Noradrénaline (Noradrénaline Aguettant®)</strong> 0,1-1 µg/kg/min IVSE titrée, voire assistance circulatoire mécanique (ECMO/ECLS) dans les formes les plus sévères, non disponible à Madagascar — transfert international à discuter selon contexte</li>
      <li><strong>IRM cardiaque et/ou biopsie myocardique</strong> à distance de la phase aiguë pour orientation étiologique (non disponible localement — orientation clinique et échographique en pratique courante)</li>
      <li>Transfert précoce vers un centre disposant d'une réanimation cardiologique si instabilité progressive</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Aspégic®, Colchicine Opocalcium® et Dobutrex® sont disponibles en pharmacie hospitalière des grandes villes. L'assistance circulatoire mécanique n'existe pas sur le territoire — le traitement médical maximal reste l'unique option locale.</p>
  </div>

  <div class="card" id="proto-guillain-barre">
    <h3>🧠 Syndrome de Guillain-Barré</h3>
    <p class="module-sub" style="margin-bottom:8px;">Polyradiculonévrite aiguë auto-immune — faiblesse motrice ascendante souvent précédée d'un épisode infectieux (2-4 semaines avant), risque vital par atteinte respiratoire et dysautonomie.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Surveillance rapprochée de la fonction respiratoire</strong> — mesure répétée de la capacité vitale (CV) ; hospitalisation en réanimation si CV &lt;20 mL/kg, baisse rapide, ou troubles de la déglutition</li>
      <li><strong>Surveillance cardiovasculaire</strong> — dysautonomie fréquente : variations tensionnelles majeures, troubles du rythme, risque d'arrêt cardiaque brutal</li>
      <li><strong>Ponction lombaire</strong> — dissociation albumino-cytologique typique (protéinorachie élevée, cellularité normale), peut être normale la 1re semaine</li>
      <li><strong>Traitement spécifique précoce</strong> — <strong>Immunoglobulines IV (Tegeline®/Privigen®)</strong> 0,4g/kg/j en perfusion IV sur 5 jours (dose totale 2g/kg) <em>ou</em> échanges plasmatiques (4-6 séances), à débuter idéalement dans les 2 semaines suivant le début des symptômes</li>
      <li><strong>Prévention systématique</strong> — thromboprophylaxie (<strong>HBPM/Lovenox®</strong> 4000 UI SC/j), prévention des escarres, kinésithérapie précoce, prise en charge de la douleur neuropathique (<strong>Gabapentine/Neurontin®</strong> 300mg x3/j en titration progressive ou <strong>Amitriptyline/Laroxyl®</strong> 10-25mg au coucher)</li>
      <li>Anticiper une intubation élective avant l'épuisement respiratoire plutôt qu'en urgence sur décompensation brutale</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : les Immunoglobulines IV et les échanges plasmatiques ne sont <strong>pas disponibles en pratique courante</strong> à Madagascar — leur obtention nécessite une importation spécifique (coût très élevé) ou un transfert vers un centre de La Réunion/Maurice si les moyens du patient le permettent. En leur absence, la prise en charge repose sur les soins de support (surveillance respiratoire rapprochée, prévention des complications de décubitus, kinésithérapie), qui restent le déterminant principal du pronostic en contexte de ressources limitées. Lovenox® et Laroxyl® sont largement disponibles.</p>
  </div>

  <div class="card" id="proto-myasthenie">
    <h3>🧠 Crise myasthénique</h3>
    <p class="module-sub" style="margin-bottom:8px;">Décompensation aiguë d'une myasthénie auto-immune, avec risque vital par détresse respiratoire (atteinte des muscles respiratoires) et troubles de déglutition (fausses routes).</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Rechercher un facteur déclenchant</strong> — infection intercurrente, chirurgie récente, arrêt/sous-dosage du traitement, certains médicaments contre-indiqués (aminoglycosides, bêtabloquants, magnésium IV, curares)</li>
      <li><strong>Évaluation respiratoire répétée</strong> — mesure de la capacité vitale, surveillance de la toux et de la déglutition ; intubation élective précoce si épuisement respiratoire prévisible</li>
      <li><strong>Distinguer crise myasthénique vs crise cholinergique</strong> (surdosage en anticholinestérasiques — <strong>Pyridostigmine/Mestinon®</strong> habituellement 60mg x3-6/j per os) — la crise cholinergique associe des signes muscariniques (myosis, hypersialorrhée, diarrhée, bradycardie, sueurs) : dans le doute, suspendre les anticholinestérasiques</li>
      <li><strong>Traitement spécifique</strong> — Immunoglobulines IV 0,4g/kg/j x5j ou échanges plasmatiques (efficacité comparable), corticothérapie (<strong>Prednisolone/Cortancyl®</strong> 1mg/kg/j per os) à distancer de la phase aiguë (risque d'aggravation transitoire)</li>
      <li>Éviter formellement les curares non dépolarisants à dose standard (sensibilité accrue) et la succinylcholine (résistance relative) si intubation nécessaire — avis anesthésique spécialisé</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : le Mestinon® (pyridostigmine) est le traitement de fond, généralement importé/commandé en pharmacie privée à Antananarivo — anticiper les ruptures de stock chez les patients connus. Comme pour le Guillain-Barré, les immunoglobulines IV et les échanges plasmatiques ne sont pas disponibles localement ; la corticothérapie (Cortancyl®) est largement accessible et reste souvent la seule option immunomodulatrice réalisable sur place.</p>
  </div>

  <div class="card" id="proto-compression-medullaire">
    <h3>🧠 Compression médullaire aiguë</h3>
    <div class="warn-box">⚠️ Urgence neurochirurgicale — le pronostic fonctionnel dépend directement du délai de décompression. Toute suspicion impose une imagerie en urgence.</div>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes d'alerte</strong> — douleur rachidienne intense, déficit moteur des membres progressif, niveau sensitif net, troubles sphinctériens (rétention urinaire, incontinence), syndrome de la queue de cheval (anesthésie en selle, troubles génito-sphinctériens bilatéraux)</li>
      <li><strong>Étiologies à rechercher</strong> — métastase vertébrale (cancer connu), abcès épidural (fièvre, terrain à risque, tuberculose vertébrale/mal de Pott fréquente à Madagascar), hématome épidural (anticoagulation, geste récent), hernie discale volumineuse</li>
      <li><strong>IRM médullaire en urgence</strong> (séquence de choix, disponible uniquement dans quelques centres à Antananarivo) — scanner si IRM non disponible/contre-indiquée</li>
      <li><strong>Corticothérapie IV à forte dose</strong> si compression tumorale suspectée — <strong>Dexaméthasone (Dectancyl®/Soludécadron®)</strong> 10mg IV en bolus puis 4mg IV toutes les 6h, en concertation avec le neurochirurgien</li>
      <li><strong>Contact neurochirurgical immédiat</strong> — décompression chirurgicale en urgence si déficit progressif ; radiothérapie en urgence si compression tumorale non chirurgicale (disponibilité très limitée à Madagascar)</li>
      <li>Si abcès épidural suspecté (notamment tuberculeux) : <strong>antibiothérapie/antituberculeux probabiliste</strong> après hémocultures/prélèvements (quadrithérapie antituberculeuse standard : Rifampicine 10mg/kg/j + Isoniazide 5mg/kg/j + Pyrazinamide 25mg/kg/j + Éthambutol 15mg/kg/j), sans retarder l'imagerie ni la décompression</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Dectancyl®/Soludécadron® sont disponibles à tous les niveaux hospitaliers. Le mal de Pott (spondylodiscite tuberculeuse) est une cause fréquente sous ces latitudes — les antituberculeux de 1re ligne sont distribués gratuitement via le Programme National de lutte contre la Tuberculose et doivent être considérés précocement dans ce contexte.</p>
  </div>

  <div class="card" id="proto-paracetamol">
    <h3>💊 Intoxication au paracétamol (acétaminophène)</h3>
    <p class="module-sub" style="margin-bottom:8px;">Intoxication médicamenteuse la plus fréquente — toxicité hépatique retardée (24-72h), souvent asymptomatique initialement : ne jamais sous-estimer une ingestion rapportée comme "banale".</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Dater précisément l'heure d'ingestion</strong> — élément indispensable à l'interprétation du dosage plasmatique</li>
      <li><strong>Dosage du paracétamol plasmatique</strong> à H4 minimum après ingestion (dosage plus précoce non interprétable) — report sur le <strong>nomogramme de Rumack-Matthew</strong></li>
      <li><strong>Charbon activé (Carbomix®)</strong> — 1g/kg per os (max 50g), si ingestion &lt;2h et patient coopérant/voies aériennes protégées</li>
      <li><strong>N-acétylcystéine (NAC)</strong> — antidote spécifique, d'autant plus efficace que débutée précocement (idéalement &lt;8h) :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Schéma IV classique (3 perfusions)</th><th>Posologie</th></tr>
      <tr><td>1re perfusion</td><td>150 mg/kg dans 200mL Glucosé 5% en 1h</td></tr>
      <tr><td>2e perfusion</td><td>50 mg/kg dans 500mL Glucosé 5% en 4h</td></tr>
      <tr><td>3e perfusion</td><td>100 mg/kg dans 1000mL Glucosé 5% en 16h</td></tr>
      <tr><td>Alternative orale (si IV indisponible)</td><td>140 mg/kg dose de charge puis 70 mg/kg toutes les 4h pendant 72h (17 doses au total)</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : le Fluimucil®/Exomuc® existe surtout en présentation orale (mucolytique) dans les pharmacies malgaches — la <strong>forme injectable est nettement moins répandue</strong> et généralement limitée aux pharmacies hospitalières des CHU. En son absence, la NAC orale (schéma prolongé, 72h ci-dessus) peut être utilisée comme alternative si le patient est capable de la tolérer (moins efficace en cas de vomissements associés). Le Carbomix® est présent en pharmacie hospitalière mais pas systématiquement en stock — le charbon activé générique reste l'option la plus courante.</p>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">Surveiller transaminases, TP/INR, fonction rénale, lactates et pH répétés. Critères de gravité (King's College) orientant vers une transplantation hépatique en urgence (non disponible à Madagascar — transfert international à envisager selon les moyens) : pH &lt;7,3, ou association INR &gt;6,5 + créatinine &gt;300µmol/L + encéphalopathie grade III-IV.</p>
  </div>

  <div class="card" id="proto-opiaces">
    <h3>💉 Overdose aux opiacés</h3>
    <p class="module-sub" style="margin-bottom:8px;">Triade classique : trouble de conscience + dépression respiratoire (bradypnée &lt;12/min) + myosis serré bilatéral.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Priorité aux voies aériennes et à la ventilation</strong> — assister la ventilation au masque si bradypnée sévère/apnée, en attendant l'effet de l'antidote</li>
      <li><strong>Naloxone (Narcan®)</strong> — antagoniste opioïde spécifique, titration prudente pour éviter un syndrome de sevrage brutal :</li>
    </ol>
    <table style="margin-top:6px;">
      <tr><th>Voie</th><th>Posologie</th></tr>
      <tr><td>IV (titration)</td><td>0,04-0,1mg toutes les 2-3 min jusqu'à reprise d'une ventilation efficace (max ~2mg au total en 1re intention, éviter le réveil brutal complet)</td></tr>
      <tr><td>IM/SC</td><td>0,4-2mg dose unique si voie IV non disponible</td></tr>
      <tr><td>Entretien</td><td>Perfusion continue à 2/3 de la dose efficace initiale par heure, si opioïde à demi-vie longue (méthadone, tramadol retard) — la naloxone a une durée d'action courte (30-90 min), risque de re-narcotisation</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : la Naloxone injectable (Narcan®) est présente dans les pharmacies hospitalières disposant d'un service d'anesthésie-réanimation (utilisée classiquement en antagonisation post-opératoire), mais reste souvent absente des formations sanitaires de base (CSB). Les intoxications aux opiacés forts restent rares à Madagascar comparativement au tramadol et à la codéine, disponibles sur ordonnance — anticiper une disponibilité limitée en zone rurale et un transfert rapide si besoin.</p>
    <p style="margin-top:8px; font-size:13px; color:var(--muted);">Surveillance prolongée obligatoire après réveil (minimum 4-6h, davantage si opioïde à longue durée d'action) — risque de récidive de la dépression respiratoire à la levée de l'effet de la naloxone. Rechercher une co-ingestion (benzodiazépines, alcool) qui aggrave le tableau et n'est pas antagonisée par la naloxone.</p>
  </div>

  <div class="card" id="proto-tricycliques">
    <h3>💊 Intoxication aux antidépresseurs tricycliques</h3>
    <div class="warn-box">⚠️ Toxicité cardiaque potentiellement mortelle par effet stabilisant de membrane — surveillance ECG systématique et répétée, même si le patient est initialement asymptomatique.</div>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>ECG systématique dès l'arrivée</strong> — rechercher un élargissement du QRS (&gt;100ms = risque convulsif, &gt;160ms = risque de trouble du rythme ventriculaire grave), une déviation axiale droite, une onde R en aVR</li>
      <li><strong>Surveillance neurologique</strong> — risque convulsif et coma profond avec dépression respiratoire</li>
      <li><strong>Traitement de référence en cas de QRS large ou trouble du rythme : bicarbonate de sodium molaire (8,4%) (Bicarbonate de sodium Lavoisier®)</strong> — 1-2 mmol/kg IV en bolus (soit 1-2 mL/kg de la solution à 8,4%), répétable toutes les 10-15 min jusqu'à obtenir un QRS &lt;100ms, objectif pH 7,50-7,55 — alcalinisation qui contre l'effet stabilisant de membrane</li>
      <li><strong>Traiter les convulsions</strong> par <strong>Diazépam (Valium®)</strong> 5-10mg IV lente, répétable toutes les 5-10 min si besoin</li>
      <li><strong>Contre-indiquer les antiarythmiques de classe Ia et III</strong> (aggravent l'effet stabilisant de membrane) en cas de trouble du rythme ventriculaire</li>
      <li>Charbon activé (Carbomix®) 1g/kg per os si ingestion récente (&lt;1-2h) et voies aériennes protégées</li>
      <li>Émulsion lipidique IV (Intralipid® 20%) — bolus 1,5 mL/kg IV en 1 min puis 0,25 mL/kg/min IVSE, à discuter en cas d'arrêt cardiaque réfractaire d'origine toxique</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : l'Amitriptyline (Laroxyl®) est l'un des antidépresseurs tricycliques les plus largement prescrits localement (accessible et peu coûteux), ce qui en fait une cause d'intoxication volontaire relativement fréquente. Le Bicarbonate de sodium Lavoisier® et le Valium® sont disponibles à tous les niveaux hospitaliers. L'Intralipid® est présent dans les pharmacies des CHU (également utilisé en nutrition parentérale).</p>
  </div>

  <div class="card" id="proto-digitalique">
    <h3>💊 Intoxication digitalique</h3>
    <p class="module-sub" style="margin-bottom:8px;">Marge thérapeutique étroite — intoxication aiguë (ingestion massive) ou chronique (accumulation sur insuffisance rénale/interaction médicamenteuse), favorisée par l'hypokaliémie.</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Signes cliniques</strong> — troubles digestifs (nausées, vomissements), troubles visuels (halos colorés, xanthopsie), confusion, et surtout <strong>troubles du rythme cardiaque variés</strong> (bradycardie, BAV, extrasystoles ventriculaires, tachycardie atriale avec bloc)</li>
      <li><strong>Dosage de la digoxinémie</strong> et ionogramme (kaliémie — corréler à la sévérité)</li>
      <li><strong>ECG répété</strong> — quasiment tout trouble du rythme est possible ("l'arythmie qui ressemble à toutes les autres")</li>
      <li><strong>Bradycardie/BAV symptomatique</strong> — <strong>Atropine</strong> 0,5-1mg IV, répétable (max 3mg)</li>
      <li><strong>Corriger la kaliémie avec prudence</strong> — hypokaliémie à corriger progressivement par voie IVSE (aggrave la toxicité si trop rapide), <strong>ne jamais administrer de calcium IV</strong> en cas d'hyperkaliémie associée à une intoxication digitalique (risque de majoration de l'arythmie)</li>
      <li><strong>Antidote spécifique : anticorps anti-digoxine (fragments Fab, ex. Digidot®/DigiFab®)</strong> — 1 flacon neutralise ~0,5mg de digoxine, dose calculée selon la digoxinémie ou empiriquement 5-10 flacons si intoxication aiguë massive — indiqué si trouble du rythme grave, hyperkaliémie sévère associée, ou choc</li>
      <li>Éviter la cardioversion électrique si possible (risque de fibrillation ventriculaire réfractaire sur cœur digitalisé) sauf arrêt cardiaque</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : les anticorps anti-digoxine (Digidot®/DigiFab®) ne sont <strong>pas disponibles</strong> sur le territoire malgache — antidote à commander en urgence auprès d'un centre antipoison international si les moyens le permettent. En son absence, le traitement repose sur le traitement symptomatique du trouble du rythme (Atropine, entraînement électrosystolique si disponible en CHU) et la correction prudente de la kaliémie, dans l'attente d'une élimination spontanée. La Digoxine Nativelle® elle-même est largement disponible et utilisée, ce qui rend cette intoxication iatrogène possible en pratique courante.</p>
  </div>

  <div class="card" id="proto-trauma-rachis">
    <h3>🦴 Traumatisme du rachis</h3>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Immobilisation rachidienne dès la prise en charge</strong> — collier cervical rigide, matelas-coquille/plan dur, retrait précoce dès que possible (risque d'escarres et de difficultés d'intubation si maintenue trop longtemps)</li>
      <li><strong>Examen neurologique complet et daté</strong> — cotation motrice par myotome, niveau sensitif, réflexes, tonus du sphincter anal (référentiel ASIA/ISNCSCI si disponible)</li>
      <li><strong>Rechercher un choc spinal / choc neurogénique</strong> — hypotension avec bradycardie paradoxale (perte du tonus sympathique) : remplissage prudent (<strong>Ringer Lactate/Baxter®</strong> 250-500mL réévalués), <strong>Noradrénaline (Noradrénaline Aguettant®)</strong> 0,1-1 µg/kg/min IVSE titrée pour PAM &gt;85-90 mmHg si besoin plutôt que remplissage massif ; <strong>Atropine</strong> 0,5-1mg IV si bradycardie symptomatique associée</li>
      <li><strong>Imagerie</strong> — scanner rachidien en urgence si suspicion clinique (critères NEXUS/Canadian C-Spine pour le rachis cervical) ; IRM si déficit neurologique pour évaluer les parties molles/moelle (accès limité hors Antananarivo)</li>
      <li><strong>Maintenir une pression de perfusion médullaire adéquate</strong> — objectif PAM &gt;85-90 mmHg dans les traumatismes médullaires aigus (limiter l'ischémie médullaire secondaire) grâce aux vasopresseurs</li>
      <li><strong>Analgésie</strong> — <strong>Paracétamol (Perfalgan®)</strong> 1g x4/j IV + <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3mg IV toutes les 5-10 min selon l'intensité douloureuse</li>
      <li><strong>Avis neurochirurgical/orthopédique urgent</strong> si instabilité rachidienne ou déficit neurologique — décompression chirurgicale précoce si compression documentée</li>
      <li>Prévention systématique des complications de décubitus (escarres, thrombose veineuse par <strong>HBPM/Lovenox®</strong> 4000 UI SC/j dès que l'hémostase le permet, rétention urinaire) dès la phase initiale</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : Noradrénaline Aguettant®, Morphine Aguettant® et Lovenox® sont disponibles dans les hôpitaux de référence (CHU/CHRR). La corticothérapie à forte dose (méthylprednisolone) n'est plus recommandée en routine (bénéfice non démontré, risque infectieux/hémorragique) et n'est donc pas à privilégier même si disponible.</p>
  </div>

  <div class="card" id="proto-trauma-thoracique">
    <h3>🫁 Traumatisme thoracique</h3>
    <table>
      <tr><th>Lésion</th><th>Signes / Conduite</th></tr>
      <tr><td class="grave">Volet costal (fractures de côtes multiples et étagées)</td><td>Respiration paradoxale, douleur intense limitant la ventilation → analgésie multimodale puissante (péridurale/bloc paravertébral si possible, sinon <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3mg IV + <strong>Paracétamol (Perfalgan®)</strong> 1g x4/j IV systématique), kinésithérapie respiratoire, ventilation non invasive ou invasive si épuisement</td></tr>
      <tr><td class="grave">Hémothorax</td><td>Matité + abolition du murmure vésiculaire → drainage thoracique ; si &gt;1500mL initial ou &gt;200mL/h sur 2-4h → thoracotomie d'hémostase</td></tr>
      <tr><td class="modere">Contusion pulmonaire</td><td>Opacités à l'imagerie, hypoxémie progressive sur 24-48h → surveillance rapprochée, oxygénothérapie, éviter le remplissage excessif</td></tr>
      <tr><td class="grave">Pneumothorax suffocant</td><td>Se référer au protocole dédié — exsufflation/drainage en urgence</td></tr>
      <tr><td class="grave">Tamponnade traumatique</td><td>Se référer au protocole dédié — péricardiocentèse/thoracotomie en urgence</td></tr>
      <tr><td class="modere">Rupture diaphragmatique</td><td>À évoquer sur traumatisme abdomino-thoracique violent, souvent de diagnostic différé</td></tr>
    </table>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : l'analgésie multimodale (Perfalgan® 1g x4/j / Morphine Aguettant® titrée) est réalisable dans la plupart des hôpitaux ; les techniques d'analgésie locorégionale (péridurale thoracique, bloc paravertébral) restent l'apanage des CHU disposant d'anesthésistes formés. En leur absence, une titration morphinique rigoureuse associée à la kinésithérapie reste l'option de référence.</p>
    <p style="margin-top:10px; font-size:13px; color:var(--muted);">Toujours répéter l'examen clinique et l'imagerie — de nombreuses lésions thoraciques s'aggravent ou ne deviennent apparentes que dans les heures suivant le traumatisme.</p>
  </div>

  <div class="card" id="proto-syndrome-loges">
    <h3>🦵 Syndrome des loges (syndrome compartimental aigu)</h3>
    <div class="warn-box">⚠️ Urgence chirurgicale — le délai avant fasciotomie conditionne directement la récupération fonctionnelle du membre (ischémie musculaire irréversible au-delà de 6-8h).</div>
    <p style="font-weight:600; color:var(--accent2); margin-bottom:6px;">Signes cliniques — mnémotechnique des "6 P" (les paresthésies et la douleur sont les signes les plus précoces, ne pas attendre les signes tardifs) :</p>
    <p style="font-size:13.5px;">🔹 <strong>P</strong>ain disproportionné à l'étirement passif 🔹 <strong>P</strong>aresthésies 🔹 <strong>P</strong>âleur 🔹 <strong>P</strong>oïkilothermie (membre froid) 🔹 <strong>P</strong>ouls diminué/aboli (signe tardif) 🔹 <strong>P</strong>aralysie (signe tardif, séquelle imminente)</p>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Contexte à risque</strong> — fracture de jambe/avant-bras, traumatisme par écrasement, ischémie-reperfusion après revascularisation, brûlure circulaire, compression prolongée</li>
      <li><strong>Retirer tout dispositif circonférentiel</strong> (plâtre, bandage, attelle serrée) et surélever le membre au niveau du cœur (pas au-dessus, ce qui réduirait la perfusion)</li>
      <li><strong>Mesure de la pression intracompartimentale</strong> si disponible — diagnostic retenu si pression &gt;30mmHg ou différentiel avec la pression diastolique (ΔP) &lt;20-30mmHg</li>
      <li><strong>Analgésie forte</strong> — <strong>Morphine (Morphine Aguettant®)</strong> titrée par bolus de 2-3mg IV toutes les 5-10 min (la douleur disproportionnée est elle-même un signe diagnostique — ne pas masquer excessivement avant l'évaluation chirurgicale)</li>
      <li><strong>Fasciotomie chirurgicale en urgence</strong> dès la suspicion clinique forte — ne pas attendre la disparition des pouls périphériques (souvent conservés jusqu'à un stade avancé)</li>
      <li>Surveillance de la fonction rénale (risque de rhabdomyolyse associée) — hyperhydratation par <strong>Ringer Lactate/NaCl 0,9% (Baxter®)</strong> selon protocole rhabdomyolyse</li>
    </ol>
  </div>

  <div class="card" id="proto-trauma-abdominal">
    <h3>🫃 Traumatisme abdominal fermé</h3>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Évaluation ABCDE</strong> — l'abdomen peut être une source de choc hémorragique occulte majeur sans signe externe évident</li>
      <li><strong>FAST écho (Focused Assessment with Sonography for Trauma)</strong> au lit dès l'arrivée si disponible — recherche d'épanchement péritonéal libre (poches de Morrison, péri-splénique, pelvienne)</li>
      <li><strong>Organes les plus fréquemment lésés</strong> — rate (souvent isolée), foie, mésentère/intestin (moins visible en FAST, y penser si douleur persistante malgré imagerie initiale normale)</li>
      <li><strong>Réanimation initiale</strong> — <strong>Ringer Lactate/NaCl 0,9% (Baxter®)</strong> par bolus de 500mL réévalués, transfusion selon besoin (protocole transfusion massive si instabilité majeure), <strong>Exacyl®</strong> 1g IV en 10 min puis 1g sur 8h selon protocole</li>
      <li><strong>Instabilité hémodynamique + FAST positif</strong> → laparotomie exploratrice en urgence sans délai pour scanner</li>
      <li><strong>Patient stable</strong> → angioscanner abdominal avec injection pour bilan lésionnel précis, grading des lésions spléniques/hépatiques</li>
      <li><strong>Prise en charge non opératoire possible</strong> (surveillance en réanimation, embolisation radiologique si saignement actif localisé — non disponible dans la plupart des structures malgaches) si patient stable ou stabilisé</li>
      <li>Réévaluation clinique répétée — un abdomen initialement rassurant peut se dégrader secondairement (rupture en 2 temps splénique, perforation digestive retardée)</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : l'embolisation radiologique interventionnelle n'est pas disponible localement — la prise en charge non opératoire repose donc essentiellement sur la surveillance clinique rapprochée et l'imagerie répétée, avec un seuil d'indication chirurgicale plus bas qu'en contexte de haute technicité.</p>
  </div>

  <div class="card" id="proto-fracture-bassin">
    <h3>🦴 Fracture du bassin instable / Hémorragie pelvienne</h3>
    <p class="module-sub" style="margin-bottom:8px;">D'après l'ATLS 10th Ed. et les recommandations WSES/EAST sur l'hémorragie liée aux fractures du bassin. Cause fréquente de choc hémorragique occulte dans le polytraumatisme (traumatisme à haute énergie, chute de hauteur, accident de la route) — l'hémorragie est le plus souvent d'origine veineuse (plexus veineux pelvien) et non artérielle.</p>
    <div class="warn-box">⚠️ Ne jamais mobiliser le bassin de façon répétée pour rechercher une instabilité clinique (manœuvre de compression/écartement des ailes iliaques) — ce geste peut déloger un caillot stabilisateur et aggraver l'hémorragie. Une seule évaluation prudente suffit ; se fier ensuite à l'imagerie.</div>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2;">
      <li><strong>Suspicion clinique</strong> — mécanisme à haute énergie, douleur/instabilité pelvienne à la palpation douce (une seule fois), raccourcissement d'un membre inférieur, hématome scrotal/périnéal, sang au méat urétral (suspecter une lésion urétrale associée, ne pas sonder à l'aveugle), choc hémorragique sans autre cause évidente</li>
      <li><strong>Contention pelvienne immédiate</strong> dès la suspicion, avant même la confirmation radiologique — <strong>ceinture pelvienne (pelvic binder)</strong> positionnée au niveau des grands trochanters (et non sur les crêtes iliaques), ou à défaut un drap plié serré autour du bassin et noué (technique de fortune efficace en l'absence de dispositif dédié) ; réduit le volume pelvien et favorise la tamponnade du saignement veineux</li>
      <li><strong>Réanimation hémodynamique</strong> selon les principes du <em>damage control resuscitation</em> — hypotension permissive (PAS 80-90 mmHg tant que l'hémorragie n'est pas contrôlée), <strong>Ringer Lactate/NaCl 0,9% (Baxter®)</strong> par bolus limités, transfusion précoce si choc hémorragique (<em>voir protocole Transfusion massive</em>), <strong>Exacyl®</strong> 1g IV en 10 min puis 1g sur 8h dans les 3h suivant le traumatisme</li>
      <li><strong>Imagerie</strong> — radiographie du bassin de face en urgence si angioscanner non immédiatement disponible ; angioscanner corps entier dès que l'état hémodynamique le permet (recherche d'un saignement artériel actif, bilan lésionnel associé)</li>
      <li><strong>Instabilité hémodynamique persistante malgré ceinture pelvienne et remplissage</strong> — avis chirurgical/orthopédique en urgence absolue pour stabilisation mécanique complémentaire (fixateur externe) et recherche d'une autre source hémorragique associée (thoracique, abdominale, fémorale) souvent responsable du choc en cas de fracture pelvienne isolée non contrôlée par la ceinture</li>
      <li><strong>Contrôle définitif du saignement pelvien</strong> — selon le plateau technique disponible : packing pelvien préperitonéal chirurgical (technique la plus accessible en l'absence de radiologie interventionnelle), fixateur externe ; l'embolisation artérielle radiologique et le REBOA (occlusion aortique par ballonnet), non disponibles dans la majorité des structures malgaches, restent l'option de référence dans les centres équipés</li>
      <li>Rechercher systématiquement les lésions associées fréquentes — vessie, urètre (ne pas sonder si sang au méat/hématome scrotal sans avis urologique), rectum, plexus lombo-sacré, vaisseaux fémoraux</li>
      <li>Prévention des complications de décubitus/escarres liées à l'immobilisation prolongée dès la phase aiguë (<em>voir protocole Prévention des complications de réanimation</em>)</li>
    </ol>
    <p style="margin-top:10px; font-size:12.5px; color:var(--muted);">💊 <strong>Disponibilité Madagascar</strong> : les ceintures pelviennes dédiées sont rarement disponibles hors CHU — le drap noué reste une alternative de première intention largement applicable. L'embolisation radiologique interventionnelle et le REBOA ne sont pas disponibles ; le contrôle chirurgical (packing préperitonéal, fixateur externe) et un transfert précoce vers un centre disposant d'un plateau chirurgical orthopédique doivent être organisés sans délai en cas d'instabilité persistante.</p>
  </div>

  <div class="card" id="proto-peste">
    <h3>🐀 Peste (bubonique / pulmonaire)</h3>
    <div class="warn-box">⚠️ Maladie à déclaration obligatoire, endémique dans les Hautes Terres malgaches — la forme pulmonaire est hautement contagieuse par voie aérienne (gouttelettes) : isolement respiratoire immédiat de tout cas suspect.</div>
    <table>
      <tr><th>Forme</th><th>Présentation</th></tr>
      <tr><td>Bubonique</td><td>Adénopathie douloureuse volumineuse (bubon), inguinale/axillaire/cervicale, fièvre élevée d'apparition brutale, notion d'exposition à des puces de rongeurs ou séjour en zone d'enzootie (régions d'altitude)</td></tr>
      <tr><td class="grave">Pulmonaire (primaire ou secondaire)</td><td>Toux, dyspnée, hémoptysie, détresse respiratoire rapidement progressive — mortalité très élevée sans traitement précoce</td></tr>
      <tr><td class="grave">Septicémique</td><td>Choc septique, CIVD, nécroses cutanées ("mort noire")</td></tr>
    </table>
    <ol style="margin-left:18px; font-size:13.5px; line-height:2; margin-top:8px;">
      <li><strong>Isolement immédiat</strong> (précautions gouttelettes/air pour la forme pulmonaire) dès la suspicion clinique, avant confirmation</li>
